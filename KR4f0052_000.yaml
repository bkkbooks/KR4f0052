front:
  text: 吾鄉為古文者自劉海峯先生後未有傳人從伯姬傳先生入詞館數年性安恬退遂假歸以著述自任于書無所不覽而所為詩文辭淸曠元遠尤注意于古文卅餘年海內之士爭相推重如泰山北斗辛酉先生掌鍾山書院學者籲求付梓共褒輯得若干卷而以古今體詩附其後江浙之間始得爭先快覩而外間尚少傳播丙寅余以庶常來掌粵秀書院篋中攜一册見者紛紛求索而卒無以應因集所得修資重付剞劂俾海內推重先生者皆得有所賞心于先生亦無所吝也卷帙仍舊示無所增益惜乎先生尚有經説左傳補注及所選詩古文辭未得攜來同付文梓一與嶺南人士盡觀為憾也刻成為書其緣起于端時嘉慶十二年四月上旬桐城姚原紱識惜抱軒文集目録
