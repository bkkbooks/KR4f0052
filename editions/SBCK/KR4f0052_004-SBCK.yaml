body:
  text: 序張冠瓊遺文序張冠瓊余妻弟也才而早卒余婦翁爲黄州通判有二子冠瓊其季也黄州就官時年六十矣家人皆畱不使從冠瓊求從則日汝在家專靜爲學易不許冠瓊念父甚悲傷已之不得從則益自奮厲於學未幾遂病未半歲而死死後其妻語人日吾夫今年學尢勤苦每夜靜家人盡寐獨聞其誦書聲悽然於是余旣痛之而亦咎其以未及壯之年乃亟欲成名敝耗精氣而至於短折何不自惜之甚也人莫不思苦身立名以光父母然竟以害其生則所志者有得有不得皆適以傷親之心故君子愼之也然冠瓊體非甚羸弱能勝勞其及死葢出於不幸非意所料而其志固可悲矣冠瓊爲人專靜淡於交遊余初婚後間至其家問冠瓊何弗見外姑江安人笑曰吾兒避人如女子也須臾呼至坐逾時默然而已後乃益親然亦寡聞其言獨每見依依向余不忍離可念也其疾初起亦不甚以不遇良醫遂不救臨訣執余手流涕而言黄州也葢極冠瓊才與志皆足自表見惜乎其學未成然所爲文久於文者或不逮也今年黃州公以公事被使淮上過家檢其遺文俾余刪次得十餘篇將刻之以自慰其悲余因爲之序冠瓊名元臚死時年二十二生一子纔十餘日後半年其子亦亾食舊堂集序丹徒王禹卿先生少則以詩稱於丹徒長入京師則稱於京師負氣好奇欲盡取天下異境以成其文乾隆二十一年翰林侍讀全魁使琉球邀先生同渡海卽欣然往故人相聚涕泣畱先生不聽入海覆其舟幸得救不死乃益自喜曰此天所以成吾詩也爲之益多且奇今集中名海天遊艸者是也鼐故不善詩嘗漫詠之以自娱而已遇先生於京師顧稱許以爲可後遂與交密居閒葢無日不相求也一日值天寒晦與先生及遼東朱子潁登城西黑窰厰據地飮酒相對悲歌至暮見者皆怪之其後先生自海外歸以第三人登第進至侍讀出爲雲南臨安府知府赴任過揚州時鼐在揚州賦詩別去鼐旋仕京師而子潁亦入蜀皆不得見時有人自西南來者傳兩人滇蜀閒詩雄傑瑰異如不可測葢稱其山川云先生在臨安三年以吏議降職遂返丹徒來往於吳越多徜徉之辭久之鼐被疾還江南而子潁爲兩淮運使興建書院邀余主之於是與先生別十四年矣而復於揚州相見其聚􅊌若此豈非天邪先生好浮屠道近所得日進嘗同㝛使院鼐又度江㝛其家食舊堂內共語窮日夜敎以屏欲澄心返求本性其言絕善鼐生平不常聞諸人也然先生豪縱之氣亦漸衰減不如其少壯然則昔者周歴山水偉麗竒變之篇先生自是將不復作乎鼐旣盡讀先生之詩歎爲古今所不易有子潁乃抄之曰食舊堂集將雕板傳諸人鼐因爲之序左仲郛浮渡詩序江水旣合彭蠡過九江而下折而少北益漫衍浩汗而其間自壽春合肥以傅淮陰地皆平原曠野與江淮極望無有瑰偉幽䆳之奇觀獨吾郡濳霍司空龍眠浮渡各以其勝名於三楚而浮渡瀕江倚原登陟者無險峻之阻而幽深奥曲覽之不竆是以四方來而往遊者視他山爲尢衆然吾聞天下山水其􅄱勢皆以發天地之秘其情性闔闢常隱然與人心相通必有放志􅄱骸之外冥合於萬物者乃能得其意焉今以浮渡之近人而天下往遊者之衆則未知旦暮而歴者几皆能得其意而相遇於睂睫閒􅁘抑令其意抑遏幽隱榛莽土石之閒寂歴空濛㪅數千百年􅀡寄焉以有待而後發耶余嘗疑焉以質之仲郛仲郛日吾固將往遊焉他日當與君俱余曰諾及今年春仲郛爲人所招邀而往不及余迨其歸出詩一編余取觀之則凡山之奇埶異態水石摩蕩煙雲林谷之相變滅悉見於其詩使余恍惚若有遇也葢仲郛所云得山水之意者非耶昔余嘗與仲郛以事同舟中夜乗流岀濡須下北江過鳩玆積虛浮素雲水鬱藹中流有微風擊於波上發聲浪浪磯碕薄涌大魚皆􅒂然而躍諸客皆歌呼舉酒㪅醉余乃慨然曰他日從容無事當裹糧岀遊北渡河東上太山觀乎滄海之外循塞上而西歴恆山大行大岳嵩華而臨終南以弔漢唐之故墟然後登岷峩攬西極浮江而下出三峽濟乎洞庭窺乎廬霍循東海而歸吾志畢矣客有戲余者日君居里中一出戶輒有難色尙安盡天下之奇乎余笑而不應今浮渡距余家不百里而余未嘗一往誠有如客所譏者嗟乎設余一旦而􅀗攬宇宙之大快平生之志以閒執言者之口舍仲郛吾誰共此哉吳荀叔杉亭集序自蘄黃而東包濳霍帶淝滁其閒皆山邑也淮水繞其後江水環其前故安慶廬州數府名雖隸江南省其實乃江北云余家桐城吳君荀叔家全椒相去僅三百里在家未嘗識至京師乃相知然余嘗論江淮閒山川雄異宐有偉人用世者出於時余之庸闇無狀固不足比儕􅀋荀叔負􅖡才而亦常頽然有離世之志然則所云偉人用世余與苟叔固皆非與荀叔雖無意進取而工於詩又通歴􅁚章算音韻所著書每古人意思所不到是則余遜荀叔抑遠矣余嘗譬今之工詩者如貴介達官相對盛衣冠謹趨步信美矣而寡情實若荀叔之詩則苐如荀叔而已荀叔聞是甚喜夫余雖不足比荀叔然謂荀叔之學余爲不知也其可乎荀叔訂所著詩文曰杉亭集成請余序之遂不辭而爲之說張仲絜時文序常熟蘇州府之一縣居府治東北隅其縣自明以來仕宦多貴人聲勢相繼雖偏僻下邑其士人多知乗時或逾於都會廣聚之區習使之然也余始入京師見邵三丈叔宀其人溫誠君子善爲魏晉六朝之文與鼐伯父同年交好皆爲編修未數年皆休致去旣又識湯君緩叔其人尢朴􅀡好學是時緩叔館余姻黨張君家余嘗與同㝛一榻見規以古誼自中夜至晨緩叔之徒張仲絜時已官部曹有名緩叔嘗召之至誡飭之如其兒時仲絜輒受敎惟謹余又因緩叔識仲絜焉緩叔與余後登第同年而常熟同年又有蘇園仲其後園仲以部屬外出爲知州不得志遂自屏不仕旣余又識編修陳君耕崖爲學亦近古此數君皆常熟人余所識皆君子也而以較其縣人材輒不􅀋諸君誠較然自好者與抑余之愚陋所取者偏狹乃獨得諸君聚而不厭也耶仲絜今歲初改官御史旋稱病去謂余曰吾才薄不足有爲於朝尙可有爲於家又岀其生平所爲時文屬余日吾文用意與俗􅊋以不敢背吾師之敎子爲我定之仲絜去半年貽書陳君令其趣余余乃取其文刪定若干首其時叔宀緩叔皆已死園仲方授學於晉絳之閒仲絜又去獨余與陳君在京師耳余由是益知如數君者果爲難得相見無日獨其文字可常在目前玆益可重也巳諸君存者方各有著述之志邵三丈集其家已刻成緩叔在時論說經傳甚衆未成書仲絜將卒成之時文末足盡仲絜之業然其文固已醇雅有體善觀文者必能愛之乾隆三十七年十一月桐城姚鼐序高常德詩集序明季沂水高侍郞巡撫河南堅守圍城與流賊相拒前後幾一年卒以忠節著稱世所傳爲守汴記者也後百餘年侍郞之元孫來爲余鄰邑蒙城知縣六安知州時余生一二歳耳及余少長而六安已遷去爲湖南常德府知府獨蒙城六安之人猶道其強􅀡有爲不愧高侍郞後也後又二十餘年常德公旣沒余廼識其子葵因得觀常德生平所爲詩一卷余顧有疑焉人生各有所遭時侍郞當天下阽危致命效節人觀所著書莫不淒然以悲至常德生當太平以政事顯屢典大郡其所遇宐人情之所喜矣顧其詩常若有所不懌而欲自適於山澤閒者何邪嗟乎士或所挾者廣而世之取之者不能盡事有旁觀見爲功名之美而君子中心歉然以爲不足居若此者往往而有其志深其情遠顧非其辭之工猶不能盡達其情志使人悵然感歎而不能自已也常德之詩貫合唐宋之體思力所嚮搜抉奇異出以平顯憔悴專一之士或不能逮而乃出於仕宦奔走之餘信乎才之偉已余取其尢工者別錄之歸諸其家而因爲之序海愚詩鈔序吾嘗以謂文章之原本乎天地天地之道陰陽剛柔而已苟有得乎陰陽剛柔之精皆可以爲文章之美陰陽剛柔竝行而不容偏廢有其一端而絕亾其一剛者至於僨強而拂戾柔者至於頽廢而閹幽則必無與於文者矣然古君子稱爲文章之至雖兼具二者之用亦不能無所偏優于其閒其故何哉天地之道協合以爲體而時􅀤竒出以爲用者理固然也其在天地之用也尙陽而下陰伸剛而絀柔故人得之亦然文之雄偉而勁􅀡者必貴於溫深而徐婉溫深徐婉之才不易得也然其尢難得者必在乎天下之雄才也夫古今爲詩人者多矣爲詩而善者亦多矣而卓然足稱爲雄才者千餘年中數人焉耳甚矣其得之難也今世詩人足稱雄才者其遼東朱子潁乎卽之而光升焉誦之而聲閎焉循之而不可一世之氣勃然動乎􅁓上而不可禦焉味之而奇思異趣角立而橫出焉其惟吾子潁之詩乎子潁沒而世竟無此才矣子潁爲吾郷劉海峯先生弟子其爲詩能取師法而變化用之鼐年二十二接子潁於京師卽知其爲天下絕特之雄才自是相知數十年數有離合子潁仕至淮南運使延余主揚州書院三年而余歸子潁亦稱病解官去遂不復見子潁自少孤貧至於宦達其􅅐臆時見於詩讀者可以想見其蘊也葢所蓄猶有未盡發而身泯焉其沒後十年長子今白泉觀察督糧江南校刻其集鼐與王禹卿先生同錄訂之日海愚詩鈔凡十二卷乾隆五十九年四月桐城姚鼐序敦拙堂詩集序言而成節合乎天地自然之節則言貴矣其貴也有全乎天者焉有因人而造乎天者焉今夫六經之文聖賢述作之文也獨至於詩則成於田野閨闥無足稱述之人而語言微妙後世能文之士有莫能逮非天爲之乎然是言詩之一端也文王周公之聖大小雅之賢揚乎朝廷達乎神鬼反覆乎訓誡光昭乎政事道德修明而學術該僃非如列國風詩采於里巷者可竝論也夫文者藝也道與藝合天與人一則爲文之至世之文士固不敢於文王周公比然所求以幾乎文之至者則有道矣苟且率意以覬天之或與之無是理也自秦漢以降文士得三百之義者莫如杜子美子美之詩其才天縱而致學精思與之竝至故爲古今詩人之冠今九江陳東浦先生爲文章皆得古人用意之深而作詩一以子美爲法其才識沈毅而發也騫以閎其功力刻深而出也愼以肆世之學子美者蔑有及焉且古詩人有兼雅頌僃正變一人之作屢岀而愈美者必儒者之盛也野人女子偶然而言中雖見錄於聖人然使㪅益爲之則無可觀已後世小才嵬士天機閒發片言一章之工亦有之而裒然成集連牘殊體累見詭出閎麗璚變則非鉅才而深於其法者不能何也藝與道合天與人一故也如先生殆其是歟先生爲國大臣有希周召吉甫之烈鼐不具論論其與三百篇相通之理以明其詩所由盛且與海內言詩者共商􅅦焉荷塘詩集序古之善爲詩者不自命爲詩人者也其胷中所蓄高矣廣矣遠矣而偶發之於詩則詩與之爲高廣且遠焉故日善爲詩也曹子建陶淵明李太白杜子美韓􅅲之蘇子瞻黃魯􅀡之倫忠義之氣高亮之節道德之養經濟天下之才捨而僅謂之一詩人耳此數君子豈所甘哉志在於爲詩人而已爲之雖工其詩則卑且小矣余執此以衡古人之詩之高下亦以論今天下之爲詩者使天下終無曹子建陶淵明李杜韓蘇黃之徒則已苟有之告以吾說其必不吾非也適來江寜識涇陽張君君以累世同居義門之子負剛勁之氣兼治煩之才雖爲一令廿餘年屢經躓起而志不可抑今世奇士也而耽於詩政事道途之閒不輟於詠岀其詩示余余以爲君之詩君之爲人也取君詩而比之子建淵明李杜韓蘇黃之美則固有不逮者而其淸氣逸韻見胷中之高亮而無世俗脂韋之槪則與古人近而於今人遠矣夫詩之至善者文與質僃道與藝合心手之運貫徹萬物而盡得乎人心之所欲出若是者千載中數人而已其餘不能無偏或偏於文焉或偏於質焉就二者而擇之愚誠短於識以爲所尙者葢在此而不在彼惟能知爲人之重於爲詩者其詩重矣張君殆其倫歟香巖詩稿序吾家渭川孝廉灨州府君季子於輩行余叔父也而自少從余學爲文辭相親愛甚入京則館余舍余歸相從則十日而見嘗八九日者舉族人才就衰君方傑出詞氣秀􅀤又通敏人事有振興之望君亦以自命也乾隆三十九年登順天府郷薦名著於京師㑹稽梁相國尢愛之然竟不獲一第以死乾隆四十年春君自里中將應禮部試余餞之於城北張氏園大雪松竹盡縞酒中君淚下日先生四十四歲棄官歸矣某今逾先生棄官之歲如此盛寒方走三千里俯就􅂣屋爲門戶計誠非得已世事􅃼􅃼安知所稅駕乎君是年竟黜歸二年遭母氏張恭人艱服終又一試又黜遂沒京師僧舍年五十又一年其􅀌裒錄生平所爲詩曰香巖詩槀俾余論之余稍刪定存若干首君詩多得古人淸韻不爲淺俗之言其才於古文經義駢麗之文無所不解爲之皆有法度而尢長者在詩然亦恨人事擾之苟極其才力所至當不止此也然於近之詩人足以豪矣有才若此而鬱鬱早終當爲天下惜豈獨姚氏哉乾隆五十五年七月朔鼐書張宗道地理全書解序自中原達乎冀北地高而壤厚喪親者雖未能愼擇而葬尙尠水蟻之憂然而不若精鑑而愼擇之之爲善也而況江淮以南者乎儒者欲安親體必求免地下之患苟非山川氣交盤繞障護之美患不得而免矣夫山川之用在氣人子安親固非希爲富貴昌熾之計然山川氣之所聚亾者安則生者福反是則禍亦理之所必有夫君子固不深希福利然使葬失其道而致衰敗絕祀之禍亦豈人子情所安哉以此論之􅄱家之說雖孔孟復生不盡廢也余以求葬親故頗觀覽􅄱家言十數家而以爲近世爲其說理當而辭明顯者莫如張宗道吾郷章淮樹觀察尢精其術而亦取張宗道書嘗爲解釋推衍其旨又於其言有誤失者稍辨正之􅄱家之理僃於此矣於是將刋行所解以遺天下之爲人子欲葬親者夫惠迪吉從逆凶道也擇葬地以萃天地山川之氣術也術之至者與道相成而不相害吾觀觀察每爲親族交友擇地子之財以葬恤難而廣仁非徒自喜其術而巳余嘗邀定先塋屢煩跋渉未嘗言瘁誼有足動人子之心者夫今之刋是書以禆益天下者亦廣仁之事惠迪之一端也余安得不樂而爲之說也哉停雲堂遺文序士不知經義之體之可貴棄而不欲爲者多矣美才藻者求工於詞章聲病之學強聞識者博稽於名物制度之事厭義理之庸言以宋賢爲疏闊鄙經義爲俗體若是者大抵世聰明才傑之士也國家以經義率天下士固將率其聰明才傑者爲之而乃遭其厭棄惟庸鈍寡聞不足與學古者乃促促志於科舉取近人所以得舉者而相效爲之夫如是則經義安得而不日陋苟有聰固才傑者守宋儒之學以上達聖人之精卽今之文體而通乎古作者文章極盛之境經義之體其高出詞賦箋疏之上倍簁十百豈待言哉可以爲文章之至高又承國家法令之所重而士乃反視之甚卑可歎也臯蘭王誡亭先生固秦中之聰明才傑士也又當康􅄉時世未甚厭經義盡心爲之其文亦旣工矣葢異於今之所以得舉者也後卒於山西家貧子幼其稿幾於湮沒今嗣孫光晟爲江寜尉乃雕板傳之以余持論素不厭棄經義也來請爲之辭余旣欲以前輩之究心經義者導後之人而又念王君能勤勤盡其心力以揚先人之美是亦可紀也作停雲堂遺文序謝蘊山詩集序南康謝蘊山先生奮迹江湖迴翔詞館者十餘年出而分符秉節者又二十餘年鼐初識之於庶常館中時先生之年尙少而文彩已雄岀當世矣自是與先生屢有離合惟丙申丁酉之歲遼東朱子潁轉運淮南邀鼐主梅花書院適先生來守揚州其時相從最久遊葢接影於山水之區三人屢以酬詠相屬先生才豐氣盛銳挺猋興不可阻遏非特如鼐輩者望而自郤雖才雄如子潁亦末嘗不以爲可畏也然先生殊不以所能自足十餘年來先生之所造與時俱進今者觀察河淮自定其詩集成若干卷而往時宏篇麗製人所驚歎以謂不可逮者先生固已多所擯去矣夫豈非才高而心逾下識精而志彌遠者歟是以其詩風格淸舉囊括唐宋之菁傋有閎闊幽深之境信哉詩人之傑也且夫文章學問一道也而人才不能無所偏擅矜考據者每窒於文詞美才藻者或疏於稽古士之病是久矣鼐於前歲見先生著西魏書博綜辨論可謂富矣乃今示以詩集乃空靈駘蕩多具天趣若初不以學問長者余又以是知先生所蘊之深且遠非如淺學小夫之矜於一得者然則謂之詩人固不足以定先生矣子潁自去淮南奄終於京國獨先生從宦益久功名益盛文章亦益多今子潁遺集得其子白泉觀察鐫板江寧鼐方爲之序而先生集亦適來回憶疇昔往來兩君之閒盡覩文章之豪儁日月逾邁駑憊如故而兩君之集將竝大傳於時與名其閒其爲可感歎而愧恧者又何如也是爲序恬菴遺稿序郷之前輩以文章稱而年與鼐接者十餘人鼐自童幼受書一室足希出戶苟非嘗至吾家者率不得見若望谿宗伯襲叅司業南堂息翁諸先生異郷學者見其詩文或生愛慕恨莫接其􅄱容而惡知生同里閈者固亦若是也汪稼門觀察之先君子恬菴先生計其生之年與鼐接之年也而鼐未嘗見觀察岀其文讀之淸和恬雅有越俗之韻眞吾郷前輩文也余於是益歎昔者文學之盛而怪今者之不繼豈人不悅學而吾邑之文將自是日衰􅁘抑士有藏於室而吾不得識亦如吾曩者與前輩不相遇者耶不然何今昔之􅊋也觀察承其家學抂官有廉靖之節世推其賢恬菴之文因益聞於天下其蓄深者其播遠於理固然吾將舉是編爲里之羣士勸焉晚香堂集序鼐世父薑塢先生乾隆九年爲順天郷試同考官得長白永臥岡先生先生後仕爲寜遠州刺史以沒其後數年鼐爲禮部員外郞而先生之兄尙書公領禮部獲侍焉因見尙書公之賢又後廿年餘先生之子小尹同知江寧府鼐適在江寧時與共語於是又僃知小尹之爲才也獨於臥岡先生生平未嘗相見先生嘗一至桐城謁吾世父於里鼐適他出惟世父語鼐永君伉􅀡誠篤君子也洎旣知小尹小尹岀其先君子之所爲詩日晩香堂集見示讀之得其度越流俗之槩音和而調雅情深而體正益以信吾世父之言不虛其閒亦屢有懐思薑塢先生之作用情尢摯回計臥岡先生之喪二十一年而吾世父卒二十三年矣因與小尹相對泫然小尹之仕也始亦自寧遠州徙官而來寧遠之民愛慕小尹樂從其令以謂甚似昔使君眞使君之子葢先生遺愛在民若此先生國之世家自尙書以往竝奮迹戎馬之閒立功疆􅂣之外人爲卿士道光廊廟而先生官止一州葢未竟其志業況區區文墨辭翰之事僅稱爲詩人豈先生意哉雖然後之學者欲知先生之志與人讀其詩亦舉可想見云乾隆五十七年十一月桐城姚鼐序郷黨文擇雅序婺源江愼修先生修行郷閭講明六藝博學精思導啟滯霧生則學者師焉沒而配食朱子其生平著述葢百餘卷嘗以諸生說論語郷黨篇尢多於古制不明以後世所見苟相附㑹臆說淺􅄭乃作郷黨圖攷又錄前人郷黨篇文頗辨論其是非其有題而文無足錄者乃自􅁧之合三百餘篇夫國家所以設經義取士之法者欲人人講明於聖人之傳不謬而已不達經說而泛爲文何取於是文哉如先生著書錄文以明經爲志良足輔助朝廷敎士必使成學之意其視流俗號爲􅃟錄文字者猶塵堁也鄉黨圖攷昔已刻行乾隆五十一年大興朱石君侍郎典試江南以過位章命題士達於江氏說者乃褒錄焉獨其郷黨文存於里中鬱而未􅀤異郷士或聞而思見之今婺源吳君將盡刻江氏遺書乃先出其郷黨文雕板以傳用科舉之體制達經學之本原士必有因是而興者余竊樂而望焉因爲之序左筆泉先生時文序左筆泉先生之文沈思孤往幽情遠韻澂澹泬寥如人入寒巖深谷淸泉白石仰䕃松桂之下微風泠然而至世之塵􅙟不可得而侵也吾郷前輩多文學之彦而先生後出先君子及世父編修府君皆友之如弟編修府君嘗語人左君年少而才穎極其所至殆欲超越吾輩也鼐八歲時從先君自城南移居城北與先生爲鄰時方侍廬先生館於鼐家每日暮則筆泉先生步來與先君方先生談說鼐雖幼心喜旁聽其論筆泉尢善於吟誦取古人之文抗聲引唱不待說而文之􅅧意畢出如是數年鼐稍長爲文亦爲先生所喜又其後鼐遊京師不第而返先生招使課其諸子鼐後成進士從世父自天津歸則先生築別業於􅆺筆泉故自號筆泉其時鼐弧而方先生遠遊河洛先生邀編修府君及鼐遊於泉上鼐歸爲作記先生大樂而時誦之余旋去里又十年自京師歸則編修府君與先生方先生相繼喪矣先生雖文士而才足有爲其事父母孝郷舉入都父母見其行甚悲故三試不第遂不復往爲武進敎諭太公一就官舍不樂居先生卽稱病返故不盡其才以至於沒其居里里人有事叩之爲謀必當爲文不甚愛惜多聽人持去今其子搜求所得才數十篇而余少所見佳文或軼不具余年七十矣執先生之文追憶六十餘年之事如一日閒今惟先生家與余鄰居如故耳乃悽然爲之序云徐六階時文序前十年余於里中始聞徐君六階之名衆咸推其能文後偶過張行可職方値六階館於其家爲訓職方之子余因識之其年甚少而溫良可親余以器之乾隆乙丣秋六階乃舉於順天郷試余及郷人皆爲之喜逾年丙辰㑹試六階不第而遽得疾亾於京師年僅三十餘妻子貧弱鮮期功之親今職方之子與其徒悲傷其師之不幸爲刻遺稿欲以存六階於久遠也六階之文與今世登第之能文者無以讓也當明中葉士始有文稿以文稿傳者皆善文士也及國初有不善文而倖第者取諸生善文而身沒者之文據爲已有亦刻爲稿世之讀者以謂是佳文必宐成進士而烏知爲是文者乃終身不遇哉雖然是其人雖不遇而其文猶傳猶爲不負其用心近世天下都不復重爲文登第者亦無事刻文稿則不遇者之文尢湮沒無由見於世矣傷哉若六階雖不成進士而其文得其徒傳播之猶愈於其竟泯也悲夫余爲敘之或足慰六階於幽冥中乎抑使列士聞之而嘅息也禮箋序有入江海之深廣欲窮探其藏使後之人將無所復得者非至愚之人不爲是心也六經之書其深廣猶江海也自漢以來經賢士鉅儒論其義者爲年千餘爲人數十百其卓然獨著爲百世所宗仰者則有之矣然而後之人猶有能補其闕而糾其失焉非其好與前賢異經之說有不得悉窮古人不能無待於今今人亦不能無待於後世此萬世公理也吾何私於一人哉大丈夫寧犯天下之所不韙而不爲吾心之所不安其治經也亦若是而已矣歙金蘂中修􅁧自少篤學不倦老始成書其於禮經博稽而精思愼求而能􅍘修􅁧所最奉者康成然於鄭義所未衷糾舉之至數四夫其所服膺者眞見其善而後信也其所疑者必核之以盡其眞也豈非通人之用心烈士之明志也哉鼐取其書讀之有竊幸於愚陋夙所持論差相合者有生平所未聞得此而俛首悅懌以爲不可易者亦有尙不敢附者要之修􅁧爲今儒之魁俊治經之善軌前可以繼古人俯可以待後世則於是書足以信之矣嘉慶三年五月桐城姚鼐序述菴文鈔序余嘗論學問之事有三端焉日義理也考證也文章也是三者苟善用之則皆足以相濟苟不善用之則或至於相害今夫博學強識而善言德行者固文之貴也寡聞而淺識者固文之陋也然而世有言義理之過者其辭蕪􅄂俚近如語錄而不文爲攷證之過者至繁碎繳繞兩語不可了當以爲文之至美而反以爲病者何哉其故由於自喜之太過而智昧於所當擇也夫天之生才雖美不能無偏故以能兼長者爲貴而兼之中又有害焉豈非能盡其天之所與之量而不以才自蔽者之難得與靑浦王蘭泉先生其才天與之三者皆具之才也先生爲文有唐宋大家之高韻逸氣而議論攷覈甚辨而不煩極博而不蕪精到而意不至於竭盡此善用其天與以能兼之才而不以自喜之過而害其美者矣先生歴官多從戎旅馳驅梁益周覽萬里助成國家定絕域之奇功因取異見駭聞之事與境以發其瓌偉之辭爲古文人所未有世以此謂天之助成先生之文章者若獨異於人吾謂此不足爲先生異而先生能自盡其才以善承天與者之爲異也鼐少於京師識先生時先生亦年才三十而鼐心獨貴其才及先生仕至正卿老歸海上自定其文日述菴文鈔四十卷見􅀉於金陵發而讀之自謂麤能知先生用意之深恐天下學者讀先生集苐歎服其美而或不明其所以美是不可自隱其愚陋之識而不爲天下明告之也若夫先生之詩集及他著述其體雖不必盡同於古文而一以余此言求之亦皆可得其美之大者云小學攷序六藝者小學之事然不可盡之於小學也夫九數之精至於推步天運冥測乎不得目睹之處遙定乎前後千百載不接之時而不迷於冥􅃼不差於毫末此術家之至學小子所必不能也夫六書之微其訓詁足以辨别傳說之是非其􅄱音上探古聖初制文字之始下貫後世遷移轉變之得失此博聞君子好學深思者之所用心小子所不能逮也至於禮樂則固聖賢述作之所愼言尢不得以小學言矣然而謂之小學者制作講明者君子之事旣成而授之使見聞之端於幼少者則小子所能受也今夫行萬里窮山海者紀其終身之所履艱危勞苦之所僅獲以告於居不出於室中者可以一日而盡得也夫小學者固亦若是而巳秀水朱錫鬯檢討嘗作經義攷載說經之書旣備而不及小學今南康謝蘊山方伯以爲小學實經義之一端爲論經始肇之事且禮樂則言之大廣射御則今士所不習九數則誠術家專門之所爲惟書文固人人當解學者須臾不能去非專門之事也前世好古之儒固多究心於斯至於今日其書旣衆或因舊聞而增深或由創得而遇古雖其閒粹駮淺深爲者或不必盡同然而彼皆欲自爲其艱危勞苦而授小子以逸獲之道其人其志固皆不可泯也因輯漢以來言文字訓詁􅄱音之書至於今日英才博學所􅁧舉載於編凡若干卷名之曰小學攷以補朱氏之所未僃其言筆埶八法者乃棄不錄以其無關於經學也攷成以其書示某某誠嘉方伯有不遺衆善採輯之美意又以爲能盡大人君子之心乃能授其敎於小子方伯之用心如此異日助成國家禮樂之修其亦有望也與嘉慶三年八月桐城姚某序􅃟擇正宗序天下術家之言必首以太歲爲重餘術皆由太歲而生者也有問於余者曰古太歲之法因於歲星歲星居所次辰則太歲居辰之所合星與太歲順逆行異而合辰無貸歲星歲一辰而微速久則過辰故有龍度天門之法則太歲應之百四十四年而超辰焉自漢後太歲失超辰法是歲星太歲所居辰不與合也而術者以推吉凶猶能驗乎余曰驗也夫吉凶生乎氣氣生乎神神生乎人心夫太歲非有􅄱也爲天之君神夫人心所向者則君也今天下九州人人心所執爲太歲在是辰者則太歲在是辰矣人心之所不超則亦神之所不超故以驗吉凶可也雖然又有道焉天之道神而不可盡測其氣時而至時而不至今夫盛暑南向宐受氣熱矣而累日北風析析而涼者有之隆冬北向宐受氣寒矣而累日南風煦煦以溫者有之故天氣時而不至雖以古測太歲之術甚密而吉凶不必驗也其氣時而至雖以今測太歲術甚疏而吉凶未嘗不驗也君子知其不可拘干祿不回不失吾理而於術家之言亦不必故違其大忌而已吾郷章淮樹觀察多術藝兼通形家日者之言究心爲一書曰􅃟擇正宗以視余俾爲之序余不能盡通其說而推淮樹著書之心欲以爲人利而祛其害其志甚美乃以余夙所持論書以爲之序云陳仰韓時文序世之文士以文進於有司使一依古之格度枯槁孤寂與世違遠以覬見賞於俗目此亦不近人情之事矣然遂背畔規矩蔑理棄法以趣時嗜則必不可譬如相人者於儔􅀋萬衆之中求堯顙而舜目龍章而鳯姿然後許爲人固不得也若夫聳肩踰頂隱口於臍支離跛躄而猶爲全人乎哉酌古今之宐審文質之中內足自立外足應時士所當爲如是而已休寧陳生仰韓見余於江寜惟余言之聽其爲文體和而正色華而不靡足以自立足以應時者也然生從余遊十二年矣而猶困於􅂣屋謂生文不善乎不然也謂其枯槁孤寂而大遠於時乎亦不然也夫艸木之榮華同本而遲速異時夫守已不變以俟時者此亦士信道篤自知明之一端也生尙終取余言乎哉因以是書生文之首云惜抱軒詩集四古體三十首題合簫樓槀國風有正變用冠皆婦人德載重一世美言播千春江山壯龍虎人物渺荆榛卓玆白髮嫠養志􅁯賤貧濡翰寫胸懷皎月升秋旻感激或哀怨終無俗淄磷二班漢東西異彼蔡與甄何況競宮體綺麗玉臺新少游詠芍藥蔑與昌黎倫異哉女郞詩於今論過秦㝛攝山幽居僧舍次日略覽山中諸勝逮暮遂歸五月暑未甚況經新雨餘攝山若雲起飄然望遠墟出郭偕好事入谷扣幽居日晡禽聲涼崦風迓籃輿萬樹欹㵎壑一鐙耿軒疏夜㡡􅅖佛龕晩案得山蔬雲白綠林外鳥嗁朝日􅀄推枕靧淸泉杖策曳輕裾雜石擁樹根萬疉雲濤如穿徑石雲中杳然疑躡虛法刹引遐歷宮樹亦瞻諸高松蔭暍行淸若循階除亭午不逢客寂爾惟鐘魚回首金碧轉始知山徑紆聳望最高峯筋力乏升岨循年嗟老矣視日盍歸歟復向山僧約期余巖桂舒九月八日偕葉治三陳碩士從弟儀筐姪彦卬謁明孝陵游覽靈谷寺晤其方丈僧祇園萬事靡弗改誰能測所終蔣山自齊梁幢蓋浮屠宮安知明祖宅毀塔遷誌公何怪三百年寢闕生蒿蓬我來謁松下黄槁閒霜叢故事識已少今帝德良隆守吏衞樵蘇金碧餘穹窿環峯嶂東南西眺曠靑空郭外隱大江杳來逝無竆杖策越􅍘橋攀躋入巖東密樹欲無徑涼飇激榛中穨垣外巳盡立殿中猶雄想見徙建初頗極匠制工老僧爲設餐共語斜陽紅窴彼萬古懷企此三幡通人歸壑谷閉深翠澹濛濛林杪餘塔頂盤鶻下秋風良醫行贈涇陽張孝廉菊自古良醫多出秦孝廉晚出當其倫授受無從古術絕山川靈異能通神一戰燕山屈羣士殿側裁文奏天子君中已酉順天鄉試是歳詔㪅試宮內謂知弓冶繼家聲孰料刀圭起人死江山地有金陵壯萬室曾城壓江上乃翁强項困爲宰令子活人譬良相經營智出非禁方痛瘝情切方無恙老夫臥病常兼旬賴子毎過情愈親巳信發蓍遄有喜況聞快論傴可伸君家孝友稱義門詔書褒使薄夫敦乃翁行古非俗吏餘慶􅃚不遺後昆帝所諧聲待韶夏天池奮翼須鵬鯤地中生木􅁚愼德況年甫逾冠加元術如和扁固小技文高潘陸猶無論嶻辥終南氣未巳當今相國誠賢矣安知人無邁古才㪅與成周閎􅊌比老夫未死得君醫拭目人閒有見時願子勉學致其大一世膏肓皆可治與張荷塘論詩薰蕕非同根鵷鴟豈竝處欲作古賢辭先棄凡俗語青巖萬仭立丹鳳千里翥寶氣照山川芳華出霧雨快此大美聚亦使小拙嫵淺易詢竈嫗險怪趨虬戶焉知難易外橫縱入規矩小黠弄狡獪窺隙目用鼠不知虎視雄一嘯風林莽嘵嘵雜市井喁喁媚兒女至言將不出曩哲遭腹侮謂獲㫺未搜頗疑今者愈嗟哉余病耄柰此眾簧􅈜􅃶上矢難畱蓄憤終一吐不期得吾心君先樹幟羽將埽􅄭且庸略示白與甫病几偶對論陽氣上眉宇東南百俊彦解者未十五寡和君勿嫌終世一仰俯有得㫺幾人屈指君試數訪坳堂觀察於城南寶光寺釋皓淸亦至讀觀察近詩數十首雨中共至皇姑寺作詩二首江霧帶長干南望盡蒼碧何處使君居空山少人迹東風㲹林影逕艸含新色數轉造精廬遂爾逢巾舄漠漠寒雲光幽幽丈室白山僧共披帷飛雨颯沾席淸言接今玆高文自曩㫺眞性不容遏筆墨偶流溢結習誠未􅁯固巳遺喧寂誅茅鍾阜巔邀君共晨夕樹引南岡升雲垂午光晦披衣細雨中曳杖􅂽林外企彼建琳宮遠矣自前代庭圍靑竹幽石倚紅牆壞危閣墮泠風空欞塞寒靄列架僃龍藏展讀吾未逮所欣道人韻敷坐肅相對偕方坳堂登牛頭迴至獻花巖㝛幽棲寺昨雨竟夕䢅未休與君㝛約登牛頭我怯欲止君意銳中道稍幸霾雲收山陰轉至南㵎曲佛宮上倚雲峯稠八門階磴鑿蒼翠兩闌松桂交龍虬十圍銀杏穿入地再出若濟興陶邱霑衣尙有林雨隳拄杖且趁石逕幽深洞傳爲辟支坐小沼或記昭明游世往􅂽昧不可辯登冡一俯千山周東來句曲氣咫尺大江三面環如鉤仰思萬古正戃怳飛烏忽逝投滄洲下踐僧廊出門外危循鳥道升東陬獻花巖居萬木杪片壤劣架懸鐘樓其時山花開且落枝閒偶復聞啁啾迴視來逕杳修曲山光金碧交相浮幽棲寺近暮投㝛林深霧暗風颼飅道人㫺處此石窟遠有望氣來相求廓然無聖乃家法金屑雖貴寧居眸尙有佛見師所斥了無一法今何修嗟予與子厭塵壒但云􅉭屩賢鳴騶若尋苐一微妙義豈於喧寂論誰優山僧煮笋春米熟虎跑泉瀹香盈甌鐙前飽食放頭睡起看杲日靑天流瞻園松石歌爲陳東浦方伯作㫺有淮淝帝起凌江東金陵始建吳王宮蒼松白石傳是宋元蓄位置乃在西園中是時招徠天下雄游賞時與匹士同謀畫紛綸史述不可盡故物矗立皆英風蔣山南徙新宮衛松石遺在中山第君臣際遇自當年景物蕭疏成異世我朝奄撫江南陲大功坊設行省司人言江寧使院天下冠日月煙霞生古姿翠華臨錫瞻園字松石光輝又一時此邦有宅城西面六朝松石名嘗擅漁洋司李爲題詩賤子少年曾一見四十年來古松死三品石徙金壇縣嗚呼于文襄沒乃返故鄉何嘗得一日幅巾屣履苔石㫄人事興衰變倏忽古蹟銷磨多􅁣慷豈如使院長淸祕冠蓋頻誇松石異自㫺元依天子家於今尙託諸侯帥使君動法前賢事文章可傳政可嗣倚石松前聽松吹謝公哀樂羊公淚好誦甘棠召伯詩休偕異石菱谿記露砌風軒攜酒尊㪅邀白髮醉芳園古今事往都須置松石之閒別有論雨晴出廬江􅀉諸同學北風夜甚厲急雨鳴淙潺大樹俯驚波連舫䌫其閒崩騰勢欲往撼拒力何艱勢極曉應衰桺葉搖翩翾柔橈蕩春渚芳艸被澄灣重陰旣蕩滌丹霞忽斒斑舟進暮未休野日澹以閒回首碧林外數點龍舒山邈彼二三子送我出柴關神㑹無遠近道合非附攀母以損夷懌屬念爲衰顔舟中漫興終朝風有常百里谿多曲屢使帆起落一若路來復春氣澹多陰四顧垂連綠艸逕人獨行田家麥倂熟屬此旅與居同寄光陰速遇物皆可欣乗化孰非足曖倚舡窗淸展􅁽呼兒讀檥舊縣淸江靜無風曉岸初上日高下雲影合遠近山靑出連舫纜盡解孤舟飯未畢觕渉齊物旨曠慕養生術逐事偶在途澹懷猶一室復此對淸遠未應嫌遲疾顧與漁父言仰送飛鳥逸又㲹滄波東􅊃作前游述題陳碩士母魯恭人端居課子圖我識夫人夫朝衫託京國繼遇夫人弟幅巾江水北自始逮今玆春秋三十易當時談宴末偶及中閨德儀容黯終掩吾友亦遠隔遙想琴瑟哀與彼同生戚徒存四尺紙繪作鐙火夕慈母如師嚴雒誦殷四壁圖中最稚兒玉立今八尺挂席出彭蠡就我同書策萬卷容可收熊丸不復得我聞畫閼氏泣涕甘泉側憬彼休屠子忠孝漢庭則何況傳經家不匱名當赫又聞悲思者不可爲太息憐吾失母雛丱髮初覆額奄垂二十年感傷衰鬢白金麓邨招游莫愁湖偕浦桺愚毛俟園陳碩士醉中作歌四月春風猶未巳吹蕩湖煙與湖水水上靑山何所似擁髻莫愁明鏡裏風生水軒三面回白鷺鳧鷖空際來山光半入城􅇸括湖影全將天蕩開當軒俯仰人閒世莫愁尙得畱名字坐上山川處處奇􅅐中今古時時至君不見英雄誰似中山王一枰昔對明高皇山陰墅賭謝太傅肥牛亭賜張安昌徐氏到今取湖稅軼事傳或非􅂽唐軼事縱傳何必詳元功極貴同泯亾運盡勲華亦鳥滅時來屠販皆龍驤春水滿時春艸長湖波澹淡漂夕陽欲喚莫愁歌一曲四坐賓客各盡觴顛毛日夜生秋霜何暇遠計千載事石室金匱求芬芳題胡山甫不浪舟記後便門將渡樓舡津御史欲以血汙輪舩危橋安稱曉人寧知三峽遠導岷􅀒舟麾斥黃龍馴人生自貴此有身正恐畏途出牀茵至人平視夷險均覆卻不入操舟神杆匜江海雲霞巾馮夷肩吾與我鄰六合一室誰疏親歐陽畫舫齋名新自記夸述艸木萅憑欄四望疑漣淪所言枝葉非本眞君齋繼作義相循平生未與君主賓有齋亦未逝其陳讀君兩記擬歐倫賢子求書意頗諄跋尾君見或不嗔邈哉歐子不可詢王石丈得異石於莫愁湖余名之坐龍石戲爲作歌洞庭雷風夜中起飛度崤潼戰涇水歸來歌吹月明中貴主輕綃泣淚紅歡樂悲哀一朝盡寶珠獻得無生忍歸坐深淵情自枯誰能出此定跏趺莫愁湖影涵秋月道是龍宮光貝闕探得驪珠何足奇迎將室內坐之而袍笏下拜情未已儼如共浴咸池底窗前咏作蒼龍鳴走避定使諸梁驚煙霧繞堦還吐潤或將霖雨爲蒼生馬雨畊住相圖自有天地驅羲娥風雲變滅流江河我昔嬰稚今髪皤如箭逝弩絲運梭􅀡逮建翣嘶虞歌焉得停晷容婆娑君取住義將云何君言變者自遷訛有不變者常無他心如死灰身槁柯所住非中非四阿須彌蚊睫誰么麽稊米萬物非寡多萬刦靡辨於刹􅃚了無未來與已過此爲住義奚可訶我聞塵根相蕩磨應無所住傳佛陀須菩提聞涕􅒔沱今始知道異昔科況君渉世猶同波畫成戴髮爲優婆忽然念起火焚和恐君禪病容未瘥因言生義皆􅃠羅住與不住同偏頗㪅請􅍘臂求達摩秋齋有述雨歇朝暾時風來廩秋􅇋樓上倚層軒城端見重岫楚樹遠連空江雲澹橫晝芳桂已䌓英叢蘭猶一秀幽居謝物喧孤賞欣良覯幸無好爵縻終卻多文富淵乎􅁚帝先曠矣發吾覆寧執近名心翻求百年後游攝山二首古佛菴有明太祖御容學道苦不深塵擾輙有損所賴行游趣養眞復吾本況玆絕靜麗深谷抱重巘始尋寺鐘來回視邨逕遠怪石倚礀興奇柯冒巖偃幽日曖疏照流籟逝忽返偶接道人談世外情亦悃久處山氣寒眺盡夕陽晩鳥㝛人語絶暗響無一遯圓月見松上長影􅊌偃蹇邈當遺視聽於法求奧梱達彼無生寂見玆有物掍豈必閉石窟􅃿齒食芝菌鑿石龕像佛遠自齊梁爲累世導師居龍象固有儀何意入僧室隆準乃可窺當時平僣亂四海誠福禔所嗟攀龍鱗十九遭焚㱦戰兢展遺像目角流千鈹想見劉宋輩日侍豈不危篝火息夜榻聞鐘逐䢅麋朝日艸露閒往讀始興碑嘅歎閱千古誰識無成虧乙卯二月望夜與胡豫生同住憨幢和尙慈濟寺觀月有詠夕陰連遠麓嵐翠斂高岑新月吐巖缺先照寺西林籃輿轉重障杳度碧谿深春樹葉未多疏影落衣襟佛宮坐遙夜妙義託幽尋上眺層閣暉下步重階琳素魄行無極光霽曠來臨本非有擇照安知受者欽文學俊才筆禪悅亦所歆余衰邈違世慕道恐弗任非徒遣煩慮㪅當遺賞心闍黎淨業就結習猶謳吟共㑹􅁯言契何嫌金玉音三月九日鄭三雲通守邀於隱仙菴看牡丹竟日翼日雨毛俟園復邀同往賦呈兩君幕府山頭天接水千古英雄此中死惟有東風歲歳來石頭城下紛紅紫人生何日不當醉何處花開不可喜況惜晩春餘幾日㪅對奇葩翻萬蘂鄭侯年少發新硎毛子老儒鑽故紙同欣就我如菖歜竝道愛花入骨髓昨攜天香歸满􅅂今踏紅雲重曳履明妝巳看照晴熏深暈復憐含雨泚桑根三㝛固慚僧羊肉慕羶終勝蟻華陽眞逸來句曲人道此閒嘗隱几齊宮梁苑今何在況遡神仙眞脫屣道人疑是殷七七能使荆榛變羅綺􅀍惱少陵柯用訴樂死右軍差有旨隱仙菴外臺城路我購一􅌀家可徙落花風盡艸如茵㪅弔紏陽挂􅋊壘景陽鐘歌景陽山作元嘉帝逸游已匱民生計累世增加到齊武采集良家萬佳麗朝朝從獵向琅琊夜夜嚴糚看星嘒端門鐘遠禁庭幽此時別起景陽樓萬鈞猛虡懸雲陛五夜蒲牢驚翠幬永明英主猶爲此何怪黃奴極淫侈迄今偃臥對斜陽卻想雄鳴流結綺無射心疾事當戒有國色􅂽寧不阤迹同潘岳弔乗風理異周官命鳧氏昔者宋武戰勝收金墉西京筍虡遷江東別命率天千五百大鐘引出温洛中當時物有故都思諒與隋陳情不同臺城自入韓擒虎廢徹雕梁傾反宇坐視宏鐘棄平楚竟鬱奇聲不可聞定知偉器難爲樹或言此鐘誠有神霜日駮炙長如新艸閒時起光璘㻞不許中宵輕臥人我悲亾國此遺迹聞見要畱戒淫僻不然鎔毀用之何足惜金麓邨招同浦桺愚毛俟園宗棠圃飮莫愁湖亭作此呈諸君往者此􅂽菴吾儕已來眺但欣雲木姸一覽湖山妙樓觀俄修飭欞檻悉光耀旣便陟巡游益足展談笑博士信好客先後再承召風日快今美歳月􅁯昔趭巳逾楝花􅋊未逮黃梅摽千林敷盛綠環堤亂蘆藋晝陰風氣疏遙靑見羣嶠煙深出鷺翔波靜響魚趒近檻種荷蕖翠葉始揚翹雖未吐含葩香已襲肌竅良取富流覽豈病隘漁釣地運有盛衰人事孰先料亾國感六朝登樓憑四徼帆轉淸淮長城倚石頭峭儻來遽舜禹運喪奚羿澆緬思徐中山大功過衛驃以智僅自全終始明高廟當世諸文儒豈特冠遭溺事往多可傷迹存聊一弔諸君采鸞凰卑棲比鷦鷯久知投閑􅊌大勝執機要鄙人謝局束觕得展吟嘨所貴鼓缶歌寧惜舉盃釂曠蕩望無垠徘􅆦待斜照跋馬雨畊破舟詩後大禹昔導江志濟昬墊驂中流龍負舟聖心堅不撼其餘渉川民臨濤輙歎感欲停苦不得豈盡負勇膽嗟子前時歸妻病臥牀毯倉卒往視之別我執手寁石頭帆北張天門日西晻知止信不殆貪進意猶欿風利急上駛石險藏下黮苟非神靈祐巳入蛟龍噉磯巨夜復昬舟破木僅攬念與子相親歲月遡髦髧白髮終牖下固當埋坎窞焉可葬洪濤含珠不投頜始聞涕爲㫬再見衷始惔憙子命才脫高吟味已醰得喪似失馬甘苦類食欖人生託大化陰陽聽舒慘脩短要有命不係避與敢食案寢席閒或逾鋒銳㦧不見王會稽誓墓避世坎岷峩萬里外欲溯三峽覽世情外益􅁯道味中愈憺子置靑溪宅吾將共鉛槧不然棹漁舟相從八葭菼㪅與傲風濤衣簑食藜糝梅石居松化石印歌深谷立龍爪矛㦸風雨電雷洶拒格電歸雷􅊌自吟風韻八簫韶殷山澤有脂不流作虎魄反眞凝髓成霜白一朝劫至遭樵斤持與市人呼作石梅子懐玉披褐衣弄印成刓自詫希嗟余秃顚眊視微取廣多識朝扣扉脩短較石焉敢幾萬物出機還入機狡猾變化奚是非王秋史二十四泉艸堂圖濟南南山立蒼玉珠􅊌膏渟遶其足憶循秋水就􅂽陂惟見昏煙挂喬木不見詩人舊艸堂百年圖畫展滄浪低􅆦翰墨前賢在隨卷雲煙入渺􅃼題葉君雲海移情圖葉君字芥一我昔身在黃山邊靑天無翳朝日鮮白雲足下橫鋪綿彌滿萬谷爲一淵亂峯飛來無所緣蕩搖欲定未定然高者百丈卑一卷驚呼眾觀足未旋微風巳動雲升遷蒼巖露足藏其巔山靈變異理幽元默存在􅅐逾八年葉君好雲揮五􅁌自言冥㑹如海壖伯牙移情于成連千載合轍容有焉圖其髣髴妙不傳我悵前游隔蒼煙題詩寄思淸不眠朱白泉觀察以其先都統公指畫登山虎見示因題長句颯動秋山萬枝響寒雲四野當空上歘歙沙礫走林莽陰森虎出睛睒朗峯高欲升短頷仰臥枝交㦸壓前掌聳身距躍踰十丈不知都統何處看指端盡得雄威象想玆暗谷下志在千仞岡隅目眈顧周四方不屑俯立同豺狼又疑郡州賢牧守政成渡江驅猛獸平地不復食牲畜奔上高巖取鼯狖轉逕掉尾􅀡似竿攀崖過迹深如臼都統固國彦指畫亦有神一㡠上進天子珍八十筋骨健濡墨每覺壯氣振遽現活虎驚顰眒文采斑斑逮子孫我從三世接交親畱遺墨寶容窺覘回首登堂四十春我老吟詩轉寒乞驟瞻壯虎心震慄觀察家聲繼玆日勉爲累葉之虎臣獨立艸閒狐兔不容出喜陳碩士至舍有詩見貽荅之四十韻初冬言趨家霜風隕門柳仲冬擢槁柯倚門時出首望子逾彭蠡計日當至否遠惟古聖籍義富若淵藪鯫生非宏知鑽硏百代後譬如物有十或取一遺九雖然竊自欣千金享家帚執裾時語人充耳莫爲取獨子甚見阿戒車屢載糗就我金陵館居我西序牖往復意屬厭􅁯餐嘗及酉懷此三改歲述別自癸丑今夏寄書說定當訪衰叜起帆盱江曲欵戸龍眠口季冬霜雪霽薄暮客造􅋼蠟梅紅燭下膽瓶燦金釦竟得展一笑共此篘新酒人生樂莫樂久别還執手況日迫桑榆小聚􅃚易有呼我稚孫前俾子問名某俯仰人閒士感歎及賢舅我出銘墓文尔讀目泫瀏新詩情􅃉切見貽媲瓊玖弸中子多文昃離吾鼓缶敢謂横海鱗制以寡婦笱頻年洪州試似不辨稂莠升牒名九十子璞乃未剖所貴士豪傑千禩期尙友威鳯登絳霄奚較翪企醜本心如日輪遭蝕情欲誘始謂微掩缺繼昬晝見斗願子念􅃿世崇樹三不朽遷義如轉圜而內堅所守文章非小技古哲逮今壽超越彼粗糲固在頻投臼海内諒多賢荷于老夫厚區區相望心豈在金懸肘北瞻宛邱道嚴君今衆母樂哉子行逮升堂奉荁滫別離未須恤雅志幸勿負
