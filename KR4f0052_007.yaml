  text: 惜抱軒文集七
  hash: sha256:d133666490f9c834b82bc9337b60b890fdfc23566dcb65d6d98411a136952bda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_007-1a}
body:
  text: 贈序送右庶子畢公為鞏秦階道序陜甘古雍州於九州最大其西北兩邊緣河隴之外地比接乎戎夷今皇帝即位方內艾寧乃以師定凖噶爾禽大小和卓木取烏什中國師行之道芻餉之運前後數年皆出於陜甘上軫念陜甘之民為數免其供賦焉大功既成闢地廓遠駐師以為守屯田以為食有不足用轉移以資給是以陜甘設新疆經費之局夫吏臨所治安氓俗頒政教而已而陜甘之吏疇畫顧及萬里之外然則國家選人西北較重三方亦其宜也三十二年冬命右庶子畢公為鞏秦階道公材高而容衆資厚而善文庶子之職自明以為相階今一旦出為外吏士大夫不以為憾而以為慶知西北重地而上嚮賴公之意甚殷故也隴洮南轉包氏故居帶挾羌渾種性雜殊夫兼植異類而內民不改樂業者所以稱上仁安疆埸也公其建德於兹而後入為輔相天下乃謂上之進公非不試而用者已送龔友南歸序龔君劒戍居江南之宜興有園田在焉其來京師每為余道宜興山水之勝而自言其樂思於此也余日昔者孔子取狂狷之士狂狷者慕古之人而不同乎流俗故鄉原絶而譏之今子材甚美志甚高論甚峻近乎狂狷而將蒙譏者也京師中豈宜是哉其思自放於山水固宜也今年冬十月龔君一日過別余曰吾將隨吾父歸陽羡之居逾年將復見子於此夫以龔君之逸才曠志將處迹乎山谷之間歌詠乎風雲狎友乎魚鳥余與龔君相別之日則長矣而龔君顧樂之若猶將復來此也則余與龔君相別之日短矣而竊恐君之不欲雖然如君年富而質美進修而日強且志日慕乎道德之盛夫道德之盛者不傲世而立名不離物而矜已謙而光偕乎俗而不流如是者夫焉所處而不宜君其一旦自江南而返乎京師使君之學進乎古人而德足信乎天下復與余歡然相聚於此然則君今者適乎江南山水之樂其樂猶淺也龔君之行其友皆作歌詩以送之余更欲其更進於道也而別為之序贈孔撝約假歸序自周衰至今垂二千年古帝王之後覆墜泯絶者不可勝數獨孔子後嗣歷代有封爵進而益崇若聖人常在世者然士大夫過曲阜孔氏無論新故必加敬愛如恐弗及豈孔子子孫人人賢哉尊慕者深則推及其遺體也遠吾因是知古封建世及之法當乎人心由之足以維繫後世畔散乖異之羣而使之不忍去其道亦猶是也國家重德而尊師加禮聖裔典逾前代遠甚惟禮部會試黏名拔之孔氏試者雜於儔人之中欲加意而莫由於是有間數十年無孔氏舉進士則天下歉然前年春恩科會試前衍聖公之孫孔君撝約與其從叔名繼涵皆得舉撝約又選入翰林天下不以為孔氏榮而以為朝廷慶雖余固亦樂之也人情好惡殊異選舉雖至公未必人皆謂善若天下樂之因為國獲得人之譽其於選舉之道不尢盡乎然吾聞士之自待與人之所以待已者不同撝約年僅二十而有高才廣學而遠志蘄為古人而不溺於富貴然則其必不以人之所以樂之者自樂也傳曰莫知其苗之碩何也誠愛之深也余誠無狀然愛撝約之深殆未有若余者夫器莫大於不矜學莫善於自下害莫深乎侮物福莫盛乎與天下為親言忠信行篤敬本也博聞明辨末也今夫豫章松柏託乎平地枝柯上干靑雲依於危崎岸崩根拔而絶土附之不足也以天下愛敬孔氏而加以撝約之賢未嘗不益重也愼其所以自附者而已今年春撝約以親疾假歸省焉其行也官於朝者皆眷然不欲離余乃別為之説以贈乾隆三十八年二月桐城姚鼐序贈錢獻之序孔子沒而大道微漢儒承秦滅學之後始立專門各抱一經師弟傳受儕偶怨怒嫉妬不相通曉其於聖人之道猶築牆垣而塞門巷也久之通儒漸出貫穿羣經左右證明擇其長説及其敝也雜之以讖緯亂之以怪僻猥碎世又譏之蓋魏晉之間空虛之談興以淸言為高以章句為塵垢放誕頽壞迄亡天下然世猶或愛其説辭不忍廢也自是南北乖分學術異尚五百餘年唐一天下兼採南北之長定為義疏明示統貫而所取或是或非未有折衷宋之時真儒乃得聖人之旨羣經略有定説元明守之著為功令當明佚君亂政屢作士大夫維持剛紀明守節義使明久而後亡其宋儒論學之效哉且夫天地之運久則必變是故夏尚忠商尚質周尚文學者之變也有大儒操其本而齊其弊則所尚也賢於其故否則不及其故自漢以來皆然已明末至今日學者頗厭功令所載為習聞又惡陋儒不考古而蔽於近於是專求古人名物制度訓詁書數以博為量以窺隙攻難為功其甚者欲盡舍程朱而宗漢之士枝之獵而去其根細之搜而遺其巨夫寧非蔽與嘉定錢君獻之強識而精思為今士之魁傑余嘗以余意告之而不吾斥也雖然是猶居京師厖淆之間也錢君將歸江南而適嶺表行數千里旁無朋友獨見高山大川喬木聞鳥獸之異鳴四顧天地之內寥乎􅉭乎於以俯思古聖人垂訓教世先其大者之意其於余論將益有合也哉贈程魚門序余初識魚門於揚州人家坐上白晢長身美髯言論偉異自是相愛敬魚門來官京師乃益親去歲同纂四庫全書因日日相見至今歲余始將去余與魚門一別於揚州後六年余由京師歸家别於京師後又六年魚門南遊江淮轉入梁宋復别余去後四年至今日前之别皆未幾即見今之去其見時未可期也余幼於魚門十四歲始相識余年二十八今逾四十多羸疾思屏於江濱田間以自息魚門意氣亦不如故修髯蒼蒼大半白相對言今昔事有足慨者人欲握手交歡杯酒道𣢾曲則鄉里親舊多有之至縱橫往復古今賢士術業言足起人意非遇海內豪傑之士不可得也是以今者余益有慕乎魚門夫士處世難矣羣所退而獨進其進罪也羣所進而獨退其退亦罪也天地萬物之變人世夷險曲直好惡之情態工文章者必決摘發露至盡人匿其情久矣而或宣之宜有見惡者矣況又加之以名稱邪往時大學士劉文正公嘗太息魚門之才而惜其為名士夫魚門行與學甚敦美與名相副名何足為魚門病抑吾聞之物求而致之者不若不求而致之之安也魚門處盛名之下車馬塵雜之間其將釋知遺形超然萬物之表有若聲華寂滅遺人而獨立者也然則魚門終免世網羅繒繳之患也已贈陳伯思序周衰而莊周列禦寇之言興蓋古帝王之時民皆有淳德聖人謂無以持之也道以仁義養以禮樂文章使民始於忠信而成於禮若周禦寇所云大人至德者聖人乃以為教之質也去古既遠功利狙詐益用二子始欲一返乎質使人各全其真其言雖不中救世之心可謂切矣自周及魏晉世崇尚放達如莊列之旨其時名士外富貴淡泊自守者無幾而矜言高致者皆然放達之中又有真偽焉蓋人心之變甚矣昌平陳君伯思其行不羈絶去矯飾遠榮利安貧素有君子之介余謂如古真德而可進乎聖人之教者伯思也國家設百官以治庶事伯思處曹司溫溫無所辦不為能吏嗟乎使今之在官者皆伯思若也則治亦大矣伯思友余時年二十許今又二十餘年德與年日新者余所望於伯思也以魏晉之賢自處而安乎故者陋也久與遊將别思有以慰且勉之者余之衷也故述是説進焉惜抱軒詩集七今體六十九首戲贈山陰陶生凛立塵中面渥丹自言鴻寶受劉安貧無素業彈長鋏行入朱門著小冠候日竟知中景再談天始識九州寬東方惜未遭時會便作蘇張未是難戲贈宏夫兄昂藏七尺氣縱橫篋內中宵寶劒鳴屠市故人從偶語屏風侍史不知名鬢華攬鏡增霜雪胸智探囊有甲兵仍作棄繻關內客西風吹短曼胡纓戲贈鄞章生山澤歌謳自負薪誰招跌宕入京塵翹身曳步驚風止蹙齃魋顔擬聖人捫蝨九流隨俯仰雕龍萬古會精神若教一與貂蟬列便作當時折檻臣蔡萬資􅛛元水鄉菱藕圖平湖秋棹木蘭船醉八汀花弄碧煙日暮都忘天近遠坐看明月到尊前緑萍白芷春陂生菱葉藕花秋氣淸語兒涇畔各含思為待先生吹笛行隔岸越山青倒開花光湖影照裴􅏆圖成張向西風裏野鶴天邊飛欲來寄仲孚應宿蟲臂觀生非有象馬肝持論故無親虛名那辦星牽軛猛士難翻日轉輪但使琴漁從叔夜不妨櫻筍送􅋊春白雲憑語相思劇三月溪山兩故人送曹效伯司務歸里觚稜回首暮雲空拂袖歸途似御風解厭奔趨將虎子定無喜怒為狙公故人長揖都亭外新月多情滄海東行上成山浥天碧早知蓬閬落杯中送左墨溪往貴州何處黔中郡憐君最少時今猶偕旅食明復送將離夏口經春闊辰陽到日遲臨岐無以慰回鴈與歸期法源寺時張樊川侍讀引疾同遊臥碣唐朝寺春階上草芽客來淸磬歇鳥啅夕陽斜筒水澆青圃簷風隕白花欲偕投紱老終日問楞迦同秦淡初雄飛道長朱克齋岐王蘭圃士棻兩比部遊洪恩寺時秦王將往主山西試僕與克齋赴山東古寺松杉一鳥鳴初暾煙霧兩階淸風幡秋氣飄鐘磬草木晴嵐入檻楹坐倚團蒲身近遠出看車轍路縱橫明朝相憶皆千里那易僧窗啜乳茗賦得昭烈宅涿水東流草樹荒千秋已比沛中陽依然桑蓋垂籬落誰種蕪菁負曉霜高臥登樓豪自許入山披髮意非狂平生髀肉銷鞍馬遊子何任悲故鄉張方伯諱秉文祠歷數天將改藩籬國早亡士餘忠壯志家在戰爭場女烈甘懷石臣心盡布裳同閭悲舊史異代入祠堂樹積陰雲黑旗翻落日黃行遊魂魄毅溟海地茫茫密雲縣當道孤城一水邊漁陽斜照隔城懸􅍘崖朔吹來陰地連塞橫山蔽遠天設險檀州防禦所建安蓨令塹湮年男兒未辦安邊策略借曹暪定損賢淸苑望郎山有懷朱克齋時知衛輝府男兒三十分銅竹多少功名到白頭紫陌鶯花故人牘黃河風雨郡城樓欲將北海同樽酒繞盡西山到衛州回首數峯蒼翠在幾人能不憶林邱定州東橫海右中山國西接天邊御射臺辨謗獲君從古少成功食子令人哀飛流倒馬關中出急雨盧龍塞外來欲下高原更回首尚疑奇士在蒿萊呂翁祠白荷花照水娟娟緑柳千條壞檻前午過微陰行客倦呂翁祠畔聽秋蟬邯鄲口號邯鄲妙伎繡襦衣屧屣無雙鼓瑟希止作低頭厮養婦不如匍匐壽陵歸錐囊有意來成市玉貌無端亦被圍秋色滿空吾徑醉西山當面挂斜暉彰德懷古鞞鐸居然擁伯才地蟠河朔氣佳哉丹崖秋幸黃華館玉貌春歌金鳳臺漳水東流何日盡高城西對夕陽開獨憐石柱平城去猶似銅人洛下來疑冢祖虞胄稷兩難求枯骨誰知屬夏侯邢史何嘗識天道邾婁家盡大長秋蕩陰有懷嵇侍中晉朝城壘結愁雲播蕩金輿此戰氛事去萇宏猶有血時危繻葛不能軍冥鴻物外誰當篡野鶴雞中故不羣西望山陽林竹盡寒聲蕭瑟詎堪聞洪縣曉色高原上連山夾路隅單車度淇水秋雨緑王芻聞道靑巗迹長懷隱者徒林巒深翳蔚中有片雲孤黃陂道中故鄉東望隔齊安馬首才旋去不難略似霸陵臨渭上瑟聲淸怨走邯鄲懷葉書山庶子遺學千秋賴服膺閉門白首向靑鐙伏生老有􅋊經懼韓愈師為舉世憎終夜思公今底柱秋風吹客又巴陵滔滔身世成何事愧憶當年許代興懷劉海峯先生先生高臥楚雲旁賤子飄搖每憶鄉四海但知存父執一鳴嘗記值孫陽於今耽酒能多少他日奇文恐散亡脫足耦耕如未晚百年吾亦髮蒼蒼懷王禹卿太守大江五月水湯湯送爾西南守夜郎聞道還家生白髮可憐解印縱淸狂天垂襄漢涵秋色水下金焦接大荒青草洞庭還獨去空山樅桂渺相望懷程魚門舍人淮南倒屣盡賢賓綸閣今稱老舍人潦倒青春長似醉交遊白首每如新一椽託足終何處四海知髯故絶倫惟有詩情渾不減獨吟今夕莫傷神渡江秋風生郡外江漢合舟前靄靄列城樹搖搖長薄煙南州殊未極西嶂正蒼然不識臨崖叟垂綸復幾年官塘碧雲巖壑盤遙勢斜日榛林映晚淸澗虎欲來風滿谷四山秋葉一時鳴萬年庵次劉石葊韻以呈補山驛路陰將雨林深鳥不喧遠風來習習涼葉忽翻翻野曠蟲何怨秋成物自恩回依僧舍憩寒水靜當門觀化吾生眇焉知從古年平生聞赤壁邀客上青煙霧雨藏南嶽江湖蕩左偏前峯猶自遠未可盡夤緣前輩輶軒過風流憶宛然人隨寒鴈遠迹付野僧傳礀戶藏秋小虛空放唄圓欲窮生滅理雲影在諸天壁有吾鄉張鏡壑閣學詩今年閣學亡矣湘陰雨積湘東行客難啼猿楓樹四山寒晚日黃陵戍前出湖雲江水白漫漫道中回寄長沙諸君日月行蹤兩不留新交故友孰從遊歸人夜夜聽山雨落鴈聲聲下郡樓萬壑盤來趨鄂渚千峯􅍘處是潭州別離倏忽真成老青草湖邊對暮秋嶽州城上高接雲霄下石磯城頭終日敞淸暉孤笻落照同千里白水靑天各四圍山自衡陽皆北向鴈過匯外更南飛人間好景湘波上卻照新生白髮歸夜起嶽陽樓見月高樓深夜靜秋空蕩蕩江湖積氣通萬頃波平天四面九霄風定月當中雲間朱鳥峯何處水上蒼龍瑟未終便欲拂衣瓊島外止留淸嘨落湘東漢口竹枝辭揚州錦繡越州醅巨木如山寫蜀材黃鶴樓頭望鐙火夜深江北估船來蜀江水長漢江低江水東流也向西霜後西風江盡落可憐離別漢陽隄信陽已逢秋鴈下江沱更望飛蓬捲大河短日人行鄳厄少長淮山繞義陽多水源四瀆思乘檋地險三關每荷戈海內艾安軺傳緩獨將停䇿問巖阿論墨絶句九首宣和香劑用油煙奚李前橅竟邈然筆法而今論篆畫江南三絶自當年涉足塵埃世態生山林養節久方成論松略似觀人法誰及新安戴彥衡事見老學庵筆記朝鮮舊國解燒松使者朝正數笏從著硯未能堅似石卻無膠滯不妨濃膠折燕山風莫勝篋中片片似春冰時工止解緣邊漆不悟堅金儼故稜除卻廷圭跨乃翁幾家絶藝後能同來男作相虞兒匠何怪方今曹素功霄漢樓憑江水空鸛峯書畫散秋風盛時猶記先人説淚與􅋊丸滴硯中先君外家任大理公藏書畫甚富皆大理先世鸛峯先生所蓄今有鸛峯墨奇品也程君文筆工無比姿媚何嘗解俗書纍壓篋中為長物不妨啜汁賞心餘程魚門多藏程君房羅小華方于魯及明內龍香舊製名其齋日三長物墨其一也我愛瑤田善論琴博聞思復好深湛才傳墨法五千杵已失家財十萬金程瑤田語云墨以多杵為佳然自千杵以上則難杵數倍於初時墨不過千杵瑶田用古法杵至三千巳極難而程君房必五千杵年年兩袖染成烏佳字奇文一筆無惟向天涯寫歸興故應銘背作思鱸范成大製墨事見老學庵筆記祝芷塘編修德麟接葉亭圖人為碧海神山侶亭傍叢花醜石安異世定懷風景好此生得倚玉枝難衣冠前輩名相繼琴奕中宵興未闌昨日移居已陳迹就君時索畫圖看鄭前村以辰州守被議授員外郎銅符分守楚雲開襆被今隨秋色迥閨閣臥時傳治績江山行處助詩才為郎父老家安在作相公孫國又推靑瑣幾人憐故侶白頭相遇數銜杯喬鷗村鍾吳江村圖素産吳淞水春風未別家閉門深翠竹展席上飛花客散看陰轉鶯啼到日斜匆匆將好景題咏在京華翁學士方綱蘇米齋宋賢遺故迹乃在嶺南山海上流雲氣冥濛石壁間披榛逢節使摹石載舟還遠興高齋對猶令客動顔送朱子潁孝純知泰安府當日長安一布衣十年粳核食猶肥遨遊誰識為巴守調笑何嘗入世機巒瘴盡穿江塞路嶽雲來欵洞天扉東西蹤迹君休論珍重平生志莫違岷嶓東接泰山陽歷歷專城待俊良掃定蛛蝥將偃伯登封鶼鰈欲來王禁中伏奏心偏肚劒外邅回鬢已蒼若會明堂陳治績豈忘沂汶古時狂文筆人間劉海峯牢籠百代一時窮別來書到長安少死去才令天下空傳説足疲登陟罷尚應舌在笑談雄君懷師友頻郵置消息淮南幾次通禹卿自入滇中路不見陵雲作賦才剖竹西南仍放浪挂帆江漢竟歸來往年使酒同燕市九日悲歌上廢臺此世論心常恨少至今相望各懷哉冬至大風雪次日同錢籜石詹事程魚門吏部翁覃溪錢辛楣兩學士曹習菴中允陸耳山刑部集吳白華侍讀寓同賦得三字三十韻侍讀城西住西望城上嵐雪明邀數客風定即同驂嶺照斜規掩林鐘晚韻韽聽詩情窈窈説士味醰醰燭盡檛街鼓杯傾倒室壜昨朝寒太劇此歲日窮南氣抱虛堂白聲搖空閲酣閉將同蟄蟻臥欲作僵𧖟綵仗從天轉瓊膏灑地覃農田占穀麥齋殿映松柟圓升宵陪位前衙曉放參是日停朝賀頻逢􅝪燎慶竊有負茲慙大祀鼐以疾未陪雖替祠官職曾求國典諳竹宮今日禮茨屋異時談急景看如此遐思默有含墐知壞戶暖壤愛滌塗甘酒幟懸風店漁蓑向凍潭靜尋封徑崦響聽打窗庵茲意仍遲暮當前且樂湛醉歸曹適百病滿月幾三重德吾嘗慕多材世所貪羣公高韻在遊地奉陪堪接臭皆幽蕙連根比灌藍敢援交吉禹終愈附音談西徼蠻猶桀方隅澤待涵洪頤今向舉幕府正深探雊鵲巢須掃蟬蜩股盡戡雪霜更卒愍日月腐儒耽疏藿咸逾量樽罍況盍簪因思王趙舊今夜宿巖堪謂琴德損之飮鄭前村寓舍觀其兩郎君新作文藝前村本出先伯之門追感往昔作此二首君居空館一牀橫霽雪階除半尺明避世重來金馬日向余久得石交情張鐙酒暖真歡伯擁袖詩寒覺瘦生蕭瑟思鄉懷舊意當軒星轉北風聲省垣羈宦迹相親再世論交況有神聞説伯高真可學從遊桑扈見長貧中年樂趣殊兒輩此日儒林少丈人金玉欣看文價貴眼前過邁又超倫元宵曹習菴中允家燕集聲名座上逢前輩鐙火堂中值令辰攜手故交皆好事當頭新月最憐春太平不數神龍節鼓舞宜容蟣蝨臣夜夜元宵吾未厭相逢誰似酒濡脣演綸入都賦贈兼懷橿亭作江漢書院山長二首昔別燕郊路今看草又春還留三載客為對再來人酒態君都減詩懷家更貧匆匆頭並白鐙火一相親君家昔全盛再相一經傳伯氏方遲出淸名似古賢入宮羣女日男子詣曹年悵惜風塵裏蕭疏江漢邊寄葉書山十丈側聞八十志猶長盡取遺經發憲章一卷豈容羣閧市千秋何讓再升堂無人當代傳朱墨有願平生結老蒼瞻望淮南真室邇裴􅏆燕北又春陽葉劉年歲略相隨先伯同行又後之至貴不關天子爵齊名起作衆人師靑州邴鄭原同術林下瞻孚倏異時四國傳公欣老健一家如我獨漣洏祫祭前一日齋宿官舍懷左一青時聞其罷官始還少年尚戀雞豚會將老寧追鴻鵠翔風閣聲搖情歷亂春山雲接夢飛揚君歸白首無餘事江照靑天送一航鐙火弟兄相見熱正余寒夜倒衣裳雲南布政使王芥子入覲賦贈二首維藩萬里護邊黎擁節三年祀碧雞草緑閉關銅柱外江喧行部鐵橋西蠻夷月出邀歌舞城郭風柔靜鼓鼙安遠最宜張祝在莫嫌功伐奏璇題繡衣持斧鎮潭州解帶賓筵值素秋密樹萬鐙圍作伎淸湘千尺照回舟歸艎鄂渚靑楓晚移節滇南白日流石廩祝融煙霧裏幾能散髮淡淹留送弟訏赴杭州後一日行草橋卻寄汝猶為客日吾亦未歸人復有山川隔寧同少小親疏林更下葉晚陌每揚塵欲得長懷弭彌如車轉輪得朱子潁書使君書札發齊州戰伐新經欲白頭出涕潺湲哀萬室獨居威望鎮諸侯淸秋念我狂尊酒落日同誰眺郡樓海內幾人功力建腐儒端合任沈浮
