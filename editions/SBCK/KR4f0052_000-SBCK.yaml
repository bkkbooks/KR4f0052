body:
  text: 桐城姚鼐姬傳第一卷論五首議一首第二卷考三首第三卷序八首第四卷序二十三首第五卷跋尾題辭十六首第六卷書十六首第七卷贈序六首第八卷壽序十二首第九卷策問十首第十卷傳七首第十一卷碑文三首墓表七首第十二卷墓誌銘十首第十三卷墓誌銘二十一首第十四卷記二十四首第十五卷賦一首第十六卷祭文五首惜抱軒詩集目錄桐城姚鼐􅁎傳第一卷古體五十六首第二卷古體六十二首第三卷古體四十首第四卷古體三十首第五卷古體廿六首第六卷今體七十九首第七卷今體六十九首第八卷今體八十六首第九卷今體一百十首第十卷今體九十三首
