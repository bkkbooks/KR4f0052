  text: 惜抱軒文集十三
  hash: sha256:7aac387ce509c812dcd03091cd820a489f4bdc23be295610153940c1983931b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_013-1a}
body:
  text: 墓志銘兵部侍郎巡撫貴州陳公墓志銘並序公諱步瀛字麟洲陳氏先世居歙公曾祖諱時賓遷江寧遂為江寧人祖諱應陛考諱士鋐家故殖財至公考為文學好施豫盡亡其資生四子而公為季公長益貧精厲為學閎傑於文詞中乾隆二十六年恩科會試榜第一選庶吉士散館改兵部主事再擢至武選司郎中公考至是年八十餘乃卒公為養與喪皆當人意及後為安徽布政使則自曾祖至考皆獲贈通奉太夫如公官妣皆贈太夫人公在兵部職事修辦吏不能為姧服闋其尚書奏請補車駕司郎中逾二年授河南陳州府知府再擢至甘肅按察使讞獄平值平涼府鹽茶廳回民為亂黨連數郡人心皆聳為逆者聚於通渭石峯堡而總督李侍堯乃託以追逸賊西往靖遠獨留公扼隴上為守禦公亦憤發不避險難盡拘為逆者之家又擒其分處他縣為間應者官軍初戰失利公度賊乘勝必東犯陜西以隆德平涼當下隴之要而守衛單弱即撥固原兵分守而後奏聞其後賊果東犯不得過公奏之達上以為知兵命大臣督軍至且詔事與陳某議之公迎説形勢事理無不究又籌糧饋入險岨皆給逾月賊平公雖身未履戰陳而功足以埓上乃擢為布政使而旋調任於安徽賜之花翎以獎焉乾隆五十年江淮大飢米升至錢五六十暴民脅衆為攘公遍至所部頒布上恩督吏賑恤防捕盜賊全護疲困自夏迄秋末安徽得寧而公勞瘁成疾其後擢貴州巡撫抵治所舊疾大作遂薨為乾隆五十四年十一月某日年六十公為人坦自和易雖於屬吏無矜容厲氣然審察能否進退必當其才安徽布政司書吏皆江寧人公臨之有恩誼而不以姦公法公自奉儉陋其在陳州嘗舉家食稷於族戚故舊助恤常厚歲時餽問無間所在官舍來居者常滿少工文章喜誦書老而不倦承學弟子多材而秦中丞承恩與公進士同榜又同一年為巡撫人以為美談鼐嘗偕公官兵部公來安徽鼐方主安慶書院於公習且久公子舉人廷碩國學生廷頎以乾隆五十六年月某日葬公江寧城北山之麓請鼐為銘銘曰公以文興多士誦稱不究其能司武是膺秉節西疆布迾有方力不挽強戎慝翦襄天子命將謀以公壯以戰以餉其阻有蕩陟登大吏而親勞事為國之志為身之憊養其疲羸拊其寒飢誅其暴欺斥其不治協維帝心開府西南不以歲深雲而弗霖金陵之里兩中丞起公壽先已貽休弟子鍾山東北卜維公宅植保松柏載詞藏石贈承德郎刑部主事鄭君墓志銘並序君諱士俊字灼三歙諸生以子貴贈承德郎刑部奉天司主事鄭氏歙舊族也自君考諱廷證以上皆居歙之嚴鎮歙人營賈淮上或僑居揚州君少孤貧從妻父李氏宦居南昌後依族人居揚州儀真縣君為族人謀事盡其智能而無欺嘗值歲飢為粥以賑揚之餓者及歙鄭氏廟敝壞營而新之君皆任其事勤苦數倍于人日吾藉人財以為善吾力不容惜也君既定居儀真乃迎其兄弟之孤及從父兄之節婦洪氏皆來居而養焉乾隆四十二三年間余主揚州書院歲一二歸歸必過儀真然未嘗識君識君子文明君壻呂彩從余學時言其舅誠篤長者也其後十餘年文明成進士授刑部主事呂彩亦與鄉舉矣乾隆五十年二月初三日君卒逾年余在江寧文明來求為君銘因言未得葬地余姑應之日吾嘗行儀真西三十里山川體勢如可葬者又逾年文明又至日果得地于西三十里張家拗已葬君矣將補納石求卒銘之余不意言之幸中自念老矣當不復至揚州於其山水人物有足興舊思者而文明又求銘甚勤安得弗銘也君二子文明文盛一女四孫銘曰愼所履載謙飭子升朝父遺德生江南亡葬北塽升原茂翳植大厥族歲千億嚴冬友墓志銘并序冬友江寧嚴氏諱長明一字道甫乾隆二十七年車駕南巡君以生員獻賦召試賜舉人內閣中書就職旋入軍機辦事君在軍機凡七年通古今多智又工於奏牘諸城劉文正公最奇其才戶部奏天下雜項錢糧名目煩多請去其名而以其數併入地丁微收君曰今之雜項古正供也今法折徵銀若去其名他日吏忘之謂其物官所需民當供且舉再徵之是使民重困也文正曰善乃奏巳之大金川之為逆也大學士溫敏往督師欲君從行君固辭退有咎君奈何違宰相意者君曰是將敗沒吾若何從之人頗甚君言既而溫公卒致軍潰以死隨往者皆盡辛卯恩科會試劉文正公為考官值軍機事有當關自君撾鼓入闈得見既而出同考官朱學士筠曰甚哉冬友不自就試而屑屑治吏事為文正曰士亦視有益於世否耳即試成進士何足貴當是時軍機有數大案賴君在直任其勞獲成議而雲南糧道以分賠屬員虧銀不完將死去限期十日君具牘入請文正奏寬之乃生其年遂擢侍讀君治事衆中獨勤辦然以是頗見疾其後連遭父母喪服終遂請疾不復入間遊秦中大梁居畢中丞所為定奏辭還主廬陽書院乾隆五十二年八月日卒於合肥年五十七君於書無不讀或舉問無不能對為詩文用思周密和易而當于情嘗為平定準噶爾方略通鑑輯覽一統志熱河志四纂修官其自為之書曰歸求草堂詩文集及論辨經史書算文藝金石文字者几二十餘部百餘卷祖諱馨父諱自新俱以奉直大夫內閣侍讀為贈封官夫人南昌耆士葉用章之女生男女各二男曰觀晉余在都時君時與相從見君朝趨省禁暮入文酒之會若甚暇者然或以事就君謀必得其當君嘗語人曰異日先去官者必姚君也後數年余請告歸過江寧君見迎笑曰吾固料君之來也余居皖中君一來會後余再至江寧而君喪矣乾隆年月日葬君及葉夫人於某所君之子請銘銘曰偉猗冬友當時羣士智孰與醜既管事樞振物之首才非不見知而其仕之登不究得年非夭而亦不為壽天命若是夫孰可多有伐石鑱詞瘞貽弗朽孔信夫墓志銘并序信夫諱繼涑孔子之六十九世孫而曲阜衍聖公諱傳鐸之季子也幼而才俊衍聖公為聘華亭張尚書照女女殤而君遂習於張氏尚書以書名天下君得其筆法書蓋埓之又善於鑑别收集古今名家書鐫刻論辨世所傳玉虹樓帖也其於詩文為之皆工善乾隆三十三年余主山東鄉試得君及君兄戶部之子廣森時廣森才十七歲而君年四十餘名著海內久矣其後廣森得第為撿討以經學稱三十五歲而殞君之少也值上釋奠闕里嘗充講書官及為舉人纍會試不第納資為中書舍人未就職又值上東巡於中水行宮召使作書及進上稱善然竟不獲仕終於曲阜初衍聖公夫人氏生冢子繼濩繼夫人徐氏生戶部及君冡子之後襲爵三世君與戶部皆及之其遇曲阜公事以祖父體自任也其氣皆剛直人或與之或否其後戶部不樂家居客遊杭州以沒檢討哀痛遽殞不數年而君又繼之嗟乎君與檢討之生世第一家也又以文學才藝名著天下余一旦遇之二三十年間見其死亡至盡雖其文采風流不可磨滅而志意抑鬱乃更有甚於常人者其可悲為何如也君於交遊有始終之誼鄉里值歲飢出千金賑之者三焉乾隆五十六年余在鍾山書院君夏來江寧視余再宿而别君遂以是年十二月戊辰卒年六十五無子以戶部少子廣廉嗣將死貽書乞余銘其墓銘曰猗子聖人之世也廟其知也蔚其藝也名上聞于朝而下載于四裔也完則毁而剛則折也有疾而不可乂也銘託余哀以待後君子之達其志也陜西道監察御史興化任君墓志銘並序君諱大椿字幼植其先為王氏在元有為山東行省平章事者曰王信其子宣繼居父職元亂避居興化改曰任氏為任氏之十三世為歲貢生鑣其子晉中乾隆巳未科進士官徽州府學教授是為君祖生庠生葆為君考祖考皆以君得贈封朝議大夫禮部儀制司主事君之少也頴敏于學為文章有盛名又性和易謙遜人無貴賤靡弗愛君然君固有特操非義弗敢為故自少至老終於貧窶乾隆庚辰恩科君為舉人中巳丑科二甲一名進士故事二甲首當改庶吉士人皆期君必館選矣然竟分禮部為儀制司主事君每日自官所歸輒鍵戶讀書如諸生時值詔開四庫全書館大臣有知君才舉為纂修官是時非翰林而為纂修官者凡八人鼐與君與焉君既博於聞見其考訂論説多精當於纂修之事尤為有功其後鼐以病先歸君旋遭艱居里既而鼐遇君淮上當是時四庫書成凡纂修者皆議敘嚮之八人者其六盡改為翰林矣大臣又以鼐與君名列之章奏而稱其勞請俟其補官更奏君於是初服除將入補官亦以見邀鼐以母老謝君獨往然大臣竟不復議改官事君自循資遷員外郎郎中保御史乾隆五十四年四月授陜西道監察御史甫一月而卒年五十二君賢者居曹司固亦佳吏居言官苟非日淺亦必有所見然終不若以其文學居翰林之為得人也而惜乎其竟抑不得也君事父母能於貧匱中盡其養待族友有恩誼而不可使為諂瀆所成官書外其自著者曰經典辨服釋例十卷深衣釋例三卷釋繪一卷字林考逸八卷小學鉤沉二十卷吳越僃史注二十卷惟字林已刋板詩集已刋者四卷其餘與雜文未刋者又若干首君學博奧而於為詩則尚淸遠不多徵引曰此非詩所貴也娶趙宜人無子沒後三年弟大楷始生子熾炎以嗣君又後十二年葬君於某處鼐昔者與君本相知及同處四庫館則朝晡無不偕有所疑説無不相論證也退而偶有尊酒召賓之設無不與同也閲今二十年同居館者死亡殆盡而鼐僅存君弟大楷來求為志乃愴懷而銘之曰嗚呼幼植之瘞不居文章之官而既為其事矣不至耆耉之壽而著書足名後世矣生不見子而沒可以祀矣吾為銘之足慰君志矣夏縣知縣新城魯君墓志銘并序君諱九皋字潔非建昌府新城魯氏也大父諱寧康熙庚午科舉人為內閣中書考諱淮歲貢生為廬陵縣學訓導君為人敦行誼謹於規矩而工為文人觀其言動恭飭有禮而知其學之邃讀其文沖夷和易而有體亦知其必為君子也嘗踰嶺至建寧謁朱梅崖而受其為古文之法於四方學者苟有聞君必虛心就而求益雖以鼐之陋君嘗渡江至懷寧見鼐而有問焉君古文雖本梅崖而自傅以已之所得持論尤中正里居授其學干子弟及鄉之雋才又授干其甥陳用光且使用光見鼐蓋新城數年中古文之學日盛矣其源自君也其為科舉之文不徇俗好自以古文法推而用之或以為不利場屋君曰得失命也君竟以乾隆庚寅科得鄉舉辛卯恩科成進士歸居十餘年奉養祖母及父因益力為學而因事設方以利其宗族閭里雖貧而必致其財雖勞而必致其力逮終養乃出就官是時鼐聞寓書諫君謂今時縣令難為而君儒者違其長而用之殆不可然君竟謁選得山西夏縣縣當驛道又時值後藏用兵使驛往來日不絶縣舊分二十餘里里以次出錢供役謂之里差吏因為利民致大困君自持既廉又減其役之得已者而重禁侵蠧民大便之而樂為役君顧歎曰吾不能盡去里差是吾恨也其見民煦煦然告以義理所當從及去不作長官威厲之狀民亦欣然聽其教於是縣號為治上吏亦絶重君矣鼐聞乃自咎前者知君之淺固不能盡君才也然君亦以積勞致疾在縣凡兩期以乾隆五十九年三月卒干官年六十三娶楊孺人生四子肇熊肇光嗣光迪光四女子又庶出之子五皆少一女肇光拔貢生君以後母弟某嗣光壬子科舉人君以後從父弟某皆能嗣君古文學者而肇光先殞君文曰山木集已刻者若干卷未刊者若干卷某年月日葬君某所嗣光及君甥用光皆以書來乞鼐銘銘曰孰謂儒者不可以理繁庶孰謂學古不可為今世語美哉魯君其行企矩其文蹈雅卒置德在夏而士興其庭宇其生也有令譽其亡也有傳緒其葬也於是野汪玉飛墓志銘並序汪生行忠信而立志甚高不與今世士同流謂士舍宋儒程朱之所道以為學舉不足云學也晝動而暮休必考一日所為得失離合悉書於一册以自為戒勸事其父兄撫其妻子交其師友循今世之禮通以古人之意見者未嘗不以為當於人心為今世場屋之文必求發古聖賢之旨而不為苟美余主鍾山書院生以上元學生來為弟子余德薄不足為生益然生親余尤至相見論説依依者幾三年而生遽死生故有咯血疾而為學研思不懈余時戒之乾隆五十六年秋冬間忽大甚至失音余方歸里亟以為憂其次年春正月疾進時時念余遂卒余復至遂不見生嗟呼使生不死必追逮古賢人必有立於天下不幸亡學未成行未著知其異於今世學者唯余而已生年二十六其父七十餘子雲官甫六歲妻楊氏割肱療生不愈終為婺矛牙而守之余為擇攝山東南故曇花寺址右阜葬生而為銘曰古秣陵明南畿粵汪生挺産兹名兆虹字玉飛聖不作望緡哉敻有轍崇有階連勱志胡弗幾抗發塗蹶駿才􅉭天乎理則乖痛無沫伐石埋翳姚鼐綴此辭鮑君墓志銘并序鮑氏世為歙人明末有諸生遭革命不復出者曰登明為君高祖其居在巖鎮生子元穎賈于吳致富其子蕃賈于杭州入其籍蕃生善基為杭州府學生善為文而家業貧落生四子其第三者君也君繼父學而益勤少自杭就學于歙已而歸杭終父喪遂復至巖鎮復先人居入歙學其文名日起巖鎮有吳先生瞻泰者試之紅豆歌使次韻君詩即成且工先生喜以孫女妻之吳先生贈嫁有書數千卷而無他財君為人敦行義重然諾作詩歌古文辭皆有法能見其才當時儒者文士皆樂與之交學使者舉為優貢生然困於鄉試不見知年四十餘遂絶不就試以文業授徒其徒乃多發科成名其尤著者金修撰榜也君諱倚雲字薇省嘗為族譜數十卷以擬蘇明允族譜故復號蘇亭子二長嘉鬯亦歙學生能文乾隆四十二年嘉鬯疾殞君以慟得疾次年秋九月二十一日君遂卒于巖鎮年七十一次子嘉命君使後其仲兄倚樓嘉鬯有子早亡嘉命有四子以其次子金復嗣嘉鬯為君宗焉嘉命及其長子壬子科順天舉人桂星皆嘗問學于鼐今將葬君某所乞鼐為銘銘曰五世三徙卒居歙貧富迭更返故業師友援推表鄉邑有文炳興身挹擫卜其終登抂繼葉建昌新城陳母楊太夫人基志銘并序太夫人建昌新城楊氏贈朝議大夫諱大炳之女適同邑陳氏舅曰贈資政大夫諱世爵姑曰魯太夫人夫曰乾隆戊辰科進士封資政大夫諱道子五曰分巡金衢嚴道守誠太平府知府守詒舉人候選內閣中書守中江蘇按察使守訓舉人候選中書守譽女三壻曰舉人內閣中書楊尚鋐監生塗志紑魯勷孫二十四曾孫二十七元孫三封大夫以學行稱于世成進士後不仕而修於家世謂之凝齋先生太夫人之始歸也能承舅姑以得其歡能任家事以佐凝齋使專志以成其業存能事以禮亡能述其志以厲其子孫子仕為司道郡守矣太夫人能持禮法於家衣服飮食不侈以踰以廉正勗其子者見則數言遠則數書於族黨之貧者能約巳而厚恤之年七十時諸子方謀為樂飮燕會太夫人使止而以其財設義倉于近鄉以濟農者凝齋先生講學守宋儒法不言仙佛太夫人亦樂善而不取福田利益之説後凝齋三十年而卒為乾隆五十五年十一月十日年八十四其時長子觀察四子提刑先喪而太夫人顧目見其孫觀曾孫希祖皆成進士為部主事孫煦吉冠曾孫希曾皆為舉人而希曾為江西鄉試榜第一太夫人沒後三年以第三人及第為編修其餘多文學可觀者人謂封大夫及太夫人植德不懈足興其家宜其後之昌也乾隆五十九年某月日合祔封大夫墓余於太夫人子知其伯仲少客南昌及見凝齋先生而太夫人孫用光從學余為文故得其家世素行宜為之銘銘曰維淸有道天子巨祥帝見元孫福錫四方母儀江嶺秉德柔正秀茁曾元國庥家慶夫以儒興子有治聲慈惠鄉閭人樂其榮荷塘之野大夫之墓山周水回宜祔永固章母黃太恭人墓志銘有序太恭人桐城黃氏處士諱貞吉之女適章氏為贈中憲大夫松太兵僃道諱某之冡婦贈中憲大夫松太兵僃道諱天祐之妻生二子長曰東桂為候選州同知次曰攀桂為江蘇松太兵僃道獲以其官贈祖考以太恭人封妣者也太恭人年三十三而寡舅姑老且疾矣而子甚幼逾十餘年又喪夫之弟太恭人能晝夜勤苦操作以殖其産又能上盡奉養以及舅姑之終下撫教稚弱以至於壯祀先人賙親舊應賓客皆盡恩誼人謂章氏一婦任二子事也其後攀桂仕為渭源知縣擢知鎮江江寧府監司蘇松皆迎太恭人於官舍諸孫屢與鄉舉矣人皆榮之太恭人被服自奉之具不加於其素而修治先廟墓餽遺族黨濟人乏匱則每進而廣焉乾隆五十年江淮大旱民死亡相繼太恭人適在里睹大哀之盡分藏廩于族戚故舊以書速子於浙江購山芋玉米數千石雜錢米濟賑所費萬金攀桂迎之官不可曰吾去若飢者何於是攀桂亦遂請養歸逾再期乾隆五十二年冬十二月太恭人卒年八十有一卒而來哭者填戶曰微夫人吾死久矣孫五曰夢橘甫維極維桓維棟曾孫四初太恭人頗通形家説與其子營葬夫贈中憲於縣東南蟢子湖之北原命曰異日勿啓祔以驚神靈其子乃為卜宅於縣西二姑峯之麓登其巔以嚮蟢子之湖明如趾下太恭人乃喜以卒之次年十二月某日葬銘曰施則侈也於已苟完有子承之其惠以殫山之嶔也中有原趾出石泉湛甘寒首於西北嚮東南間德人居之固且安載詞堅石永不刋廣州府澳門海防同知贈中憲大夫翰林院侍講加一級張君墓志銘并序君諱汝霖字藝墅宣城張氏大父諱宿父諱中聖皆為縣學生皆贈中憲大夫君自縣學生雍正十三年為拔貢生旋以人才保舉乾隆元年引見命為知縣分發廣東任河源香山陽春知縣其至香山者再而攝署之縣又三四焉君初在香山遭母汪太恭人喪憂居新任令未至姦民賴姓乘隙為亂君即起捕倡亂者置之法而杖校其和從者逮新令至而邑已寧其後至香山免荒埔報升之稅修城南羅婆陂成灌溉之利而禁豪家為隄堰之厲民者海南徐聞縣民惰窳布種後不知糞耨槔車之事而婚姻尤無禮式君攝其令乃教之如內民時廣東有開礦採銅者七縣地力盡而役未止君攝英德縣知其病請于巡撫奏停焉澳門者香山南境斗入海西洋夷民居之以與中國為市時設同知官甫二年上吏以君賢俾攝其職君尤能得夷民情而柔調之故卒授君為澳門同知值事吏議降一級上官惜君去奏請留粵而部議不許君遂返宣城不復出矣君博學多聞尤工駢體文及詩嘗為澳門記略輯宛雅若干卷詩約若干卷自為詩文集三十卷政牘五十卷乾隆三十四年七月八日卒於家年六十一配袁恭人生君長子燾乾隆癸未科進士為翰林院侍讀得贈君如其官一女適附監生梅學側室梁安人生二子廣西布政使經歷倓太學生炯二女一適諸生劉辛未嫁死孫男十一孫女七乾隆年月日葬君于寧國縣花塢山村之原桐城姚鼐與燾為進士同年又與炯相知於君葬後為君補為墓銘銘曰懿維君吏海濆安內民外夷馴為國勤著有勳未上聞乘歸輪聚典墳閎厥文子繼振蔚以彬瘞泯泯昭億春吾銘云袁隨園君墓志銘并序君錢塘袁氏諱枚字子才其仕在官有名績矣解官後作園江寧西城居之曰隨園世稱隨園先生乃尤著云祖諱錡考諱濱叔父鴻皆以貧遊幕四方君之少也為學自成年二十一自錢塘至廣西省叔父於巡撫幕中巡撫金公鉷一見異之試以銅鼓賦立就甚瑰麗會開博學鴻詞科即舉君時舉二百餘人惟君最少及試報罷中乾隆戊午科順天鄉試次年成進士改庶吉士散館又改發江南為知縣最後調江寧知縣江寧故巨邑難治時尹文端公為總督最知君才君亦遇事盡其能無所回避事無不舉矣既而去職家居再起發陜西甫及陜遭父喪歸終居江寧君本以文章入翰林有聲而忽擯外及為知縣著才矣而仕卒不進自陜歸年甫四十遂絶意仕宦盡其才以為文辭歌詩足迹造東南山水佳處皆遍其瑰奇幽邈一發於文章以自喜其意四方士至江南必造隨園投詩文幾無虛日君園館花竹水石幽深靜麗至櫺檻器具皆精好所以待賓客者甚盛與人留連不倦見人善稱之不容口後進少年詩文一言之美君必能舉其詞為人誦焉君古文四六體皆能自發其思通乎古法於為詩尤縱才力所至世人心所欲出不能達者悉為達之士多效其體故隨園詩文集上自朝廷公卿下至市井負販皆知貴重之海外琉球有來求其書者君仕雖不顯而世謂百餘年來極山林之樂獲文章之名蓋未有及君也君始出試為溧水令其考自遠來縣治疑子年少無吏能試匿名訪諸野皆曰吾邑有少年袁知縣乃大好官也考乃喜入官舍在江寧嘗朝治事夜召士飮酒賦詩而尤多名迹江寧市中以所判事作歌曲刻行四方君以為不足道後絶不欲人述其吏治云君卒於嘉慶二年十一月十七日年八十二夫人王氏無子撫從父弟樹子通為子既而側室鍾氏又生子遲孫二曰初曰禧始君葬父母於所居小倉山北遺命以巳祔嘉慶三年十二月乙卯祔葬小倉山墓左桐城姚鼐以君與先世有交而鼐居江寧從君遊最久君沒遂為之銘曰粵有耆龎才博以豐出不可窮匪雕而工文士是宗名越海邦藹如其沖其産越中載官倚江以老以終兩世阡同銘是幽宮郭君墓志銘并序吳江郭君諱元灝字淸源其祖諱如龍考諱諤君少工為文為吳江學生而陸中丞耀之弟子也中丞最稱賢之君居家授徒僅以供養父母而已其室時至匱乏而不以為憾中丞貴亦絶不往于第與書往來論學乾隆五十一年君年五十三卒孺人迮氏無子側室翁氏生子麟鳳麟嘗從余學為文君亡其考猶在而家益貧麟出遊求養既而君考亡又數年麔乃克葬祖若父于是葬君於嘉善縣澄湖港之阡時嘉慶二年也次年遇余于杭州乞補為君志余宿知吳江陸中丞天下君子其所許必君子無疑也而又哀麟志乃為銘曰篤為學文可稱守有介行中繩進而與之君子朋吳越兩縣間一塍回見故國喬木升於焉卜兆曰永寧江蘇布政使德化陳公墓志銘並序公諱奉兹字時若其先陳宜都王叔明十世孫崇唐末為江州長史聚族為孝義僖宗旌之其後五世自南唐及宋皆旌為江州義門後乃遷居南昌明季又自南昌遷德化居德化三世為九江府學生俶俶生範康熙戊子科舉人為安義縣教諭生絢為德化縣學生是為公考自曾祖至考三世俱以公貴贈通奉大夫江寧布政使妣皆贈夫人公生二十二歲中乾隆丁卯科鄉試第一庚辰科成進士授四川知縣凡知蓬山閬中擢知茂州皆有善政當金川為逆大將率兵討之任公主炮局及修飭兵興橋路常居口外山谷間瀕危勞績甚著有三雜士司地當進攻金川之路官兵猝至三雜長卓爾碼婦人也謂且伐之閉道不通將校譁言三雜畔矣宜先攻公告將軍三雜未知國家意耳非畔也請往察而諭之將軍從公策公至一告諭卓爾碼即散守者具狀上謝且奉軍過甚謹其後詔加其封號曰賢順卓爾碼以謂惟陳公活我又豫我以榮也公旋晉嘉定府知府及建昌道其居官日常寡出入邊塞仁恩素著多所鎮定中外皆稱之上乃授公四川按察使乾隆五十二年調河南按察使居二年調江蘇旋擢江寧布政使居四年調安徽未半歲又調江蘇公始在蜀最久凡二十七年其後居江南亦九年歷四任熟習民情洞其利弊能以簡靖漸祛其患未嘗厲威為聲名吏民愛戴以謂得大臣之體好士樂善奬掖如不及公自壯入蜀至老受任不得歸乃取鄉地自號東浦以寄思士皆稱東浦先生云其天才高厲作詩專法杜子美論者謂朴厚之氣殆足嫓之平生經歷多異境舉見所為詩凡千首曰敦拙堂集古文則所為不過十餘篇然實得古人之法今世作者無能逾也公年七十四嘉慶四年正月壬午薨於蘇州夫人桂氏同縣縣學生某女有賢智從公居建昌時卒生蔭生候選員外郎大來候選州同知方來又生二女側室蔣氏生候選布政司理問斯來戊午科舉人具來側室張氏生候選司務僃來公嘗喜桐城姚鼐之文薨前一歲在江寧監臨武鄉試見鼐語曰我死必得君志吾墓鼐曰公方健何言是也然心諾公及公子於年月日葬公某所卒為銘鼐也銘曰才為國勞險阻載遭靖彼紛囂平寧安處來宣江滸從容風雅民曰吾宜列士懷儀未究其施有政可頌有文可誦名存身覂匡廬前麓故居爰復永安幽谷方侍廬先生墓志銘有序方先生桐城人諱澤字苧川侍廬其自號也祖某父某先生少有異才高識遊江寧與諸名士遊一時才俊之士言行多險怪先生默默獨守中行其後同遊者多及禍而先生弗與然頗經紀其喪有終始之誼退為諸生久屈埸屋長自觀尚書保以學士督學安徽最知先生賢乃舉優貢入都時先生年五十矣再入北闈不售為八旗生教習歲滿詔以知縣用先生不樂就歷遊湖南河南山西學政幕內遍觀山水之勝作為詩歌以自娛最後主洪洞玉峯書院得疾歸歸未幾卒年七十一先生與鼐伯父編修府君少為交友編修府君仕京師時先生館於鼐家鼐兄弟皆受業先生論學宗朱子論文宗艾千子惡世俗所奉講章及鄉會闈墨禁其徒不得寓目先生為文高言潔韻遠出塵壒之外場屋主文俗士不能鑒也然先生弟子以其説獲雋於鄉會試者十餘人矣得失要自有數不繫乎其文士自從所好耳如先生乃真信道篤而知所守者也編修府君嘗謂先生文似明羅文止詩似宋楊祕監云子二今皆亡有孫績曾孫東樹能世其家學先生弟子今僅存三人皆年七十矣與績謀葬先生而鼐豫為之志曰其守額額以古為則不為俗惑英英高雲以壯其文絶於穢氛生名弗耀沒遲藏兆弟子所悼營是幽宮龜言既從以安厥終陳孺人權厝志孺人仁和陳氏女也父琛母程氏通文字以課子女故孺人自少讀書能為詩文而其志慨慕古女子賢哲有節行者不欲以才藝自居也故其為詩質直慷慨義嘗近古不若世女子流連風景為媚好悅人之詞孺人適江寧胡君名培胡君居貧甚孺人時以文字慰其意既而胡君病沒遺三子二女皆未婚嫁孺人執女紅為衣食暇則教子女與之論古今為學又性解醫術里中婦女有疾往往請為之方孺人於富者鮮所求於貧者或濟之藥雖自處乏困不恤也其子女卒皆成立婚嫁幼子鎬從姚鼐學鼐見孺人詩曰合簫樓稿歎謂今女子作詩者之冠雖流俗淺人論詩者未必知也而後世必有知之者已孺人嫠居三十四年嘉慶三年十月卒年六十八鎬與其兄鎮鑑權厝夫人於江寧城北鼐為之銘銘曰居庳里志高矢藏無有而學富其身可亡名不毀吾為命之女君子奉政大夫江南候補府同知軍功加二級仁和嚴君墓志銘並序君諱守田字穀園杭州仁和嚴氏祖諱士奇贈奉政大夫考諱立功為虞城主簿封奉政大夫君少遊濟南寄籍運學為諸生遂中乾隆辛卯科山東鄉試舉人乾隆四十六年挑發廣東知縣初任陽江縣未至境有迎吏來與君語少習見君囊槖貧甚誘君以利君問何以取利吏曰邑有賣漿者毆人死而多引富室繫數十人矣君至咸脅以罪千金立致也君曰諾至縣日即坐堂上出所冤繫囚盡縱之去獨留一囚訊之囚即服罪賣漿者也迎吏捧牘在側捽下痛杖黜之是時方傾市來觀上新令見君治此吏歡呼動地君名聲一日大起調仁化與巡撫孫公士毅爭獄君辭厲孫公變色既而卒從君議更以重君遂調之番禺凡獄事多委君以母憂去官服闋再赴廣東補順德知縣治海盜有績屢辨難獄又調南海番禺南海皆大府治所君兩蒞之人見其意思如暇然而政無不盡是時孫公擢為總督率兵出關討安南之亂公故奇君才檄之從軍及市球江之捷敘功入奏賜孔雀翖五品頂帶君才益見端緒矣既而與孫公偕返孫公內召嘉勇公福康安代其任福公亦重君才君議論其前必盡福公常聽其説於事多便乃保題君引見命記名知府而發江南以同知用在江南三年屢委署未及真授而遭父憂歸其署淮安知府時值旗丁以各縣助之費少為詞數百人大噪淮上漕使之門君往召衆前使訴其意君徐曰助費在州縣今為爾白漕使飭下道道下州縣取費至則汝候久矣不亦病乎衆曰然君曰是誠非吾職然吾當為公濟汝以私財汝等張帆疾行可矣於是命之次第發而稍資給之竟無事江淮人咸稱頌君有定亂才君既歸數年竟不復仕於嘉慶四年四月十日卒於里年五十有二君文章無不能而奏牘尤善通曉兵事便騎射為舉人時偕人遊塞上與侍衛武人共宴飮角射君最後發三矢中的如一武人大愕沮屈君從容就坐題詩便面而去其在孫公軍中誠欲盡其謀以共立功于域外不幸值阮氏之變軍潰功不就然古人始敗而卒建大功如孟明之類史册多有其後孫公猶被眷遇卒收庸蜀桑榆之效而君竟不復試于軍旅矣世孰由知其才之異也君在江南時嘗一來訪余與言果明決異士其後余至杭州又遇君而君無意用世亦旋歿矣娶莊宜人君在江南時宜人卒生炳及兩女側室范氏生煥亦兩女胡氏生燾吳氏生煦某年月日葬君于杭州天馬山祖塋之側莊宜人祔銘曰既多文又秉武臨溟海江淮滸鋤黠猾柔強禦意趠遠為國撫萬里駕中乖阻鬱餘能紀可睹勒堅石慰終古歙胡孝廉墓志銘并序胡君諱字受穀其先鄞人康熙中有武進士璋遷歙生行人司行人廷鳳廷鳳生歲貢生銘恭銘恭生廩膳生與修一統志凝鼎凝鼎生君君少孤受學於淳安方先生楘如工文章中乾隆已卯科鄉試名著於遠邇矣而屢躓會闈迄母喪終君遂絶志求進吏部符取為知縣亦不就惟日與諸生講誦文藝以為樂歙城南越溪陟山有古寺十雖多頽毁而空靜幽邃多古松柏君攜徒稍葺治讀書寺中其意蕭然余昔主紫陽書院去寺不十里嘗與往來或至夜月出共步溪崖林徑寒窈至今絶可念也君論文尤能起人意又多藏書喜借人閲歙士多歸之用君説取科第仕朝者數矣君竟老山中年七十四以卒嘉慶三年十二月九日也余去紫陽亦十年矣君性仁厚與物無畦畛其沒也非其徒亦皆思之娶方孺人先三年卒生府學生良會良會將葬君某所以書乞余銘銘曰行伊修其文彪淡寡求懋學優授羣髦日月遒藏陰幽後億秋於吾褒高淳邢君墓志銘君諱復誠字良生高淳邢氏祖諱之鵬考諱本岐祖考皆娶陳氏君為人朴誠慈和與人無爭而好施豫乾隆三十四五年間高淳大水壞民廬舍既而大疫君多所賑施以濟民困又為設醫藥葬埋至五十年大旱民病尤亟君盡出藏穀千餘石以食衆又假貸數百金以佐施自其大母陳孺人建石橋於村溪之上久而圯君復建焉又買石治塗以便行者君考嘗欲為邢氏設義倉未就君與弟復吾卒就之置義田五百畝君祖於宗祠既置祀田矣至君益之又數十畝故鄉族無不愛戴君者然君遇之謙甚未嘗敢自德也君年八十二卒於乾隆五十五年四月十八日嘗以急公議敘授職直隸州同知娶劉氏生增廣生國秀繼娶楊氏生允模側室費氏生國學生晉國學生國勛晉從余學於江寧余在江寧見高淳人多言君長者晉之來君沒既葬于先隴之次矣而晉求補為君志余因書所聞而銘之曰斯民憊矣其生危孰職撫是顚則持邑有魁艾敦愛慈積而能散衆所飴遺休逮後理不疑刻石藏幽視來兹繼室張宜人權厝銘并序宜人十七歲而歸余三十一歲而沒上事姑中接娣姒下撫諸子婢僕無以異今時女子而悖傲苟賤暴虐之事所必無也治家不能極於儉嗇而矜奢縱佚之事所必不為也尤喜稱人之善聞人不善雖於余前亦絶不言余迂謬違俗仕不進而家不贏宜人不怨顧以為宜然以余所遇不偶獨幸得宜人偕居室十五年而今又死矣乾隆四十三年兩淮運使朱子潁請余主梅花書院又勸以家往宜人之疾以多産氣虛猝無良醫或反以藥疏其氣故以閏六月朔殞於揚州宜人高祖為張太傅文端公曾祖為少詹事諱廷瓚祖為贈奉政大夫諱若霖而今四川屏山令君為宜人之父其母又鼐姑也皆在屛山隔數千里不知其亡也余先娶亦張氏同出文端之父遺一女宜人視之殆無以加其善既沒所出子女各二幼不甚知哀而長女之慟不可聞八月柩還厝之縣南五里而銘其室曰循階庭立軒楯窈若存敻超遠風幽幽翩哉返稚子嬉澘來盻􅿇以須精霧散歸無窮物之本罔荒忽曠靡戀生奚欣死奚怨厝委形於此館江蘇布政使方公墓志銘并序公諱昂字叔駒其先由歙遷於義烏自公祖諱紹倫以上居義烏二十三世至公考諱起英乃遷歷城祖考皆贈江蘇布政使公十三歲而孤貧甚為歷城諸生親執薪汲以養母而其意怡然乾隆壬午科舉山東鄉試辛丣恩科成進士授刑部主事居刑部十餘年再擢至郎中其執法平用心仁恕屢以此與上官爭至忤而公不變所守乾隆五十四年授饒州府知府饒州人甚愛之期歲命擢為江蘇道交印將發矣而營辨以捕私鹽擾民於德興民大驚恐皆欲奔亡公曰吾不可辭此責馳往民見公即定公旋請削武辨職而置民之犯官閧衆者於法然後至江蘇待缺以委審積案三百餘勞甚致疾暫解病痊引見復發江蘇署松太道事值海上盜近寶山總督率兵至寶山防之公籌軍需甚裕盜旋去公乃建八䇿大府頗用之以弭後患次年補江寧鹽巡道公以為吏治不善與民俗之惡二者每相因而益甚故其與諸生庶民語皆諄諄教之如子弟知其貧乏有時濟以資至懲治姦蠧則極嚴峻嘗早暮聽訟不懈民益趨公所而訟人或謂此非觀察之體也公曰然使舉吾職視不肖令長盡汏之吾坐受成豈不善然其勢不得非如此何以盡吾心哉自公臨江寧凡五年吏民風習之尢惡者大抵皆革而士皆親公矣旋擢貴州按察使行日民涕泣送之連塞數十里公亦為泣顧而不忍去今上夙聞公治名矣及臨大政即擢公為江蘇布政使公至江蘇甚欲有所建而已被疾百日而卒嘉慶五年閏四月二十八日也年六十有一公為人孝友仁厚雖家去義鳥而修祠墓厚宗族皆盡其禮意作詩文不多而自然頴拔讀者知其為奇人也夫人歷城楊氏生子世平女二壻張鎮峰周霞繼娶海陽趙氏生子世德又繼娶上元吳氏生子世紱女一未字世平奉公葬歷城之山桐城姚鼐居江寧時親見民之戴公甚也為之銘曰卓犖其才勤撫衆黎用意愍慈天子既知作屛海淮任荷當時宜壽以祺而早謝之家貧子羸舊民載思作是銘詩以告萬期
