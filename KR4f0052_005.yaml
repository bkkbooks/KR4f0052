front:
  text: 惜抱軒文集五
  hash: sha256:abca551eb54921756851f0bc94449aa90008d845d2d0e92dc23572441568ab74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_005-1a}
body:
  text: 題跋孝經刊誤書後孝經非孔子所爲書也而義岀於孔氏葢曾子之徒所述者耳朱子疑焉爲之刊誤夫古經傳遠誠不能無誤也然朱子所刊亦已甚耳夫其書有不可通者非本書之失後人離合其章者之過而文有譌失不能明也漢藝文志云孝經古孔氏一篇二十三章其曾子敢問章爲三章夫孝之常在於事親立身而其極至於嚴父配天故曾子敢問章義與首章之說相僃朱子中庸章句以孔子言子臣弟友之常爲費之小以舜文武周公之孝爲費之大夫孝經亦猶是已舉中庸之言孝以釋嚴父配天之義則知聖人論孝必極於是以人子自盡之實則匹夫啜菽而不爲不足以其行於天下之量則爲帝王制禮樂皆僃於孝之中故日義相僃也子言天地之性人爲貴至聖人之德又何以加於孝乎其辭盡矣其下故親生之膝下至不敬其親而敬他人者謂之悖禮自爲一章以申資於事父以事君而敬同義也自以順則逆民無則焉至其儀不􅑯又爲一章言君子苟不能自愼其威儀而但以虛辭訓民民必逆之而滋爲凶德縱能得志於民而已實無禮以臨之君子亦所弗貴是以君子愼威儀一章以申非先王法服不敢服非法言不敢道義也藝文志分三章是也而章首各有脫文又訓誤爲順儒者觀其發句言故言以遂聯屬之而以子日字寘父子之道天性及不愛其親之上則失其所矣孝經後章之文多以廣前章之義但非必以經傳分其次亦不必拘拘比附也若其辭有同於左傳者葢此固曾氏之書而左傳傳自曾申劉向別錄記之矣意戓爲傳時取辭於是未可知也不幸孝經之文譌脫不具朱子覺此文義之不完反不如左氏之可通遂疑爲襲左氏也其病亦由混合爲章者過也若其首前儒所分爲七章者朱子合爲一章則說誠善無以易矣夫儒者有德行有言語文學苟非亞聖之才不能僃也德行之儒或疏於辭若坊記表記緇衣之類每一言畢輒引詩書文以証之閒有不甚比附而強取者矣亦洙泗閒儒者之習然也子思孟子然後不爲是習至荀子則亦有之矣孝經引詩書亦頗有然知其取義有疏密則可耳而節去之恐未可也辨逸周書世所傳逸周書者漢藝文志載之六藝略尙書中但云周書七十二篇不云尙書之逸者云孔子所論百篇之餘者劉向說也班氏不取識賢於向矣然吾謂班氏辨此亦未審子貢曰文武之道賢者識其大不賢者識其小雖小而所傳誠文武道非誣也誣則奚取哉周之將亾先王之典籍泯滅而里巷傳聞異辭葢聞而識者無知言裁辨之智不擇當否而載之又附益以已之私說吾意是周書之作去孔子時又遠矣文武之道固墜矣荘子言聖人之法以參爲驗以稽爲決其數一二三四是也此如箕子陳九疇及周禮所載庶官所守皆不容不以數紀者若是書以數爲紀之詞乃至煩複不可勝記先王曷貴是哉吾固知其誣也其書雖頗有格言明義或本於聖賢而閒雜以道家名法陰陽兵權謀之旨程寤太子晉篇說尢怪誕殆非儒者所道校書者宐出之六藝八之雜家乃爲當耳宐依其本書名曰周書雖與尙書周書名同不害也不當曰逸云逸則附之尙書矣讀司馬法六韜世所有論兵書誠爲周人作者惟孫武子耳而不必爲武自著若其餘皆僞而已任宏以司馬法百五十五篇入兵權謀班固出之以入禮經太史公歎其閎廓深遠則其書可知矣世所傳者泛論用兵之意其辭庸甚不足以言禮經亦不足言權謀也且僅有卷三耳漢藝文志吳起四十八篇在兵權謀尉繚子三十一篇在兵形埶今吳子僅三篇尉繚子二十四篇魏晉以後乃以笳笛爲軍樂彼吳起安得云夜以金鼓笳笛爲節乎蘇明允言起功過於孫武而著書顧艸略不逮武不悟其書僞也尉繚之書不能論兵形埶反雜商鞅形名之說葢後人雜取苟以成書而已荘子載女商日横說之則以詩書禮樂從說之則以金版六弢然則六弢之文必約於詩書禮樂者也劉向班固皆列周史六弢於儒家且云惠襄之閒或云顯王時或曰孔子問焉然其爲周史之辭若周任史逸之言無疑也非言兵亦無與於太公也今六韜徼取兵家之說附之太公而彌鄙陋周之權曰鈞不曰斤其於色曰元日黑日緇不曰烏晉宋齊梁閒市井乃有烏衣烏㡌語耳而今六韜乃曰斤曰烏余嘗謂周秦以降文辭高下差別頗易見世所謂古文尙書者以他書事實證之其僞已不可逃然直不必論此取其文展讀不終卷而決知非古人所爲矣葢古書亾失多在漢獻晉惠愍閒而好爲僞者東晉以後人也唐修隋書作藝文志不知古書之逸舉司馬法之類悉載之顔師古注漢書於六韜直以謂卽今書此皆不足以言識至韓退之乃識古書之正僞惜其於此數者未及詳言之也漢書刑法志所載古井田出車之法甚詳其文葢出於司馬法與包咸注論語辭同也刑法志引其文僃故以六十四井出車一乗別以三十六井地當山川沈斥城池邑居園囿術路合之則百井包咸引其辭略故苐言成出車一乗耳其原出一也作僞者其所見書寡於爲古文尙書者故舉此及他經史明載之司馬法而倂遺之辨賈誼新書賈生書不傳久矣世所有云新書者妄人僞爲者耳班氏所載賈生之文條理通貫其辭甚偉及爲僞作者分晰不復成文而以陋辭聯廁其閒是誠由妄人之謬非傳寫之誤也賈生陳疏言可爲長太息者六而傳內凡有五事闕一吾意其一事言積貯班氏已取之入食貨志矣故傳內不㪅載耳僞者不悟因漢諸侯王表有宮室百官同制京師之語遂以此爲長太息之一然賈生疏云令君君臣臣上下有差已足該此義矣不得又別爲其一也夫天子母曰皇太后妻曰皇后諸侯王母曰王太后妻日王后雖武昭以後抑損宗室終不改此制何嘗爲無別耶易王后曰妃自魏晉始作僞者魏晉後人乃妄意漢制之必不可用耳若諸侯王相用黄金印固爲僭矣故五宗王世易爲銀印然吾以爲此亦未爲巨害漢御史大夫秩中二千石銀印靑綬張蒼以淮南王相遷爲御史大夫周昌以御史大夫降相趙高祖日吾極知其左遷其時國相乃金印此正如隨以來外官章服官品雖崇而位絀於京職之卑品耳是亦何必爲太息哉要之漢初諸侯王用六國時王國之制故其在國有與漢庭無別者若此若皇帝臣下稱之曰陛下此是秦制周末列國諸王所未有則漢諸侯王必不襲用秦皇帝之制而使其國臣稱曰陛下而僞爲賈生書及之此必後人臆造非事實也眞西山取新書是篇欲以補賈生之疏吾是以爲之辨若其文辭卑陋與賈生懸絕不可爲量則知文者可一見決矣讀孫子左氏序闔閭事無孫武太史公爲列傳言武以十三篇見於闔閭余觀之吳容有孫武者而十三篇非所著戰國言兵者爲之託於武焉爾春秋大國用兵不過數百乗未有興師十萬者也況在闔閭乎田齊三晉旣立爲侯臣乃稱君曰主主在春秋時大夫稱也是書所言皆戰國事耳其用兵法乃秦人以虜使民法也不仁人之言也然自是世言用兵者以爲莫武若矣書貨殖傳後世言司馬子長因已被罪於漢不能自贖發憤而傳貨殖余謂不然葢子長見其時天子不能以寧靜淡薄先海內無校於物之盈絀而以制度防禮俗之末流乃令其民仿效淫侈去廉恥而逐利資賢士困於竆約素封僭於君長又念里巷之徒逐取十一行至猥賤而鹽鐵酒酤均輸以帝王之富親細民之役爲足羞也故其言曰善者因之其次利道之又次敎誨之整齊之夫以無欲爲心以禮敎爲術人胡弗寧國奚不富若乃懷貪欲以競黔首恨恨焉思所勝之用刻剥聚歛無益習俗之靡使人徒自患其財懐促促不終日之慮戶亾積貯物力凋敝大亂之故由此始也故譏其賤以繩其貴察其俗以見其政觀其靡以知其敝此葢子長之志也且夫人主之求利者固曷極哉方秦始皇統一區夏鞭箠夷蠻雄略震乎當世及其伺睨牧長寡婦之貲奉匹夫匹婦而如恐失其意促訾啜汁之行士且羞之矧天子之貴乎鳴呼蔽於物者必逆於行其可嘅矣夫辨鄭語太史公曰左邱失明厥有國語吾謂不然今左氏傳非盡邱明所錄吾固論之矣若國語所載亦多爲左傳采錄而采之非必邱明也又其略載一國事者周魯晉楚而已若齊鄭吳越首尾一事其體又異輯國語者隨所得繁簡收之而鄭語一篇吾疑其亦周語之文輯者別出之者周自子朝之亂典籍散亾後之君子掇拾殘闕亦頗附㑹非實喜言神怪若周語房后爲丹朱馮及是篇龍漦之說何其誕耶夫褒姒之事鄭桓公所親見如是篇史伯所述後世紀前代之辭非同時辭也鄭桓公周賢人也而謂寄賄誘虢鄶取其地用小人傾詐之術且當西周時史伯惡能知周必東遷鄭必從之哉此可謂誣善之辭矣秦仲居幽王時僅一附庸不足云小國而何以云國大造飾之詞忘其時之不合以邱明君子必不取也若鄭人爲鄭語宐載有鄭東建國後之事子産引鄭書安定國家必大焉先司馬叔游引惡直醜正實蕃有徒然則鄭固有語輯國語者卒未得邪跋夏承碑自漢以來爲書者有隸書或又言八分書說者欲殊別之辨之愈繁愈使人茫然不得所據吾謂八分止是隸書耳衞恒四體書勢古文篆隸艸書四者而已明八分在隸內也然隸書自有三種之別秦與西漢官俗所用猶未有波磔然不得謂之篆止是隸書其字形亦殊不正眞所謂取便徒隸者也是爲其一東漢及魏則波磔興矣然尙無懸針之體是爲其二自晉以來皆法羲獻有懸針垂露之別葢創始於漢末而大盛於二王以至今日是爲其三其閒貌別形殊眞所謂變化如浮雲者然一以此三者統之則盡矣其中不容八分別爲體也蔡伯喈嫌世俗隸書苟簡謬誤正之以六書之義取於篆隸之閒是謂八分葢所爭者在筆畫繁簡得失之殊而不在體勢波磔之辨其謂之八分者旣爲隸體埶不容盡合篆理略用其十七八耳亦如顔元孫所云盡法說文則下筆多礙者也故余嘗云蔡伯喈爲漢八分顔魯公書郎可云唐八分此與論筆法體勢者遠矣衞恆云上谷王次仲善隸書始爲楷法王次仲未知何時人然當在伯喈之前楷法者止言筆法之工拙與八分論字形之正不與六義離合者無渉張懐瓘書􅍘妄以次仲爲秦人又謂次仲作八分若以八分在隸外爲一體者果若是漢書六藝志中載六體書何以遺漏八分耶歐陽公集古錄凡漢碑字率呼爲漢隸葢伯喈惟書石經當爲世則字形必合典正故取於八分其尋常作書亦或有出入況他人所書碑石舛失之字多矣其中縱有能爲八分者謂之漢隸終不爲誤若俗體漢隸苟謂之八分乃是誤也齊梁以下至唐人往往言分書眞書其分書乃指波磔而不懸針者聊與二王等眞書爲別異此皆沿俗失其義不若歐公稱漢隸之善世反謂歐公誤以八分爲隸書可謂倒易是非也趙明誠云嘗出漢碑數本示一士人何者爲八分何者爲隸士人卒不能別不知八分本未嘗別於隸體也此夏承碑中作字有甚得六義近篆者亦有從俗舛誤者然從其多者論之固愈於漢人他碑作字舛俗極甚者卽謂此碑是八分書亦可但未知是伯喈所爲不耳至若鄭僑所云漢石經是隸體八分夏承碑是篆體八分此乃不知而妄說所謂使人茫然者也書攷工記圖後休寜戴東原作考工記圖余讀之推考古制信多當然意謂有未盡者東原釋車曰軫謂之收此非也記日軫之方也以象地也葢軫方六尺六寸記日參分車廣之一以爲隧葢以二尺二寸爲輿後其前也其廣如軫而深四尺四寸以設立木焉是爲收詩曰小戎俴收毛公曰收軫也謂輿深四尺四寸收於軫矣非謂軫名收也古者之尺小鞌之戰綦毋張寓乗韓厥肘之使立於後晉師入平陰獲殖綽郭最衿甲坐中軍之鼓下使軫深四尺四寸而已此非四尺四寸所容也故收非軫也夫車邸之四邊爲軫後軫無立木人所由登也軫三面有立木者謂之軓記曰軓前十尺而策半之此前軓也版之前於前軓者曰陰陰一而已少儀曰祭左右軓軓有三面也古大車轅上附輿小車輈下附軸其旣駕也輈附軸者上離輿七寸揉而升之踰軓及衡不及軓七寸而揉始焉故記曰軓中有灂今圖謂軓爲陰而揉輈自軓始抑誤矣輿上以一木再揉而曲爲三橫居前日式其餘輿上巨木皆日較記曰參分式圍去一以爲較圍又其餘細木爲欞旁者曰軹前者日轛故橫木其高平於式而當式後較也注家謂之輢士輚車其崇者輢而已大夫以上飾車衷甸重較輢上二尺二寸而設重較焉左右衡較皆二立較皆三短其一修其二記日以其隧之半爲之較崇謂重較也天子重較則爲繆龍荀子日彌龍以養威也今戴君謂較輢不重者失之矣凡戴君說考工車之失如此其自築氏而下亦閒有然者然其大體善者多矣余往時與東原同居四五月東原時始屬稾此書余不及與盡論也今疑義蓄余中不及見東原而正之矣是可惜也書夫子廟堂碑後虞伯施夫子廟堂碑無建立年月觀其文內葢武德九年十二月建廟次年爲貞觀元年仲春廟成釋菜又稱述太宗有視膳問安及空山盡漠等語則知立碑必在李靖俘頡利之後高祖未崩以前而爲之也當武后稱帝之時磨去唐字改題曰大周孔子廟堂之碑故前署司徒相王旦書碑額後復有長安三年太歲癸丣金四月壬辰水朔八日己亥木書凡二十一字黃山谷見榮咨道家所藏舊搨本如此然史言是年三月相王罷爲司徒矣不知史誤耶或山谷所記四月字非耶貞觀立碑年月是時旣磨去及文宗時祭酒馮審又請琢去大周字及武后年號而元建碑之年竟不能知如今本是也歐陽公集古錄趙明誠金石錄皆以此碑爲武德九年立葢失之是碑宋初已毀壞爲王彦超再建文內及金冊斯誤及字誤爲反榮光幕河幕字誤爲莫葢再建時摹刻者失之耳石旣非舊加又刓敝至今執是以論伯施書法之妙遠矣聞今安徽巡撫閔公家藏古拓􅋊文自集其字爲纂言孔繼涑爲鉤本勒石以一本贈余余觀之尙不如此石本伯施書雖渾厚而有鋒鍔王彦超摹刻山谷固云不厭人意矣若孔刻乃彌失之摸稜爾但未見閔藏本不知究如何也曩時陳紫瀾宮詹見語云某王府有唐拓廟堂碑後進入大內果然亦可與山谷所見榮咨道家者抗行也何孺人節孝詩跋後昔孔子刪詩鄘風首柏舟之篇葢春秋之時禮敎衰風俗敝女子若共姜者鮮矣故聖人亟與之也其後風俗益偸若魯貞女淮陽陳孝婦之倫閒稱於世及宋時儒者申明禮義之說天下宗之至於今日女子皆知節行之爲美若柏舟之賢者多矣是何士大夫之德日衰於古而獨女子之節有盛於周之末世也乾隆十五年禮部議從江蘇巡撫奏以天下爲節婦者衆不可盡予旌表乃別定爲格如格者乃旌表而女子之行或出於人所難能不乔不及格有終不與於旌表者矣然其實足以存敎化美風俗君子樂得詠歌而稱道之不繫乎旌與否也鳯陽何太孺人少寡守節育其遺弧不乔孤子夭自投於井家人救出之爲立嗣嗣子長而又死卒撫孤孫今武淸令何君也與鼐爲同年友京師士大夫以孺人節行尢異多作歌詩以美之何君以視余詩曰無忝爾所生夫孺人高行明節可以張之以風乎天下之士君子而況其子孫也哉然則孺人之遺敎遠矣劉念臺先生淮南賦跋尾右山陰劉念臺先生淮南賦葢爲寶應劉練江先生作誄者也兩先生之於爲儒皆所謂篤行好學守死善道者也其相爲友有不僅直諒多聞之爲益者矣當萬歴中紀朝廷政治大壞念臺先生方出而練江先生告歸於家然皆內進修其德而外繋心於天下之事欲援手以救斯民者念臺先生以行人出使過䢴方欲見練江先生而先生已没故其痛尢深次年使還又過䢴不勝其悲私謚之曰貞修而作此賦因自書以貽其家人此卷是也乾隆乙丣秋練江先生之六世孫台拱攜來江寧出以示鼐讀之使人感懐悽愴不能自已又念先六世祖汀州府君與念臺練江兩先生皆萬歴辛丑進士卒皆爲名臣俯以通家之情仰增敬慕用敢識詞於其後云後學桐城姚鼐記方拗堂㑹試硃卷跋尾乾隆三十六年㑹試余與南康謝蘊山編修竝爲同考官蘊山得詩四房余得禮記二房皆居西序東向坐最近時每共語得佳卷或持與觀賞之今觀察歴城方君坳堂出於蘊山之房余獲讀其文最先及塡榜始知其名其後余病歸久之來主江寜書院時蘊山旣外授遷河庫道去江寧三百里坳堂觀察亦來江南則居江寜日夕相從出其㑹試硃卷見示余再讀之因憶昔者兀坐終晷握管披卷時欣時厭及獲於諸賢聚居言笑之狀宛在目前計去今二十二年矣當時考官三人諸城劉文正公長白觀補亭尙書武進莊方耕侍郞皆已亾同考官十八人及今存者余與謝觀察外復四人而已是科得才稱最盛而當時登第烜赫有聲若程魚門周書昌孔葓谷洪素人林於宣孔撝約輩今率已殞喪況歲月悠悠又自是以往者乎因與坳堂語及愴然坳堂才行逾人不負科名是卷固宐爲後世所寶貴而余顧尢念者今昔之情也同考官舊制用藍筆是科以皇太后萬壽恩科易之以紫循用數科升祔之後復改從舊又是時試帖詩題在第二塲房官以五經分卷今則詩題移於第一場而房官無五經之名是皆二十年中科場儀制之小變倂記於是俾後考求故事者知之十一世祖南安嘉禾詩卷跋後先叅政公當明中葉以給事中出知南安惠澤下流祥嘏上應成化二年屬縣大庾有嘉禾之瑞一時文士多爲歌詠凡數十篇而大庾蔣君銘爲之序叅政公旣集而刻之石又以其眞蹟藏於家閱今三百二十七年矣所藏閒有零失弟壯亭收輯重装之凡得詩十六首仰思先人仁賢淸白之風無忘後嗣夙夜繼紹之志然則是卷也抂昔者爲國祥抂今玆爲家慶夫豈特文章翰墨之事哉子孫其世寶諸梅二如古文題辭吾郡潛山有張立齋先生者爲人純白淸介舉世閒埶位利祿之事無以動其心者一以飭身稽古爲事困而不改耄而不倦眞所謂君子儒也宣城梅文穆公第三子鉁字二如學於立齋矯然以節行自持其人品葢似其師立齋頗好爲古文見二如古文喜以爲勝已梅君中庚午科副榜與鼐爲同年然初不及相知君後從文穆公居江寜乾隆四十三年鼐偶以事至江寧其時文穆已薨於人家坐上一遇君而心重之然囱囱别去又後十餘年鼐來主鍾山書院則君已喪數年矣江寜人每爲鼐述君之賢思今不可復得也乾隆五十九年八月見君弟繼美始得君文讀之果有高格淸氣異於世之爲文者然君不自意其早亾爲文不自收拾繼美鈔於散佚零亂之中得二十餘篇鼐取其尢善者別鈔以付其家鼐家去潛山百二十里而不獲見張先生唯其文自先生存時已雕板得見然終以不遇其人爲恨君家世有德行文學自定九先生及文穆公所著書及文集行於海內鼐具讀之矣若君年四十而喪旣無立齋之壽以大著其名而文又未刻鼐苟非後至江寜烏知君行之詳及文之善哉君文太少似不足名集然世固有鈔取漢魏以來名人文數首輒以某集稱者然則即以君集刊行亦可也孫文介公殿試卷跋尾武進孫文介公萬歴二十三年殿試對䇿卷公官禮部時自取出以藏於家嘉慶四年余於公從七世孫淵如觀察處得覲之賢哲翰墨雖寸紙足貴況其身所由始仕而陳辭慷慨切直忠藎之志已見於此焉者乎文介書法爲世所稱董華亭亦嘗推之方其登第時年三十一書猶未爲甚工葢暮年筆力轉進又踰於少壯之蹟然如公德修節立不愧始終書小藝不足論縱不能加益於其少時亦何害乎卷內每行作三十二字凡郷會試卷皆有横直硃絲行殿試卷但有直行而已推立制之意葢以僃士對䇿文有長短則字從而疏密無不可者今時相習書殿試所對率行二十二字失爲法之本惜抱軒詩集五古體廿六首夜讀篝鐙毎夜讀古人皆死矣而我百代下㑹其最深旨吟諷至往復欲罷不可巳安得與之論謂我能知彼今世綴文者異世亦如此念此衷悽惻淚下如鉛水顧思文載道筌蹏徒寄耳陋哉執此愛束縛作文士汝聞天籟乎飄風满空起題汾州張太守墓廬圖三代重廟祀墦祭禮所略義謂迎精返宫室專神託藏欲弗得見豈事大興作所以脩防封孔聖涕隕落邃古墓不墳於義詎爲薄自從秦漢來閟宮禮銷鑠厭祭不迎尸同堂廢特禴廟輕墓乃重阡表極華爚所以上陵儀造自漢都雒仁孝旣屬玆福祐亦攸酢七略載相墓魏晉稱管郭大儒子朱子於焉頗采獲固欲先靈安匪繫俗見縛張君少孝養節母處幃幕板輿迎入越風木痛寥廓佳城猶未卜霜露走巖壑秉義諒無愆神感助求索面勢峯棱秀種樹柏樅錯鬱鬱氣佳哉腼想幽靈樂窀穸中妥依丙舍外營度在晉陶士行元功表衡霍少日居潯陽牛眠藏父槨諒知神報德陰相啓竆約期君功業隆異日登名爵善績史僃書墓廬事不削送胡豫生之山西趙城將訪乃翁舊知䢅朝雨歇石城水一挂江帆幾千里邀君小立白門前往事回頭四十年章江寒渚丹楓落乃翁共坐滕王閣詩情酒態天下豪旅舍生兒始繃縛湯餠眾客閧登筵碩果惟余遲入槨渥洼種卒成權奇見爾文章繼翁作貧交令我慙叔孫駿足憐君無伯樂承家彈鋏向風塵有母尸饔尙藜藿小倉亭戶拓玻瓈敗荷落桂沈秋泥主人昨日會賓飮綠尊满捧靑蛾低美人北士各有思隨眾歡笑中含悽況到霜風河北岸襆被只餘僮僕伴太行地脊天下雄汾水秋風古來歎晉中小邑猶萬家往往車馬能豪華賢令聲名有遺思郞君憔悴宐矜嗟我悲乃翁今不見衰盛人情孰無變男兒精金須百鍊勉走塵埃莫辭倦豈有美若陳平乃貧賤書樂志論後大功濟一世富貴當崇高運會苟不逢引身入蓬蒿良田及美宅誠免苦身勞旣非先世遺求致寧非叨吾鄙樂志論陳酒烹豚羔雖愈乾沒徒未爲肥遯豪不見陳元龍牀下臥此曹闕口阻風一出金陵郭兩日北河口翻翻鍾阜雲背我逝蒼狗試曳市廛杖迴飮王生酒墨香發笈外古色盈座右吳畫奪造化黃字耀星斗上河王養中家觀所藏書畫甚富吾尤愛山谷道人書子建詩及吳仲圭夏邨圖乃知此淹畱風伯意良厚自是飽挂帆卯行嘗及酉離家百里外故山當船首正及湖水闊忽起西風吼引領吾徒羨銜尾來舸走停棹入菰蒲繫纜向榆桺老翁晝夢醒試一慿舩牖遙山紛冶麗下水亦淸瀏魚艇夕陽邊楓葉零霜後雖乏古墨妙景物亦希有行止要不礙愠喜兩無取默坐獨成詩橫肱進吾糗次日又阻風暮風聲巳厲入夜尢洶洶有如九淵底怒起千鬬龍吾舟繫樹本幾欲拔起從一夜枕席間鏜如金鐘晨興無日暉四野雲逢逢樹葉下如雨棲鳥無復容豈必大木竅空響自相舂吾舟一長年擁袖衣蒙茸小舟自後來所受可百鍾笑傲舞兩棹踊躍升斜篷此怯豈非夫彼勇誠可庸吾知任事難坐譚苐恣胸假令吾操舟畏葸恐㪅慵天道不能久旣盈還當沖飄風明決止朝暾望東峯遲行一日耳何必責犯鋒吾取老聃言挫銳萬物宗朱石君中丞視賑淮上途中見示長句次韻二首此身未作龜藏六擾擾人閒同一局春水常乗東下舠霜林毎引西還轂論材眞似蒿蔚卑學道不如荑稗熟先生伯仲才峻崇兩角去天幾一握文高萬士喑無聲德盛千豪書可秃固應厮養皆人豪卻媿雕鐫加朽木笥河巳歎火傳薪使君今作凶年粟我從竹馬試迎車但覺謙衷彌粥粥咳唾小且出千珠事業閎宐安萬屋獨思舊夢五十年那得從容髮還綠北臨潁尾南灊六壽春邑據東南局英布倔起逮劉安豪傑興亾如轉轂列仙曾授鴻寶方下客猶吟楚詞熟山川極盛在一朝鍾離帝起乾符握自是蕭條英儁無艸木八公皆赭秃惟餘㬥桀多劫人毎犯刑科俾荷木先生欲革小人面上書先請調均粟夜犯霜風走斾旌往問飢寒散饘粥詩書猶且待陶甄桴鼓豈敎驚井屋鄰邦擾攘此安居淮甸麥豐桑柘綠酬釋妙德闍黎信耆㝛貌古神淸完如尙處榛狉未入今世間與之論俗情鈍若椎刺穿幾昧馬幾足況識機械干見人輒談法不視憎喜顔科判捨經本誦解波瀾翻剖晰義微妙賢首及慈恩古說久蒙晦光明興舌端乃知其中利凛然持太淵聞者無愚知悟解增悲歡嗟我嘗脩心勤在此生前自從一念失漂轉來塵寰譬若乗蜀舟東下三峽關迅忽造海壖矯首求西還泝流靑天上得不勞且艱愛師秉直心啓子三昧門師亦喜我意不謂鄙且頑相從宐不厭勿論暑與寒不待盛言說目擊道巳存許秋巖太守問耕圖先生伏首諸生日深耕疾耨惟硏筆先生彯纓登玉堂鋪棻垂穎皆文章秉麾岀作江東守欣戚時時念農畞陰雨膏惟恐後期非種鋤還去爲莠男兒起任天下事問舍求田非所志不恤四體昏作勞固將九域蒙吾利一朝回首望邱園歲見成功惟樹藝君不見伏波將軍不世才中興事業光雲臺營軍瘴霧沈鳶地苦憶平生季弟哀又不見北宋盛時君子達韓范富歐同禁闥偶聞鵯鵊數聲嗁忽念隴頭耕曉月此圖有士何美髥豐玉饑穀兹身兼繫君節鉞與華袞那容短褐從腰鎌感事撫躳成一歎冩圖非戲非爲幻無人得喻使君懷官舍把圖時自玩我謂才難自古然士如麟角偶一焉敎民樹藝且一事只今百務須旬宣慷慨建樹竆歲月譬如穮蔉亦有年志業精勤信諸已淮退早暮從諸天或圖麟閣或歸田請君置此中情牽周公未遂明農志何況紛紛後世賢米友仁楚江風雨圖卷王養中藏後有友仁自題七言詩萬山欲駕雲飛去風雨江聲挾東注波翻雨横客登樓天地渾茫不知處藤厓高下縣太陰霾霧冥濛露江樹颯颯風漂勁柯動急雨小停江浪涌低昻㠀溆數舟行寂寞魚龍暮天恐楚江晴甸亦蒼茫況值蕭條風雨涼山鬼含睇帝子怨海洲忽近吳天荒破墨氤氲載元氣胸前突岀山川勢不須慘淡擬形模元是分明出層次君不見阿章早許元暉繼楚山已進先皇秘此圖卷末復題詩南朝又見顛翁字父子崢嶸書畫學江山慨歎遷移事五百年來江自流江城余亦澹淹畱借來寶墨流虹卷且慰無憀風雨秋題句容學博馮墨香小照我於江寧城始接馮君䫉蕭靜有古韻當座展圭瑁固知其中異淸絕遠塵淖而今對此圖睇視目增眊審知爲子眞指說賴前告寫眞自古難神藝有深造點晴加頰豪用意孰能到後世圖太多往往雜仁虣卷軸紛牛毛題詠亂蟬噪君實精六法自摹山水樂㫺賢縑素遺竆辨極窔奧倉卒命俗工胡亦同眾好想處山澤儀局以入黌校士有笑吟披奠乃分臂臑學舍小如舟請鄰仍祀竈誰知曠世懷天宇大哉謷抑鬱無與言寫圖寔寄傲工拙固勿論似否亦弗較譬若影㒺兩等是無持操又若太虛雲約略狀旌纛與古寫眞意迹本不同蹈此理如不然姑縱吾言耄雨霽天欲霜候迫風落帽邀子野鶴態試鼓青谿櫂一醉酬廩秋相對蘧然覺王麓臺山水幽谷蒼蒼擁煙樹樹底明流沙石布畫中取勢作低平巳是人閒最高處倚谷崖石千萬層嶔崟仰映天光澂蝯攀獸顧不可登石根砰隱谷風響崖後別盤幽徑上峯迴徑轉山仍開畎有禾黍林松梅結構精舍當其隈㪅貫倒景岀高嶂鬼神所會騰雲臺若憑絕頂眺萬里脫屣人間何有哉侍郎起家入華省貴仕何由造玆境染豪興至成此奇乃知妙悟通神領我㫺孤藤極幽險溼雲常與襟裾染竆山或至絕齎糧日取谿毛供一噉呼吸瓊樓碧漢通近郭山谿皆可貶一往眞當絕世塵卻來平地望高旻春秋郊野雜眾賓此圖於我情獨親臥遊雖慰平生意欲䇿衰慵㪅問津瀟湘圖王宸畫雲霽岀楓林烟深停水驛來往石崖間迷離竟朝夕欲畫蝯嗁聲寒峯數重碧贈孫雨窗秋風吹蕩秦淮白老翁獨行成落魄故交死䘮新知少晩逢公子敬愛客牙籤玉軸綾縹湘貫虹妙墨千金藏茶香竹淨好風日請我俛仰前賢㫄我如落葉枯桐峻寒聲時起無姸潤莫愁湖上可憐春花桺宐君美才俊何事愛我詩句奇往往耽吟燭花燼謂當四海同一情㪅召木工急雕印桂花落盡黃花開我爲扶笻時一來念子嚴君連帥首心愍民憂走羣部公子閉門止讀書不近少年親老叟異哉公子今安有古有名家繼前後最子以方報瓊玖碩士約過舍久俟不至余將渡江畱書與之成六十六韻敦牂歲三月桃李羣飛花東望鍾阜雲風帆待江涯欲發不能決撟首背負髽吾堂子昔登寒梅照檐牙子去歲幾何三見青艸芽俄聞子將來笑口成喎斜望子翔鴈初祓稧今鳴笳敝廬長掩闔不聞扣馬檛豈以積雨多㰚舍限泥塗抑或戀厠牏日侍欣淸嘉戒徒久易期卒未成巾車吾行不可畱子來日猶賒閒闊終不逢顧念深咨嗟聞子官舍中弦管謝嘔呀夜誦或鳴雞晝披逮昬鴉裁爲五色文爛若開䢅赮元年求孝廉詔紙頒南衙郡舉尙遺賢有才爲兔罝孑孑處士中燦燦金居沙射宮萬辟易一矢行拔靫我老又多疾析若枯蒼葭兀爾默終日短榻支僧跏食案廢脫作毛羽哀刳􅤏嚶聞求友聲一一皆頻伽唯有文字習癢不禁搔爬仰惟聖有作豈以文矜夸奇麗光至今廼逾初日茄其中矩矱存已足範奇衺後賢但有述敢擬作者姱譬若鏤之而畫繪鳥獸蛇巧工棄常度拙工藝反加一失外形體豈復中精華在㫺明中葉才傑蹈高遐比擬誠太過未失詩人葩蒙叟好異論舌端騁鏌鋣抑人爲已名所惡成創痂眾士遭豐沛皎月淪昬蟇我朝王新城稍辨造漢槎才力未極閎要足裁淫哇豈意羣兒愚廼敢橫疵瑕我觀士腹中一俗乃癥瘕束書都不觀恣口如閙蛙公安及竟陵齒冷誠非佳古今一邱貉詎可爲擇差所貴士卓識不受眾紛挐朗然秉獨鑒豈必蓬生麻我雖辨正塗才弱非騏驊願子因吾說巨若瓞引瓜吾舍倚龍眠靑嵐壓闉闍中有太傅墳㫺是公麟家子來我雖去風景猶可誇試停行道驂拄䇿探㟏岈誦我前日詩酌彼新焙茶淸嘯發巖中大勝諧筝琶吾曩游南昌鉅邑觀閎奢顯慶帝子閣西山明列娃去之四十年題字行涎蝸子家有舊園吾迹荒蔓遮子往定憶吾北望天垂霞吾非山斗倫不詆排釋迦頗與同好奇結友宐仝义秀句成見寄豈不珍朋蚆日月兩馳輪形駭一棲苴何暇競一世口大身如椰卮言聊一放閉口終毘耶耿耿遺子志母嫌吾道洿題謝藴山方伯蘇潭圖南昌山色如靑玉下照澂江千里綠倚江都㑹賢俊居各起亭臺帶修竹先生小園堂數弓聚書萬卷花萼紅四方名士春秋同舉觴吟嘯於其中遊賞年年情未足世推豐玉兼饑穀使節東領黃河隄法冠北上太行麓獨於錢塘治績多來旬再莅西湖曲杭州前後瞻蘇公先生事與東坡同小園舊以蘇潭命或疑前定天所通讖占小數何足道先生本憶南康好因懷蘇步作蘇潭更著新圗寫昔抱君不見安石東山在越中金陵亦託東山號當時曾治循海裝中原事定思一航威儀山澤百世芳遠述祖德何能忘功名卓越人間事自古男兒悲故鄉弔朱二亭篔吾年垂七十四海故人少東望毎思君如立雲霞表往昔朱子潁豪才起燕趙向我道君才五言幾謝朓子潁貧無食子亦家集蓼相從邗溝曲吟和觴淸醥我時隔京師想見姣人僚丙申至江都遂得訪窈窱其時子潁貴冠葢頗叢繞君顧無所干陋巷閉門悄扣闔就談詩但覺風嫋嫋舟乏仲舉同書絕巨源嬲獨荷時見阿累投珠玉皛惜哉近子舍攝提僅三肇我歸子潁罷舊迹如逝鳥一別二十年中未脫塵擾澂懷實愧君高與秋旻杳子岀諒不能吾遊尙可紹行當一相就帆挂橫江淼昨得郞君書巳設韜練旐豈但悲友生問道苦不了君疾正月初一榻兒女繞呼與吿逝期屈指七日劋屆時一笑亾何嘗貳壽夭銜哀遠弔君諒爲君所小那復弄毫翰繁詞報劉沼題劉雲房少宰滌硯圖侍郎誠意之子孫亦統御史風憲存自從弱冠登金門湘東才子弟與昆拭硯濡毫書國恩豈似犂眉少遭亂晩逢眞主猶憂煩誠意江南舊門閥侍郞四執江南節硏吐雲霞霄漢間筆驅風雨蛟龍窟四海文章見師表累代風流推繼述内侍寧誇金氏貂傳家惟奉鄭公笏竣使重當入金殿裝槖依然藏一硏聖人前席或咨猷史官舍墨裁佳傳侍郞德業垂無竆硯也旣久從有功卻顧江南老秃翁猥稱當代一文雄豈知心氣今搖落況復逃禪文字空松煤竹管行抛棄蕉白紅絲塵自封登天平山觀白雲泉萬木塞㟏岈環巖抱秋靜澂泓中一池導源仰幽夐壓頂累穹石側足折微徑略可半畞平深隱小潭瑩酌口識淸甘煩慮豁開醒僧牕啓絕壁遠納湖光淨靦彼支遠智屬此魚鳥性誰與送歸途松風澹遙聽觀飛來峯入靈隱寺由寺西上韜光菴乃北高峯上也連山聳西南水勢東北趨山蟠四十里障合中成湖矯矯北高峯獨瞰西南隅高下測三二乃是韜光居靈隱古名寺所處實山跗門外地如砥奇峯矗覆壺中空四穿達立距疑神扶所以西域僧謂是鷲嶺逋造說固詭異度形疑非誣九月未肅霜嶺木猶榮敷我從湖尾來橫􅎒乃西逾日薄桑陰閒舍舟入籃輿遂造飛來峯鑿刻多佛圖題名自元豐指顧雜賢愚秋壑見子中飛來峯有林希賈似道等題名想亦加邪歈發我一長歎舍之入僧廬琳宮旣巍傑巨鑊中容車不識飯千僧中有龍象無萬竹繞一逕登陟方縈紆幽谷微風來泠然寒肌膚俯視羣山卑乃知所立殊内湖而外江驚潮見天吳蒼然浮數翠未得其名呼略辨浙水東僧言蕭山區仙人遺丹竈聊一窺其窬長生固非願遺物卽道腴徘徊未忍去曦影俄西晡山川自淸麗迹過如鳥烏悵懷幽興極冩託天雲孤戊午九月十四日出雲棲寺作萬樹納幽光峯頂日初到寺樓人始啓四嶺鳥羣噪鐘磬隱虛堂蔬水薦僧竈門與道人別逕有脩篁導邅迴將出谷陰森猶入奧返瞻昨履地木末一峯冒玆生入世網空王實先覺豈不被聲聞所病無持操是以雲棲門堅持一佛號要取同趨歸非謂異宗敎睠焉顧其室喟然發中悼焚和從一念繫物沮高蹈旣厭流俗靡豈耽山水樂終辭弱喪情屬爲知者道次韻荅秦小峴觀察贈別倂以別謝藴山方伯我如行雲向九州飄然一往不可畱東南烟水一千里挂帆曲轉楓林秋西湖絕景四面好北客拄杖十日遊夜月披襟倚湖檻曉烟聽㯭摇湖舟朅往山深友麋鹿歸從水宿同鳧鷗兩君丰采古賢伯亦邀賓客探奇幽孤山處士余所慕香山玉局君之儔四賢祠前共遊舫魚蟹蔆芡新登篝恪官事異元豐世豈開魚鑰貪林邱斜陽欲盡旌旆返野人朝亦生離愁從來佳處不可盡安用萬壑竆兩眸主人雖賢客當去徑買輕舸隨北流兩君各示七言妙扣缶詎和編鐘璆使君文章配旄節漫士踪迹同漂漚敢期一事嗣前古培隄去葑仰令猶想公更遊水深闊倒浸南北山僧樓惠山寺觀御賜寺内王紱溪山漁隱卷歌秋陰細雨梁溪前停舸往酌第二泉石巖偃仰神所窟密林寒邃風泠然泉東穿過惠山寺我從拄杖尋幽異山僧手持王紱卷語我前年寺中事火燼竹罏山房圖吏傳天府琳琅賜晃曜日月升虹霓山僧室內瞻御題次看王畫果神妙淸深意境竆天倪山長水遠合氣勢人家漁艇從幽捿武林溪口落花出西塞山外斜陽低豈徒畫師今莫躋盂端自喜非常蹊三處題詩兩番記宐升秘笈同璋珪我聞貞觀天子求僧室闇檻蘭亭一朝失英主嗜好乃如此豈如緗縹宮庭出翰墨風流異代情明廷故實邨氓述況記此間迎翠華寄暢園蒙頻駐􅵖不賢識小宐作歌大政元存史臣筆青華閣帖三卷紹興御刻皆二王書後有釋文余頗辨其誤復跋一詩蒼頡始作書巳聞夜鬼哭官民信治察淳樸存有幾何況尙草法几牖駭蛇虺筆勢取奔趨形體雜靉霼多寡亂馬足左右錯丁尾假如羲獻存翰墨矜有斐試箝文上下自讀口亦悱儒者厭草書所識詎不韙傷哉宋南渡國有存陳唏鐵馬苟臨江所憂杭一葦柰何耽安燕宮苑豔禯卉近擬大觀年取法寔比匪鐫工聚樂石名帖啓籯篚帝后各擅書親釋文如螘吾今適無事舊冊陳几棐頗亦從俗嗜驤騰震瑰瑋默對淹永日錯昧暾與朏舊釋或得失吾說亦葑菲古帖殘闕餘誰能誦娓娓盍各陳小辨聊於博弈偉若夫大雅才自命則吾豈方天民獨覺次韻余少在京師與朱竹君王禹卿酬和長句見贈又示病起五言用其病起韻荅之大哉天地化縱視忘形拘耳目乃可遺況識肥與臞將適汾水陽首謁冰雪膚徑淩天地度袵拂扶桑株俯短龜鶴齡詎與蜉蝣殊聖凡本無隔妙道藏頑軀聖門講六經抑或營廢居若論微言絕二者皆可吁陳魚取乙鬛顧己遺腴膴吾幼耽文章矻矻不知愚二十入京師兩漢希閎橅斯文有先驥朱王騁高衢揚班以見待竝謂詡匪誣灑墨疾風雨往復競裁觚投老自愍惜雕蟲稺子俱我棄良晩矣子取非過歟少小同硏席里閈多歡娛秋燕匹故人室存形影徂獨君臥冬巷久病幸一蘇短日發長詠走餽逾苞苴我誦雪牕前意驟興縶駒終願超言象共子遊虛無呵毫罷一笑升暾煌八區題外甥馬器之長夏校經圖聖人不可作遺經啓蒙愚大義乖復眀實賴宋諸儒其言若澹泊其旨乃膏腴我朝百年來敎學秉程朱博聞强識士論經良補苴大小則有辦豈謂循異塗柰何習轉勝意縱而辭誣競言能漢學瑣細搜殘餘至寧取讖緯而肆詆河圖從風道後學才傑實唱于以異尙爲名聖學毋乃蕪言多及大人周亂兆有初彼以不學敝今學亦可虞嗟吾本孤立識謬才復拘抱志不得朋嘅歎終田廬甥有吾家性禮部方升書才當爲世用勉自正所趨矻矻校遺經用意寧投虛盛夏示我卷秋葉今零株至道無變更景物乃須臾僞學縱有禁道德終昌舒試觀宋元間士盛東南隅以視後世賢人物誠何如願甥取吾說守拙終不渝
