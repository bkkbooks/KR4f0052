front:
  text: 吾郷爲古文者自劉海峯先生後未有傳人從伯􅁎傳先生入詞館數年性安恬退遂假歸以著述自任于書無所不覽而所爲詩文辭淸曠元遠尤注意于古文卅餘年海内之士爭相推重如泰山北斗辛酉先生掌鍾山書院學者􅈼求付梓共襃輯得若干卷而以古今體詩附其後江浙之間始得爭先快覩而外間尚少傳播丙寅余以庶常來掌粤秀書院篋中攜一冊見者紛紛求索而卒無以應因集所得脩資重付剞劂俾海内推重先生者皆得有所賞心于先生亦無所吝也卷帙仍舊示無所增益惜乎先生尚有經說左傳補註及所􅃟詩古文辭未得攜來同付文梓一與嶺南人士盡觀爲憾也刻成爲書其緣起于端時嘉慶十二年四月上旬桐城姚原紱識惜抱軒文集目錄
