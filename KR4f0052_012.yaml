front:
  text: 惜抱軒文集十二
  hash: sha256:41ce1de7abfd329caf9b34eef541dd6bf210622d31dce162b018d4bc3aa72b93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_012-1a}
body:
  text: 墓志銘一內閣學士張公墓志銘並序故資政大夫內閣學士兼禮部侍郎桐城張公者贈光祿大夫諱士維之曾孫贈光祿大夫諱秉彛之孫而太傅大學士文端公之子也雍正元年恩詔開會試科是時文端公薨公之兄太保文和公已為戶部尚書充會試考官矣公以舉人例避不與試值特命官別試回避舉人於是公成進士改庶吉士授編修遷左贊善歷翰林院侍讀學士詹事府詹事今上即位以公為工部右侍郎公在翰林常充日講起居注官起居注素無條例為者繁簡任意漏遺冗贅不稱史體公精思為之寒暑在館十餘年編載詳贍上以為善於其職於是公以工部侍郎兼起居注官事本朝官不為翰林而仍職注記者獨公為然為工部侍郎數年轉內閣學士兼禮部侍郎又二年遂告歸公為人誠朴篤謹細微必愼每當入朝自書職名讀之曰某官張某又屈指計之日幾字視紙上三四而後敢出奉使督江蘇學政遇試士日公服竟日燕處不脫人問之公曰取士國重典也敢忘共乎其為侍郎謹奉法度而絶阿私既告歸則益以舊德為行自守所為喪祭禮制多合於古足為法式其自奉甚陋或人所不堪雖其家人皆竊笑之然至族黨有緩急出千百金不惜也未嘗私受人一錢門生某為江西巡撫過公居奉數百金為壽公日吾幸足衣食安用汝金為又有以人參寄公者公曰吾生平無病烏用參少為宰相子久居京師冠蓋之間而終無世故態遇人無貴賤率意而言必忠必信是以天下之士皆謂公長者公諱廷瑑字桓臣兄弟六人其四皆貴長少詹事廷瓚仕仁皇帝與文端公同時次太保大學士廷玉次禮部侍郎廷璐太保禮部侍郎與公皆仕憲皇帝及今上最久公之歸也禮部侍郎及太保前後皆告老而公最後沒上聞顧謂左右曰張廷瑑兄弟皆舊臣賢者今盡矣安可得也因歎息久之公卒於乾隆二十九年年八十有四夫人吳氏子二長若泌舉人次若渠副榜貢生以乾隆三十八年某月日合葬公夫人於桐城北投子山麓銘曰德葆以居才託其餘取安吾心不為人夸士誰能然惟公之行繼成於學始秉於性再世卿相家胡不隳厚植根苞天則祐之我銘其幽所陳者信後世識之以固無盡四川北道按察副使鹿公墓志銘並序公諱邁祖字紹聞定興鹿氏始明監察御史久徵有直諫名久徵生正明熹宗時嘗營救左魏諸君子之難天下稱為鹿太公者也太公生太常少卿繼善殉節死諡忠節忠節子曰化麟舉鄉試第一居父喪歿人謂之孝子孝子之子諱盡心公之曾祖也為安邑合公祖諱賓仕本朝為陜西道監察御史考諱聖權封奉政大夫公雍正八年庶吉士授編修以四川川北道按察副使罷官乾隆二十九年十二月十四日卒於家年六十夫人王氏先卒子二琪廩膳生次預早卒以乾隆三十二年月日葬公及夫人於江村祖塋之側銘曰鹿氏在明忠孝久稱有肖無替纍以世嗣巍副使公彪文縝質始作詞臣究通經術匪曰能言而允行之以學事君抂心不欺命作御史有辭謇謇君子所豫小人所憚巡察帝城周閲殷廣閉杜謁言􅊧邪伐黨給事於中掌禮吏科審較牘奏詳而不苛轉運奉使湘湖之南羣吏放手民則弗堪核正斗甬公以躬監正稅罔贏誅責貪婪有盜殺人吏論如法撫軍卻之謂不當執罷按察使而令公攝將骫律令意授威懾或旁諷公公曰不可佑賊詭正寧禍及我言忤上官解其柄持改任川北自以疲羸親入山林掘盜根株哀問民生慰恤瘠枯直時軍興征金川醜以馬濟軍百城交走或應於前而乏於後歸罪邑令大吏借口公曰憊矣非令之咎豫以身任遂遭彈奏吏籍其家敝几故書怨嫉之徒愧感嗟吁詔荷公校以重軍罰大吏憐公勸使私脫公曰詔乎脫余則為苟非君命敢姦以欺卒朝夕荷西師隨罷既有定功公亦蒙赦公之在官嶷嶷剛毅公之在家愈愈孝弟歸遭父喪以毀受病秉道終身卒斃於正有懿夫人飭身約已佐公淸節誼不為侈同穴江村高墳磊砢我銘直諒以厲媕妸光祿大夫刑部尚書贈太傅錢文端公墓志銘並序刑部尚書嘉興錢公登朝為名卿老而告歸上承聖人之殊眷下為海內文學之士宗仰為耆碩者又二十餘年乾隆三十九年正月辛酉薨於里疏間上悼惜甚至製詩哀之命贈太傅祀於賢良祠諡之日文端賜祭葬如制特豫銀千兩治喪其子汝誠以是年十二月葬公武原生坊南化城請余為銘按狀公諱陳羣字主敬明給事中贈太常卿徽者公六世祖也曾祖諱升祖諱瑞徵考諱綸光三世皆以公貴贈光祿大夫妣皆一品夫人公之少也讀書頴悟過人未二十遊京師則已與諸名士論文唱和相得時言才士即曰錢君康熙四十年公成進士改庶吉士授職編修世宗時三進官至侍讀學士充日講起居注官直南書房今上登極擢通政使司右通政四進官至刑部侍郎以疾歸里公當事持大體守成法為編修時嘗為陜西宣諭化導使在事稱為能及久任刑部讞獄剖晰得情甚稱職然上尢愛公詩文之美嘗樂與考論今古稱為故人公之歸也上每思見之公以所作詩奏進上覽之未嘗不稱善也公歸後五年上南巡賜在家食俸後三年皇太后慈壽七十公入都慶祝命加尚書銜與九老之會圖形禁中後又兩值南巡加命以刑部尚書致仕晉太子太傅至皇太后壽八十公再入都年八十六矣猶健步上見公益喜賜騎馬紫禁城再與九老之會公子汝誠為戶部侍郎侍養於家及是隨公入朝父子卿二持杖扶攜出入宮苑禁闥之中觀者以為榮其歸也又賜詩以寵其行公嘗一為會試總裁三典鄉試再提督學政及年益高天下文士翕然趨之公亦和易與後進談説往復論難不厭吟誦詩章音節抑掦要眇説先朝故事歷歷首屋如披史傳聽者每至中夜忘疲是時長洲沈文慤公在吳公在嘉興天下以為齊名雖上亦稱為二老也文慤既歿後四年公亦亡於是上自九重下洎朝士以及閭閻識與不識莫不歎息悲傷謂東南耆舊盡矣公年八十又九再娶皆俞氏皆一品夫人與公祔葬子七長侍郎汝誠次汝恭汝慤汝隨汝豐汝弼公以汝弼嗣弟界後幼子汝器上南巡為公賜汝器為舉人女九孫男十五曾孫二銘曰多士雲興蔚此昌時孰為魁英僃履福祺秀水之郭鴛湖之湄公起登朝作吏之儀歸樂太平為羣士師上與天子賡和其辭衆望裒然既老不衰我嘗識之丹頰白髭飮酒笑談寡怒多怡國有上瑞匪鸑匪芝進觀公貌退讀公詩詩則永留貌不可追刻示後來吾言不欺贈武義大夫貴州提標右營遊擊何君墓志銘並序君諱道深字會源山西靈石縣人以武進士侍衛乾淸門出為貴州提標右營遊擊乾隆三十二年兵部尚書明瑞總督雲貴進討緬甸集諸道兵君初不與調明公聞君訓練營卒勇健有節度可用特檄以其衆至永昌至則果整練異他軍明公善之秋三路出師以軍隨幕府從取木邦破錫箔踰天生橋大戰蠻結先登奪柵殪醜紀功一等又從入至窮窄去賊巢阿瓦城益近賊􅍘木礨石守隘我師糧少火藥鉛丸盡師旋賊抄其後君為殿遇山谷險厄君必奮戰俾師得度至猛域未至猛域前二日君中鳥鎗夜息有軍校曰君傷重矣賊至日衆道險難與敵盍稱病且逸歸乎君曰賊衆乃將卒致力時也叱之退明日戰益力初明公將中軍趨錫箔别將分左右軍異路進約會師及至猛域兩軍不如約前臨大山賊盡塞蹊隘環圍數重軍殺馬以食三十三年二月丁丣明公令夜拔營起平明賊來邀君立高岡與相拒他軍士從其旁得去君朝戰至日中被數創仆君亡次日明公亦亡事聞上以中軍多戰功其沒以無援賜恤特厚左右兩軍死事者殺其制不與之等於是君得贈武義大夫祀於昭忠祠祭葬恤蔭如制君祖龍騰父思義皆贈中憲大夫夫人梁氏先沒繼配武氏君之赴永昌也武夫人方孕君沒猛域兩月子膺綬始生君撫士嚴而有恩其聞檄令二日即行而顧擇其無子無兄弟者皆勿從沒後軍皆悲涕以其帶髮返次年賜葬本邑銘曰頎與何君睂目淸美揖讓溫溫以與余友佩鞬橫戈徂險而馳急難舍生義孰與多汾流之側君起厥邑往不生歸銘窆無極副都統朱公墓志銘並序公諱倫瀚先世世襲指揮使於明屯戌遼陽左衛因家焉三世歸我太祖皇帝為正紅旗漢軍世襲參領其子以從世祖入關功為鎮守山海關世襲城守尉是為公之曾祖諱登科祖諱廷縉襲職後改副都統因亡世襲自是以白衣仕進副都統有弟為湖廣道參議諱廷宷無子副都統使已子為之後是為公考諱天爵為建寧府知府有吏能淸節公少而孤貧負軼才奇氣而好學文武藝皆能盡其巧通知當時事變利病慨然懷濟人之志中康熙五十一年武進士選三等侍衛聖祖偉其才使兼直武英養心殿數年改用為刑部郎中持法堅不可奪時刑曹或破律放意以入人罪公疏論其非上善之飭吏如公指雍正中出為寧波衢州知府浙江糧儲道布政副使衢民為齋堂合衆誦佛書公曉以非道盡解其黨及大吏聞欲以邪教論衆已散去遂皆免運丁有積欠久不能償者且十萬金公計糧道所入歲償之竟除其逋今上初召人為御史出蒞湖廣驛鹽道復為御史給事中掌吏戶科巡南城擢正紅旗漢軍副都統在朝屢以事陳抉絶萌姦民賴其悆公為人和易好交遊而持身介直仕宦恥為家計晚歲益貧或至乏食其意益恬時為文自娛以至於歿年八十一有集十二卷公在浙江時世宗夜夢道士見而請曰吾天台山道士也來就陛下乞所居地帝寤異之使問於浙江吏言天台故有桐柏觀今為人侵廢且為墓矣詔還為觀俾公董其事公成觀而民無疾焉往來山中為詩一編曰天台遊草其辭尢奇雋士多誦之自聖祖愛公畫世傳寶朱公指畫及書然公修已立朝卓然於衆不詭隨蓋有古人之風豈以文士論哉子五人長孝先次孝升舉人縣知縣先公卒次孝全次考純次孝揚乾隆二十五年葬公宛平西北十五里祖墓之側夫人合祔銘曰言以法謇刮吏瑕行以義域不為他苟利於國家則羸偉哉中藏鬱以多抑揚文武誰不宜遠氓涕泗百士嗟作銘幽室埋其阿此石可泐名不磨淮南鹽運通判張君墓志銘並序君諱廷璇字淸紹桐城張氏始以仕顯者曰明廣西布政司參政淳史録諸循吏參政之孫秉哲順治時以能文名為舉人舉人生都水員外郎芭都水四子其季為君君少修謹寡子弟之過長以薦舉試職於禮部出為東臺鹽課大使擢鹽運通判分司通州廉愼於法所職無不舉通州符生以文為君知嘗侍從容以吏事于君君曰書生乃可言及此耶既而曰汝毋乃貧乎曷不語我而俾人以利訹汝遂厚豫之生感而奮為善士海濱以䆴戶煮鹽舊給之田竃戶輒賣之民且百年田價增八九倍而田數易主矣有議奪田與䆴戶使竈戶苐償故直君曰是非平法也且竈戶貧不能買田必姦民誘使為名而陰據之是平民失業而姦民利也以告上官不聽君曰厲民為媚可乎投劾遂去君與太保文和公皆參政元孫也君績學工詩善楷書言行有蘊藉太保尢器之然仕於內外皆不竟其志年四十餘即歸歸而飮酒賦詩接鄉里歡然無間其居衆中望其狀嶷如也娶左氏生子若兆教其子少毋與人接鼐年十九時君一日見之歸使若兆獨與之友君沒於乾隆三十三年年六十七始厝他所逾年若兆定葬君某所左安人祔鼐為之銘曰羣言以禮士容几几維邦之祉羣言詭隨士容昌被邑以敝墮嗚乎子尚見古之人以恪以循既畚以墳以徵豫文原任少詹事張君權厝銘並序君諱曾敞字塏似桐城張太傅文端公之曾孫禮部侍郎諱延璐之孫翰林院侍講諱若需之子年二十一中乾隆十六年進士改庶吉士授翰林院檢討自文端至君為翰林四世矣是時君家大保文和公解為相歸而侍講及羣從在朝為翰林者四人君年最少材器通美究識古今事宜國家典故而持巳淸峻人謂君且繼其家兩相國後也君為檢討十餘年值御試翰林名列第五進侍讀充日講起居注官四遷至詹事府少詹事兼侍讀學士又值試翰林列第三當進官詔特褒君而未及遷自有記注官君家世職之及君尢講正體例嘗獨任一館之事諸城劉文正公為掌院每歎異君君疾士大夫骫骳隨俗節概不立欲以身正之見於辭色衆頗憚焉君三為順天鄉試同考官有公廉名逮已丑科會試復同考時武進劉文正公為考官知君可信君所薦卷中者較他房多且再倍君又以嶢然獨立稍自喜也於是榜發磨勘有君所薦舉人梁泉卷疵纇數十當斥革吏遂傅君法革職提問會考驗無纖毫私狀而梁泉故鄉舉第一詔卒復梁泉舉人君雖釋罪而竟廢矣於是惜君者莫不咎當時議君之重而謂兩劉相國宿知君賢而不能為一言於上而顧使疾君者得其快嗟乎君進非人所得援其退非人所得沮天則使君仕不究其才而志不信於世也而何咎邪其後君以萬壽加恩復五品頂帶歸主晉陽江漢大梁三書院乾隆四十二年正月卒於大梁年四十七始娶姑女姚氏生一女適孫起峾再娶定興鹿氏生子元艮側室生子元襲元衮其亡也長子才十二歲君少而孝友持喪以禮於族姻朋友事雖難成者任之必盡其勞謀之必竭其慮雖疏遠以急投之必應乙亥之歲江南飢君居侍講憂抂里倡捐米出賑平糶晝夜營之以活一縣之衆又以糶餘錢積穀以待歲䘲今吾鄉所謂永惠倉也為文工為應制之體尢好古人文章託意深邈而不比於時者仕方顯而為詩示余多憤慨深鬱之詞蓋其所志遠矣君與余家世姻少相知又嘗重余文君喪之歸也余既以辭祭而哀之乃復為其權厝室銘曰綺組會者絲邪而孰為之機邪鳴者匏簧邪而孰吸以揚邪物或以冬榮或盛夏而先零孰主是而為之虧成以盛族有君志則抗而節弗汚既駕而騖而躓於中路􅉭乎吾奚知其故維紀其人而如可以呼翰林院庶吉士侍君權厝銘並序君諱朝字潞川泰州人也其先姓侍其明初去其稱侍氏曾祖諱念祖祖諱震考諱衛皆諸生而祖考得贈如君官君少孤好學無師友之助而於古文辭詩歌四六諸體皆習而能之始冠得鄉舉初聘泰州沈氏沈氏女不幸得瘖疾其家願無嫁請君他娶君不可卒與處無嫌惡且十年沈氏卒而後娶江寧鄭氏人以為難君內行修外重交遊有死生之誼而性峭急聞人一善稱之不容口惟恐世不及知及見行有失道理者亦切齒忿怒若不可須臾共處世者然故世亦以此過君乾隆二十五年成進士當就吏部選知縣君曰吏事非吾所堪也後國子監缺丞詔大臣於進士中選得君君任職以不阿上為節有共事不合君者君不能堪即日引疾去久之會修四庫全書大臣有知君之才奏為校勘官既而為總挍君挍書數倍他人而最精當乃命為庶吉士是時君已得疾而讐閲不懈乾隆四十二年瘍生於首秋七月晦竟卒年四十九無子女嫁者一幼者二其弟臣仕浙江亦未有子君妻弟鄭君厝君甘泉之西山以待臣生子而後之鼐知君最久故為銘銘曰山璞瑤琨器則陊也龍淵大阿鋭則折也嗟子慷慷勇言義也孑以自居甘與躓也日暮延登才未竭也天生不與之年死不與之繼世也芴兮以託於兹吾辭以志也亡弟君俞權厝銘並序先贈大夫三子長鼐次訏次鼎訏字君俞幼於余八歲嘗以一鐙環坐三人而讀書其時家貧甚中夜余歎以為聚讀之樂不可得而長也君俞聞而悲獨甚余二十二歲授徒四方以為養既孤又仕京師使兩弟侍太恭人於家久者十年或四五年弟兄不相見君俞獨以應順天鄉試間入都每來學加充識加明行加愼余輒喜其初病目幾瞽及愈而作真行書甚工余益以喜然君俞數困場屋後以監生試吏部得吏目職於是君俞意彌不懌值南昌李侍郎督學浙江邀之同往侍郎事或不當君俞輒諫之其夫人聞之太息而稱為益友也君俞聞余歸里遂亦歸逾年丙申歲夏六月感暑疾初如甚微夜不能言旦遂沒嗚乎余不孝不友不能亢其家君俞存余冀其有以為太恭人慰也君俞亡余其􅍘棄也已君俞娶張氏再娶倪氏一子三歲名曰恩余惡知能卒使其成立邪銘日貌碩以豐氣寬以有容宜達而窮閲期卅八而奄終天乎人乎宗之不振乎厝汝以近先君乎如我言哀者鬼神乎左衆郛權厝銘並序衆郛諱世經考曰贈文林郎諱澄母曰張孺人祖曰贈文林郎諱之延祖妣曰姚孺人孺人為鼐曾祖姑於親黨君為余丈人行然而年相若少而志相善也君娶舅女其妻之弟應宿及君兄一靑及余四人少者十餘歲長者二十餘里居無他交獨四人相遇不厭而君於其間尢沈靜寡言笑勤學喜為詩詩成視余輒以意指瑕纇君不為忤輒芟易之一靑與余常出遊君偕應宿營視余家甚僃其後一靑丞湖北縣以獲盜功升為令入京師過余旅舍篝鐙夜對太息憶君與應宿雖為諸生而方藝花竹為園遨遊歌詠山水邈然不可逮也一靑為令六年罷去後二年余亦病歸然後四人者復聚於里中時乾隆乙未夏也然君比已被疾其秋加劇九月竟卒夫人倉卒遽慟從而絶逾年一靑病至冬亦亡夫交友久離及其遇而遽亡之雖常人猶可悲矧君兄弟之賢而與余之厚邪君卒年四十七一子七歲曰虎應宿撫之厝君暨夫人柩縣北古塘而余為銘待虎長而葬君銘曰嗚乎衆郛之柩也志學而將究也身隱而年弗壽也繼者昆而偕亡者婦也厥天為之夫焉咎也維余之與舊也銘以詔孤之幼也
