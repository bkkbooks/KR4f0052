  text: 惜抱軒文集三
  hash: sha256:49ec2d33dcd438cf489101945a95b8d1f96077e5c302cce468574bed325279bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_003-1a}
body:
  text: 序老子章義序天下道一而已賢者識大不賢者識小賢者之性又有高明沈濳之分行而各善其所樂於是先王之道有異統遂至相非而不容並立於天下夫惡知其始之一也子曰述而不作信而好古竊比於我老彭老彭者老子也孔子告曾子子夏述所聞老聃論禮之説及老子書言以喪禮處戰之義其於禮精審非信而好古能之乎南行者久而不見冥山求之過也夫老聃之言禮蓋所謂求之過者矣方其好學深思以求先王制禮之本意得先王制禮之本意而觀末世為禮者循其迹而謬其意苛其説而益其煩假其名而悖其實則不勝悁忿而惡之禮云禮云玉帛云乎哉夫禮貴有誠也老子之初志亦如孔子而用意之過貶末世非禮之禮其辭偏激而不平則所謂君子駟不及舌者與且孔子固重禮之本然使人寧儉寧戚下學上達而已庸言之必謹逮七十子之徒推孔子之義極言之固多高遠失中此亦聖門好古達於禮者之言失也夫老子特又甚焉耳孔子遇老聃問禮於其中年而老子書成於晚歲孔子蓋不及知也老子書所云絶聖棄智蓋謂聖智仁義之偽名若滅武仲之為聖耳非毁聖人也而莊子乃日聖人不死大盜不止老子云貴以身為天下者言不以天下之奉加於吾身為快雖有榮觀燕處超然以是為自貴愛也而楊朱乃日不拔一毛以利天下皆因其説而益甚為謬夫老子言誠有過焉雖舉其末學益謬推原及老子以為害天下之始老子亦有所不得辭然是又豈老子所及料哉世乃謂老子之言固已及是而儒者遂不肯以述而不作信而好古為老子之行夫孔子於老子不可謂非授業解惑者以有師友之誼甚親故日我老彭解論語者顧説為商之大夫不亦遠乎其説出於大戴禮記吾意其辭託於孔子而實非殆不足據耶抑所舉別有是人耶若論語之老彭非商大夫可決也老子書六朝以前解者甚衆今並不見獨有所謂河上公章句者蓋本流俗人所為託於神仙之説其分章尤不當理而唐宋以來莫敢易獨劉知幾識其非耳余更求其實少者􅍘數字多則連字數百為章而其義乃明又頗為訓其旨於下夫著書者欲人達其義故言之首尾曲折未嘗不明貫必不故為深晦也然而使之深晦迂而難通者人好以已意亂之也莊子天下篇引老子語有今文所無則知傳本今有脫謬其前後錯失甚明者余少正之並以待世好學君子論焉太史公書不甚知姓氏之別又自唐以前讀者差不若漢書之詳故文多舛誤夫老子老其氏也聃其字也太史公文蓋曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字聃周守藏室之史也漢末妄以老子為仙人不死故唐固注國語以為即伯陽父流俗妄書乃謂老子字伯陽此君子所不宜道當唐之興自謂老子之裔於是移史記列傳以老子為首而媚者遂因俗説以改司馬之舊文乃有字伯陽諡日聃之語吾決知其妄也老今文所無則知傳本今有脫謬其前後錯失甚明者余少正之並以待世好學君子論焉太史公書不甚知姓氏之別又自唐以前讀者差不若漢書之詳故文多舛誤夫老子老其氏也聃其字也太史公文蓋曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字聃周守藏室之史也漢末妄以老子為仙人不死故唐固注國語以為即伯陽父流俗妄書乃謂老子字伯陽此君子所不宜道當唐之興自謂老子之裔於是移史記列傳以老子為首而媚者遂因俗説以改司馬之舊文乃有字伯陽諡日聃之語吾決知其妄也老子匹夫耳固無諡苟弟子欲以諡尊之則必舉其令德烏得曰聃孔子舉所嚴事之賢士大夫皆舉氏字晏平仲蘧伯玉老聃子産其稱一也陸德明音義注老子兩處皆引史記曰字聃河上公曰字伯陽不謂為史記之語陸氏書最在唐初所言史記真本蓋如此則後傳本之非明矣老子所生太史公曰楚苦縣或日陳國相人莊子載孔子陽子朱皆南之沛見老子夫宋國有老氏而沛者宋地言老子所生三者説異而莊子尤古宜得其真然則老子其宋人子姓耶子之為李語轉而然猶姒姓之或以為弋也彭城近沛意聃嘗居之故日老彭猶展禽稱柳下也皆時人尊有道而氏之晉穆帝名聃字彭子漢晉舊儒必有知老彭為聃之氏之説者矣後世失之乃不能明也乾隆四十八年夏六月桐城姚鼐序後漢書桓帝紀章懷注史記曰老子者楚苦縣厲鄉曲仁里人也名耳字聃姓李氏吾作此序未及檢引然則改此文疑元宗以後事莊子章義序漢藝文志莊子五十二篇陸德明音義載晉宋注莊子者七家惟司馬彪孟氏載其全書其餘惟內七篇皆同外篇雜篇各以意為去取自唐宋以後諸家之本盡亡今惟有郭象注本凡三十三篇其十九篇經象刪去不可見矣昔孔子以詩書六藝教弟子而性與天道不可得聞其得聞者必弟子之尤賢也然而道術之分蓋自是始夫子遊之徒述夫子語子遊謂人為天地之心五行之端聖人制禮以達天道順人情其意善矣然而遂以三代之治為大道既隱之事也子夏之徒述夫子語子夏者以君子必達於禮樂之原禮樂原於中之不容已而志氣塞乎天地其言禮樂之本亦至矣然林放問禮之本夫子告以寧儉寧戚而已聖人非不欲以禮之出於自然者示人而懼其知和而不以禮節也由是言之子遊子夏之徒所述者未嘗無聖人之道存焉而附益之不勝其弊也夫言之弊其始固存乎七十子而其末遂極乎莊周之倫也莊子之書言明於本數及知禮意者固即所謂達禮樂之原而配神明醇天地與造化為人亦志氣塞乎天地之旨韓退之謂莊周之學出於子夏殆其然與周承孔氏之末流乃有所窺見於道而不聞中庸之義不知所以裁之遂恣其猖狂而無所極豈非知者過之之為害乎其末天下一篇為其後序所云其在詩書禮樂者鄒魯之士縉紳先生多能明之意謂是道之末焉爾若道之本則有不離於宗謂之天人者周蓋以天人自處故日上與造物者遊而序之居至人聖人之上其辭若是之不遜也而蘇子瞻王介甫乃謂其推尊聖人自居於不該不遍一曲之士其於莊生抑何遠哉若郭象之注昔人推為特會莊生之旨余觀之特正始以來所謂淸言耳於周之意十失其四五夫莊子五十二篇固有後人雜入之語今本經象所刪猶有雜八其辭義可決其必非莊生所為者然則其十九篇恐亦有真莊生之書而為象去之矣余惜莊生之旨為説者所晦乃稍論之為章義凡若于卷左傳補注序左氏之書非出一人所成自左氏邱明作傳以授曾申申傳吳起起傳其子期期傳楚人鐸椒椒傳趙人虞卿虞卿傳荀卿蓋後人屢有附益其為邱明説經之舊及為後所益者今不知孰為多寡矣余考其書於魏氏事造飾尤甚竊以為吳起為之者蓋尢多夫魏絳在晉悼公時甫佐新軍在七人下耳安得平鄭之後賜樂獨以與絳魏獻子合諸侯于位之人而述其為政之美詞不恤其夸此豈信史所為論本事而為之傳者耶國風之魏至季札時亡久矣與邶鄘鄫等而札胡獨美之日以德輔此則明主也此與魏大名公侯子孫必復其始之談皆造飾以媚魏君者耳又忘明主之稱乃三晉篡位後之稱非季札時所宜有適以見其誣焉耳自東漢以來其書獨重世皆溺其文詞宋儒頗知其言之不盡信然遂以譏及左氏則過矣彼儒者親承孔子學以授其徒言亦約耳烏知後人增飾若是之多也哉若乃其文既富則以存賢人君子之法言三代之典章雖不必邱明所記而固已足貴君子擇焉可也自服杜以後解其文者各有異同近時有顧亭林惠定宇皆為之補注余以為有未盡乃別記所見者若總古今之説擇善用之萃為一書則以俟後之君子西魏書序當拓跋氏之衰朝廷失政而邊鎮橫武夫暴興而國柄移天子寄居亟立亟廢蓋高歡一人而援立之帝三焉安定廢而孝武興孝武奔而孝靜立計其得失之故雖不甚相遠而以時論之則孝靜固始為孝武之臣也魏收書外孝武而以天平為正豈理也哉南康謝蘊山觀察舊居史職出剖郡符間以退處數年之暇慨魏收之失當撰西魏書二十卷以正其失可謂勤學稽古雅懷論世者矣吾觀李延壽北史本紀録孝武于東魏孝靜之前而不日西魏意蓋以收為非者然拓跋自崔浩被誅史筆回罔故紀道武以往事多侈詞又自道武以前二十餘世率加以皇帝之號延壽因之不能正也今觀察所紀僅抂其末二十五年事固有延壽之得而無其失者然延壽自序言見別史千餘卷今時代遠隔泯亡無一存不獲使觀察據之以考稽同異而裁定焉惜哉惜哉讀者知其綱羅放失述作之志存焉可也族譜序昔三代帝王及卿士大夫巫醫祝卜之職莫不出於世族當時姓氏之分端緒著僃而朝廷又專設之官而掌之故黃農虞夏支裔流別數千歲之紀可得而知也自漢以降王者興於草澤將相出於屠牧皆不能紀其先世而譜諜寖以不詳及晉宋因魏制以九品官人重門戶辨族地而後譜學復興以至於唐然考唐以前諸家世譜所能詳皆始於魏晉魏晉而上或依託謬妄蓋郎邪王氏自云出於王子晉蘭陵蕭氏自謂本蕭何望之皆為昔人所誚由是言之譜諜之詳略非時俗風尚之有盛衰由世族之崇替存亡異也當世族之存非特子孫能詳其先人之傳凡天下學士博於聞見者歷舉各族系世如循庭木之支如舉其室之庪物迄世族亡則子孫有不能推明其祖而始誣託名人求以自重是亦可謂愚也與自五代至宋故家殘滅及元明屢遭兵火今日天下無復有千年相傳之家譜矣吾族先世本於田農又自餘姚遷桐城正當南宋末元興之日江淮之間居民粗定而譜敘皆失故居餘姚以前祖不可得而知不可知則闕以為愈於誣託者之愚也譜自先雲南參政及先職方府君及叔祖贛州太守嘗三修之逮今孫子益衆為文益繁故少變其體依古世表之法率橫列而注歷職生卒妻子於其下欲其文簡而易檢也初自餘姚來居桐城大有鄉之麻溪人謂麻溪姚氏逮明中葉而始有譜又垂及今二百餘年自是以往子孫之崇替不可知而譜之存亡不可必也然而差冀其經歷久遠者惟文册輕簡易挾而藏則傳久之道與代州道後馮氏世譜序吾嘗謂三代重姓族而繫世詳其後晉宋六朝尚門地而譜諜之學亦貴獨中間秦漢之世公卿大夫崛興草野而譜繫蔑可徵焉世變使然學者不能強説也漢書載公卿名人傳皆不詳其先世而所詳者獨司馬遷揚雄馮奉世三傳而已子長子雲皆以其所自序故載之然則宜鄉之族亦必有能自序者故史得因其文異於他傳以此推之馮氏之有譜舊矣自漢以後􅍘續不可盡明而今代州之馮興於明之中葉至國朝乃益盛非苐仕宦貴顯也蓋賢哲君子多矣以余所及交則湖北按察使馮君弼其人介然自立士也君弼既沒於武昌數年其從父弟右書來為安徽布政司經歷因得識之又識其弟汝咨皆敦誼好學異於流俗右書示佘所藏海內名人為其先世作傳志數十篇信乎其世濟為君子也余與右書汝咨論近世人作譜繁而非法夫譜欲簡要而卷册少俾子孫百世流轉海內易攜以行其體當略如古世表之法因略與分別所宜載與不者右書汝咨以為善後余別去次年再見之皖中則右書汝咨已如余論作道後馮氏譜成書矣而余為族譜反未及成右書汝咨之勇於取善如此余能無愧乎哉馮氏古多偉人矣而今譜首於明時者缺所不聞以為信也余聞右書之考秀山令君應鄉試時夜揭榜有走報其已得舉者令君方臥聞應之而已顧熟寐至曉其氣量之閎遠如此乃仕終於令雖有惠政而澤未及遠今右書弟兄方嗣其德賢者子孫宜更有大興者他日史氏為名人列傳而紀及其先意或有資於是譜而余又欲用是書之體為世作譜者式也故序之包氏譜序周時天子重神明之姓使小史奠繫世載以世本之紀諷以瞽矇之詩延及春秋黃農虞夏商周之裔散在列國者可考而別也而人臣功德尤異思褒録其子孫則又因所生地諡字賜姓氏族用別紀之而政教衰賞罰亂所命族氏不加於賢者則得氏不足以為重上無掌繫之職而私譜亦興蓋去先王之義益遠矣宋興五代之末天下俗敗壞而道不明洎仁宗之時大賢乃出包孝肅公亦于其間以忠言諒節聞于朝後世聞而慨慕之蓋孝肅合肥人其後有移居桐城北鄉者于是吾邑有包氏焉自古賢者少士囿於俗或一姓數百年未有聞人然則幸遇賢者之裔而庶見其先遺風餘烈君子未嘗不樂得而親友之也包氏世故有譜卷首載孝肅像及宋誥敕詳其世自孝肅而下今某方重修之以語余余謂譜別紀孝肅為宗誼近於古又嘗慕賢者之懿而樂道其家事也于是為之序云醫方捷訣序余少有羸疾竊好醫藥養身之術泛覽方書然以不遇碩師古人言或互殊博稽而鮮功深思而不明十餘年無所得乃復厭去夫醫雖小道然其本出於聖帝所為三代以來設官而氏其族其極至於使人無疵癘夭札之傷而羣生樂育導天和安民命至治之隆有賴焉又推原其故必自君子躬能循天理之節應六氣之和固筋骨之束調氣血之平於是安樂壽考永享天祿然後推其意以為醫藥以及庶民此其意至精且厚是以後世醫者雖多然苟非慈明篤厚之君子終不能究其義而雖有篤厚慈明之心苟不世業而少習者猶不能盡其曲折變移之理審其幾微而察其離合也吾鄉有嚴氏世為醫前世有號則菴者其術神驗余恨不及見之今其孫以恬能繼其學出其傳書曰捷訣者以示余其言簡直使人易入能盡疾病之變狀又操論得中無偏駁之弊蓋嚴氏既世其業又欲以此明諸人人信哉君子之用心矣惜乎余方以事牽不能從以恬盡學其術以獲養身濟人之益也乃為之序而歸之惜抱軒詩集三古體四十首新城道中書所見大霧被野天為遮海東遏不翔金雅寒威逼人斂默息倏忽眼眩生奇花是時夾道萬凍木半生半死交杈丫含靈孕氣作怪異纈如桃李冬揚葩蒼龍立海負冰雪天女隳地紛珠珈黃帝此夜戰涿鹿蚩尢肩髀埋谽谺三軍凱旋盡解甲亂挂林木光明霞千形萬態未易究琮琤忽墜當吾車發書占䇿苦不得野老能説殊亦佳或云休徵僃飯甕梱載千億收禾麻或云此咎達官怕有鬼欲瞰高明家從來休咎兩難定況何與此枯樹耶紅罏圍坐別妻子敦宿起看聊矜夸虛榮幻象豈久據午位已正陽輪加飢腸得食出戲語荒店凍壁題欹斜阜城作積雪河間道初日弓高城單車十二月自此將何征僕昔弱冠歲始竊鄉曲名充賦自南來意氣頗縱橫謂當展微抱庶見康民氓行能苦陋薄疾疢復相嬰十年省閣內回首竟何成側聞太山谷往往仙人行雲霄晝下鹿東海遠騎鯨願言見求道倘許傳其精披我故時裘浩歌出皇京旁觀擁千百拍手笑狂生於朱子潁郡齋值仁和申改翁見示所作詩題贈一首我昔少年百不求車舟載走殊方州短褐之衣飯不足胸探江漢千珠旒偶向人間結豪士擊築和歌燕市秋自從通籍十年後意興直與庸人侔徑辭五雲雙闕下欲攬靑天滄海流故人剖符守東嶽長髯忽對當風虬坐中賓友況英俊聞名往往從交遊嘉陵驛路劒關口君昔黃綬憂民憂一朝解印歸不得西南漂泊猿獶愁是時朱君亦羇客攜子登閣觀江涪萬里解散復會合並有百錦囊壓輈荷君為我盡順出紅燭低看三白頭精金美玉價在市鯨波蜃氣升成樓信知江山助雄麗使我愧向平生􅊧擬將雪霽上日觀當為故人十日留高巖磨壁不敢寫盍借巨筆鑱天球文章道路識老馬世事滄洲漂白鷗相看興極一回首日月住矣空悠悠歲除日與子潁登日觀觀日出作歌泰山到海五百里日觀東看直一指萬峯海上碧沈沈象伏龍蹲呼不起夜半雲海浮巖空雪山滅沒空雲中參旗正拂天門西雲漢卻跨滄海東海隅雲光一線動山如舞袖招長風使君長髯真虬龍我亦鶴骨撑靑穹天風飄飄拂東向拄杖探出扶桑紅地底金輪幾及丈海右天雞才一唱不知萬頃馮夷宫並作紅光上天上使君昔者大峨睂堅冰磴滑乘如脂攀空極險才到頂夜看日出嘗如斯其下濛濛萬靑嶺中道江水而東之弧臣羈迹自歎息中原有路歸無時此生忽忽俄在此故人偕君良共喜天以昌君畫與詩又使分符泰山址男兒自負喬嶽身胸有大海光明暾即今同立岱宗頂豈復猶如世上人大地川原紛四下中天日月環雙循山海微茫一卷石雲煙變滅千朝昏馭氣終超萬物表東岱西峨何復論孔撝約集石鼓􅋊文成詩在昔成周造西土日出海隅皆奄撫同文遂光天子政異學敢施私智舞大搜有禮朝金舄小雅餘萹鐫石鼓東遷孔子悼詩亡史有闕文吾尚睹用劉子駿説倔興暴國尚首功撥去古文焚一炬小篆從茲法丞相爰歷競言受車府援筆且便徒隸才立政安求周召侶雖然六體試古文尚有典刑存一縷魏晉以後述者稀科斗僅傳逮韓愈厥後推求鐘鼎文形響猜疑似聾瞽銘勒誰可迹􅑢梁真偽奚能知岣嶁獨留此鼓見周人猶似裔孫瞻鼻祖文士甲癸紛臆決強定成宣道文武􅍘文闕義那得知偉畫奇橅差可數一朝聯綴使完善墜玉零珠同貫組文王淸廟固難睎急就凡將真下俯乃知翰林有奇智錬石星躔如可補嘗疑秦篆一家學叔重雖精猶異古言之成理或近鑿有似郢人書燭舉保氏本體益茫昧後賢傅説時舛午日在茻中會意草背私公乃韓非語豈如石鼓堅可信乃諺胡為譏厥父説文草日且冥也從日在茻中石鼓文從早不從日按説文載自芥至菿五十三字大篆皆以從草固草名見詩安知非本草名而假借以為蚤草之草亦猶蚤之借蚤蝨也以假借言之亦不必取日在中矣又説文公平分也八猶背也韓非日背私為公石鼓公字下從口不從某亦不合背某之説而説文載古文訟字下正從口故知石鼓可信必以許氏所解六書義難之則反失之矣説禮無徵傷杞宋崇舊有由敬收嗟君好古如食跖快讀奇字嘗如吐益友多聞求寡昧家法虛懷銘傴僂何當再發壁中書小學源流勝張杜題唐人關山行旅圖亂山奔如濤急水高如山千山萬水不可度況有倚天絶地之雄關終南東走洛與宛劒閣岷嶓天最遠山頭日落關前晚靑煙滿地黃雲返棧中馬足躡重雲巖底車聲行絶坂後有輿從前建旄孤騎席帽絲鞭操負擔汗頳賤且勞耳邊不􅍘風騷騷猿鳥悲嘯兕虎嗥靑楓密竹苦霧塞仰首始露靑天高林開地闊春陂緑商舶漁舠牽纜續嘉陵江水下渝州愁聽巴人竹枝曲不道曲聲悲且説含辭苦山頭十日九風雨君王腸􅍘為零鈴行路誰能不酸楚路草巖花秋復春關山猶有未歸人丹靑寫盡關山怨千古行人行不􅍘將身涉險豈非愚不及田間藜藿飯或言男兒桑弧蓬矢射四方那得日在妻孥旁樵夫隱士同一谷英雄賈客偕征行士生各有志未易相評量亦有進退無不可出亦非見居非藏蒼生自待命世者豈必棲棲求異鄉正月晦日期應宿同遊浮山余往遍歷諸峯而應宿不至遂宿會勝巖次日至華嚴寺作詩歸示應宿兼寄朱竹君學士天池見纎鱗人言乃龍種卻立不敢浴引手聊一捧浥水洗石蓮戲答羣慫慂繞雲梯頗峻僧導使余踵右詣張公巖欲乞餘鉛澒夙聞九帶禪晰義啓愚懂異哉不二門兼紹洞山統遠公本臨濟下嗣而受洞宗太陽和尚記以授青公使遙嗣太陽今洞宗皆其後也我登遠公石但見青草菶安得聞説法顚頂灌酪湩日暝返龕閣中心獨悵懵靑鐙熒石壁照佛兩臂拱終夜風雨急環巖吐泉孔坐待朝暘洞果見先曈曨置案未盡餐僧雛來趣董西北舍舊歷東南發新竦紫霞關其隘穹蜷偃修蝀僧登余未上仙牀危可悚最巨金谷巖斑駮矗上湧赤玉挂彎環靑天受蟠擁巖竇立金容縱橫結梁栱其右闢石室弇上竅若籠冬凝曜冰柱春􅋼墮乳挏有童試擲爆訇殷坁隤隴其外沸石泉當戶三曲踴長溪決兩隘霜鍔拔鞞琫轉入華嚴寺高林墮鳥氄鯨鏗震幽陰奚啻破蛚蛬遂穿巨竹徑上詣可師冢婆娑芳桂陰趺坐遺厦借問張文端寧辭柱石重蕭爾此淹留何如驚辱寵張文端有浮山十可坐處桂下其一也有志嚮浮山自余始角總長序仲孚詩鋭思撥倥偬余有左仲孚浮渡詩序悲哉吾仲孚奄巳乘翣輁而吾二十年京洛仕㩉茸翰林持節來思余隔塵塕嗟彼千里驥倏以短轍覂至今壁上刻光晶照珠珙惜我先後迹與君不可總此生逋世役幾如説梏拲孰慰獨遊寂靈怪交獻奉所恨未聞道仍將棄凡冗糞掃石壇隅終身縛竹䈵遠道或見思作詩遺笑唪雜詩誰植高原樹花葉相離披幽陰上蔽日野鳥中巢之朝飛呼其友莫宿呼其兒豈不樂平生久託終不移微霜變靑緑涼風又先吹餘葉猶滿林颯颯聲何悲四海諒云廣欲逝願裴􅏆獨食雖得飽不如羣食飢一夕不相親百年安得知但兾藏弱羽奚必棲高枝挾瑟昔侍君中宵錯明燭芳尊前既陳衆女皆列幄不謂微且鄙過蒙君顧辱為君起新聲竭才自結束盼睞人心移曾無待終曲堂上有萬里薄帷能蔽目親者巧有餘疏者拙不足欲逝不敢遠沈吟就别屋秋風拂階墀皎月如寒玉恐欲傳淸光為人照幽獨陽澤將被物秭鵜乃先嗥天運苟不通密雲在西郊哲人亦何為託與萬物遨語默非有心進退一所遭嗟彼盛名譁雖值禹與堯不容蓬艾間乃有膾胥敖握有荆山璧不以易銀鏐韶虞發高音陽阿何足謳高門擊鐘磬尊爵缺獻酬酒肉雖飫人豪傑當懷羞不聞弋鸞皇披羽持為裘一朝毀周鼎鑄作棘與耰白首不能言小子方咿嚘願舍中閨態君當聽道周步陟高巖巔浮雲鬱如海扶桑升圜日眩矅生五采宛虹首幽恆江漢拖其尾氛霧倏淸澄島嶽乃錯峙俯聽深崢嶸空曲巨聲起勃上充元天下達幽泉底倡始羲黃前萬世卒未止傾耳魂九逝返乃得宮徵獨抱虛音歸中心竊自喜寫曲欲遺誰兾有伶倫耳湖上作江潮日夜上廣澤何瀰瀰靑山隱其側白日漾其裏竟日無檣帆鳧鴈或孤起傾耳鳴瀨間植立淡何俟昔者水中央蓋有天下士豈忘濟物情審見人與已名姓不可聞何況覿容止默默千載下悵望辨茲理平皋日將暮草舍面陂湖良禾被當門喬木列萬株含緑泛幽光長風忽披敷水鳥雜岸禽異響如相呼近玩既蕭泬遠趣來虛無不知靑冥外沈霞杳何徂人生各有適豈論榮與枯倚立待瞑月孰云高興孤屬言寫自賞非欲遺吾徒暮行靑山下宿田家作江皋夕霧中初月寒津上雜樹轉蕭疏長風拂淸曠夙愛靑山隅既瞑猶一望勢别列殊峯光沈藹同嶂夜鳥寂還啼春澗幽逾壯人從草徑逢屋與雲巖並感茲洵有情欣我久無恙場圃共披襟風露頻開釀耽樂未渠央疏慵任遺謗康熙間無為州僧曰修學死而其身不壞其徒塗以金奉於所居三官廟舟過瞻之作詩是身一塵垢與物孰為親有迹與無象二者孰為真借問此比邱方其閲世辰杳乘六氣辨萬彚同一鈞縱復隨化往存者猶日輪何為纍一蛻長託茲川津萬劫一剎那久暫固已均不以去為快不以存為珍見者自分別何足議至神連朝臥小艇了不見異人躡屣謁導師默與扣淨因推測可與否定知師不嗔出門縱鳴櫓煙霧江泯泯泊采石值沈南雷來為姑孰山長夜話因贈江山俯仰皆吾舊送我淸風滿襟袖雙橈徑度大江東南徼雲霞皆出岫高閣平臨日月輝傾巖下湧金鐘奏空江遠影弔蒼茫幽谷寒聲生左右止疑萬古謫仙人念我平生尋邂逅那知玉趾向姑溪正挂蒲帆出杭秀開尊丈室置盤餐燒燭深宵繼窮晝小邑經師道自尊荒村菜食容常􅛀風搏秋澤見鴻翔雷響春陂聞雉雊安有才如萬斛泉不汲王明藏井甃明朝我欲攬鍾陵未獲為君停宿留祝君早起濟當時儻有音書寄巖竇舟中望板子磯以南山勢甚奇因題長句黃山天半卅六峯包含雲海蟠奇松忽乘風霧走江岸橫入江心如臥龍風淸霧霽水搖碧遠見初日穿玲瓏煙鬟俯仰久未定玉圭角立誰為宗十年前再入春穀每下籃輿搘短笻楓丹照眼秋錦亂茶香薰鼻春焙濃山中猶未識山好正坐一障藏千重輕舠兀坐忽昻首有似故人天際逢凋零緑鬢塵埃後借問青山好憶儂田居自我遊人間嘗恐失情性負擔偶歸體揵戶良多幸外物解羈牽中田託觴詠既免五漿驚又謝四簋敬乞醯常友直飮酒安用聖寡偶亦可歡多稼況為慶白雲與戶齊青山入簷映南榮就冬暄北斗懸夜柄逝者諒弗居優哉復何競將老淡忘年達生庶無病題四更山吐月圖環海世界中須彌光明隱蔽行兩規元夜穹蓋覆四維淸氣鼓動東南陲寒魄欲吐風先吹倒影滄海升厜㕒一氣孔神中夜持仰首雲隙先見之或來稽首問導師指端湧現圓若斯憶泝沅澧踰沙羡洞庭下浸高樓危四更起坐星杓垂月生尚在湘東涯半映湖面山蔽虧須臾天地成琉璃夢遊所到不可追惟有明月窺余帷於子潁揚州使院見禹卿遂同遊纍日復連舟上金山信宿焦山僧院作五言詩紀之結友二紀前別離萬里外每恐終此生交會安知三故人一夕今相對緑鬢既先凋行恐成聾瞶妻孥幸無恙幼稚盡成大兩君蓋神祐滇蜀出萬隘僕也疾未平中朝謝儔輩舉目孰不改身存心可碎那擇儒與佛有得差為快既攬淮南春雕闌雜錦繪使者官事餘翩然動旌斾連舫指空江但見天垂蓋駮嶂立陽赮受日騰光怪陰壑靄如雲蒙龍奏悲籟陰陽有開闔一氣無遷代誰云逝者多澄川故如帶舉觴酹馮夷布席臥驚汏聊與平生心從容託江瀨同王禹卿馮拙齋遊八公洞循招隱寺歸潤州山雄如戰馬駢飮江中尻未下長波漂盡百興亡古淚登高誰不灑不知更有南山南疉嶂雲關塞平野初穿幽谷琅玕八卻聽細竇珠璣瀉陰陰鳥語萬朱櫻寂寂僧居十蘭若兩君梵行正淸修伴我蕭間如結夏未須不二問維摩風磬一聲言自寡空階久坐袂生寒小嶂試登笻可捨更斟虎跑甘如乳重過竹林靑沒踝豈徒公輩愛家山我亦淹留為白社江風吹面迓歸途還八喧聲攢萬瓦偕蔣春農舍人王元亭給事金蒔亭御史登江鶴亭康山草堂憶昔武功身不用南走江津作遊弄江風海月四天垂中有琵琶聲一縱淸濁都忘身後名軒裳那計當年重世間從此有康山二百餘年存屋棟江君新葺作階墀千歲虬龍今始種每來放鶴羽如輪縹眇雲霄思獨控揚州三面邗溝上中阜獨臨天宇空風前帆影入城來天際斜陽低首送臺省兩賢皆鷙鶚舍人文筆真苞鳳淮南芍藥落花時記入層軒留玉鞚獨余不飮復無詩應愧主人開馥甕惠照寺分韻得自字我昨山中居嘗愛林下寺每俟風雨休杖藤輒孤至矧茲淸郊外良朋逾三四道人晨啓關涼蔭散幽地墜萼點階稀高藤仰空遂壁掃唐相題宇拱金人臂山鳥罷啼時風篁識聲自疇謂聞見間奄忽忘深智身世苟無牽頻來坐寒翠暑懷乘化日行逝童稚固巳然朝徂暮復改矧此將穨年一室曠淸暑桐蔭落疏懸涼飇倏西起和鳥鳴階前飛雨遂飄颯墜葉亦聯翩適賞在須臾顧思彌悵焉混成故無尾象帝詎有先悟彼空外旨泛此世間緣夕陽忽西露倚檻聽悽蟬潘惟勤弟兄有小園在城北當龍眠山口林麓溪嶂蟠擁最為可愛惟勤於松下作亭余為名之日谷口亭龍眠崖壑誠幽峭一往深如處窔奧卻來谷口快平夷靑嶂芙蕖開四照筋強骨健易江山登涉平生恃年少而今老矣欲閉門苦畏拖舟及輿轎城闉徒步半里餘及此林巒巳姸妙朋遊獨往皆不惡但欲雨晴途不淖朝暾尚及露濡瀼晚日更看山照曜況於松下落陰翳萬樹寂無山鵲噪夾溪紅葉颯蕭蕭天際秋聲時一到農樵遇我不相顧倚柱獨吟頭自掉世間多少東海生吾作井蛙君勿笑張印沙七丈得先職方亦園故址作逸園吾邑靑山圍四境小嶂城西庳亦勝昔吾先世籠有之遂作兩園地相並其後閲姓凡幾家敗牖穨垣蓬滿徑新堂忽起闢荆榛舊木猶存覆陰映百年父老觀廢興舉觴競來為地慶丈人健吏勇為國嘗抑豪強沮姦幸餘才歸逸作茲園舉廢治荒譬為政賤子歸休一畞宮橫榻僅容搘麈柄每于田野縱嬉遊復荷鄉閭同愛敬霜風吹淡夕陽時往聽僧庵打鍾磬開軒松竹復淸疏解帶親交共觴詠坐久時逢歸鳥斜飮罷仰看圓月正百歲如輪那得知一日縱狂何足病老梅巖隙巳含苞更待雪香攀石磴夏晝齋居中庭榮夏木靄此南榮幽微風泛其陰好鳥鳴相求乍聆巳可怡移時復悠悠未知古與今此意有遷不願言觀吾生託與萬物遊望道苦弗見安敢輕為言大哉天地化示人初不煩物表時一遇忽又汨其源孤生千載後屬念祇弗喧客從茅山來教我默自存服氣至萬息顧見天地根多謝丈人意求生固有門謷乎遊恣睢何為畜於樊終日居揵戶披卷慰寂寥久坐生微涼不待輕紈招上覽虞夏興下及衰亂朝耳目雖不接感歎自蕭條舉首望中庭忽斂西陽驕喬木陰暮氣朱霞灼穹霄簷昏巳飛蝠林杪猶鳴蜩俯仰萬化中安知盈與消感冬四運革成歲日月播陰陽萬化靡弗徂天地固有常元陰蔽朝日堅冰嗣微霜俯仰偶一世思彼乘雲翔既無終與始焉用思羲皇願言從問道或為言其將王叔明山水卷大山如雲高蔽日小山如睂靑入室千林過雨長靑蔥大山小山瀑爭出低首見峯仰見水軒窗宛此空巖裏此中有士無四鄰草木猶涵太古春巖花落盡春澗長遂有漁舟來問津居者既無求來者亦無意但見白雲倚蒼翠屋上寒雲流滿地山風卒起漁舠歸澗石交鳴幽嶂閉借問何處有此山豈非廬與霍盤互雲霄間哀猿思鳥不知路惆悵王孫遊不還眼底溪山止平遠嵐光深處飛禽返開塗伐木吾無徒老夫那得淩絶巘昔聞趙承旨作畫居吳興筆法晚授王氏甥授受有緒諒可貴意匠不到天機生妙趣磅礡出域外承旨雖工容未能我憐叔明擅此技丞相之宅才一至明祖殺士夫何忮嗚呼翰墨祇作他人娛露才往往傷其軀曷不避世深山居竟友麋鹿從樵漁衣冠名姓世莫識結屋無能與畫圖仇英明妃圖明妃一出蕭關道玉顔不似當時好卻留靑塜地長春復有畫圖容不老漢官佩劒卒舉旗分布四馬連尻脽毛端颯有風沙吹侍女頗具宮中儀中有襜褕擁獨騎落日黃沙萬馬迹臨風翠袖雙蛾睂欲到穹廬前幾許賢王迎跪廬兒語琵琶曲終淚如雨佳人那必逢佳侶表餌生分漢帝憂容華死作單于土遺事竟寧傳到今王昭有曲聲中琴仇生豈亦能知音寫出別怨關山深正使夔州衰杜老春風省識忽傷心贈錢魯思少日懷賢甘執御既老猶思身一遇朅來三載皖中居惟對龍山如可語城外拍空江水流雲中引首時登樓東風忽有天涯客青草生時吹泊舟裁詩作字皆非俗意中正繼開元躅信古方能見性情遺今誰得加榮辱世間口説何紛紛未知天意於斯文鳳凰五色偶鳴和麒麟一角方超羣有才如此誠難得田舍秃翁長語塞邀君風露月明中坐歎玉英人莫識卻憶平生知子時侍郎舉族住京師安昌弟子聞張樂謝傅家庭多詠詩樽前冠蓋俄逾貴室內孤嫠今莫支門戶難留百年盛文章要使千秋垂修名莫待榮華落白日終令奴隸知頻來莎砌同淸暑耽聽狂言亦未癡唐伯虎赤壁圖東坡居士賦有畫風月無窮瀉淸快畫中有賦情亦奇唐寅使筆能爾為登高臨水秋氣悲山空夜明木見枝憑虛欲望天涯處可似湘中瞻九疑九疑山高湘水深重華不作哀至今靑楓搖落幽竹林湘君窈立風滿㯲江妃海若夜起會或有雲中竽瑟音雲開月出天寥闊俯首悲風興大壑不見帝子乘飛龍但有橫江之一鶴橫江鶴何裴􅏆蘇子乘之去不回賢者挺生當世才重之九鼎輕塵埃脫屣竟從赤松子賦懸日月何為哉情往一樂復一哀後六百歲余茲來曳杖江頭看山碧思得公語從追陪請與圖中二客偕今夕何夕月當戶霜落收潦面深渚涼風吹林蕩空宇作詩要公公豈許感衰朱顔相娛嬉倏復為老醜每見長童稚屢失故交友生平免夭折得天諒巳厚所志尚千百為者才八九終非力所及曷不歌鼓缶苐恐日失足盡隳平生守松檜晚彌榮所以異蒲柳修短未足論請勿喪吾有心與逝者寧道與存者夀送余伯扶重遊武昌好士如好山不容置几席好詩如好士每見輒增益皖中山遠人士稀愛咏淸辭長面壁余生才名二十年江關處處吟飄泊蕭條秋氣遠歸來落楓未盡還為客挾册棲遲不療貧青山重過句仍新往憑黃鵠山頭望江漢風流今幾人夕懷西嶺斂斜規餘暉猶辨色暗牖此終日俯起釋書䇿巡簷風蕭蕭墜葉動階石羣鴉得枝棲復起噪林側萬物皆寓形何者為主客追前信巳愚探後詎為適舉首默無論寒月偶淸夕見禹卿題拙書後因寄侍讀淨業真頭陀靜中萬象觀菴羅起攬風雲入紙墨筆勢所向揚天戈金翅擘海作平地巨靈分山流大河世人不悟三昧力將謂妙迹回永和嗟子弱腕綰春蚓索處陋巷藏泥蝸何緣手迹荷題字皮薦價視蒼璧多憶昔風帆共投宿金山夜鼓驚鳴鼉君呼起説微妙義履行巨浪穿姻蘿倚立雲間天淡外長江蕩與空相摩三客恍知宿世在千生了辦須臾過人間別離細事耳乘輪退轉憂蹉跎子潁困臥已近死與子那得長委蛇一臂可為初祖􅍘三折豈屑張芝波快雨堂中想投筆仰見圓月升牆阿江上一書通問訊翻湫倒海將如何答王生古人矌不見生世惻愴多幸逢賢哲知交臂倏已過鄉耋盛文行孟韓紹同科四海士仰流踵門肩相摩嗟余生晚矣始冠贄庭阿繼見曾幾時奄復從虞歌所承得線􅋼洪流逝江河況復久遺忘髟領垂衰皤猶欲抱􅋊缺為昔揚其波豈不愧謏聞稍足異傳訛顧恨學非優身名一么麼時髦䇿遠騖高閎冠峩峩孰干藪澤下而為焦朋羅坐是臥蓬衡緘閉如蠯螺邈隔後來賢朱墨方研磨寫述恐弗遂畢世埋薠莎獨君不見鄙每顧問無他投卷逾束帛陳藉璋圭瑳見譽配懿古愧汗生顔酡豈君擇取舍有願正邪頗眷茲牛下鐸尚俾雅樂和廣地孰無材利欲為之劘塵霿苟不興萬里曜羲娥士為千章林毋為附施蘿寒風發江潯危葉隕庭柯一觴向風月願得相婆娑念子百里外辨影篝鐙俄閭井歲苦飢並日塵生􅰍古􅰍即俗鍋字飢喉出金石植道為嘉禾報詩恧言耄嘉貺將奈何題張篁村萬木奇峯圖一峯掘起天當中撑拄元氣開鴻濛左右闔闢兩巨壑徑路各絶風雲通松風遠自雲中起搖蕩雲光山色裏水交山􅍘置人家松響溪聲動窗几巖高谷迥居無鄰松林有路無行人豈非高士嘗避秦自此千載無問津又疑靈境與世隔乃是天地神物之所珍我家龍眠東西望兩谷口每至夕陽時嵐光紛照牖日月逝矣身今衰􅉭屨竟隔靑崔嵬卻尋圖中幽谷到窮處忽有數峯天際來張君畫山最得古人妙俯視百年畫史皆塵埃人家收得尺絹素屈指不數王麓臺何況林卉與翎羽擾擾俗工何足取韓幹戴嵩堪障壁徐熙周昉遺兒女落落平生山水情移將看畫亦眼明於今安得張君死復生與余結茅共對靑山靑
