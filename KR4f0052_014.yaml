front:
  text: 惜抱軒文集十四
  hash: sha256:c0dc3b2e6fd34a11f734bf04410b534ef1caaf49eb572e4a56e521dcc527a776
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_014-1a}
body:
  text: 記儀鄭堂記六藝自周時儒者有説孔子作易傳左邱明傳春秋子夏傳禮喪服禮後有記儒者頗裒取其文其後禮或亡而記存又雜以諸子所著書是為禮記詩書皆口説然爾雅亦其傳之流也當孔子時弟子善言德行者固無幾而明於文章制度者其徒猶多及遭秦焚書漢始收輯文章制度舉疑莫能明然而儒者説之不可以已也漢儒家別派分各為專門及其未造鄭君康成總集其全綜貫繩合負閎洽之才通羣經之滯義雖時有拘牽附會然大體精密出漢經師之上又多存舊説不掩前長不覆已短觀鄭君之辭以推其志豈非君子之徒篤於慕聖有孔氏之遺風者與鄭君起靑州弟子傳其學既大著迄魏王肅駮難鄭義欲爭其名偽作古書曲傅私説學者由是習為輕薄流至南北朝世亂而學益壞自鄭王異術而風俗人心之厚薄以分嗟夫世之説經者不蘄明聖學詔天下而顧欲為已名其必王肅之徒者與曲阜孔君撝約博學工為詞章天下方誦以為善撝約顧不自足作堂於其居名之曰儀鄭自庶幾於康成遺書告余為之記撝約之志可謂善矣昔者聖門顏閔無書有書傳者或無名蓋古學者為已而已以撝約之才志學不怠又知足知古人之善不將去其華而取其實擴其道而涵其藝究其業而遺其名豈特詞章無足矜哉雖説經精善猶末也以孔子之裔傳孔子之學世之望於撝約者益遠矣雖古有賢如康成者吾謂其猶未足以限吾撝約也乾隆四十五年春二月桐城姚鼐記寶扇樓後記朱子潁家有聖祖仁皇帝之賜扇作寶扇之樓􅔑焉王禹卿為之記成以其辭視余余讀而歎曰昔漢武既招英俊程其器能左右近臣若主父嚴朱皆出為守相獨東方朔以不得任用至於上書自訟才士之亟於自效若此哉若以人臣愛君之心言之則日侍帷幃者之志固已得矣況乎出臨一方有吏事之責人情乖忤有詘伸應接之難曷若一意以親媚於主上者之為善哉都統公以筆墨文字遭逢聖祖知遇內侍最久其後乃出入宣力躋於二品今子潁之任用略同於都統公而且滋重矣而回思昔日都統依天日之輝光侍淸宴之間暇聖翰雲章璀璨懷褎蓋有邈然不可及之慕況於禹卿辭玉堂之廬而飄搖江海者乎余於是書為後記子潁既外任家雖作是樓而未得以登異日倘召居闕廷近職以休沐之餘俯仰斯樓循玩吾言感念國恩之無窮將有漼然不知泣涕之隕落者已乾隆四十四年七月姚鼐書記蕭山汪氏兩節婦事蕭山汪君輝祖之母曰王孺人其生母曰徐孺人汪君考為淇縣尉淇縣君沒兩孺人皆少遺孤十一歲而上有七十之姑門無族戚之助或謀殺其孤而奪其資忌兩孺人日欺陵困辱兩孺人不為動卒奉姑保育孤子教之成立登第為聞人是時有司既疏兩孺人之節而旌其門矣汪君顧悲傷兩母少所處危苦遍走士大夫求為文章褒揚其行義所致凡數百篇又自越以書遺余請記其事汪君志亦勤矣夫兩孺人之名著海內者以其子之成立也設幼孤不幸或殤或長而不才則兩孺人泯無聞矣方其窮厄困難伏首相對閨闥之中豈能知子之必才而待之雖子成立不可必而終不忍負吾志義者此兩孺人所以賢也賢者固不求名而名至然世竟無稱者亦有之且女子尚能堅其持操卓然自立而顧謂天下之士無獨立不懼守死服義其人者乎其泯無聞焉則已矣夫士貌榮名卒何加於其身豪末哉記江寧李氏五節婦事江寧李文兆之妻呂氏年二十二而夫死一子方襁抱家貧甚無以生也文兆有族兄弟曰文采哀之以屋居其母子子長為賈呂氏今年六十餘矣於法當旌於朝待吏舉焉文采之族有文華妻楊氏文升妻魏氏文旭妻胡氏文中妻張氏皆守節以老文采皆收恤之凡數十年而四人者夫死婦年逾三十矣於例不當旌夫人之所遭不同女年三十而婺矛牙其苦有逾於二十而婺矛牙者國家立制不得不立之限耳若夫人心之褒善非可以例論也文采生平嘗憫五節婦之遭欲為之紀文采沒子際春從鼐學以告鼐鼐謂五人者貧而能守善皆可褒而文采之恤其窮而欲著其名義並可稱也因為之録云快雨堂記心則通矣入於手則窒手則合矣反於神則離無所取於其前無所識於其後達之於不可忤無度而有度天機闔闢而吾不知其故禹卿之論書如是吾聞而善之禹卿之言又曰書之藝自東晉王羲之至今且千餘載其中可數者或數十年一人或數百年一人自明董尚書其昌死今無人焉非無為書者也勤於力者不能知精於知者不能至也禹卿作堂於所居之北將為之名一日得尚書書快雨堂舊楄喜甚乃懸之堂內而遺得喪忘寒暑窮晝夜為書自娛於其間或譽之或笑之禹卿不屑也今夫鳥鷇而食成翼而飛無所於勸其天與之邪雖然俟其時而後化今禹卿之於尚書其書殆已至乎其尚有俟乎吾不知也為之記以待世有識者論定焉遊媚筆泉記桐城之西北連山殆數百里及縣治而迤平其將平也兩崖忽合屛矗墉回嶄橫若不可徑龍溪曲流出乎其間以歲三月上旬步循溪西八積雨始霽溪上大聲漎然十餘里旁多奇石蕙草松樅槐楓栗橡時有鳴巂溪有深潭大石出潭中若馬浴起振鬛宛首而顧其侶援石而登俯視溶雲鳥飛若墜復西循崕可二里連石若重樓翼乎臨於溪右或曰宋李公麟之垂雲沜也或曰後人求公麟地不可識被而名之石罅生大樹蔭數十人前出平土可布席坐南有泉明何文端公摩崕書其上曰媚筆之泉泉漫石上為圓池乃引墜溪內左丈學沖於池側方平地為室未就要客九人飮於是日暮半陰山風卒起肅振巖壁榛莽羣泉磯石交鳴遊者悚焉遂還是日薑䲧先生與往鼐從使鼐為記登泰山記泰山之陽汶水西流其陰濟水東流陽谷皆八汶陰谷皆入濟當其南北分者古長城也最高日觀峰在長城南十五里余以乾隆三十九年十二月自京師乘風雪歷齊河長淸穿泰山西北谷越長城之限至於泰安是月丁未與知府朱孝純子潁由南麓登四十五里道皆砌石為磴其級七千有餘泰山正南面有三谷中谷繞泰安城下酈道元所謂環水也余始循以入道少半越中嶺復循西谷遂至其巔古時登山循東谷入道有天門東谷者古謂之天門溪水余所不至也今所經中嶺及山巔崖限當道者世皆謂之天門云道中迷霧冰滑磴幾不可登及既上蒼山負雪明燭天南望晚日照城郭汶水徂徠如畫而半山居霧若帶然戊申晦五鼓與子潁坐日觀亭待日出大風揚積雪擊面亭東自足下皆雲漫稍見雲中白若樗蒱數十立者山也極天雲一線異色須臾成五采日上正赤如丹下有紅光動搖承之或曰此東海也回視日觀以西峯或得日或否絳皓駮色而皆若僂亭西有岱祠又有碧霞元君祠皇帝行宮在碧霞元君祠東是日觀道中石刻自唐顯慶以來其遠古刻盡漫失僻不當道者皆不及往山多石少土石蒼黑色多平方少圜少雜樹多松生石罅皆平頂冰雪無瀑水無鳥獸音迹至日觀數里內無樹而雪與人膝齊桐城姚鼐記遊靈巖記泰山北多巨巖而靈巖最著余以乾隆四十年正月四日自泰安來觀之其狀如礨石為城墉高千餘雉周若環而缺其南面南則重嶂蔽之重溪絡之自巖至溪地有尺寸平者皆種柏翳高塞深靈巖寺抂柏中積雪林下初日澄徹寒光動寺壁寺後鑿巖為龕以居佛像度其高當巖之十九峭不可上橫出斜援乃登登則周望萬山殊騖而詭趣帷張而軍行巖尻有泉皇帝來巡名之曰甘露之泉僧出器酌以飮余回視寺左右立石多宋以來人刻字有墁入壁內者又有取石為砌者砌上有字曰政和云余初與朱子潁約來靈巖值子潁有公事乃俾泰安人聶劒光偕余聶君指巖之北谷泝以東越一嶺則入於琨瑞之山蓋靈巖谷水西流合中川水入濟琨瑞山水西北流入濟皆泰山之北谷也世言佛啚澄之弟子曰竺僧朗居於琨瑞山而時為人説其法於靈巖故琨瑞之谷曰朗公谷而靈巖有朗公石焉當符堅之世竺僧朗在琨瑞大起殿舍樓閣甚壯其後頽廢至盡而靈巖自宋以來觀宇益興靈巖在長淸縣東七十里西近大路來遊者日衆然至琨瑞山其巖谷幽邃乃益奇也余不及往書以告子潁子潁他日之來也循泰山西麓觀乎靈巖北至歷城復泝朗公谷東南以抵東長城嶺下緣泰山東麓以返乎泰安則山之四面盡矣張峽夜宿姚鼐記晴雪樓記遼東朱孝純子潁知泰安府之二年境內既治無事作樓於居室之東曰晴雪之樓又一年余自京師來遊泰山偕子潁登其上思昔子潁西抂巴蜀以軍興使雲南永昌後又逾美諾之巖入小金川之阻冰雪所沍師旅所屯往來常數千里今年賊起泰安鄰郡子潁最先造大府幕為出方略親戰臨淸城下巨炮越頭上手射斃賊首一人率士入城遂定餘櫱余誠偉其氣然方其出入險難之地履鋒鏑之所交忠謀勇氣誼不顧已固不知復有燕遊之樂及事定時夷口不言功伐蕭條登眺淡若無為此所挾持蓋過人益遠矣余駑怯無狀又方以疾退浮覽山川景物以消其沈憂與子潁仰瞻巨嶽指古明堂之墟秦漢以來登封之故迹東望汶源西流放乎河濟之間蒼莽之野南對徂徠新甫思有隱君子處其中者之或來出慨然者久之又相視而笑余之來也大風雪數日崖谷積滿霽日照臨光暉騰映是樓之名若獨為余今日道也然則樓之記非余而孰宜為乾隆三十八年十月作樓始成三十九年十二月桐城姚鼐記遊雙溪記乾隆四十年七月丁巳余邀左世琅一靑張若兆應宿同入北山觀乎雙溪一靑之弟仲孚與邀而疾作不果來一靑又先返余與應宿宿張太傅文端公墓舍大雨溪漲留之纍日蓋龍溪水西北來將入兩崖之口又受椒園之水故其會曰雙溪松隄內繞碧巖外交勢若重環處於環中以四望煙雨之所合散樹石之所擁露其狀萬變夜共一鐙憑几默聽衆響皆入人意蕭然當文端遭遇仁皇帝登為輔相一旦退老御書雙溪以賜歸懸之於此􅎝優遊自適於此者數年乃薨天下謂之盛事而余以不肖不堪世用亟去蚤匿於巖窔從故人於風雨之夕遠思文端之風邈不可及而又未知余今者之所自得與昔文端之所娛樂於山水間者其尚有同乎耶其無有同乎耶觀披雪瀑記雙溪歸後十日偕一靑仲孚應宿觀披雪之瀑水源出乎西山東流兩石壁之隘隘中陷為石潭大腹弇口若罌瀑墜罌中奮而再起飛沫散霧蛇折雷奔乃至平地其地南距縣治七八里西北距雙溪亦七八里中間一嶺而山林之幽邃水石之峭厲若故為詭愕以相變焉者是吾邑之奇也石潭壁上有刻文曰敷陽王孚信道建安陳信臣榮陽張嶢子厚合淝皇甫升紹聖丙子正月甲寅凡三十六字信臣皇甫甲寅之下各有二字損焉以兹瀑之近依縣治而余昔嘗來遊未及至而返後二十餘年及今乃履其地人前後觀兹瀑者多矣未有言見北宋人題名者至余輩乃發出之人事得失之難期而物顯晦之無常也往往若此余是以慨然而復記之隨園雅集圖後記曩者鼐居京師友人程魚門為語在江寧時嘗寓居袁簡齋先生隨園幾一月其水石林竹淸深幽靚使人忘世事欲從之終老也簡齋先生與鼐伯父薑塢先生故交友而鼐未見獨聞魚門語識不能忘其後鼐以疾歸間居於皖簡齋先生遊黃山過皖鼐因得見先生於皖又後七年鼐至金陵始獲入隨園觀之魚門語不虛也而魚門於前數年卒於陜獨家歸江寧因見先生述其語而相對太息先生故有隨園雅集圖所圖五人為沈尚書蔣編修尹公子陳文學及先生先生以示鼐考作圖之年與魚門語鼐時相次時陳文學年才十八今先生外惟文學尚存仕為郡倅亦已老矣圖後名公卿賢士題識數十人於今求之非特昔之耆耉宿德邈焉己往即與鼐年輩等者亦零落殆盡獨先生放志泉石三四十年以文章詔後學於此夫豈非得天之至厚而鼐亦幸值之於是時也圖有山陰梁相國記五人爵里具焉先生俾鼐書其末夫人與園囿有時變而圖可久存圖終亦必毁而文字可以不泯千百年後必有想見先生風流者顧鼐非其人不足託也先生故人皆有題詠魚門獨無名字其間鼐識其辭亦以補其闕云西園記黟自漢為縣而其後境屢析分為他邑今其縣所據者蓋漢縣之北隅而已徽州處萬山中而黟又在徽州羣山之隘略無平處民居其間尢敦朴多古風魯語云瘠土之民莫不好義誠不虛也其南二十里曰葉村村有曰西園者葉君冠山之所為也冠山篤行君子而好文學老於諸生於其宅西為屋數間背山臨溪為課子讀書之所其子有和從余學為文卓然有志於古昔人稱洛陽多名園極巨麗閎曠之觀惟司馬溫公獨樂園至狹陋不足競其勝然人尢重其園者以溫公故也今西園亦數畝地耳然以賢者創於前佳子弟承於後安知異日世不絶重此園以謂逾於巨麗閎曠者耶余年二十二嘗一至黟未與葉君相識其時君之子尚未生園尚未作也後幾四十年乃至歙去黟不遠亦未及識君而歸獨君之子見告家有是園而已今君歿逾年君子書來述君臨歿欲得余文為園記余老矣殆不復入萬山之隘以見所謂西園者又念能增重此園者君子也豈在余文乎故顧重君之賢傷君愛余之意姑為文述之以朂君之子至於初作園之日月及溪山登眺之勝足以娛人耳目者皆不足論也金焦同遊圖記乾隆丁酉戊戌之歲朱思堂運使方在淮南邀余主揚州書院而王夢樓侍讀居京口嘗期之同遊金焦二山屢宿僧寺一日三人對立山間悠然若有所悟思堂因言欲使工為三人共作一圖其後圖成而余已去揚州里居不及見也思堂旋亦歸京師惟夢樓常居京口余懷思兩君寄以詩云三客並知非一世兩山回首有餘蹤紀是事也數年思堂竟捐館舍又後數年其子丹崖來為江寧糧道余適在江寧相向感念思堂之不作獨見賢子偉然繼武重涖江南悲思之懷一時交至丹崖㩦昔工所為三人同遊之圖出以見示作圖時三人微及斑白今鼐與夢樓皆鬒髮皓然與圖中不相似蓋屈指閲十六年矣思堂之儀容固邈然既亡鼐與夢樓餘年處世更復幾何未知此身與是圖當孰為真幻因題其後並以寄夢樓云乾隆五十八年八月晦日姚鼐記袁香亭畫册記香亭太守與其兄簡齋先生解官之後皆買宅金陵而寓居焉風流文采互相輝映固門內之盛也簡齋性好山水年六七十猶時出遊探極幽險凡東南佳山水天都匡廬天台武夷達於嶺海無不至而香亭日閉戶邀之暫出輒有難色其性與簡齋異者若此顧獨好畫窮日夕執筆為之不倦蓋林麓煙雲之趣浩渺幽邃之觀水石竹木花葉鳥獸蟲魚之奇態香亭自具於胸而時接於几席之上意其遊亦未嘗異於簡齋耶兹册香亭摹董思白山水凡十二幅而簡齋自書詩十二首與相間香亭以示余余於詩畫深處非所能解自來金陵與其兄弟交遊往來纍歲識名其末以存其迹云少邑尹張君畫羅漢記畫家白描之法世謂始於李伯時伯時龍眠山莊在吾邑境嘗入龍眠求其故址卒不可知悵然而返而伯時之畫生平亦未之見往者袁春圃方伯為言曾於常州僧寺見伯時畫一應真其衣摺引筆屈曲上下可二丈許止作一筆此殆為真迹無疑余聞而想見之不能忘少尹張君以高才來涖敝邑多藝能以日治伯時舊里柳愚兩君作詩以詠其事持以視鼐鼐謂公負閎偉之才仰佐聖治俯安黎氓外襄異域勳業播四海靡不聞矣至其遇平生故舊無貴賤辭色憸愈執禮謙遜之甚如布衣交此惟與公接者知焉孔子曰事君而達卒遇故人曾無舊言吾鄙之若公者不亦賢乎抑聞之古王者朂諸侯詩曰君子樂胥萬邦之屛又曰彼交匪敖萬福來求夫君子承天王德意以屛萬邦惕惕焉惟恐不盡其任處位雖尊未嘗見為此為我寵貴資也故驕傲之氣泯而屛翊之道至詩言賢侯之行二端而理通於一君子觀人一節而知其僃焉然則見公之處交遊者如此而亦可以推明公為大臣之度矣袁浦兩君皆公鄉里故舊而鼐則江南萬民之一又故人也故述斯義於兹圖以為敬􅋢公者公誼私情若是交至而公德益宏矣吳塘別墅記無錫汪君銘常作別墅於吳塘之側又自定壽終之藏於是地丹徒王夢樓先生為之銘及作吳塘八韻詩寄余觀之且使為記昔莊生述子祀子輿子犁子來謂孰知死生存亡之一體者吾與之友矣今汪君之志與此四人者其奚異乎子來又曰善吾生者乃所以善吾死也吾聞汪君能以厚德成其內行又擇山林湖陂之佳勝將以遺世事而樂其生此非所云善其生者乎夫夢樓了通釋氏無生之法殆無愧於子祀所云足與友者若余俯仰人間慕道而未見苟遇子祀當為所擯夫烏足記汪君之墅獨念生平亦好樂山水渡江至丹徒止於夢樓之堂自是以東皆足迹未至今讀夢樓之詩景物奇勝足繫夢想尚思以異日東遊造錫山而窺吳塘之域接汪君之容而探其曠遠達觀之旨斯誠平生之至願矣昔蘇子瞻不識吳德仁因陳季常寄詩有寓物而不留物之羡因以握手一笑相期余願亦以此覬之汪君其尚可得歟是為記陳氏藏書樓記士大夫好古能聚書籍者多矣而傳守至久遠者蓋少唯鄞范氏天一閣書自明至今最多歷年歲國家修四庫書取資范氏以助中祕之藏海內稱盛焉余家近合淝聞合淝龔芝麓尚書所藏書亦至今未失其家專以一樓􅔑之命一子弟賢者專司其事借讀入出必有簿籍故其存也獲久聞范氏之家法蓋亦略與同焉夫一人之心視其子孫皆一也而子孫輒好分異以書籍與田宅奴僕資生之具同析之至有恐其不均翦割書畫古迹者聞之使人悲恨然則藏書非必不可久抑其子孫之賢不異也新城陳凝齋先生嘗購書萬卷其後諸子為專作樓以貯手澤樓旁即為子孫讀書之舍今其仲子約堂太守又慮歲久而後人或有變也乃摹凝齋先生之像於石而奉之於樓下使後人一至其樓前而愴然思惕然悚愈久而不敢不敬守也以余少獲奉見凝齋先生乃以拓本寄余且命為樓記余於先生後裔又識數人皆賢雋也而約堂用意又如是之至然則百年之後數海內藏書家必有屈指及新城陳氏者矣吾安得不樂而為之記也重修石湖范文穆公祠記南宋資政殿大學士范文穆公既以文學著稱當世其詩尢為天下所愛後世為詩者每誦法之以謂宋詩人之傑然考公生平立朝出使卓有節行臨民布政方略可觀亦非苐詩人之傑而已世傳公為中書舍人時與張敬夫俱論已張説簽書樞密事説曰張左司平時不相樂固宜爾也范致能與吾故交胡為亦攻吾世以此或疑公吾謂此公之所以賢也君子之行不必同大趣歸於義而已拒小人甚嚴君子之介也於人何所不容故舊往來有不能絶者君子之和也至於當國家大政進退賢不肖則不敢忘守官之節以平居昵好之私奪朝廷是非之正此非賢者而能之乎易曰君子夬夬獨行遇雨若濡有慍無咎范公於張説殆若是矣吾益以見公賢夫何以疑公哉公吳人也吳西南石湖公詠遊之地故有祠歲久且頽嘉慶二年春觀察歷城方公大興查公府同知歙汪君同泛舟石湖思范公之賢至公祠而傷其敝始議更修之返告於方伯德化陳公及蘇州太守任君皆樂成其事因聞於侍郎學使長沙劉公及凡守牧江蘇者競出財而濟其功以其年某月竣事方公至金陵語余請為之記余謂范公之賢誼當祠於吳不朽而諸公之競勸於此亦有性情嗜好不必同而同樂為義者乎是固可紀也余生平未嘗至吳而慕其山川之勝異日或從諸公瞻遊湖濱造於祠下見公像而一酬焉公其謂是知我者哉孫忠愍公祠記明北平都督副使燕山忠愍侯孫公諱興祖始以雄傑之材從高祖於淮上渡江開國數立戰功終奮伐元遺櫱深入失授身沒沙漠其忠烈之迹具載明史本傳忠愍兄子諱繼達始同以族從淮上積戰功為濠梁衛指揮使忠愍侯定遠人也及指揮使守常州與張士誠拒戰最久從徐達平士誠復有功高祖乃賜之田宅於常州武進指揮子孫遂為武進人指揮之子泰當建文時為北平都指揮使燕師起與戰於懷來中矢裹血力戰竟陷陳死惠帝追封廣威侯廣威有從父兄恭亦早從太祖取沂州密州益都及克元都屢有功官至前軍都督僉事授驃騎將軍孫氏一門在洪武建文時功業著聞凡四人而死事者二焉忠愍之子恪亦繼為良將爵至通侯矣而不幸與藍玉之禍故孫氏之居定遠者衰而武進獨盛明禮部尚書文介公愼行則濠梁指揮之八世孫而廣威之弟後也今兖沂曹觀察星衍又文介兄七世孫也觀察以謂孫氏建功肇始於忠愍而無專祠非所以表忠義以光後嗣乃於江寧城中買地建為祀所以奉忠愍而以濠梁指揮廣威侯都督僉事三主祔其左右又於祠室置書籍􅉓器之藏甚僃俾後子孫能讀書者守之餘皆可假觀而終歸於祠因請余為之記余謂孫氏之始興也以武烈而後子孫之達者以文學文武雖異而一歸於忠孝大義則同今觀察建祠之法上以崇先祀下以啓後賢不以遠遺不以已私其用意甚厚其望於族人者甚巨且遠孫氏忠孝之美其將有世濟者乎方正學祠重修建記天地無終窮也人生其間視之猶須臾耳雖國家存亡終始數百年其逾於須臾無幾也而道德仁義忠孝名節凡人所以為人者則貫天地而無終敝故不得以彼暫奪此之常昔明惠宗之為君成祖為臣自下逆上篡取其位當時忠義之士抗死不顧而方正學先生之事尢烈此貫天地不敝之道也天道是非之理間不與禍福相附楚商臣胸奴冒頓皆身享大逆之所取而傳之子孫當其造逆之日亦安知無仗節死難之臣於其間而古記或略而不傳要之忠義之氣自合乎天地士固不必以名傳也而靖難之事於今為近正學先生本儒者之統成殺身之仁雖其心不必後世之我知而後人每讀其傳尢為慷慨悲泣而不能自已成祖天子之富貴隨乎飄風正學一家之忠孝光乎日月此豈非人心之上通乎天地者哉明萬歷時南京士大夫始建正學祠於其墓前至國朝數經修飭今祠宇又以久敝矣江寧巡道歷城方公昻其先金華人正學之族子也來謁祠下因亟修治其漏壞又增建前後之屋各四楹旁屋三楹以便守者之居而壯祠之觀歲月久遠或更有視其敝感正學之誼而來修者公乃請余為記以待之嘉慶二年秋七月桐城姚鼐記常熟歸氏宗祠碑記吳中歸氏皆出於唐翰林學士兵部尚書餘姚宣公之後宣公之孫五世其名可考五世之下更宋及元其世次名爵皆佚焉明太僕丞震川先生作歸氏世譜論之詳矣常熟之族震川世譜所云在常熟者居白􅛄是也始自吳遷白􅛄者曰榮四公榮四七世孫曰椿震川所為作歸府君墓志銘者也其子有雷霆電三人霆於白􅛄建祖祠焉後其子孫自白􅛄遷常熟城內而白􅛄祠久圯壞乃更建祠城北為堂三間中祀宣公旁祀始遷祖榮四公以下凡三十五人堂後為樓凡居白􅛄時所藏石刻遺像皆遷藏於是時康熙六十年也迄嘉慶二年今歸君文學寅亮拱等以堂久黯敝加丹艧而新之又於堂前增建門廡凡八間而祠之規制乃益嚴以靖常熟歸氏自明中葉至國朝二百年中以名德尢稱鄉賢者曰刑部主政裔興公少詹惺崖公贈工部尚書監兹公又有孝子松期公孝子故於宗祠堂側有專祠今圮乃於其地重立之其三鄉賢則買地各建專祠於宗祠堂後逾年工悉竣乃至江寧請記於余余謂歸氏在明代稱以崑山今世則以常熟至大司空監兹公以才德勃興列位正卿真古公侯族矣今歸君為大司空之孫繼承祖德而尢盡心於宗祀其道不已善乎且崇先者一家私情也尚賢者天下公誼也兹之立制蓋兼盡之昔震川每惜古人宗法之壞而不可復而立宗祠者收宗復古之先務吾聞震川無後嗣其墓在常熟宗人為修祭焉夫常熟之宗能厚於其别宗者猶如此而況於其本宗哉由是推之其將弗憾於宗法之敝也歟是足記也嘉慶三年十月桐城姚鼐記峴亭記金陵四方皆有山而其最高而近郭者鍾山也諸官舍悉在鍾山西南隅而率蔽於墻室雖如布政司署瞻園最有盛名而亦不能見鍾山焉巡道署東北隅有廢地昔棄土者聚之成小阜雜樹生焉觀察歷城方公一日試登阜則鍾山翼然當其前乃大喜稍易治其巔作小亭暇則坐其上寒暑陰霽山林雲物其狀萬變皆為兹亭所有鍾山之勝於兹郭若獨為是亭見也公乃取見山字合之名曰峴亭昔晉羊叔子督荆州時於襄陽峴山登眺感思今古史既載其言而後人為立亭日峴山亭以識慕思叔子之意夫後人之思叔子非叔子所能知也今方公在金陵數年勤治有聲為吏民敬愛異日或以兹亭遂比於羊公峴山亭歟此亦非公今日所能知也今所知者力不勞用不費而可以寄燕賞之情據地極小而冠一郭官舍之勝兹足以貽後人矣不可不識其所由作也嘉慶三年四月桐城姚鼐記
