body:
  text: 答翁學士書鼐再拜謹上覃谿先生几下昨相見承敎勉以爲文之法蚤起又得手書勸掖益至非相愛深欲增進所不逮曷爲若此鼐誠感荷不敢忘雖然鼐聞今天下之善射者其法曰平肩臂正脰腰以上直腰以下反句磬折支左詘右其釋矢也身如槁木苟非是不可以射師弟子相授受皆若此而已及至索倫蒙古人之射傾首欹肩僂背發則口目皆動見者莫不笑之然而索倫蒙古之射遠貫深而命中世之射者常不逮也然則射非有定法亦明矣夫道有是非而技有美惡詩文皆技也技之精者必近道故詩文美者命意必善文字者猶人之言語也有氣以充之則觀其文也雖百世而後如立其人而與言於此無氣則積字焉而已意與氣相御而爲辭然後有聲音節奏高下抗墜之度反復進退之態采色之華故聲色之美因乎意與氣而時變者也是安得有定法哉自漢魏晉宋齊梁陳隋唐趙宋元明及今日能爲詩者殆數千人而最工者數十人此數十人其體製固不同所同者意與氣足主乎辭而已人情執其學所從入者爲是而以人之學皆非也及易人而觀之則亦然譬之知擊棹者欲廢車知操轡者欲廢舟不知其不可也鼐誠不工於詩然爲之數十年矣至京師見諸才賢之作不同夫亦各有所善也就其常相見者五六人皆鼐所欲取其善以爲師者雖然使鼐舍其平生而惟一人之法則鼐尙未知所適從也承先生吐胷臆相敎而鼐深蓄所懐而不以陳是欺也竊所不敢故卒布其愚伏惟諒察復張君書辱書諭以入都不可不速嘉誼甚荷以僕騃蹇不明於古不通於時事又非素習熟於今之賢公卿與上共進退天下人材者顧蒙識之於儔人之中舉纖介之微長掩愚謬之大罪引而掖焉欲進諸門牆而登之淸顯雖微君惠告僕固媿而仰德久矣僕聞蘄於已者志也而諧於用者時也士或欲匿山林而羈於紱冕或心趨殿闕而不能自脫於田舍自古有其志而違其事者多矣故鳩鳴春而隼擊於秋鱣鮪時涸而鮒䱉遊言物各有時宐也僕少無巖穴之操長而役於塵埃之內幸遭淸時附羣賢之末三十而登第躋於翰林之署而不克以居浮沈部曹而無才傑之望以久次而始遷値天子啟秘書之館大臣稱其觕解文字而使舍吏事而供書局其爲幸也多矣不幸以疾歸又不以其遠而忘之爲奏而揚之於上其幸抑又甚焉士苟獲是幸雖聾瞶猶將聳耳目而奮雖跛躃猶將振足而起也而況於僕乎僕家先世常有交裾接迹仕於朝者今者常參官中乃無一人僕雖愚能不爲門戶計耶孟子曰孔子有見行可之仕於季桓子是也古之君子仕非苟焉而已將度其志可行於時其道可濟於衆誠可矣雖遑遑以求得之而不爲慕利雖因人驟進而不爲貪榮何則所濟者大也至其次則守官攄論微補於國而道不章又其次則從容進退庶免恥辱之大咎已爾夫自聖以下士品類萬殊而所處古今不同勢然而揆之於心度之於時審之於已之素分必擇其可安於中而後居則古今人情一而已夫朝爲之而暮悔不如其弗爲遠欲之而近憂不如其弗欲易曰飛鳥以凶詩曰卬須我友抗孔子之道於今之世非士所敢居也有所溺而弗能自返則亦士所懼也且人有不能飮酒者見千鐘百榼之量而幾效之則潰胃腐腸而不捄夫仕進者不同量何以異此是故古之士於行止進退之閒有跬步不容不愼者其慮之長而度之數矣夫豈以爲小節哉若夫當可行且進之時而卒不獲行且進者葢有之矣夫亦其命然也僕今日者幸依聖朝之末光有當軸之褒采踴躍鼓忭以冀進乃其本心而顧遭家不幸始反一年仲弟先殞今又喪婦老母七十諸穉在抱欲去而無與託又身嬰疾病以畱之此所以振衣而趦趄北望樞斗而俛而太息者也遠蒙敎督不獲趨承雖君子不之責而私衷不敢安故以書達所志而冀諒察焉復曹雲路書鼐再拜雲路先生足下數十年來士不說學衣冠之徒誦習聖人之文辭衷乃泛然不求其義相聚奊首帖耳哆口僔㳫迺逸迺諺聞耆耉長者考論經義欲掩耳而走者皆是也風俗日頽欣恥益非其所而放僻靡不爲使士服習於經師之說道古昔承家法以繫其心雖不能逮前古人才之美其必有以賢於今日之濫矣鼐少時見鄉前輩儒生相見猶論學問退習未嘗不勤非如今之相師爲媮也所謂飽食終日無所用心者與獨先生單心畢力於傳註辨究同異旣老而不懈說之矻矻然雖未知於古學者何如其賢於今之士不亦遠乎鼐居此一期矣嘗苦無可與語者聞先生之篤學著書苟非居處閒遠之故必將造而請觀焉先生乃辱寓書而示以所爲說不棄愚陋而欲因之求益抑何任其幸且媿也詩曰心乎愛矣胡不謂矣鼐固不能爲益於先生然而心之所蓄不敢不盡者愛敬先生謂不可類先生如今世俗倫也夫聖人之經如日月星之懸在人上苟有蔽焉則已苟無蔽而見而言之其當否必有以信於人見之者衆不可以私意狥也故竊以謂說經當一無所狥程朱之所以可貴者謂其言之精且大而得聖人之意多也非吾狥之也若其言無失而不達古人之意者容有之矣朱子說元亨利貞舍孔子之說者欲以達文王之意而已苟欲達聖賢之意於後世雖或舍程朱可也自漢以來爲經說者已多取視之不給於日苟非吾言足發經意前人所未明者不可輕書於紙而明以來說四書者乃猥爲科舉之學此不足爲書故鼐自少不喜觀世俗講章且禁學徒取閱竊陋之也今先生之說固多善者然欲爲時文用之意存焉鼐輒以硃識所善者先生㪅自酌而去取之必言不苟出乃足爲書以視於後世鼐又聞之言之無文行而不遠出辭氣不能遠鄙則曾子戒之況於說聖經以敎學者遺後世而雜以鄙言乎當唐之世僧徒不通於文乃書其師語以俚俗謂之語錄宋世儒者弟子葢過而效之然以弟子記先師懼失其眞猶有取尒也明世自著書者乃亦效其辭此何取哉願先生凡辭之近俗如語錄者盡易之使成文則善矣直諒多聞益友之道也鼐不足爲多聞直諒雖不能逮而不敢不勉故盡言之如此鼐自撰經義數十首中乃有幸與先生意同者今倂寄一冊幸敎其失賢從子謂杖履秋冬或來郡然則不盡之意可面陳兹略報鄙意承自稱謂過謙不敢當也鼐再拜復汪進士輝祖書六月某日鼐頓首汪君足下鼐性魯知闇不識人情嚮背之變時務進退之宐與物乖忤坐守竆約獨仰慕古人之誼而竊好其文辭夫古人之文豈苐文焉而已明道義維風俗以詔世者君子之志而辭足以盡其志者君子之文也達其辭則道以明昧於文則志以晦鼐之求此數十年矣瞻於目誦於口而書於手較其離合而量劑其輕重多寡朝爲而夕復捐嗜捨欲雖蒙流俗訕笑而不恥者以爲古人之志遠矣苟吾得之若坐階席而接其音貌安得不樂而願日與爲徒也足下去鼐居千五百里非有相知之素投書致辭甚恭惓惓焉欲得其言以紀太夫人高節卓行足下何所聞而爲是哉海內文士爲達官貴人甚衆執筆爲太夫人紀述者亦甚衆足下旣求得之今又以命僕將足下不遺一士而以鼐僃其目乎抑遂以太夫人不朽之名冀之僕耶且古人之文今人讀之或不識以今人之道度古人古人文之傳特其幸耳然則雖有如古人之文其能不朽與不未可知也況鼐之不足比古人邪雖然推足下爲母氏之心姑爲文以僃衆士之列者僕所不辭也足下書來久矣有犬馬之疾今始閒輒作記一首寄請觀之久未報惟諒宥不宣復孔撝約論禘祭文鼐頓首去聖久遠儒者論經之說紛然未衷於一而又汨於同異好惡之私心以自亂其聰明而長爭競之氣非第􅋊闕之爲患而已子曰多聞擇其善者而從之又曰禮失求之於野夫於羣儒異說擇善從之而無所徇於一家求野之義學者之善術也雖於古禮湮失之餘亦終不能盡曉然而當於義必多矣承敎禘說其論甚辨而義主鄭氏則愚以謂不然禘之名見於禮經傳春秋國語爾雅未有云祀天者禮記曰王者禘其祖之所自出以其祖配之而立四廟韋元成釋之云王者受命祭天以其祖配不爲立廟親盡故也所立親廟四而已元成以是解禮記之義已僻矣此班彪所謂不博不篤不如劉歆者也意元成之爲此言固非臆造當時儒者固有以禘爲祭天神之解矣元成又引禮五年而再殷祭言壹禘壹袷也此亦當時儒者之說葢出於公羊經師推是說固以禘爲宗廟之大祭非祭天神也惜元成混引其辭不能分別擇其一是耳東漢而後儒者說經之義或繼或絕或闇不章而鄭氏獨著鄭氏所受師說同於元成夫以祖之所自出爲天且人孰不出於天何以別爲一王所自出別爲一王所自出則必如康成所用緯說感生靈威仰之類而後足以達其義故究韋元成之解必至於用讖緯而後已然則禘說之失萌於西漢之士而極於康成之徒西漢之士說非皆誤也雖有是者傳述之不明而廢於無助也夫逸禮尙有禘於太廟禮安得如鄭說以祭昊天於圜丘而謂之禘果周以禘祀天而以嚳配孔子告曾子宐與郊以稷配明堂以文王配竝舉之矣而反漏不言乎禮記喪服小記大傳兩篇皆以說儀禮喪服者耳因喪服有宗子適庶之禮異故推其極至天子承祧至禘而後止何謂泛言及祀天乎兩篇皆言禮不王不禘鄭君釋以祀天不達經之本旨者也且夫郊以祭天其禮誠重矣然自人鬼言之則禘之祭祖所自出而以祖配其禮專爲祖設者也重在人鬼者也郊祭天而配以祖所重非在人鬼者也故展禽之言禘先於郊春秋外傳屢言禘郊者以此不可因是遂謂禘乃祭天神與郊同義也當康成注周禮知是說之不可通矣亦謂宗廟之祀有禘祫祠禴烝嘗六者然不能舉禘祫之別惟鄭司䢉注司尊彞有云朝享追享謂禘祫也夫王者先祖之於太祖皆子孫也子孫得朝於祖而合食故祫謂之朝享王者之追遠未有遠於祖所自出者矣故追享禘也以是求之司䢉之說當矣而後鄭不達顧捨而不從及王子邕難鄭君作聖證論斷以禘爲宗廟五年之大祭以虞夏出黄帝商周出帝嚳四代禘此二帝是爲禘其祖之所自出然後禘義大明故究禘之論仲師啟其萌子邕暢其義後儒所不能易己然鼐意子邕之說亦有未盡葢王者太祖以下皆其祖也禘祭祖所自出則其祖皆得配之祫有不禘而禘無不祫是以皆曰殷祭也其祖皆殷祭而立廟者四是謂以其祖配之而立四廟言隆殺之分有如此故雖有太祖之廟而非其辭意所及也非如元成謂遠祖無廟亦非如子邕言專以太祖一人配也然子邕之言大旨善矣後有執鄭君以難子邕者皆好爲說而無從善徙義之公心者耳當明時經生惟聞宋儒之說舉漢唐箋注屏棄不觀其病誠隘近時乃好言漢學以是爲有異於俗夫守一家之偏蔽而不通亦漢之俗學也其賢也幾何若夫宋儒所用禘說未嘗非漢人義也但其義未著耳夫讀經者趣於經義明而已而不必爲已名期異於人以爲已名者皆陋儒也撝約以爲然乎鼐於義苟有所疑不敢不盡非有爭心也苟不當願㪅敎之得是而後已鼐頓首復魯絜非書桐城姚鼐頓首絜非先生足下相知恨少晚遇先生接其人知爲君子矣讀其文非君子不能也往與程魚門周書昌嘗論古今才士惟爲古文者最少苟爲之必傑士也況爲之專且善如先生乎辱書引義謙而見推過當非所敢任鼐自幼迄衰獲侍賢人長者爲師友剽取見聞加臆度爲說非眞知文能爲文也奚辱命之哉葢虚懷樂取者君子之心而誦所得以正於君子亦鄙陋之志也鼐聞天地之道陰陽剛柔而已文者天地之精英而陰陽剛柔之發也惟聖人之言統二氣之㑹而弗偏然而易詩書論語所載亦閒有可以剛柔分矣値其時其人告語之體各有宐也自諸子而降其爲文無弗有偏者其得於陽與剛之美者則其文如霆如電如長風之出谷如崇山峻崖如決大川如奔騏驥其光也如杲日如火如金鏐鐵其於人也如馮高視遠如君而朝萬衆如鼓萬勇士而戰之其得於陰與柔之美者則其文如升初日如淸風如雲如霞如煙如幽林曲㵎如淪如漾如珠玉之輝如鴻鵠之鳴而入廖廓其於人也漻乎其如歎邈乎其如有思㬉乎其如喜愀乎其如悲觀其文諷其音則爲文者之性情形狀舉以殊焉且夫陰陽剛柔其本二端造物者糅而氣有多寡進絀則品次億萬以至於不可竆萬物生焉故曰一陰一陽之爲道夫文之多變亦若是已糅而偏勝可也偏勝之極一有一絕無與夫剛不足爲剛柔不足爲柔者皆不可以言文今夫野人孺子聞樂以爲聲歌絃管之㑹爾苟善樂者聞之則五音十二律必有一當接於耳而分矣夫論文者豈異於是乎宋朝歐陽曾公之文其才皆偏於柔之美者也歐公能取異已者之長而時濟之曾公能避所短而不犯觀先生之文殆近於二公焉抑人之學文其功力所能至者陳理義必明當布置取舍繁簡廉肉不失法吐辭雅馴不蕪而已古今至此者葢不數數得然尙非文之至文之至者通乎神明人力不及施也先生以爲然乎惠寄之文刻本固當見與抄本謹封還然抄本不能勝刻者諸體中書疏贈序爲上記事之文次之論辨又次之鼐亦竊識數語於其閒未必當也梅崖集果有逾人處恨不識其人郞君令甥皆美才未易量聽所好恣爲之勿拘其途可也於所寄文輒妄評說勿罪勿罪秋暑惟體中安否千萬自愛七月朔日復蔣松如書久處閭里不獲與海內賢士相見耳目爲之瞶霿冬閒舍姪浣江寄至先生大作數篇展而讀之若麒麟鳳皇之驟接於目欣忭不能自已聊識其意於行閒顧猶恐頌歎盛美之有弗盡而其頗有所引繩者將懼得罪於高明而被庸妄專輒之罪也乃旋獲惠賜手書引義甚謙而反以愚見所論爲喜於是鼐益俯而自慚而又以知君子之衷虛懐善誘樂取人善之至於斯也鼐與先生雖未及相見而蒙知愛之誼如此得不附於左右而自謂艸木臭味之不遠者乎心乎愛矣何不謂矣尙有所欲陳說於前者願卒盡其愚焉自秦漢以來諸儒說經者多矣其合與離固非一途逮宋程朱出實於古人精深之旨所得爲多而其審求文辭往復之情亦㪅爲曲當非如古儒者之拙滯而不協於情也而其生平修已立德又實足以踐行其所言而爲後世之所嚮慕故元明以來皆以其學取士利祿之途一開爲其學者以爲進趨富貴而已其言有失猶奉而不敢稍違之其得亦不知其所以爲得也斯固數百年以來學者之陋習也然今世學者乃思一切矯之以專宗漢學爲至以攻駁程朱爲能倡於一二專已好名之人而相率而效者因大爲學術之害夫漢人之爲言非無有善於宋而當從者也然苟大小之不分精麤之弗別是則今之爲學者之陋且有勝於往者爲時文之士守一先生之說而失於隘者矣博聞強識以助宋君子之所遺則可也以將跨越宋君子則不可也鼐往昔在都中與戴東原輩往復嘗論此事作送錢獻之序發明此旨非不自度其力小而孤而義不可以默焉耳先生胷中似猶有漢學之意存焉而未能豁然決去之者故復爲極論之木鐸之義蘇氏說集注固取之矣然不以爲正解者以其對何患於喪意少遠也至盆成見殺之集注義甚精當先生曷爲駁之哉朱子說誠亦有誤者而此條恐未悮也望㪅思之鼐於蓉菴先生爲後輩相去甚遠於潁州乃同年耳先生謂潁州曰兄固於鼐同一輩行而過於謙非所宐也客中惟保重時賜敎言爲冀愚陋率逵臆見幸終宥之復談孝廉書某頓首星符先生足下前辱以辛􅎝先生說秦三十六郡事與僕二郡說異示以相較甚喜比未及詳答今㪅考尋知少詹言亦未審也按秦始皇紀分天下爲三十六郡在其二十六年迄三十三年略取陸梁地爲桂林象郡南海是已爲三十九郡至秦亾時或㪅有分合不知凡若干郡也子駿孟堅葢已不能詳知姑舉其初曰本秦京師爲內史分天下作三十六郡下遂及漢興云云其說實有未僃不可拘守也僕考秦楚閒郡名得四十餘漢地志郡國其有注云秦置者凡三十六少詹所舉謂始皇所分三十六郡卽是也而桂林三郡在其中其外史記紀秦昭襄王置黔中郡矣陳涉世家云比至陳陳守令皆不在則知有陳郡矣丁疾等圍東海守慶于郯則知有東海郡矣項羽紀趙將司馬卭定河內故立爲殷王王河內葢秦有河內郡也田安下濟北數城畱侯世家孺子見我濟北是濟北亦秦郡故曹參定濟北郡也至於鄣東陽膠東膠西博陽城陽衡山諸郡皆名見楚漢之交者此或秦置耶或楚漢置耶舉未可知將以推始皇二十六年分三十六郡之數惟南海桂林象郡必不當數之少詹誤耳其餘四十餘郡不能定其決爲後置者何郡也裵駰所舉三十六郡與少詹互有短長僕作二郡沿革攷時姑因六朝人說以鄣爲秦郡究之秦初郡必不可指數謂有鄣者未必非亦未必是也多聞闕疑庶得之耳尊著斗建考甚精當然猶覺文太繁減其大半乃善餘當相見論之不具與許孝廉慶宗書正月行過敝邑幸得見溫然君子之容心竊異其非恆士矣車馬發後取所著世室攷讀之何其博洽辨達也三月鼐來江寧攜入行笥重繹執卷敬歎累日士牽於俗學略能畱意古箋註者了不易得況精思若此者乎年二十許所進已踰世耆㝛進而不止至耆㝛之年絕出尙可量哉何時當復見當復㪅有示敎者不至於審辨所說當不必學有精博踰足下或與足下比者乃可決之僕淺學葢不任此㒒觕識文句之末而已曾子問篇當七廟五廟無虛主足下欲伸已說以當七廟爲句此非愚見所安大抵古今之隔遠矣議禮者非特漢以後不可合雖周人之言亦或舛㸦必欲衷於一是故難也又內載朱子說不應書名二者幸㪅酌之原本附還千萬自愛不具答袁簡齋書前日承詢婦人無主之說當時略以臆對歸後復讀賜書檢尋傳記以攷其實葢以士大夫禮言之非特婦人無主雖男子於廟固亦無主也以天子諸侯言之則自漢以後婦人於廟中有主而周以前則或有或無未敢決焉古人所重者尸祭其依神者尸爲要主非所必不可無也鄭康成注祭法謂士大夫之廟無主惟天子諸侯廟乃立主其說頗爲今學者所駭而攷之於古則實然孔子告曾子曰當七廟五廟無虛主然則三廟二廟一廟者固可虚無主矣古聘禮賓介所居館皆士大天之廟也使有主之廟而使人居之將豫移主出乎抑聽其人神之相瀆乎賓主皆何以安焉斯廟不設主之可徵者也惟左氏載孔悝有取祏之事此特末世之僭耳非禮之正也以禮之正言之天子有日祭月祀諸侯亦月有吿朔故設官以日嚴奉其主爲宐卿大夫之祭於時疏矣又位下不能專立官以日典守故廟中亦無常奉之主且古人依神所重亦不必以主也故男子婦人皆無主於廟士大夫禮也若天子諸侯廟中固必有主矣然主不書諡雖漢猶然婦人配祭不專立尸設同凡以依神則謂后夫人與君同一主亦無不可者至漢儀載天子主一尺二寸后主七寸在皇帝主右則婦人有主之事至漢而甚明矣不知自周秦以來所傳禮固然漢乃因之耶抑苐漢時人自爲之禮耶此不可以臆決者也若今世士大夫不以尸祭廟中惟主爲重主則書先人之爵與字不可以云與妣共之其必當立妣主明矣荀子食魚泔之之義鼐意謂食魚易傷人者鱠也泔之恐是漸之醯醬之類以爲鱠耳奥讀如燠奥之則以火熟之矣曾子殆傷昔奉父母時不聞此語常以泔供饌故泣也然別無攷證不敢信以爲是也不逆薪而㸑者言持薪必順其本末此小事尙不肎逆況爲㬥乎此解易了但不知所出耳來書云見南齊劉璡傳撿璡傳無此語乃見宋書建平王宏傳係璡上書申建平王景素之詞其餘數條鼐皆不能解古事固難通而傳書亦或有誤字也謹就所見者上陳待敎少涼走候不具再復簡齋書士喪禮有重無主若虞主用桒練主用栗乃是文二年作僖公主公羊傳文非言士禮也何休引士虞記云喪主不文吉主皆刻而謚之葢爲禘祫時別昭穆也此是禮之逸篇題云士虞記而中廣言天子諸侯之禮若士則安得有禘祫也鼐前書所云不書諡葢誤以漢禮爲古禮據是篇則古主有諡也左傳凡君薨卒哭而祔祔而作主杜元凱云言凡君者謂諸侯以上不通於卿大夫觀何杜之注皆與康成同意則知康成言之不可易矣穀梁疏載麋信引衞次仲云宗廟主皆用栗右主八寸左主八寸此亦言婦人於廟中有主然不知次仲所言古禮耶抑苐漢事耶是猶不能明也謹再復再復簡齋書兩札下問愚淺不能具答略以所明者上陳古人以元爲服采之盛禮所云冕服皆元也衣正色裳閒色謂之貳采惟軍禮乃上衣下裳同色故曰袀服㝛衞之士當用軍禮衣裳同色故趙世家有黑衣之列其衣兼衣裳而名之也周制軍禮韎韋之服韎之爲色在赤黑之閒不知趙左師所云黑衣者卽是周之韎耶或元衣元裳耶要之黑非賤服也古帝王革命雖有易服色之事而要其大體皆上元而下纁黃雖魏晉而降制猶存焉隋人以宇文周尙黑舉矯而變之遂亦及於章服自隋唐以後以紫緋爲品官上服朝㑹皆衣之無復尙元之禮矣夫聖人制禮其始必因乎俗故曰禮俗祭之有尸始葢亦出於上古之俗而聖人因以爲禮此亦仁孝之極思使聖人生乎今世天下但有厭祭而無尸矣固必不㪅行設尸以祭之禮然不可因此遂譏古人之爲謬也尸葢廢於秦世秦戎俗也然則設尸非夷禮廢尸乃夷禮耳凡祀天神無尸而配者人鬼有尸淮南子言郊祭有尸可也然太公爲尸之說則不可信郊祀稷尸固宐以子孫爲之何爲以姜姓乎國語董伯爲尸晉之董姓出乎辛有之子意辛有乃夏子孫故董伯爲鯀尸耶然而不可攷矣若夫感生之說則緯書之妄固不足述猫虎之尸亦說之者過耳於理不應有也儒者生程朱之後得程朱而明孔孟之旨程朱猶吾父師也然程朱言或有失吾豈必曲從之哉程朱亦豈不欲後人爲論而正之哉正之可也正之而詆毀之訕笑之是詆訕父師也且其人生平不能爲程朱之行而其意乃欲與程朱爭名安得不爲天之所惡故毛大可李剛主程綿莊戴東原率皆身滅嗣絕此殆未可以爲偶然也愚見如是惟幸敎之尙熱未敢走謁謹復復休寧程南書虙羲氏受河圖而畫八卦禹得洛書而陳九疇是其說本出劉歆世儒或疑歆言不足憑吾謂莊子有九洛之事其言出歆前矣歆說必有受未可非也宋儒所得河圖洛書傳自道家夫禮失求之野亦不得謂道家所傳必非古聖之遺故如歸熙甫輩肆訾宋儒之非者吾未敢以爲然也然吾謂有聖人之智然後能見圖書而得卦疇之理苟非聖人而推測言之固未必當矣就邵朱之書而決其必合於古聖人歟否歟斯非聖人不能定矣非吾末學所敢論也且聖人之得於天者有道焉有機焉道則列聖同其傳機則聖各異其所取虙羲與禹所見者道也而所由悟者機也夫易者言道之書也而聖人作易詞取象則亦各因其時之機焉文王所由取周公或未及知周公所由取孔子或未及知解易而強言其象之所由皆不知道可明而機不可明之故朱子本義置象不言此朱子識之最卓非漢以來諸儒所可及者然則邵朱所傳之圖書卽誠與虙羲禹所見者纖毫無失焉吾亦存之不言可也彼聖人與天契者有機焉作易以敎天下之理天下所必當知也作易始發之機天下所不必知亦不可知也食肉不食馬肝未爲不知味吾尊奉朱子而不言圖書意葢如此今足下所著易尤以言圖書爲事此僕平生所不能解者雖承下問而無以對焉答魯賓之書某頓首賓之世兄足下遠承賜書及雜文數首義卓而詞美今世文士何易得見若此者某之譾陋無以上益高明求馬唐肆而責施於懸磬之石豈不媿甚哉顧荷垂問宐略報以所聞易曰吉人之詞寡夫內充而後發者其言理得而情當理得而情當千萬言不可厭猶之其寡矣氣充而靜者其聲閎而不蕩志章以檢者其色耀而不浮䆳以通者義理也雜以辨者典章名物凡天地之所有也閔閔乎聚之於錙銖夷懌以善虛志若嬰兒之柔若雞伏卵其專以一內候其節而時發焉夫天地之閒莫非文也故文之至者通於造化之自然然而驟以幾乎合之則愈離今足下爲學之要在於涵養而已聲華榮利之事曾不得以奸乎其中而寛以期乎歲月之久其必有以異乎今而達乎古也以海內之大而學古文最少獨足下里中獨盛異日必有造其極者然後以某言證所得或非妄也足下勉之不具六月十七日某頓首復秦小峴書小峴先生觀察閣下鼐惷愚無所識又以年老多疾遂至廢學爲海內賢士大夫所棄宐矣與閣下非有生平過從之舊遠承賜書殷勤垂問見推過甚恧然媿赧固不敢議閣下之言爲無端又安敢以所相望之深謂必可以任也鼐嘗謂天下學問之事有義理文章考證三者之分異趨而同爲不可廢一塗之中岐分而爲衆家遂至於百十家同一家矣而人之才性偏勝所取之逕域又有能有不能焉凡執其所能爲而呲其所不爲者皆陋也必兼收之乃足爲善若如鼐之才雖一家之長猶未有足稱亦何以言其兼者天下之大要必有豪傑興焉盡收具美能祛末士一偏之蔽爲羣材大成之宗者鼐夙以是望世之君子今亦以是上陳之於閣下而已往時江西一門徒取鼐文刻板鼐意乃不欲其傳播屬勿㪅印故今絕無此本子惟四書義乃鼐自鐫其板在此今輒以兩部奉寄經義實古人之一體刻震川集者元應載其經義彼旣錄其壽序矣經義之體不尊於壽序乎胡雒君在㑹稽當佳孝廉之舉不得亦不足恨耳此閒常與鄒先生相見因以略知近祉相望殊切企慕略報不宣復東浦方伯書四月二十三日姚鼐頓首奉書東浦先生閣下得前月二十七日賜書伏悉近祉慶慰慶慰所諭論文之旨反覆數百言詞氣雄逴而又深盡文章之奥秘雖於鼐有見許太過之謬而於立論鑒古之精兩不相妨也世之爲學者多矣其所得高出千萬人之上者亦有之矣若先生之識不與今之出千萬人之上者竝而當於千百年中數古人期也鼐以生平用心所隱冀相知於不可知之異世者而竟得於同時乎以四海之廣悄然相望於曠邈泬寥之中有不使㪅感歎而增欷者乎先生文亦自非今世所有特爲之不多耳然亦何必以多貴乎韓理堂魯絜非文略如來諭絜非後日之文乃㪅不逮舊刻之文昌黎云無慕於速成無誘於勢利凡爲文始善而終衰者大率病此耳可太息也陳石士前月末自此往蘇州云將謁閣下必已過其人可謂有志意矣其必成與否尙未敢決知耳示詩三十餘大抵蒼勁入古已併入大集內矣鼐詩集近亦刻成謹以一部呈敎此閒可與言者僅毛俟園一人其言詩文貴當者立碎果爲名論先生所作時有此境而尙不能盡然況如鼐耶賤狀略如曩昔率復併候不具惜抱軒詩集六今體七十九首夜抵樅陽輕帆挂與白雲來棹擊中流天倒開五月江聲千里客夜深同到射蛟臺山行布穀飛飛勸早耕春鋤撲撲趁初晴千層石樹通行路一帶山田放水聲貴池道中曉過池州郭人家傍曲谿白花臨岸發靑艸度江齊秋浦􅋊林雨春山徧竹雞東樓懷李白風日至今迷黟縣道中蒼翠壓人低流雲落大谿連巖􅝪艸日懸隥帶陰霓雨歇羣山響春深萬木齊寥寥方久立谷鳥一爲嗁出池州桃花霧繞碧谿頭春水才通楊葉洲四面靑山花萬點緩風搖㯭出池州江上竹枝辭滔滔無際是秋瀾估客牽江泊夜灘江岸唱歌江上聽不知風雨爲誰寒蕪湖山露小於船池口銅陵山接連那得靑山江岸盡止應西上到靑天年年八月旺潮期送潮送到小姑祠惟有滿天風共雨小姑祠上送郎時東風送客上江船西風催客下江船天公若肎如儂願便作西風吹一年古意靑桺高樓白馬駒五陵春醉酒家胡君家新市長安少臣里佳人楚國無在下願爲莞蒻席與郞儂作博山鑪東風門外蘼蕪晩㪅折瑤華向路隅效西崑體四首咸陽蘄年宮外八川流輦道環通徧雍州萬里黿鼉橫碧海六王鐘鼓在朱樓地中闕表終南胏天上城開太華旒獨令上林辭賦客曲江蕭瑟不勝愁渚宮樓觀雲陽入窈冥兩東門對楚山靑錦帆暮雨迴江渚鳴籟雄風起洞庭北望六雙飛鸗鴈西來五尺困蜻蜓渚宮衰艸秋風裏愁絕當年帝女靈洛陽洛陽形勝匹西秦累葉章陵氣尙新甲第雙崤如黽谷芳林九派似江濱生前父有張常侍死後兒還史道人借問西園冠蓋盡溼螢飛暗小平津越臺臣佗事漢抱孫年滄海無波阜井廛嶺嶠春臺餘繐帳牂柯秋水下樓船空詢萬里番禺醬不及千金好畤田一自建章荆棘後越巫方㪅與誰傳寄和劉海峯三丈游伊闕之作聞去梁園超廣武西登闕塞眺黄河伊陽風雨從中出洛下山川向北多白髮上賓聊自許靑春歸興復如何且從浩蕩詩懷劇莫念沈淪壯歲過寺寓贈左一靑南北風煙萬里深對君王舍有香林春來夜夜江南夢不及高齋聽雨心送一青歸因寄仲郛與君兄弟夙相依洛下今年遇陸機天末四愁思莫致秋來九辨送將歸行竆南汶山初見吟到澄江葉盡飛若把迷方語鄉里㪅憐心事卜居違出塞連營鼓角夜星環擐甲弓刀曉露閒列障三邊開幕府勒兵萬騎出蕭關黃河日落人旋渡靑海春深鴈未還聞道南庭先效順輕車齊會涿邪山八月十五日與朱子穎孝純王禹卿文治集黑窰厰寒吹動關河登臺白日俄孤雲高渤碣秋色渡滹沲海內詞人在尊前往事多夜來明月上鳥鵲意如何送人往鄴九月燕郊艸尙青送君且爲住郵亭明朝月落漳河曉無限飛鴻不可聽贈戴東原新聞高論詘田巴槐市秋來步落花羣士盛衰占碩果六經明晦望萌芽漢儒止數揚雄氏魯使猶迷顔闔家未必蒲輪徵晩至卽今名已動京華寄仲郛天外思將新歲酒雪中同醉故人家折梅憶客楚江遠凍竹閉門山郭斜春晝鋤犁無素業少年詞賦共青霞長安溝桺看垂發直恐相望到鬢華天門山萬里江流􅍘雙崖地脈通冥冥浮積氣漠漠送長風滄海孤帆外神州落照中人生如鳥迹獨上俯鴻蒙望濳山道邊隻􅕤復雙􅕤天半大山宮小山客子出林暮喚渡居人微雨寒閉關橫空積樹雲漠漠交流􅍘逕谿潺潺不知蒼谷最深處喬松白鶴誰往還由㝛松向黄梅秋山紅葉重煙樹暮巖鐘水澹松玆郭月生天柱峯人閒二南嶽江上六禪宗悵望停車者征途何所從㝛德化縣南行三百里舉首白雲端大壑連陰靄中天峙碧巒夜潮千嶂閉明月九江寒㪅就東林㝛蕭條鐘磬闌題負薪圖落葉被逕行客稀晚風吹樹斜陽微空山短日惜餘景野老長鑱甘息機瀑流側足巨巖響峯高倚杖秋雲飛邨林舂黍戶將閉寒谷束荆人未歸南昌竹枝辭南昌南去盡山谿白石淸沙不見泥一到鄱陽風浪黑行人那㪅岀江西城邊江內岀新洲南北彎彎客纜舟莫上滕王閣前望靑天無地􅍘江流石鐘山挂帆初月岀風起大孤塘遙夜來湖口江天寒淼茫石潭流激激巖樹鬱蒼蒼千載元豐士風流何可忘出湖口扁舟昨夜泊湖涯霜重蘆枯㝛鴈知朝日忽生彭澤縣挂帆無數小姑祠送客之南昌野曠深春艸江空起夏雲樅陽㪅西上日日見匡君寄友千仞靑巖萬壑雲辤家籐杖謁匡君玉簫吹處非人世江上秋風偶一聞郡樓寓目檻前洲渚後山拗劇郡樓臺艸樹交白霧乍開人入市丹林猶綴鶴歸巢授衣霜露齊民節倚劒江天大國郊竟作陳登牀下客長鑱思訪地肥墝由郡城適樅陽漫詠淼淼江流㲹楫維蕭蕭岸戍見旌旗斜陽萬里背人去落葉千聲與客悲寂寞子雲期後世蒼茫詹尹謝先知靑山滿目身無累惟有憑磯坐罟師關山月遼海初生月長城幾度秋夜吹羌管笛風滿戍亭樓紫塞斜銀漢靑天澹玉鉤如何渭橋渡止道似牽牛秦宮辭挾瑟佳人載輦行渭南秋月綺羅情秦皇愛聽邯鄲曲不及叢臺夜宴聲露下梧桐墜井欄滿宮明月見君難傳聞博浪霓旌過磁石宮門閉夜寒漢宮辭四首君王武帳御船樓一片旌旗拂女牛日晩移舟鳴趙瑟昆明池上月如鉤井幹樓上見飛塵宛馬新來集渭濱欲詔海西先涕泣帷中誰報李夫人關外花迎帳殿開箜篌隨上射蛟臺桺邊細馬雕鞍過新自河閒望氣來金罍春殿酌瓊漿夜賜黄門樂府倡三十六宮歌舞地一時風靜玉階涼黃河曲負羽千營臂角端平明卷幕北風寒青天西挂黃河水立馬長榆塞外看黄河繚繞漠南山秋盡蒲昌鴈盡還萬里白雲飛不去朝朝長結玉門關山行石徑幽巖竟日曛杖藤行逐遠樵聞縱無世外冥鴻翼猶􅋢林閒野鹿羣春渚夭桃無雜樹暮天􅋊雨有行雲故人谿口如相問何物空山可贈君一靑仲孚往金陵屬訪耕南三丈消息域中前輩盡穨顔混迹劉伶尙閉關孤艇著書江水上百年閱世酒尊閒天邊落木流楊子秋盡寒雲出蔣山若憶團亭舊漁釣挂帆明月共君還榆中直北天低見磧山黄河南下曲如環白榆夜雜雕戈戍靑艸春稀牧馬還寒吹滿空雲出塞暮天無色日平關千秋猶對秦時月多少功名大漠閒初雪憶去年是時經濳山下窗外聞風竹緣階雪遂深我思山谷寺天遠大江陰石氣靑霞嶂秋聲黃葉林㪅穿巖徑去應阻故人尋送左冠倫丈往平羅萬里靈州外孤懷焉可論關山疑路盡士馬尙秋屯河水流中國寒陽下塞門重開漢四郡豪傑幾家存南朝宮雉南朝接玉繩幾年金掌露華承衣冠志節悲終始艸莽英雄有廢興海壯五州開北府江通三峽督西陵銷沈轉眼愁隨主欲作長城㪅不能登報恩寺塔山迴煙繞出浮圖逈踏青霄萬里孤􅍘鴈秋雲飄莽蒼高甍飛閣散榛蕪江風颯颯吹天日海氣昏昏􅒓楚吳多少人閒興廢理蔣山松柏正糢糊登永濟寺閣寺是中山王舊園中山王亦起臨濠萬馬中原返節旄坊第大功酬上將江天小閣坐人豪綺羅昔有巖花見鐘磬今流石殿高憑檻碧雲飛鳥外夕陽天壓廣陵濤金陵曉發湖海茫茫曉未分風煙漠漠棹還聞連宵雪壓橫江水半壁山騰建業雲春氣臥龍將跋浪寒天􅍘鴈不成羣乗潮鼓楫離淮口擊劒悲歌下海濆丹徒寓樓上作鬱鬱山川面倚樓側身江左舊徐州寒潮不隔中原望白日遙縣大海流北府千年京口鎭西風一夜秣陵舟古今只此滄波色煙霧何時竟掉頭望岱峻極通天地陰陽辨魯齊連峯渤海外流畎穆陵西樹據金輿路雲深玉檢泥山川供効佞千載一淒迷泊臨淸漳口泊舟寒渚對裵􅏆岸木蒼蒼水鏡開滄海霧搖孤月上靑天影合二流來平生苦憶淸江櫂深夜休嫌濁酒桮明發風帆好停處拂衣先上魯連臺由張秋至汶上口號四首汶川千里路漫漫三峽船如上閘難篷底春風九十日穀城山隔缺隄看細艸春陰碧四圍空隄花落燕初飛澹雲何處飄􅋊雨迎取魚山神女歸風定遙山水面靑垂楊不見釣舟停晩來忽唱橈歌去疑載高人小洞庭帆前莽蒼暗平蕪風雨神靈定有無一片雲遮分水廟四垂天入蜀山湖太白樓李白任城住於今九百秋靑天東海月長爲挂南樓三月楊花雪餘春客濟州慿闌空汶水相憶下滄洲濟寧城東酒樓憶亾友馬牧儕汶河垂桺萬枝輕把酒高樓對馬卿十四年來兩行淚春風重過濟州城河上雜詩四首碭沛蟠紆接下相風雲咫尺㑹舟航中原日落關城白西楚河來天地黃山閉彭門千里暮林開祠廟一陂荒背關懷此君休笑自古男兒悲故鄉海上晴天雷雨豗驚濤奔入亂山開靑冥楚越孤帆去浩蕩淮沂四面來春艸不知韓信里秋風曾到項王臺誰明鼓檝中悲慨仰視雲霄數鴈迴使者治隄久未還東南波浪海雲閒只愁天上桃花水􅒓失淮南桂樹山任土司䢉操戶版薄征都尉且河關勤憂中澤須良吏又待霓旌問里闤南登楚岸出楓林回首天邊萬里心日月空濛探海窟魚龍縹緲踏春陰故人京洛思朝夕鷗鳥滄波自古今河上近連江上路蒼蒼千嶂碧煙深淮上有懷吳鉤結客佩秋霜臨別燕郊各盡觴艸色獨隨孤棹遠淮陰春盡水茫茫淮陰釣臺人傑乗時會功成運已非可憐高鳥盡回憶釣魚磯淮上春風起高臺桺絮飛王孫殊未反惆悵落斜暉畱別揚州諸君年少諸郎各俊才要余夜盡廣陵桮明月相隨天際去思君還傍月邊來由儀眞至滁州口號三首醉點紅鐙碧樹明夜看亭閣廣陵城醒來忽向蒼山路獨聽寒松曲㵎聲初日牆隅出未高孤花叢樾閒相遭陂塘行度重陰底惟有蛙聲和桔橰陰陰巖偃蒼龍腹片片雲飛白鶴翎江浦縣南來暮雨滁州山露半邊靑寄潞川江雲萬重合中有故人行西風吹落照一半向蕪城君家種新竹牆陰雨中長若爲北窗來蕭蕭數聲響南陵送渭川楚澤横千里登高望不分山城正風雪江路忽逢君歲晏梅初􅠂長宵酒易醺只愁明發去空水與寒雲過江浦縣江出天門雲水長客心孤迥路蒼茫寒山自繞涂中碧不與斜暉過歴陽徐州霽雪城頭戲馬場憑城三面瞰蒼涼河流畫地分中夏雲氣隨風出大荒竟入山林惟孔令遠求風雅獨元王閒關此日方爲客􅋊照天涯數鴈行邳州遼濶山川縱遠游又欹風帽過邳州千秋遺蹟尋黃石一片寒陽下白樓難得眞龍逢漢帝易將竆虎縛溫侯英雄潦倒尋常事惜與曹暪作畫籌過汶上弔王彦章楊劉兵度大梁危飮泣猶當奮一麾亂世鳥飛難擇木男兒豹死自畱皮天連白艸橫􅋊壘日落陰風擁大旗莫問夾河爭戰地渾流徙去黍離離
