front:
  text: 惜抱軒文集十六
  hash: sha256:0677c2c72f0865c8bf739835af8a559448cd781f3b9e51b8d422c8622583676d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_016-1a}
body:
  text: 祭文祭林編修澍蕃文鳴呼寥曠朗而曀陰兮風四起而蕭瑟草未霜而先萎兮華始春而零落時不可以中淹兮地不可以久宅路遠荒忽兮天茫茫去海隅兮超河漳窈憭栗兮恍遠望上有母兮下有兄食不甘兮寢不寧隱思子兮涕零年弱而非壯兮貌晳而不頳邈不得徠歸兮倏忽以終生鬱紛綸之多才兮為近臣而婉孌出奉使而不欺兮入在廷而𣢾𣢾世競諂以容進兮蹇何君之徙倚挾寶珵之照乘兮投淤泥而愧恥耿獨立其不懼兮孰余怒兮孰喜水何坎而不逝兮民何生而不死失與得之須臾兮吾至今而知君之不悔臭若蕙兮玉有輝朝吾室兮暮豫帷君愛豫兮不忍歸靑春􅏯出薊兮憯與子違殷結友兮知者稀建旐兮翻翻風回回兮舷進難出淮汭兮循𨝍望出涕兮江之干雖為善兮何恃既寡妻兮無子骨將朽兮道不毁千齡兮萬祀遊無生兮反無始尚饗祭張少詹曾敞文鳴呼昔君始降宵中營室鼐生逮君後五十日君長而才鵬揚驥騖鼐也無能伏尋章句十年二之偕聞鹿鳴風雪載途共以車征龜圻其膚褰闢帷軨笑我擁袖懦婦稚嬰省試罷歸獨君登第送我西墉援衣出涕君為禁臣彪胸爛手裁觚朝脫暮誦士口鼐走南北五躓一升來則授榻行為檢縢荒園廢寺挈擕交朋畸客窮士受禮不能狂歌踞罵酒悲沾膺人或駭厭君恬不憎鼐不能飮君每代舉同車出入相從坐處奬善救過或喜或頩嗚呼君往而孰余成士氣之卑言甘貌順君企古人欲以義振兩試翰林辭成拔俊遂至詹事益持孤峻衆所顧畏索刺瘢疵詔衡貢士有當無私勇於知恥怯於賄資交讒去官大快羣欺自是與君別居南朔在歲壬辰來儳去邈念君魁梧面丹有渥終接簷甍䢅宵商榷鼐始告歸君在大梁靳世大用為師一方正月十二作書示我暮已告疾䢅琴徹左凶問遠承將信終叵手執君書情密辭夥天道祐善芴不可論既煢獨余又奪所親強盛先隕弱寧久存鼐在揚州君柩歸里不牽其紼不撫其子寫辭可窮有悲曷已尚饗祭侍潞川文昔歲庚午鼐始鄉舉張徐汪君及君余伍初入京師寓居佛寺君暨三君謂余同志余病而興不勝跪拜數子時來色腴神快張徐先仕汪以繼登或中或外官為世稱操衡貴人妍媸以臆五貢有司子偕余斥君第之歲我猶窮羇忘君之喜為我嗟咨又後四年余第南還幽幽子室館我其間重五泛舟萬夫呼譟風起水溢升龍以棹淮南冠蓋君飮之酒謔論諧辭擊掌濡首網魚於江烹鱗璀璀有唱四酬怒出如蕾始隕汪君追求莫及四子人間數於分合張君禁臣屢以才達直立嶷嶷羣手交摋君丞太學鼐屬尚書相憐失侶把手欷歔挍文四庫與子偕命晝几宵鐙目窮心競鼐以疾還君留闕下换秩翰林責殷身寡張君既替兹春疾喪遺書報君俾君悽愴開緘讀復凶問隨來天乎人乎奄受之災昔共相知渥顏始冠未三十年凋零過半有才絶人引鑱自寇擢性滑神終於不救君既亡子長女喪夫有稚擕抱隱痛何如君之期余勉余為義靡以益君俯仰懷愧尚饗祭劉海峯先生文嗚呼自聖有述道存乎文孔徒之傑與顏同倫周室世衰末流岐分或鳴為技或以道陳迄千餘年其傳緡緡豈無才士識暗其本苟為僨強卒躓而隕聖言載世有炳其光蔽暗於矇日月何傷吾鄉宗伯勇繼絶軌甘噬乾臘寧遺腴旨賅萬逾俗去古則咫先生再興益殫厥美上與詩書應其宮徵抉􅊧百家掩取瑰偉抑揚從心不見端委日麗春敷雖妍不靡世有斯文千載之雄百世所述當世則窮半生場屋老授學官卒亦不居退處江干天奪其子獨與以朋昔我伯父始與並興和為文章執聖以繩劇談縱笑據几執觥召我總角左右是譍賤子既冠於京復見先生執手為我嗟歎嗣學古人以任道期亹亹其文以贈吾離其後閲年又逾二十豈徒君耄鼐亦衰及念吾伯父相見以泣先生益病侍帷妻妾要我牀前強坐業業猶有高言記為士法孰承遺書竟委几榻舉世茫茫使我孤立有言莫陳終古於邑嗚呼尚饗祭朱竹君學士文嗚呼海內萬士於中有君其氣超然不可輩羣余始畏焉曰師非友辱君下交以為吾偶自處京師君日從語執拒相諍卒承諧許或歲或月以事間之淸辭酒態靡不可思余與君決乙未之春有言握手期我古人君之屬文如江河滙不擇所流蕩無外內猋怒濤驚復於恬靡小沚澄潭亦可以喜世皆知君文士之碩莫見君心堅如金石不為勢趨不為利眯吃口澀辭遇義大啓嗚呼今日士氣之衰天留一人庶卒振之七年江濱日思君面已矣及今終不可見嗚呼尚饗
