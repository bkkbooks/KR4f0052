  text: 惜抱軒文集十一
  hash: sha256:49260b06f719efa6dc70a031127adaec54fc0919ed1067e81af7a644eb1f9740
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_011-1a}
body:
  text: 碑文宋雙忠祠碑文并序東海朱使君受命領兩淮鹽運司之次年謁於江都城北宋制置使李公副都統薑公祠下乃進士民告之曰當宋之季自荆襄而下城隳師殲降死相繼伯顏之軍南取臨安阿术之軍北圍揚州時維二公忠義堅固竭力合衆以守兹城臨安既下帝后皆入於元孤城藝不可終全二公卒不肯降屈其志再卻謝后之書斬元使焚其詔以絶他慮明身必死國家之難昔蜀漢霍弋羅憲據郡不降魏及審知後主內附然後釋兵歸命世猶愍其所處以為弋憲欲守而無所嚮異於君在懷有二心者也若二公當國破主降之後效節於空位致命不遷卒成其義概可以壯烈士之志而激懦夫之衷者以視弋憲何如哉今天子褒禮忠節雖親與聖朝為敵難而殞者皆隆崇諡號俾吏秩祀矧宋二公立身甚偉而舊祠陊壞歲久不修其於朝廷奬忠尊賢之典守吏以道導民之誼甚不足以稱吾將率先飭而新之衆皆曰願盡力乾隆四十二年六月既竣工桐城姚鼐為之銘辭曰元雄北方既脫金距瞰視江淮嬰兒稚女誰固人心奉彼弱主力或不支有氣可鼓二公堂堂孤城在疆國泯衆遷誼不辱身死為社稷生豈隨君既得死所安於牀茵列士搏膺市人流涕同廟揚州以享以祭五百斯年其報匪懈新堂炯炯有翼其外神陟在天明曜剛大思蠲厥心來庭來對蕭孝子祠堂碑文并序蕭孝子諱日曂江都人其母朱氏病且殆孝子刲脅割肝使婦虞氏和藥進母母愈而孝子死世之學者言不敢以親遺體行危殆為孝是固然也抑紂之時微子去之比干死而箕子奴而皆為仁武王伐暴救民伯夷恥食周粟而皆為聖君子行豈必同乎今夫小人之為不善非不聞有禮誼廉隅之介也出於情所不自勝則潰藩籬蕩防檢而不顧夫君子之為善亦若小人之為不善也發於至善而不可抑遏豈尋常義理辭説之所能易哉故曰求仁而得仁又何怨孝子既喪虞氏謂母初愈不當使聞悲慟乃匿語姑曰日曂商出耳殯孝子他室奠則麻衰絰而哭孝子入則常服而奉進食藥孝養十餘年姑死虞氏守節以終虞氏誠賢婦然亦孝子行足感動之以成其德士患欲行道不能必於妻子者觀於虞氏可自反矣孝子事在康熙時墓在梅花嶺東邑人祠之於墓側鹽運使遼東朱使君至修整祠宇桐城姚鼐為銘之曰親吟於席子憂弗寧親偃然死子欲無生親蹶然起而坼子形猶全九鼎碎彼缶罌何究何思一決於誠志存身滅夫豈徇名德衰恩薄以忍為貞千世萬世徠讀此銘明贈太常卿山東左布政使張公祠碑文並序明崇禎十一年冬大淸兵自靑山口入畿甸所過夷刜蔑能防阻放兵南下山東巡撫以濟南兵守德州濟南遺卒不及二千而大兵卒至左布政使張公率吏卒募士城守相拒十晝夜力盡援絶十二年正月庚申城破公戰死城上妻方夫人妾陳氏皆自投大明湖內事聞贈公太常卿方夫人陳氏皆被錫命義果章於一家忠烈光於國紀夫天下之善一也我朝神武奄有天下於前代之臣忠於所事雖相抗拒以死必褒美及之豈非崇善植義示人臣不以衰盛易心之道哉故天下聞而增感歎焉況在其人之鄉里乎張公桐城人也既沒濟南及桐城皆為祠祀公鼐昔嘗以使事至濟南瞻公像拜於祠下恍焉賦詩而後去後十五年家居值里中修飭公祠衆請為文以記吾鄉當明萬歷中公及左忠毅公以丁未庚戌兩科相繼成進士而皆死於忠藎故世言吾鄉人物風節之美也君子所貴為善而已二公所以死不同而同為忠士有遭值行義不必同二公而庶幾於二公者其道亦必有在焉矣公行載明史傳不待文而顯為之文者以厲鄉人也祠在邑南門公居室前復修之者公五世孫某銘曰天有所廢人不可支危以軀殉道則無虧公治閩粵民頌曰哲遷屏東藩以困奮節婉懿夫人援攜娣妾甘臥潭淵高義矗立靈車神輦風雨之辰偕徠故居撫其居人倚彼城垣高堂以軒既飭敬祀以萬斯年鄭大純墓表閩縣鄭君諱際熙字大純為人介節而敦誼勤學而遠志年三十六終於舉人而士知其生平者靡弗思焉君初為諸生家甚貧借得人地才丈許編茅以居日奔走營米以奉父母而妻子食薯蕷君意顧充然鄰有吳生者亦介士死至不能殮君重其節獨往手殯之將去顧見吳生母老憊衣破即解衣與母母知君無餘衣弗忍受也君置衣室中趨出君既中鄉試將試京師行過蘇州或告之曰有閩某舉人至此發狂疾忽詈大吏吏繫之禍不測矣君瞿然曰吾友也即謝同行者步就其繫所為供醫藥飯羮至便溺皆君掖之適君有所識貴人至蘇州求為之解某始得釋君即護之南行至乍浦乃遇其家人君與別去於是君往來蘇州月餘失會試期不得與君文章高厲越俗其鄉舉為乾隆丙子科同考知龍溪縣陽湖吳某得君文大喜以冠所得士及君見吳君吳君曰吾不必見生見生文知生必奇士也然己矣生文品太峻終不可與庸愚爭福君自是三值會試一以友故不及赴再絀於有司君意不自得遂不試往主漳州雲陽書院歸謁吳君於龍溪遂於龍溪卒君有弟字曰大章少與君同學同執家苦長而同有名君殁八年大章登進士為編修去年余與大章同纂修四庫全書大章日見余每如欲有言而止今秋余疾請假大章乃悽然曰世好文者多矣莫若吾兄吾兄鄙夷凡近人而追慕古人則忘寢食棄人事以求其文之用意惜乎不見君文吾兄必愛之也今吾兄沒十四年矣君又將去安得君文傳之余為惻焉昔吾鄉方望溪宗伯與兄百川先生至友愛百川死而宗伯貴吾鄉前輩皆告余宗伯與人言一及百川未嘗不流涕也今大章何以異是大純學行皆卓然雖生不遇表其墓宜可以勸後人余固不憚為辭而大章之志則亦益可悲矣君無子其詩文曰浩波集大章為鐫行之乾隆三十九年十月刑部郎中桐城姚鼐撰羅太孺人墓表攸縣陳檢討夢元之母曰羅太孺人初歸於贈檢討諱伍南家無尺地以資生父母作苦中年乃能買屋以居教子讀書為士未幾贈檢討君亡太孺人撫其二子皆十歲餘能使無失業相繼為縣諸生既而長子夢鼇又亡獨與次子居或頗侵侮之太孺人禁毋論較惟責為學益急以至成進士選庶吉士時太孺人年近七十檢討請歸奉養太孺人遭逢艱難豫樂不同能始終靜一其心不怵不慆年七十三乃沒將沒戒子異日入朝毋徇勢利而棄舊學故檢討至今奉其教為端士焉當長沙之南衡山之北湘水東受洣水泝湘則逾衡永西南屆嶺泝洣則東南至茶陵之東洣源雖近而淸徹侔於湘故其旁多奇士攸縣居茶陵下流洣至是納攸水受其通稱其西遂近湘攸之會云縣中陳氏為最大姓檢討之祖在明多取科第仕進久而勢落徙業至檢討再興其家而太孺人最有力焉初贈檢討君治屋城中居攸水西南而其六世墓地曰叢􅄵又在其西南距攸水十里據溪山之勝陳氏長者謂贈檢討君夫婦賢也使葬獨祔於是故太孺人始厝城北今葬叢􅄵祖塋之次乾隆二十七年檢討值國覃恩追贈及太孺人三十九年刑部郎中桐城姚鼐表其墓前之隧荆條河朱氏先墓表朱氏先居山東歷城明初有以功得世襲三品指揮使者數世譜失其名其始以指揮使屯遼陽左衛名永安名乃可紀永安生澄澄生國輔皆襲指揮使於遼東國輔之子諱應奎襲職會太祖高皇帝定遼東改為正紅旗漢軍參領管火器營嘗以修理遼東戶口籍成賜爵阿達哈番既而失爵以參領終長子襲參領諱登科世祖章皇帝入關從有功又改為鎮守山海關城守尉兼參將事章皇帝賜之塋地於寧遠州荆條河上今墓所也城守尉遷父柩於遼東來葬之城守尉沒亦葬之其子諱廷縉襲城守尉二十餘年於職無廢事康熙二十年增山海關守兵設豁屯大裁去城守尉改朱公為副都統官副都統未任而卒卒從父葬故荆條河多從葬之墓而參領城守尉副都統三世最先焉朱氏城守尉世職也及改官副都統吏議之不詳而遂亡之自是副都統子孫或居山海關或遷京師雖失世職而自以才進顯者益多副都統有孫曰倫瀚曾孫曰孝純繼以文章治行顯倫瀚仕至正紅旗漢軍副都統孝純今為兩淮轉運使嘗使人出關修墓植木既以啚來告余曰孝純家京師出官四方先人墓地越在山海關外不獲時謁自吾父謀立石表隧以昭國恩崇紀前烈石既具矣未得文以刻孝純懼久遠或湮廢敢請為之辭余曰參領以來三世皆為功開國時以受賜地為墓誼固宜表天下族姓興衰多矣尊貴或一二世或數世輒盡朱氏自明迄今十餘世矣而人才之興未替豈非其先人遺澤遠哉此天下所樂稱者而況其子孫乎若夫右控北平巖壑之雄深左臨渤澥之波而瞰中外之界山川偉異足以發其子孫英傑奇秀之氣則是被先朝賜地之恩厚於無窮也朱氏其勉焉而已乾隆四十二年某月刑部廣東司郎中桐城姚鼐表丹徒王氏秀山阡表王氏世丹徒人今在告雲南臨安府知府文治之祖諱元盛字􅖤甫里居為誠朴長者不幸早世有子諱士閎字漢徵漢徵生五歲而孤母吳孺人尚少家貧乏無族黨內外之助撫三尺之孤默默自守於窮巷之中卒教養子至成立漢徵有兩弟皆殤獨漢徵長而至孝母子相依無須臾之離其事親衣服飮食之具貧不能致美而能使母衣食之而樂也母八十餘而終漢徵年逾六十矣喪殯不能華飾而能極其哀慕之誠也乾隆初鎮江修府志丹徒馮令君詠主其事漢徵謁令君涕泣而述母節詠為感動載之志內里人皆以為不誣也􅖤甫亡時不能葬漢徵長乃營葬父於丹徒東南秀山枝之原及吳孺人亡祔焉漢徵年七十三卒娶同縣某孺人無子側室秦孺人生文治文源文明漢徵兩孺人皆從葬於秀山墓右後文治以一甲第三人登第為翰林院編修遇國恩贈兩世皆如其官階皆文林郎妣皆為孺人又其後文治以侍讀出為知府歸守先壟桐城姚鼐其友也嘗訪文治於丹徒拜於壟下文治請為表未及成又其後文源與江南已亥科鄉試為舉人文明為湖北龍坪鎮巡檢文治視其弟於湖北過皖就鼐復徵前語乃以所知者書俾揭諸其阡夫王氏內外節孝誠可稱矣然皆生窮困於其身卒乃光顯於其後為善之報有不可必而為已之無憾者可必也誠無憾矣無聞於時亦可也而必盡力表章以著於世者賢子孫之心不能已也傳曰既美其所稱又美其所為非是謂邪斯亦可為為人後者勸矣乾隆五十二年五月表河南孟縣知縣新城魯君墓表魯氏世居江西新城中田村康熙乙丑科進士諱瑗由翰林檢討仕至右通政通政之子諱京康熙戊子科舉人為廣西平南知縣實生孟縣君君諱鴻字遠懷乾隆癸未科進士為河南沈邱滎澤孟縣知縣君少讀書慕古人行迹思效於實用其在職重鄉約長必愼擇淸謹畏法者而稍禮貌之又重奬其尤善者告上誡下一以忠信故事舉而民不擾下情達而上官樂從沈邱與江南阜陽界鄰盜互匿焉故難捕君推誠與阜陽約兩縣合捕如一邑於是宿盜皆獲沈邱有買硝之纍君力請去之而為孟縣禁無賴號為水官擾民者其時上官亦多知君賢然十年居河南終不見拔君亦厭吏事遂援例入資當得府同知因離任遽返返則誘進後進稱善如不及著四禮通俗以率鄉人其於古文受法於建寧朱梅崖所為凡百餘首持論有根枑而多當於情君之族子九臯始從君為科舉之學君高其才勸使學古九臯卒成進士以古文名君於余為進士同年然往來疏甚晚與九臯相知乃聞君之為人君在里又將使其二子繪繽渡江從余學雖不能至余甚愧其意乾隆五十四年冬君卒卒逾年九臯與繪繽以書乞為文揭諸墓上蓋魯氏多才而君所以啓後人者為有道矣乾隆五十七年二月日桐城姚鼐表疏生墓碣疏生名枚父曰長淸兄曰枝春皆桐城諸生生幼從其兄讀書潁悟過人大興朱竹君學士督安徽學政愛其才取入學次年補廩膳生才十三歲乾隆五十一年朱石君侍郎典江南試填榜得疏枚名大喜曰此吾兄生平所重士也然生終於舉人年三十二乾隆五十七年夏卒生為學精甚寒暑晝夜疾病不輟世之士能文章者略於考證講經疏者拙於為文生能兼攻之不懈於箋注文辭之事皆求得塗轍矣用力憊而夭及之悲夫生居去吾家七十里顧不常見其慕余絶甚得余文輒誦之不忘余在江寧生疾亟謂其兄曰吾不復見姚先生矣為乞數言識我足矣其秋枝春來語余余傷而書之使歸鐫其基上姚鼐表蔣君墓碣君諱知廉字用恥翰林院編修鉛山蔣心餘先生士銓之長子也編修以才稱天下矣君少繼有才名能文工作書乾隆四十二年為選拔貢生從編修京師編修大病割臂和藥一進而愈君鄉試屢不録以謄録勞授州同知發山東署臨淸州同知吏事甚辨辨獲盜之不實者執之力卒獲真盜果如君言值水潦君行視救溺者中溼未幾卒年四十乾隆五十六年也當余在揚州時編修君赴都過揚州相見君以拔貢將入試與其弟偕從時丹徒王侍讀有家僮善歌吹笛而編修工為曲嘗成曲俾以笛歌吾曹相從飮酒聽歌極樂以君年少不呼使與也苐見編修有子英秀侍側共言其可慶而已後未十年聞編修歸里旋沒又數年而君亡余頃居江寧君之子立中來求為文紀君其年已逾君始遇余之年矣人世之速而才者之不可留如此悲夫君才既足稱沒後其幼子立萬之生母賈氏卒縊以從今從君葬是亦可紀而余又感思生平故舊乃書其略俾立中碣君墓上云嘉慶三年十月桐城姚鼐書
