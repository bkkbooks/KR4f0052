body:
  text: 壽序劉海峯先生八十壽序曩者鼐在京師歙程吏部歷城周編修語曰為文章者有所法而後能有所變而後大維盛淸治邁逾前古千百獨士能為古文者未廣昔有方侍郎今有劉先生天下文章其出於桐城乎鼐曰夫黃舒之間天下奇山水也鬱千餘年一方無數十人名於史傳者獨浮屠之俊雄自梁陳以來不出二三百里肩背交而聲相應和也其徒遍天下奉之為宗豈山川奇傑之氣有藴而屬之邪夫釋氏衰歇則儒士興今殆其時矣既應二君其後嘗為鄉人道焉鼐又聞諸長者曰康熙間方侍郎名聞海外劉先生一日以布衣走京師上其文侍郎侍郎告人曰如方某何足算邪邑子劉生乃國士爾聞者始駭不信久乃漸知先生今侍郎沒而先生之文果益貴然先生窮居江上無侍郎之名位交遊不足掖起世之英少獨閉戶伏首几案年八十矣聰明猶強著述不輟有衛武懿詩之志斯世之異人也已鼐之幼也嘗侍先生奇其狀貌言笑退輒仿效以為戲及長受經學於伯父編修君學文於先生遊宦三十年而歸伯父前卒不得復見往日父執往來者皆盡而猶得數見先生於樅楊先生亦喜其來足疾未平扶曳出與論文每窮半夜今五月望邑人以先生生日為之壽鼐適在揚州思念先生書是以寄先生又使鄉之後進者聞而勸也書制軍六十壽序大司馬制府書公紱庭先生自其先相國藩屏江南之時從於官署趨庭之暇以偉材明識佐成善治而因習知江南之民俗其後以忠孝入侍禁垣以勳績外著徼塞而天子知其才德之閎尢熟於江南之治命撫安徽擢督三省皆嗣相國之故迹公整身秉義以率列城之吏殫心悉謀以圖數千里之政法令不苛而治績日茂為時益久民心益仰戴親樂之至於今歲公俯臨江南者十年而維秋八月降嵩之壽亦六十矣昔周公召公分主東西陜始自文王之時及於成王則君陳繼周公為尹而召公受任逮於康王年幾百歲周召之治皆前後數十年此周治所以盛也今聖人臨馭宇內僃文武成康創守之道亦且兼有其前後纍洽之年矣而督治三江者自中原而包有吳越猶周召分陜之職公實以父子相繼居之譬若周公君陳焉至其莊敬日強任劇煩而不倦精神方富耆艾壽考必且同於召公然則以一人之身將兼有周召之美若是者豈獨公一身之庥嘉哉夫亦我國家之盛事也然公持淸介之節葆儉素之風設弧之辰方親詣河淮以防秋水之至誡屬吏無敢為慶祝之禮至於閭巷之間歎美者盈途頌禱者在室而固不敢以陳於左右也鼐聞之豳風古豳民頌其國侯有躋公堂稱兕觥而祝無疆之壽者今公世治江南固猶古諸侯之嗣職而凡厥吏民各懷躋堂稱觥之思久矣特公謙懷儉德不使其下得為耳然其意不可不著也鼐江南庶民之一實與億兆同心又欲附古詩人之意謹述而為之序云陳約堂六十壽序始者豫在京師獲知於新城陳觀察伯常得聞其考凝齋先生之賢其後遂拜凝齋先生於南昌粹乎君子德人之容也後豫再入京師乃遇約堂先生為觀察之弟仕於兵部望其狀知其為人足嗣父兄矣而顧不常見其後十餘年鼐歸江南新城魯君潔非示豫所為文中記約堂在鄉里為義田義倉恤民之事十餘端而志若未足其仁心如此時約堂已來為守太平問諸太平之人曰太守之撫吾民如其邦族焉後又數年豫來江寧遇約堂於江寧既而約堂命其少子用光碩士來從子學為古文碩士年少才駿而志遠固世之異士也其時約堂長子以為四庫書勞賜舉人當補京職而觀察之孫既成進士入詞館矣甚矣陳氏之多才也蓋天固相其家而興之而亦其纍世仁德篤行之蓄有以致之矣詩有之曰樂只君子遐不黃耉樂只君子保艾爾後夫貽德於後美矣而身以黃耉得躬見之則尢人之所樂得如詩之頌君子抑何盡乎人情也今陳氏世德相承固古所謂樂只君子者矣維諸少年之興凝齋先生與觀察不逮見而約堂於政成名立之時日見其子孫繼登之美由是日引而未艾是古之善頌而不可必得者而約堂獨得之也可不謂盛乎歲之正月為約堂六十壽辰碩士求余言持歸為親壽余以世俗之為壽者必曰神仙昔凝齋先生嘗為仙説斥其陋矣不足為約堂道俾碩士誦詩以侑觴焉其可也陳東浦方伯七十壽序昔昌黎韓文公之論為詩曰歡愈之詞難工愁苦之言易好故世謂唐詩人罕達獨高常侍稱為作詩之顯者而已其後歐陽永叔因亦有窮而後工之説世多述焉或以為是不必然夫詩之源必遡於風雅方周盛時詩人皆朝廷卿相大臣也豈愁苦而窮者哉鼐嘗思之當文武成康為治周召之倫陳述祖宗援引興亡以為教諫憂危恐懼之意常多逮宣王中興尹吉甫之徒於君友間誼兼規勉是雖處極治之時其詞固不得苐謂為歡愈矣若夫為歡愈之詞魚麗蓼蕭菁莪魚藻之篇寥寥數言不足以發為詩之極致然則詩人誠不必盡窮而歡愈之詞不如愁苦其説上推之六經卒無以易也潯陽陳東浦先生少為詩人實配盛唐之雄傑秉節方面則嗣周室之旬宣固兼孔門之政事文學而為詩人之達者也今秋七月先生七十初度吏民蒙德者無不為先生慶而先生方勤思國事愍念民瘼未嘗少自睱逸歡愈之説靡得進焉鼐謂此先生德業之所以隆亦先生詩所以美也是以援韓公之論證之周召吉甫以請於先生蓋衛武公年八九十而為抑戒而召公矢音卷阿年逾百歲為古詩人之壽而道光於天下後世此鼐所以祝於先生者若夫白樂天陸務觀之倫雖亦詩人之多壽而不足為先生道矣家鐵松中丞七十壽序維歲乙丣春二月吾兄鐵松先生由廣西巡撫移臨雲南於故事當覲於朝會黔中有疆埸事吾兄當助籌糧運以應軍興將待胥靖而後請覲焉是夏六月先生七十初度以國事方殷幕府之前命無得以祝壽言者而吾嫂方夫人及其子伍祺方留任家事於里方夫人慈和惠愛幼先生一歲來年五月亦七十矣伍祺將進觴於室且以寄祝於先生而俾鼐為之辭鼐聞之詩曰泛泛楊舟紼纚維之此言諸侯佐天子任民事如將舟者必有維楫之勞也既而曰優哉遊哉亦是戾矣言既勤勞之後則道洽治成優遊無事以造於天子之朝也吾兄早居繁劇屢任封疆宣力奏績感激知遇今以七十之年精力方剛許國之情彌厲忘家之節愈堅非所謂紼纚維之者乎所治事寧將趨闕下優遊是戾旋當其會矣而吾兄不敢亟言優遊唯盡力於勤勞則誠忠孝之志也仰維聖人臨馭重熙而久治海內鼓舞於萬壽無疆之樂而大臣蒙錫福而佐嘉謨者又皆耉造之人雍容化日盛世之福也吾家積德纍數世二三百年矣而舉族壽登耆耋者極少吾兄少居貧以孝名天下僃經勤苦矣乃老而康艾登焉且其始仕河隴之間分符江漢之域觀察閩海提刑南越所處每在邊徼遭值事勢盤錯或為常情所難居而肩任不疑屢禽大憝惠布遠黎今又居昆明西南數千里建旄秉鉞為國家安奠中外愈任其勞福祿愈遠此殆天所篤祐以助承景運之隆者夫豈偶然哉然則上引天下之閎休下成吾一家之私美吾兄雖不欲言慶家之人能無慶乎若夫蓼蕭有黃耉之褒桑扈有受祜之命度吾兄八述所職承被龍光將亦上近於古義矣而其禮瞻於禁陛固當紀在史官今方與吾嫂稱觴於里巷道𣢾於平生所謂家人之詞有未敢抗比詩人之頌者云彚香七叔父八十壽序吾族居桐城四百年纍世仰承先祖之盛德率獲為善之報登仕籍致名稱者亦多矣而惟耆壽最為難至蓋有年屆七十已為貴矣若夫數百年中數千人其至八十者三四人而已今歲乙丣吾族在城居而度七十已有五人而秋八月九月吾叔彚香先生暨叔母趙孺人並壽八十然則今茲最為吾族之盛而吾叔又當今盛美之尢也吾叔承家世忠厚之訓行固可稱而族人所尢推者與叔母趙孺人事叔祖􅖤符府君盡孝愛之道故宜其福之優而亦天之相之也今歲吾族壽七十者莫貴於鐵松中丞矣然中丞方遠撫西南萬里之邊勤勞公事不敢暇逸豈如吾叔使長子貫一弟作令近省祿足以供甘毳而依平弟宦歸之後侍養里中懷源石南兩弟又方以才進於時諸孫並奮誦讀足娛老人之志下有曾孫上偕琴瑟以大耋之年於里中時會親族康強娛樂不知世有缺陷之事以此言之所得福且鐵松中丞所不逮也而況於餘人乎貫一弟作令有聲時方倚用而吾叔亦惟勉以在公以盡養志之理雖不獲常在側而與稱觴階下無異也族之人於吾叔初度咸合慶於庭鼐故為之詞既以增吾叔叔母之歡又以達貫一兄弟之志云鄭太孺人六十壽序儒者或言文章吟詠非女子所宜余以為不然使其言不當於義不明於理苟為眩曜廷欺雖男子為之可乎不可也明於理當於義矣不能以辭文之一人之善也能以辭文之天下之善也言而為天下善於男子宜也於女子亦宜也太姒之所志莊薑之所傷共薑之所自誓許穆夫人之所閔衛女宋襄公母之所思於父母於兄弟於子采於風詩見録於孔氏儒者莫敢議獨後世有為之者則曰不宜豈理也哉侯官林君母氏鄭太孺人少善文辭歸於林君尊甫林君尊甫以進士知山陰縣罷官旋沒廉吏家無儲贍太孺人年三十餘上事姑下撫兩幼子辛苦勞瘁以其學教二子同一年得鄉薦季者成進士為編修余每與兩林君言論非世俗淺學也而皆出於母氏今詣余謂太孺人是冬壽六十乞一言以歸為獻余謂太孺人之行孔氏所褒而其文儒者所當采以附古録詩之旨者也林君歸以是説進諸母氏之前太孺人其益可以自信矣旌表貞節大姊六十壽序周之西都多貴族而詩人嘗思詠其女子焉曰彼君子女謂之尹吉女而有君子之德天下所得之以為榮者也及尹氏為太師見刺家父而節南山作焉則併其親黨譏之曰瑣瑣姻亞夫一尹氏也而得其女者或以為榮或以致譏豈非以所值賢不賢異哉故貴賤盛衰不足論惟賢者為尊其於男女一也吾族夙有形家之説曰宜出貴女而張氏與吾族世姻其仕宦貴顯者固多姚氏壻也然余以為吾族女實多賢豈待其富貴而後重邪余三從伯父為嘉湖道布政副使實生大姊適張君肩一為萊州太守之子太守之夫人吾姑也大姊之娣又吾妹也皆賢有可稱而大姊之遭最不幸十六而嫁能事公姑以為有禮太守捐館舍肩一以憂致疾姊割臂求以療之竟不起遺一孤女姊年才二十悲傷之甚損其一目自是上事姑下撫弱女閉門自守不妄見一客卒以夫弟子雍嗣教之成立有司請於朝而旌其閭焉吾嘗閲歸熙甫作顧文康之女壽序言其家隆盛能以豔陽桃李之年而有冰雪風霜之撡吾姊雖不若彼出於宰相之門而父母及夫家皆典牧方州世承仕宦姊獨於其間遭離荼苦執德秉節數十年其亦可謂君子之女無愧古之尹吉而其榮有逾六珈簟茀者已萊州之喪吾姑恭人最儉謹持家有法姊能嗣姑之舊以保其業子女皆婚姚氏女嫁母姪子娶姑女雍然門庭之間日􅒓以盛姊於是老而傳事蓋今兹年六十矣十月上浣實其初度內外之族皆往慶之詩曰無非無儀惟酒食是議無父母遺罹此以處常者言也若不幸遭值艱厄如吾姊其必如吾姊處之乃可以言無遺罹矣吾故引詩美刺之義為壽豈獨以榮吾姊哉又使幼少者將聞吾言而知敬戒也孫母張宜人八十壽序孫君石似之母張宜人節孝著聞於鄉鄰慈惠洽溥於族戚上則朝廷旌異其門閭下則士大夫敬禮而樂頌其美子孫才俊冠蓋滋興歲春正月閲壽八十設帨之辰親交咸詣舉觶為慶而俾某首為之辭某讓不獲乃進曰夫前哲往行之美而後進不獲見者多矣天既俾其人為賢必又與以耆耉之壽然後後之人得承事聞見其嘉言懿行而效法之其能及是者豈非幸乎某之生晚於鄉前輩之賢多未奉杖屨嘗侍宜人之父張少司空時公年八十餘矣竊自以為幸而今又見宜人之八十宜人雖女子而有父風其在孫氏承其舅東昌太守淸吏之後尺寸銖纍必由於儉朴而所以助鄰里宗族者罄竭與之未嘗吝也治身恭肅作配刺史公刺史公早世獨撫三子教之成立節義凜然老而修行不衰後進士女靡不見之有所矜式如宜人之壽豈獨孫氏之福夫寧非吾鄉之美也歟往者諸城劉文正公嘗問某子同鄉張少司空子以為何如人也某謹對公孝友篤敬人也文正曰公非苐此而已其立朝有丰裁能􅍘大事吾希見其比者會他客至某不及請問其詳嘗以為恨夫少司空男子行著於外人尚有不及盡知者況懿美之藴於閨闥者乎宜人之德雖著然或尚有餘美雖鄉人不及知而獨以貽慶於其子孫者然則吾言苐盡於此若其所以為孫氏慶者蓋自是不可窮也伍母陳孺人六十壽序自余來江寧伍生光瑜從余遊四年矣時為余述其母氏之賢曰昔光瑜先考為人慈仁樂善而艱於子適母楊孺人賢明而好義急緩帶之思乃得生母陳孺人來歸生子瑛及光瑜光瑜甫生而孤是時舉家所以為生計者皆托於人手主人驟喪或乃乘勢危而欲攘之兩孺人處悲哀之中內撫幼弱外禦強侮僃嘗困難而後得保其家二子既長雖慈愛之甚而教督必嚴以至於有孫也則撫之亦如是於是者數十年而楊孺人棄世陳孺人之事女君也常嚴未嘗一日懈於禮侍其疾也未嘗須臾離於側及其亡也悲哀至久而不能自勝其持家教子婦及施德親族也一皆率循楊孺人之舊法而不敢怠當先君始沒楊孺人年三十餘陳孺人二十餘國家之制三十歲以下守節者得旌典逾三十則否光瑜將為母請旌孺人聞之悽然曰吾與楊孺人共守數十年目見女君之勤苦立義至矣今者使國恩獨加於吾而楊孺人不與則吾不忍也必不可光瑜又請曰甲寅之歲春正月五日實吾母陳孺人六十初度光瑜既不敢違母命而請旌於朝願先生賜之言以光於室余聞而歎曰兩孺人者之秉義則皆美矣而陳孺人讓善之意何其厚也易曰謙尊而光今世相矜以名雖閨門之內亦務為夸飾而寡情實如陳孺人之辭名不欲居者何可及哉雖然守謙者孺人之志也而奉國制以揚幽潛者有司之責也孺人自盡其情而有司自行其典夫亦並行不悖可矣孺人豈必終拒之哉若夫詩之言曰釐爾女士從以孫子言女有士行也孺人之用心如此可不謂有士行乎況其子孫從為士者乎然則將必有承其德而興者可以為伍氏慶矣王禹卿七十壽序孔子曰古之學者為已今之學者為人今夫聞見精博至於鄭康成文章至於韓退之辭賦至於相如詩至於杜子美作書至於王逸少畫至於摩詰此古今所謂絶倫魁俊而後無復逮者矣假世有人焉兼是數者而盡有之此數千年未嘗遇之事而號魁俊之尢者矣然而究其所事要舉謂之為人而已以言為已猶未也夫儒者所云為已之道不待辨矣若夫佛氏之學誠與孔子異然而吾謂其超然獨覺於萬物之表豁然洞照於萬事之中要不失為已之意此其所以足重而遠出乎俗學之上儒者以形骸之見拒之吾竊以謂不必而況身尚未免溺於為人之中者乎丹徒王禹卿先生篤志學佛者也先生少以文章登朝取上第生平吟詠之工入唐人之室與分席而處書法則如米元章董元宰之嗣統二王此皆天下士所其推無異論者獨至其學佛之精而人反不甚信僕以語人人口諾而心笑者且有之今歲八月先生忽生背疽負痛欲死而晝夜危坐與人言説神明不變匝月而平復於是世始駭歎知先生之學真有能外形骸而一死生者平時不覺遇難而後見也又越月則為先生七十壽辰夫先生苟無此七十之壽則其為已之實不能大著於天下而天下反以其為人寄迹之事稱之不亦失先生於交臂乎先生持佛戒桑弧之日不可以酒醴稱觴鼐獨為斯言以壽侑以淸茗使來壽於堂者同飮之將終醒而無醉云吳伯知八十壽序余往主江寧鍾山書院高淳吳君伯知使其次子維彥來江寧就余為學自是余得僃聞君之為人溫良君子人也而未得相見獨維彥時往來於江寧如是者數年及余今年畏涉江濤辭去鍾山而居皖而維彥又適當補官於安徽亦來皖於是又相從幾一歲維彥與余之得屢聚豈非天乎維彥以歲十月為君之八十壽辰告余將請歸為父壽余又因詢知君之康強如少壯面渥丹而筋骨堅凝又有以異於常人也君性甚孝自其先人之亡葬於郭外每日晨起必先步詣墓下然後歸治家事今八十矣猶日往如其昔也君於鄉黨有急無不應於高淳公事修學宮治道路拯災患恤孤寡無不盡其力鄉人皆戴而德之又恭敬謙遜未嘗少以言加人獨居必肅然聞雷霆必正衣竦立夫存心慈仁而持躬戒敬者壽之道也君之得壽於理固為當然而以天下人子之心思之維彥與其兄維英弟維綱以逾壯之年而見其老親之壽健若此得不謂天之厚之乎余是以樂為之辭使維彥以歸為君獻若夫仁孝如君以其道教其子則維彥成慈􅖤之德異日必為吾安徽良吏者吾又將因君之為人決之而君且於子成政之日就養於官或與余相遇於此邦也則尢余之所深願也惜抱軒詩集八今體八十六首雄縣咏周世宗世宗北伐志猶勤山後寧容地剖分天意自留耶律氏人心俄變殿前軍五朝庶見真神武再世何難嗣守文反覆興亡無處問瓦僑關外又斜曛平原咏東方生陛戟千官列衣冠九尺豪滑稽通強諫辭賦變離騷車就公孫借家令少婦操惟羞齒編貝長對口無毛去歲吾邑喪葉花南庶子今秋喪王懷坡吏部皆文行為後學之師又皆鼐丈人行也道中念之追愴竟日作一詩以寄海峯先生吾邑平居三數賢十年風雨地相懸文章後死能無懼日月東流逝每然滄海一笻憑嶽觀靑山千嶂待江船畢將宿草銘幽墓止就先生臥短椽漫興故人揖我燕山前送我來過淸汶川海右青山不可極中原落日何茫然牛羊落落散高壠車馬駸駸誰少年往來斯世卒無補俯愧古人靑簡編朱無逸孝廉自平陰來會賦贈自愛名山一杖笻敢言老子迹猶龍布帆垂拂淮南樹􅉭屩來登日觀峯雲海似於人有約冰天豈意客相從憑君欲問平生業倚聽寒巖夜壑鐘題子潁所作登日觀圖窮臘陰凌蔽暮曛高巖孤迹此偕君前生定結名山諾到死羞為封禪文豈有神靈通默禱偶逢晴霽漫懷欣卻從元旦官齋靜看掃滄洲萬里雲次韻子潁送別三首盤盤泰山石終古不相離石上雲如蓋靑天多路岐浮雲將客去盤石此心知諒守平生誼寧無後見期海月依巖上官齋記客來登樓一俯仰窺牗共裴􅏆杯引千峯氣心思萬古才為留三百字長對碧雲開白髮遲聞道靑山且縱狂江風淸一曲樹日蔽千章古哲惟文字天心豈喪亡當憂商訂少暇日一東望乙未春出都留別同館諸君同承天詔發遺編對案常餐少府錢海內文章皆輻湊坐中人物似珠聯三春紅藥􅝪衣上兩度槐黃落硯前歸向漁樵談盛事平生奉教得羣賢汶上舟中春風迎我自江淮岸柳將陰花漸開盡室相看浮汶去數山如畫入船來微波夕照融當面飛鳥長空近好懷欲上濟樓呼李白月澄滄海玉為杯江行絶句天低兩岸直風緩夾江灣樅陽猶未到已見皖公山夏日空庭朝復暮邈爾若無依自顧與人遠方知近道稀暑雲簷外盡晚日竹中微谷鳥翩翩影孤翔識所歸夏夜舊讀􅋊書向几橫新陰鄰木隔牆生簷風草閣方孤坐雲月蕉窗度二更擾攘蚊虻無一影纒綿絡緯有餘聲謳吟自覺偷間便那比前賢挾勝情曉齋有述盡舍人間事將求達者機開軒垂草露曉日潤煙霏梧竹淸千尺雲峯碧四圍不知滄海內此志孰相依泥汊阻風泥汊絶岸菰蘆風吹逐白雲如轉蓬兀茲小舟未可下杳然疉嶂何當通一夜寒溪聞落木萬里長江同拍空懷抱須向碧天盡起借漁郎沽酒筒宿攝山寺嚴風洗霧出芙蓉含冷流哀越幾重拄杖曙雲驚鳥宿古碑秋雨讀苔封交流急澗鳴千步極北憑江更一峯誰識風濤鄰咫尺不妨幽壑自從容出金陵留示故舊又向靑溪十日留依然雙闕望牛頭交遊聚處思移宅衰病行時愛棹舟蕭寺風多長似雨後湖煙淡總如秋摩揩老眼僧書內不為興亡作淚流竹林寺懷王禹卿盤磴上香臺雙峯倚檻開江流天影盡海氣地陰來左右皆松響蕭條獨客回他時君到此空復憶裴􅏆竹林層檻閣江水照晴空杖䇿來招隱巖松與澗風鳥聲含雨細樵徑隔雲通便恐鳴泉曲彈琴值戴公江行夜宿蕭然伴釣翁曉乘涼月出蘆中縱橫島嶼中流失繚繞雲煙萬里空燕尾水分斜渚岸魚鱗波颭夕陽風散人隨意江南北處處青山戶牖同同禹卿拙齋登木末樓江邊擕酒送春歸霽雨登樓風滿衣賈舶霾雲吹暗浪佛圖懸日照空磯故交縱蕩情忘老寒衲逢迎語亦稀苐一江山容易到舉杯猶欲盡斜暉惠照寺或言古木蘭院也見禹卿於此寫維摩詰經落盡淮南萬樹紅晝陰僧院鳥玲瓏簷含梅子黃時雨戶進新篁緑處風出世了無香海界置身休在碧紗籠鐘堂一飯成遺迹回首天花丈室空雨後晝陰沈地一花明裂紙窗前素卷橫展讀未終雷雨適竹軒梧閣作秋聲江上送吳殿麟定還歙我行江北路漫漫送爾江南山萬盤靑天落日如相憶更倚蓮花峯上看題二王帖自􅍘平生誓墓餘會稽東去世情疏無端卻念虞安吉不似田間種果書偶有所感書此自嘲勿謂譏右軍也寫付官奴論一通千秋俯首有涪翁自憐無力收遺本梁帝何嘗擅折衷古人巳與不傳亡優劣誰堪品二王地下右軍如可作詎將知巳許文皇餘杭甥作桓家婦妙迹從汙寒具油忠義有靈應不忿幾能藏弆託淸流太白樓太白樓頭空復空滄洲晴照碧流東久傷白髮生明鏡每見靑山憶謝公萬壑鬛松鳴水上九秋霜鶻入雲中不妨無客聞高詠自有江山興未窮燕子磯裊裊丹崖挂薜蘿石亭松檜俯驚波蒲帆從此通滄海藜杖曾攜眺曲阿舟楫客逢前日少江山秋見夕陽多水雲洲渚還相錯獨鴈流哀奈遠何寄王禹卿竟日無人至蕭蕭風雨涼樓臺憑晚霽天地正青蒼思爾西湖去拏舟春草長無因聞玉笛煙月夜琅琅答客鳳城恩近賁新除鴻漸都升省閣居楚國多聞推左史漢臣淸望動中書春深文宴盈金谷日宴儒林論石渠盛世彈冠誠欲往秖憐衰髮不勝梳懷朱竹君學士文章三十年淸修難弟亦稱賢肯令節似郊祁詘何必才為絳灌憐世態期期求復古酒懷浩浩欲登仙一時門下稱英少誰是侯芭受太元懷陳伯思壯年車馬劇馳奔晚節疏慵日閉門奉粟幾時能飽朔合尊何處更留髠室中婢老都無齒竈下奴淸不茹葷料得涼宵風雨急誦詩流涕即令原涼階涼階今夕又飛螢倚檻風前已涕零人迹不如修竹影每隨明月到中庭題僧照少通輕俠老如冰禁兄蒲團學小乘間説秣陵前日事只疑元是六朝僧鮑鸞書自歙渡江問業於蒙陋愧其意贈以詩我如山徑􅍘行軒擁腫枝柯大樹存節目何由能待問靑黃久巳謝為樽披榛客自非流俗岐路誰當見道原共對小庭芳草積林風吹晚更無言敬敷書院值雪空庭􅋊雪尚飄蕭時有栖雅語寂寥久坐不知身世處起登高閣見江潮霄漢樓三十年前登此樓招攜緑鬢賦滄洲四山雜樹排簷入萬里淸江抱郡流過眼雲煙窺物外憑欄花鳥又枝頭層軒尚有斜陽白更就明霞望逝鷗春日漫興春冷江城裏端居到日斜閉門生徑草空砌墮鄰花亂帙從行鼠分飱與聚鴉千生彈指過何處惜年華芳草深春後高樓擁樹端一城萋更緑纍日未曾看江氣浮煙薄山光抱郡寒故人猶辱問數字自長安春動彭蠡鴈蕭蕭正北飛長空照江水孤影與斜暉託處吾將老平生侶更稀一聲當檻外舉首忽沾衣絃月藏雲氣幽庭自夜明樹疏懸鳥宿花密照人行書册催兒誦衣囊撿婦情人間紛感觸何遽見無生又絶句新蕉才展中心緑芳杏將􅋊半樹紅門掩小庭無客到呼兒相對立春風几榻塵生坐不知一鐙深夜照書帷江邊春盡瀟瀟雨空館花開又落時自詠羣賢鼓舞赴明廷陋巷無車戶久扃已作元龍牀下士每書子玉座旁銘故交四海多衰白何事千秋託汗靑風雪繞窗鐙火暗更披朱墨讀遺經聞河決張瑞書以陜汝道督工沒焉愴悼作詩歲賦長茭築水墉又聞萬室入波衝王尊勇竟為冥死趙孟儕還謝禹庸祠廟吏民垂淚過衣冠先壟想魂從衰罷愧乏當時用焉敢􅝪膏議楚龔細雨細雨餘春尚薄寒緑窗風定蕙香􅋊七年同種階前樹獨坐花開掩淚看留客高齋西面向澄江緩酌蘭陵春酒缸莫厭坐深風露重宵分圓月始盈窗寄子潁禹卿拔地凌江峙碧峯水雲禪榻此相從解衣蘿薜巖前石倚被旃檀閣外鐘三客並知非一世兩山回望有餘蹤太虛為室時相見豈為離憂日置胸銷暑古木陰能大空牆日亦幽風絲垂縊女雨蔓長牽牛尚友誠多遜離人庶寡羞暑窗深竹韻危坐與神謀不寐聞江聲憶昔乘舟遍遠征和風惡浪每殊情同舟死喪身今老欹枕江聲入皖城夏日絶句二首數株當戶緑交加徙倚前榮見早霞忽有宿禽驚起語露梢飛落石榴花牆頭高樹緑雲天謝盡餘花未噪蟬掩卷看陰移午後數聲啼鳥在風前夏夜黃昏急雨夜中收起見華雲吐玉鉤久立玲瓏階下影樹梢風過已鳴秋穀樹牆西生穀兩株連陰蔽斜陽媚夕煙惡木豈能妨志士吾廬何厭聒繁蟬窗間細響鳴秋籟屋角新光照上絃幸假不才居隙地淸風時為至江天感秋秋草萋萋蘆荻花涼風嫋嫋大江涯雨餘墜棗兼黃葉日落歸禽背絳霞俯仰羣生同逆旅棲遲百里亦離家餔糟晚欲從漁父倚待亭皋立杖斜題畫梅老夫對客常思臥誰寫疏枝劇可憐渾憶揚州喚吹笛梅花嶺上值新年魚門編修曩以一詩送僕南歸今失其稿更向僕鈔取因並一詩寄之六藝高論玉麈揮百家楊秉莫能非欣登雲閣仍簪筆卻送春艎憶釣磯再應徵書丞相老三為祭酒大夫稀聖朝舉欲留儒者豈得歸田志不違寄朱二亭念君里舍會絲簧獨屏吟詩兩鬢蒼閉戶不知誰與語向人自謂我非狂居惟甕牖仍耽酒行過旗亭就賣漿送我橫江歸艇疾蜀岡西望幾斜陽臨江寺塔江上浮屠三十尋半登回首見楓林夕陽忽送孤鴻出暝色將生百雉陰浩浩東流浮積氣茫茫後死獨傷心西風飄蕩蒹葭外止有滄浪漁父吟寄任幼直昔開金匱集羣賢花藥春風坐榻連藏史著書歸苦縣祠官侍禮在甘泉羇間繫馬階前地悵望飛鴻樹杪天豈必知音當代少衆中時一鼓琴絃寄孔撝約岱山樅檜鬱嵯峩礀戶秋風吹女蘿早厭雕蟲卑入室遲歸金馬且槃阿萌芽頗歎言詩少枝葉惟嫌擬易多千古著書非近用廟堂伊鬱獨絃歌聞禹卿以書名上達幾更出山而竟止因寄王氏風流草隸兼江東行樂且遲淹解官誓苦歸元早合妓情多聽不懕家作道民輸斗米身惟服食乞戎鹽練裙團扇名皆貴豈必凌高署殿簷哭魚門魚門素有同居之約今春聞其引疾方為欣然而魚門旋以訪畢中丞于秦沒矣子幼才三歲耳遇君通籍已華顛猶見雄才賦百篇送别議聯元亮井論文曾許伯牙絃十年白虎成通論幾日揚烏與太元一入崤函身不返空聞解紱買江船論書絶句裙屐風流貴六朝也由結習未全銷古今習氣除教盡别有神龍戲絳霄筆端神動有天隨迅速淹留兩未知莫道匆匆真不暇苦將矜意作張芝雄才或避古人鋒真脈相傳便繼蹤太僕文章宗伯字正如得髓自南宗論書莫取形模似教外傳方作祖師老去差當捫鼻孔世南臂痛廢書時本是嶔奇可笑人衰羸今況髮如銀薑芽斂處成何狀正得嚴家餓隸倫哭孔撝約三十二韻孔夢興疇昔斯文失在茲世從乖大義家尚誦聞詩舊德誠遙矣通家願附之壁中書若授坐上客何辭往歲南宮直東征使節持鹿鳴君始賦駿骨竊先知庾信升朝歲揚雄好賦時翰林真不忝家法亦胡虧文富韓陵石書摹鄒嶧碑談經工折角好學復深思海宇承無事宮庭大有為九流讐祕省三俊接彤墀博誦先王語當求孔氏師二劉今幾見後鄭獨勤儀君作儀鄭堂嘗乞余為記老氏藏書室儒林習禮帷廟堂君竟返延閣士奚資道德慙途説文章劣管窺燕居頻接膝狂論每無疑處處同杯酒殷殷愛履綦逮聞辭禁闥先已病茅茨岱嶽分天峻江流控地卑龜陰人去少舒口鴈來遲鵩鳥妖斜日龍蛇在歲支風流前日會天意百年期橘幼靈均頌蘭摧長史悲豈教為異物真見瘞瓊枝銘鼎幾先德沾袍辨異辭君書來云近喜公羊學方為之説未竟書成寧餅肆身泯罷饘斯適就濳夫論希聞智者規九原終不達一卷更投誰余以經説寄君甫去計不及見髟鬢秋增白雙髦昔對垂止餘名篆在啓篋涕交頤寄釋誦苕瓶鉢相逢慧業兼碧雲詩法授江淹離居一夕身衰白禪悅多時味屬懕陶令社容耽枕麯周生室久謝無鹽卻思半日山光寺共聽風鈴語塔簷答孫補山中丞過港口萬年庵見懷二首嶺嶠頻褰問俗帷流歈夾道擁蠻夷建牙巨海重雲上弭節千山落日時明月珠崖盈近岸祥飇神廟送歸旗縣聞諸管環相慰久識中朝吳隱之湘東松竹帶郵亭十五年前兩使星鴻翼久回春水白隼旟重向越山青僧堂吟就興遙夢麟閣圖成失壯形我欲更除三宿戀就公新治乞壇經聞香茝兄擢廣東按察使卻寄二十韻舊德前朝在傳家後起難江山留治迹祠廟足辛酸兄仕初為令君恩每改官分符臨夏口建節過閩灘荒服南溟闊雄藩列嶂巑命提中典使首立外臺端經術良為本科條亦可觀霜風淸瘴癘蛟鰐伏波瀾陳氏嘗慙長諸袁實繼安公卿終可致道德在無刊永憶家風厚咨嗟獄吏􅋊深文堪惕息考讞極創瘢昔濫京倉祿䢅趨省戶丹循書黃案尾默愧惠文冠隱几今懷耿中宵每竊歎政茲褒召杜道必閉申韓陳臬雖無陂推情或未殫勿憂陳奏卻翻戒慮囚寬梅嶺延冬燠茆簷臥歲闌公私相望切引領屬加餐詠史將軍猶駐碧油幢積石河源未盡降安定有城名第一隴西出將每無雙牧民豈謂非良幹伐畔何教震友邦憶昔盟書金似粟百年金鼓不聞摐答客藜藿粗營便閉關幾看榮謝隔溪山淹留正爾因衰病敢笑何公去復還大觀亭中丞祠倚石崖青杖䇿秋風更一經舉目衰林如脫髮幾人采鞠制穨齡淸江三面舒州郭南嶽千峯皖口亭落照橫天鴻鴈起獨憑長嘯對冥冥黃愼雨景數椽深壑架茅茨亂木霾雲出谷遲忽聽後巖飛瀑急四山風雨巳多時李敦庸荷葉雙鳧落盡芙蓉葉未枯野塘深處唼雙鳧貌來合乞忘機侶曾入煙波得見無謝陳勤齋方伯餽𥿄已震戎韜靖阻遐又瞻弭節澤江涯遊思竹素真餘事分乞溪藤賁物華身愧詞人居楚國腕嫌餓隸出嚴家安能泚筆形周翰會見褒書降草麻懷故學士朱竹君洛下書生起侍朝獨陵天地氣飄飄青雲後進時來附白髮前交意每饒中夜酒多猶擁榼過春花少尚連鑣卻臨杖節經遊地立望江亭晚落潮懷故編修程魚門走昔雕蟲志尚勤十年操牘每從君承吟雌霓知聲病荷定雞人潤小文白下退將鄰舍卜玉堂晚逐少年羣世間一別逢無日聞有遺孤未屐裙唐伯虎墨筆牡丹兩枝芳蘂出深叢休比徐熙落墨工曾向金陵參法眼了知花是去年紅離思畫角一聲江郭布帆幾疉風亭前日故人千里倚樓依舊山靑
