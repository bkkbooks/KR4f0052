front:
  text: 惜抱軒文集十五
  hash: sha256:1ec91aa03b82e6d2b8d508dec3dc7d900fc36bd29e2b4246dfa05cdb0c29c3ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_015-1a}
body:
  text: 賦聖駕南巡賦幷序臣聞王者兼覆九州內撫畿甸外察方岳其爲道葢至廣遠易傳曰風行地上觀先王以省方觀民設敎夫八方之氣不同而風行因土以生物者天地之至德也九州之俗不同而天子省民因方以成治者聖人之至敎也古揚州之域厥民輕心火耕水耨昔者嘗蒙仁皇帝六莅之恩及世宗十三年休養生息之福皇帝承基至仁究物念東南之幽阻懼民隱之不聞十六年二十二年時巡再莅於江淮察吏問俗民勸於化夫恩篤者道崇志深者念遠海內承平百年矣天子仁沛而義凝南綏而北撫敎友民而征不庭懷異俗而廣徼塞風雨雷霆之所施地里億萬以計受萬國之攸同輯祥嘏而來僃歸福慈寧乾坤愷豫重光之歲仲冬維皇太后七旬萬壽之慶聖孝攸崇推恩庶類北戶而北竆髮之南靡弗欣懌旣履逸樂不忘憂勤維兹江淛之閒實聖心所尢切二十七年春玉輅復臨淸問疾苦禁惰翫於民萌昭震疉之宏業昔三代王者繼有神聖臣嘗攷之詩歌必先述其小心勤惕治內治外㒺弗安恬又使萬物得其理覽艸野之鄙事然後民樂其德揚懌和之聲保世滋大集庥福於無竆也以東南之區古稱難治而屬車三歴俗變風移豐美之化成謠詠之聲作雖其言不出於閭閻鄙俚而足以上占國家隆治之昌景福之遠臣愚無似竊作賦一篇不敢自附於古詩之流亦欲以道鄕里之民情述覩見之所及以揚盛世輝光之萬一云爾其辭曰於皇時淸維祖宗濬恭緝熙佑民勤恤乃篤生皇帝之文武􅐶喆匹天運而日行紹丕業而無逸穹覆庶生萬方如一方內大和乃治遠夷旣定邛僰之外疆招西域而懷來乃有狼顧豕竄鳥距魚鬐跳踉矜恃巖幽曲渚之中而以仰抗夫天威萬士勃怒是命將帥收準􅉰之兩蠢翕萬部而失氣定功葱嶺之北闢疆玉關之外葢爲地二萬有餘里合古三十六國而歸於郡縣之吏靡不被德施而恩流葳㽔而滂沛治肹蠁產祥嘏雲日輝和風雨歸善於聖母錫福於下士重光元英日行牽牛臨於河渚皇太后履萬壽而當七旬仰覩聖孝巍崇邁於前古莫不踴躍歡欣忭手歌舞曰是宐康豫無爲輝明黼黻而鏗鳴鐘鼓皇帝曰嘻余敢自康自逸雖兹江淮東曁於越昔聖祖恩加乎六巡及朕亦再爲臨閱而式加優恤顧猶恐化澤有未究疾苦有未聞宐噢咻以三復豈朕躬而憚勤乃命百吏稽禮文循前典加鴻仁水衡頒錢司農調均散委積於京倉蠲租稅而拯貧申誠使者汝領治河鞏成金隄洪流逶迱然後禮官奉儀太史練日首春䢅暄大駕將發總虎賁之禁旅陳鹵簿之有秩奉慈寧之安輿乃迤出於殿闕條狼執鞭誦訓夾軏華芝道游秋秋翐翐沛艾騰驤扶輈翼騑順和氣之萌茁轉春郊之靑旂䒥裳景從雜遝重委日動而雲飛邪拂乎海岱光熛燭乎淮沂當鸞輿之未行也先明詔乎有衆曰咨吏以屆民維儉德之是奉假靡麗以飭恭實朕心之攸痛快視聽於須臾懼百室之􅟂痌所臨馳道宮館所供式攸循禮毋以麗用萬乘所至廛市無動度財大䢉毋敢私貢是以吏無供帳之煩而民無威臨之恐逎以南徂乃觀大河天雲澹而飛揚長風柔而蕩波龍伯戢其之而從蜿蜒乎蛟鼉仰萬乗之戾止召百靈而委蛇分渠浪蕩淮口是過各官奉職金隄峩峩刻玉禮神永戢以和超渾流而南踰徵萬民之咸喜儷雲日之輝光吾㝛瞻乎天子兹念我之弗釋又再莅乎我里誠慰我之慕思呼萬歲而拜稽連襼接袂錯頂累趾扶掖龎睂亦擕稚齒有垂伊絲楊桺依依有龍飛矣天子之旂布廣澤與崇山敷春卉之披離兹風景之未改夙昔憬乎帝思宛來莅於兹士計杓運之數移旣長我之嬰稚又增壽乎耋耆敦風俗之懋和閲多悆而阜熙固皇心之載嘉粤集休之孔宐迺御龍舟黃頭擊櫂吳歈越吟涉江激譟讙鳬鴈之鳴飛爥紫蘭之茁冒晴日麗乎平臯流帆揚而照耀俯龍虎之盤蟠招奔趨而繚繞越江漢而超五湖東以介乎海嶠迺御離宮周以淸籞鍾山之麓漸江之滸倚郭控郊或帶田圃梅林揚葩春禽初語修竹菁菁谿流有湑遡自昔兮幸臨言於斯而晏處不侈增乎前觀有依閑兮庭廡儉德昭乎軒楹􅐶藻宣於鐫鏤爾乃莅南土觀稼穡瀰湖陂利溝温地早燠而後寒稅再熟而餘食美風雨之旣和見萬類之滋植桒榮柔而衣履豐麥靑黄而倉廩實有丱婦之餉饁懿兹䢉之樸力爰補助之攸行復胡憂於乏亟若夫左江右湖指次吳㑹天地鬱阻東被海介皇甄治之有巖吏愼防乎封界戢鳥夷之肆心安商舶之失戒迺閲舟師艅艎載斾縱鳥逝而龍驤芴荒裔而四逮火焱發其煌流煜星奔而雷􅐀蛟龍竄伏而屛氣山島陁落而失隘瞰武節之式昭宣威棱乎域外於是帝乃頒賚守職長吏農工商販旣徧以僃暢和氣之休嘉鬱充塞乎天地迺朝羣辟展皇儀張廣筵式燕私黼黻蹌蹌鼓鐘論詩飫於隆恩載飽德施上皇太后萬壽有祺合海隅之羣歡以上奉於一卮愔愔帝德厥殷治敎祛所患惡謹所好樂杜治術之陂邪警愚惷之失道嗟我友民世服忠孝服冕攸興敬爲民導作嘉頌而揚休聲亦旣各宣其無蹈弦誦闤闠之所歌謠江海之漘爰進試其秀才升時髦而允掄或辰宅於菰蘆而夕進於宮鄰夫惟江淛之俗亦勞亦侈地下以阻包數千里富以溢禮爲華秀以文辭爲靡矧厥土之最下惟民力以營之澤艸所生􅉭種維宐桔橰挈首注高引卑作力獨深於海內寡儲亦易以怨咨苟非蒙聖主之式臨何以永載於雍熙昔歲載陽旣賁帝趾雲日其輝於江海涘民仰識乎隆準習玉輅之和音何念復於此而弗忘誠𬒳德之滋深上竭其思下寫爾忱八荒旣已阜安猶顧瞻而有餘心造至化以敦德將集祉萬億載以有壬
