body:
  text: 朱竹君先生傳朱竹君先生名筠大興人字美叔又字竹君與其弟石君圭少皆以能文有名先生中乾隆十九年進士授編修進至日講起居注官翰林院侍讀學士督安徽學政以過降級復為編修先生初為諸城劉文正公所知以為疏俊奇士及在安徽會上下詔求遺書先生奏言翰林院貯有永樂大典內多有古書世未見者請開局使尋閲且言搜輯之道甚僃時文正在軍機處顧不喜謂非政之要而徒為煩欲議寢之而金壇于文襄公獨善先生奏與文正固爭執卒用先生説上之四庫全書館自是啓矣先生入京師居館中纂修日下舊聞未幾文正卒文襄總裁館事尢重先生先生顧不造謁又時以持館中事與意忤文襄大憾一日見上語及先生上遽稱許朱筠學問文章殊過人文襄默不得發先生以是獲安其後督福建學政逾年上使其弟圭代之歸數月遂卒先生為人內友於兄弟而外好交遊稱述人善惟恐不至即有過輒覆掩之後進之士多因以得名室中自晨至夕未嘗無客與客飮酒談笑窮日夜而博學強識不衰時於其間屬文其文才氣奇縱於義理事物情態無不僃所欲言者無不盡尢喜小學為學政時遇諸生賢者與言論若同輩勸人為學先識字語意諄勤去而人愛思之所欲著書皆未就有詩文集合若干卷姚鼐曰余始識竹君先生因昌平陳伯思是時皆年二十餘相聚慷慨論事摩厲講學其志誠偉矣豈苐欲為文士已哉先生與伯思皆高才耽酒伯思中年致酒疾不能極其才先生以文名海內豪逸過伯思而伯思持論稍中焉先生暮年賓客轉盛入其門者皆與交密然亦勞矣余南歸數年聞伯思亦衰病而先生沒年才逾五十惜哉當其使安徽福建每攜賓客飮酒賦詩遊山水幽險皆至余間至山中崖谷輒遇先生題名為想見之焉張逸園家傳張逸園君者諱若瀛字印沙曾祖兵部尚書諱秉貞祖諱茂稷考諱廷珶皆贈左都御史廷珶三子長若溎仕至左都御史而君其季也都御史為人端凝朴愼而君慷慨強果自其兄弟少時里人皆異之矣君始以諸生為書館謄録敘勞授主簿借補熱河巡檢熱河今為承德府君仕時未設府縣以巡檢統地逾百里歲為天子巡駐之所四方民􅚈居其間君以嚴能治辦姧蠧屏除留守內監為僧者曰于文煥君一日行道見其橫肆立呼至杖之於是熱河內府總管怒奏君擅杖近御直隸總督亦劾君上聞之顧喜君強毅不之罪而以劾君者為非其後為良鄉知縣順天府南路同知有旗民張達祖居首輔傅忠勇公門下始有地數百頃賣之民矣久而地值數倍達祖以故值取贖搆訟經數官不敢為民直君至傅忠勇頗使人示意君也君告之以義必不可卒以田歸民畿南多回民久聚為竊盜不可勝詰君多布耳目得其巨魁或親捕之凡半年獲盜百餘盜畏之甚乃使一回民偽來首云有某人至其家巨盜也及捕之至即自首某案已所為盜有贓在京師禮拜寺君使兵吏偕之至禮拜寺則反與閧鬬至刑部􅏺以某案事與此人無與以君為誣良議當革職既而上見君名疑部議不當召君令軍機處覆問減君罪發甘肅以知縣用是時上意頗嚮君然卒降黜者大臣固不助君也在甘肅二年嘗為張掖復營兵所奪民渠水利又以張掖黑河道屢遷所過之田為沙礫數百頃而歲輸糧草未除力請於總督奏除之時甘肅官相習偽為災荒請賑而實侵入其財自上吏皆以為當然君獨不肯為其後為者皆敗於是世益推君君引疾去甘肅里居數年會兄都御史已進用上數顧詢君狀君乃復出補直隸撫寧知縣其勤幹如昔然君年已六十餘矣以子鴻恩為兵部郎中受封朝議大夫例不為知縣遂去歸里又數年卒君居里為園時遊之名之曰逸園言已不得盡力為國勞而苟逸也故人以逸園稱君姚鼐曰余家與君世姻好君為丈人行所謂逸園者負城西山面郊余先世亦園址也君數飮余於是自述平生為吏事奮髭抵掌氣勃然誠充其志所就可量哉君在里建育秀書院為族人設藝局以養貧者親姻昏喪急難每賴其施以濟君亡久矣人方思之不能忘也然余尢偉君杖內監僧及不為傳忠勇曲論民田事為有古人剛毅之風故為著傳君能著於世矣才節遇知天子而仕抑屈於縣令惜哉命為之耶抑古之道終不合於今乎君長子鴻肇為戶部員外郎先卒次鴻恩為福建延平府知府次鴻磐方睎原傳方根矩歙人睎原其字也為歙諸生工為文其文用意高遠非今世之所謂時文者也而昔人所以取四子書為義之初旨則睎原得之為深其學宗婺源江愼修其文宗桐城劉海峯也所居在歙西靈金山中有林泉之勝睎原親賢好學四方賢者至歙無不樂交睎原睎原亦延致其家唯恐其去名聞甚廣乾隆丙午科大興朱石君侍郎主江南試自決必能以苐一人取睎原而睎原是時已不應試後又四年睎原卒其卒年六十一矣睎原父曰候補布政司理問常客於漢上而使睎原家居為學及為其曾祖祖父母營卜葬地數年睎原學益深而登涉川原盡得兩世葬地其父乃以為慰其於交遊死生如一能任其急難意氣和易寡怨怒雖終身諸生世為之不平而睎原未嘗以為感歎也子二曰起泰起謙姚鼐曰余始聞方睎原之名自戴東原東原為言新安士三曰鄭用牧金蘂中及睎原也蘂中在京師與相接最久用牧睎原之文嘗得讀之而不識其人及睎原殁之前一年余主紫陽書院用牧以鄉試去里不得見得見晞原果君子然以事促歸不及造其靈金山居也其後余不復至歙而睎原用牧相繼喪矣人存殁數十年間耳遇不遇曷足論士有所以自處其身者足矣蘂中書來使作睎原傳余以所知者述於篇張貞女傳昔歸熙甫作貞女論謂女在父母家不應以身屬人所許嫁者亡而為終守不合於義吾謂熙甫是言過矣今律與人約婚而中背者有刑而晉王褒以其壻葬父洛陽即以其女别嫁以今律論褒為甚不誼以褒之賢衡今之法則制刑非矣然而皆不然者古今情事殊也且伊尹五就桀柳下惠不羞汙君而伯夷非其君不事季歷文武興周室而泰伯逃隱夷齊叩馬而諫士各行其志所安耳君子亦仁而已何必同吾近覽鄉曲之事高貞女之節悲傷其志以謂靡病於古誼焉張貞女者父曰張裕昌其五世祖為明末山東左布政使秉文殉難於濟南者也貞女許嫁之夫曰葉孝思孝思父母皆老病將死獨有孝思一子又病瘵甚篤欲迎張氏侍其父母疾張氏親戚皆難之貞女曰既以身許人奈何聞其危篤安坐以待其死乎即布衣乘輿入葉氏視其公姑及夫疾晝夜不怠一年而舅姑及孝思皆死僅有屋三間張氏迎父弟共處以屋居父而已所處幾於不蔽風雨時為父浣炊為弟縫紉晝夜營女工以為生及父死而治其喪立族子友賢為子聘姪張氏為婦得孫曰傳興一年而友賢又死其婦亦能效其姑立節概焉貞女自十九歲守節至今五十四而葉孝思之族祖曰蔭寰聘妻胡氏蔭寰失愛於繼母悲憤以死胡氏農家女也聞而誓必為夫守父母不能奪即送至持喪其夫伯母楊氏亦寡婦憐胡氏與同寢處其姑久亦愛焉胡氏今年四十餘守節三十年矣其居皆在縣城內之西又有周氏者居縣城東百四十里許配法洪山章彌六年十五而彌六死請於父母來夫家服喪遂不返其夫家為立嗣撫之至有元孫年九十三去歲冬沒乾隆五十五年也鄉俗焚葦輿以送終章氏數千人見其焚煙上徹聚為白鶴久乃滅云而桐城城內又有馬鳴玉之聘婦方氏鳴玉死方氏居父母家極窮困然守而不嫁至老先周氏二年死始馬氏諸子疑方氏初未即至夫家不敢迎入門至其老將死乃服其節請於官而旌之嗟乎行必久而後信女子固然非耄期不亂者曷以為士乎哉印松亭家傳印君諱憲曾字昭服寶山縣人也祖曰輯瑞考曰克仁克仁無子其弟廣西太平府知府光任生君以君為之後中乾隆十五年順天鄉試舉人次年成進士分發廣東為翁源知縣以能吏稱其後內擢補吏部稽勳司員外郎三擢至吏科給事中京察一等乾隆四十六年命為浙江寧紹台兵僃道其在寧紹凡八年嘗修海寧石塘有功榷海關盡去苛征商民喜之寧紹歲造戰船以樟木為材君采購嚴禁吏蠧毋擾於民而公事修辦大計列一等當擢而君疾引歸數月而卒年七十一君為人孝弟慈仁其在京師遭本生父母喪哀甚見者不能與言也平居和易愛人人樂親之交友鄉里至都居君寓舍常滿有求􅧞者必應事有就君謀者必盡其慮及君外任則求君者益廣君意常若有歉於人者然所給者雖頻數不以自沮其處內外職屢治刑獄而意一出於慈仁矜全多賴以生者鼐與君及泰州侍庶常朝皆以鄉試同年相知侍君負氣疾惡同年生多遭誚責然獨重君嘗謂鼐印君真長者也其後庶常沒於京師君視其棺殮尢僃君生平寡欲獨好鼓琴晚而自號松亭云子三曰鴻經鴻緒鴻緯君居官為政之詳錢辛􅎝少詹事已為志墓具之鼐更以所知者為傳以授其子焉節孝陳夫人傳陳夫人雍正甲辰科進士臨海知縣諱皓鑑之女遷江知縣左諱文高子世揚妻也年十七而嫁嫁十年夫死一子行遜二歲左氏雖宦後至夫人寡居甚貧乏上事姑謹下撫孤子及以叔娣女為女訓之必以禮始臨海公生五女夫人最長季則姚鼐母也臨海嘗夜教女讀書每太息言吾女何率勝兒夫人後亦自授行遜書左氏所居猶其先明忠毅公之故宅分至夫人及子二室才盈丈撫子愛甚鼐時至其室亦愛甚嘗使子與鼐於室中談經義夫人自治食噉之聞其言於牖外即喜入曰汝等與人言宜若是夫人年五十八乾隆十五年冬甚疾鼐之母視疾執手而訣行遜後終於諸生其子其章最有行誼嘉慶元年詔舉孝廉方正里以其章應舉而其章之子前一年登江南鄉試榜人謂天祐節孝之遺也然去夫人卒四十五年去行遜亡二十餘年矣今惟夫人所撫叔娣女為女適張氏者尚存亦為婺矛牙年七十餘矣當乾隆間夫人已為吏奏旌表其節孝鼐更愴思而述從母傳云鍾孝女傳孝女錢塘鍾曉齋女三歲母徐氏沒父繼娶陸氏又三年喪父及女年十四陸氏得危疾人謂必死女禱天求活其母刲股和藥飮之未愈乃再刲陸氏竟起女後適邵志錕志錕疾病女亦割臂以愈之年二十四卒夫割股非孝之正也然至情所至無擇而為之君子所許也且天道人事捷於呼響惟誠則達於鍾氏女何疑焉志錕字儒珍性好為善浙中凡有濟民之事必儒珍董之以此聞四方其言孝女事舅姑接家人皆多可稱雖復娶矣嘗悲思鍾氏余哀其意作鍾孝女傳惜抱軒詩集十今體九十三首過程魚門墓下作憶挈柔豪就石渠春風花藥襲襟裾隨珠荆玉多奇士金匱名山見異書霄漢幾人成令僕滄洲吾道在樵漁獨君埋骨青山隧長鬛松呼似識余送江寧郡丞王石丈運餉入蜀鼐座師王文莊公之子使傳驅天府家聲長地官書名留御墨急病在衷丹行受專城寄寧辭報國難天從秦嶺窄身入棧雲寒轉餉千峯裏傳餐萬木端才猷經事大體骨積勞安憶昔趨階序初欣見羽翰山邱嗟歲往風義值江于短髮飄藤架長歌共藥闌亭皋春寂寞閣道路巑岏涼燠車中換情懷事外寬吾衰君自壯談笑去征鞍題夢樓集與君交久無如我並到頭童白頷髭事業銘鐘都未逮林泉投紱卻非遲燕關秋氣聯吟袂江寺潮聲接臥幃五十年間都憶起一鐙草四卷中詩送陳東浦方伯自江寧移任安徽三十二韻衡嶽羣舒地橫江六代都風煙通上下民俗别荆吳駐節方從化移轅有待蘇生申元四國借寇豈私吾白下公初蒞黃中信早孚從容文禮樂談笑奠江湖小察羞誇智訏猷始作謨五年休息意四境蕩平途愛士憐彈鋏知音辨濫竽古風宣頀夏偽體闢榛蕪豈以文防政真看效是儒甘棠方苃舍瓠子計搴芻天語褒丹鳳人心縶白駒皖公先在望泗上且須臾四載俄安宅雙旌遂載驅同州淮海合分省井疆殊作伯臨諸帥投間有一夫登龍慚郭泰伏鵠愧南趎江遠林煙淡霜初岸草枯遠偕迎竹馬近即送檣烏回首思鄉郡傾心仰大爐土風兼俠武鄰域急軍需狗有生氂逸人無佩犢粗依仁諧衆願舞德況微軀劇邑將辭醴歸村更飮酺甁開惟説尹襁負共將雛九派潯陽會千峯天柱孤詞源瞻几杖坐上又醍醐此地朱訾口他時北斗樞旬宣寧楚尾羽翼上天衢業廣同環海恩周詎向隅形容羣作頌傳詠慰吳歈寄袁香亭時為墺門同知同歲書生盡白頭異時江國共登樓蒼茫身世餘孤䇿歷落山川又九秋雲出易迷巖曲岫鴈飛難到海南州卻聞壯事猶能作談笑吳霜拭佩鉤題王麓臺山村扇面谷口停舟傍石林幽人猶隔幾重岑濛濛山氣將為雨待長溪流二尺深偕陳渭仁吳子見朱引恬南濱遊攝山宿般若臺院次日邀釋卓羣入寶華山九月寒初未擬還江南草樹正斒斑短笻慣識青巖路白髮重攜向攝山萬葉霜凋變錦叢雙巖金碧擁行宮宮門右畔溪橋石竟日涼颸響墜紅密樹陰沈般若臺珍珠泉映井天開蕭條彌勒龕邊宿一夜橫江風雨來路掩青山舊孝陵村零黃葉古江乘騎驢共踏秋風裏新識南宗小院僧雞犬民家帶柘桑志公人説出東陽寒山一往無尋處卻見鷹窠是道場慧居寺恭閲三朝御書獵獵霜風拂袂斜偶攜僧裓入㟏岈山蟠句曲橫青靄樹自深巖上碧霞霄漢奎章藏鷲嶺人天法會憶龍華白雲蒼狗塵寰感也到空林釋子家寄吳殿麟聞其里人欲為舉孝廉方正天都山下結茅茨閉戶盤桓自命蓍弟子三千周士貴公孫五十漢徵遲朝中筐篋將更䇿天下文章要起衰聞道洛陽才不世吳公第一始深知鷲峯寺寂寂靑溪水蕭蕭祇樹園江潮春入郭海月夜當門銀杏風前活寺有銀杏已死今復榮金容世外尊殿中佛像傳猶江總捨宅時造金色獨異他像陳隋銷落後來聽道人論葆光寺一徑循修竹高低杳靄間秋風深院桂寒色寺門山龍象來居少寺無方丈僧鴉烏暮語間故人餘隱迹孤杖此追攀方坳堂嘗避喧于此報恩寺江上來興甲宮中失委裘升朝君難靖建剎母恩酬風物長千古雲山短髮秋浮圖三百尺陟級望滄洲南唐小朝偃蹇大江東煙月流連六代風建業文房收寶笈淸涼法眼啓琳宮帝都執玉才嫌後天塹浮橋巳架空一聽大梁春夜雨最思花是去年紅龍江阻風紫金山外俯羣巒白鷺洲前木葉丹十月淸霜天地肅一江空水古今寒往來未定秦淮宅冷落唯投大澤竿坐待暮天霞作綺吾生何處不盤桓憶慧居寺九聞初鴈在江南一詣靈山杖䇿探殿角夜明升鷲嶺鐘聲秋發過龍潭歸㩦衣袂煙霞染回望雲關石樹參料得老僧居絶頂峯坳時見度風帆歸舟風起橫江晚未休躊躇山下送歸舟遠天青白依依日近樹丹黃颯颯秋早歲經過忘故迹百年死喪憶前儔老翁萬事投空寂只寫淸詩處處留過黃陂湖離家百里泛晴川遲速吾心總曠然淡淡風揚初日上高低山匝一湖圓連村黃葉叢叢霧舉棹滄波面面天好景一過須記取擬同兒女話鐙前自嘲冬烘老子木棉裘苜蓿盤邊與古謀曳踵車輪良病緩拄頥劒首正嫌修雖讐七略無藜火未證三幡愧苾芻儒佛兩家無著處祇將黃髮邁時流嘉慶丁已三月十六日阻風於繁昌三山磯因遊三華菴菴為僧山若建山若傳為明進士楚人不知其姓名國變後為僧塔在菴左側青山緣曲徑紺宇帶修林江影高軒覆花光小閣深峯巔橫落照門外淡春陰不厭風潮阻頻為淨院尋勝國傳遺老開山託巨磯三衣藏服冔一鉢寄餐薇名姓塵寰滅波濤過客稀祇聽松竹韻三歎出巖扉寄李雨村調元故人與我尚人間曾傍金羈玉筍班地勢風煙難蜀道天涯雲水各江關偶將文筆傳消息竟謝簪纓孰往還衰鬢不妨論事業發揮濳德又誅姧題畫深谷高巖寺閣扄疏林谷口見溪亭亭中恐是龎居士坐對無埃山四青未凋林碧發梅紅石壁天齊岸勢窮搖艇更深何所遇武夷君在白雲中題夢樓集春雨高梧灑夜涼夢樓詩卷伴虛堂未知他士堪看否我自微吟欲􅍘腸題韓魏公早朝像當年秉笏獨書思每進難陳父子詞逮託北門榮晝錦永昭陵遠夢罘罳王文成公像餘事功名到五溪室家纍世輯羣黎除將道統千秋重我更傾心為鼓鼙宋人水殿圖金波鳷鵲麗秋光高下空明水一方天淨不知河漢轉玉階風露覺新涼趙承旨天寒翠袖圖冷落山花間竹竿誰言空谷異長安態濃意遠無人見自倚天風翠袖寒王太常雨景沙上浦漁歸煙際村林閉風雨黯成昏湖山轉淸氣將會夢樓於攝山道中有述太平門外雨初晴又聽新蟬第一聲轉轂年光逢小暑夾衣天氣似淸明山雲近作迎人態僧院歸如返舍情未死故人重執手舉看藤杖一枝輕别夢樓後次前韻卻寄送子拿舟趂晚晴沙邊暝立聽橈聲百年身世同雲散一夜江山共月明寶筏先登開覺路錦箋餘習且多情钁頭半箇容吾與莫道空林此會輕次韻贈左蘭城我似頽陽尚㺯晴子如雛鳳發新聲殷勤老馬途頻問高下精金市自明共案八關尋至味聯牀三宿係餘情屬將道域深攀援更覺文章小技輕題趙雨亭出關圖葉君中子謫伊犂趙與有舊省之葉沒又往致其柩歸冰雪天山照往來懸旌四見玉門開尊前渥赭顔如昔身是唐朝老萬回秋至積雨晴時風滿襟夕陽空院落疏陰暑過秋至關誰事付與寒蟬樹上吟自海峯先生喪十餘年鼐不至樅陽今年自江寧循江西上過其故居不勝追愴乃作二詩往時四海一衡茅頻使升堂命酒肴輕許便當人俊傑高言寧計衆譏嘲寥寥空宇今羅雀兀兀荒臺古射蛟草宿重因天下痛百家新學總訛淆樅陽山市枕江濆何陋廛闤只為君此日羊曇重下淚百年端木永離羣霜風激激團亭水天日昏昏大澤雲正是平生停棹地招魂當復細論文松圓老人小景荒寒空水夕陽流落鴈聲遲近荻洲識取松圓詩裏畫秣陵天遠不宜秋松圓溪山亭子半依平遠半巖扃雜樹逢秋一半零入谷未深林未密拈來詩思在溪亭八山雪餘冰泮日華淸試向寒山託漫行曳杖穿林逢客少解裘登嶂覺身輕丁東石澑巖幽出層疉嵐光樹上明取作分司隨口句驚人無復謝宣城徐半山桂巳將僧裓謝塵緣猶有深情拜杜鵑極望湘南天更遠秋風零落桂連蜷仇英熏籠宮女手持團扇梅萼香􅝪靜女旁熏籠暖倚意寒涼懷中不合時宜在愛詠齊紈冰雪光挽袁簡齋四首早應詞科稱玉堂出臨大邑見文章流傳政牘吳歈裏得助詩才蔣阜旁官罷買田如好畤身亡起冢在桐鄉祇憐行樂平生地門掩西州淡夕陽文集珍傳一世間兼聞海外載舟還千篇少孺常隨事九百虞初更解顔竈下媪通情委曲硯旁奴愛句斒斑渾天潭思胡為者縱得矦芭亦等間館閣江湖並盛名胸苞今古手持衡當關報客無朝暮下筆噓枯有性情羣輩角巾從郭太公侯小巷候君嫏希光時彥今多少籬溷辛勤悵賦成半世秦淮作水嬉沙棠舟送玉簫遲錦鐙耽宴韓熙載紅粉驚狂杜牧之點綴江山成綺麗風流冠蓋競攀追煙花六代銷沈後又到隨園感舊時嘉慶戊午二月十一日攜持衡偕左良宇叔固張侍喬晴牧素從同遊雙溪四子留宿山中侍喬及余持衡暮歸憶去歲是時亦與諸君遊集于此因作二首于嶂龍眠碧玉圍雙溪蟠繞玉龍飛圓隄松響交山閣曲崦花光照礀扉青草已埋黃閣骨絳霄還振素流衣衰羸幸與年年會昏黑猶嫌早命歸此邦曾住李公麟何處山莊間翠筠衆壑莫如今據地四朝誰問昔時人龍眠山甚廣然莫佳於太傅墓前疑昔山莊即此雨過澗漲多新響崖闔林開别貯春玉局黃門徒對畫吾曹差勝得身親寒食雨細雨泠風日夜催陰沈庭戶長莓苔山城樹底花頻墜關路淮南客未來三月晚春悲老物百年後死待奇才坐看暝色階前合北嚮寒空數鴈哀哭錢侍御澧三十二韻能國惟君子丕時讓俊民九苞鳴大夏一鶚降秋旻士盡歸遺直朝方賞諌臣如何孤有德終歎百其身家世昆明遠聲名上國珍青編先珥筆白簡奮當仁受詔乘軺急當官襥被貧九流分混汙三族責頑嚚始使淸流重終教惡女顰遷官依日側持節度江濱魯酒師圍趙曾參罪惑親湘東辭樹蕙滇海臥誅榛脫穎賢名舊聞絲帝念新雲霄重起翼風雨又司晨授命官何擇賢勞事不均更生徒禁闥長孺是前薪心苦非摶石言高觸秉鈞苟無光日照蚤與禦魑鄰被薄焚香夜盤空翦韭春孤危仍不恤溘死又誰論節概今無兩文章古與倫廟堂虛讜議館閣重詩人昔試儒家法招徠觀國賓登茲一片玉忝作九方歅晏笑鋪筵會潺湲攬𬒮辰江湖漂擊棹霄漢望拖銀遠慰空庭目時烹尺素鱗病羸增復減兒女學兼姻任道誠無負論交亦有神祝雞從廢墜乘驥又邅迍宇宙宏才少風霜往迹陳蒼生卒何望靑史豈終淪題宋院畫林檎孔雀風舉高枝露葉乾明花暄日鳥情歡世間好處憐儔侶翠尾張屏盡意看張呂環選勝圖何處龍眠勝無如太傅墳嵐光千嶂合泉響四邊分前月吾行至春風鳥獨聞只憐煙月暝幽絶不逢君謝藴山方伯得晉永平八磚以為研作寶研圖圖中三子侍琢磨新試麝煤煙委臥荒榛幾歲年匣研寶貽安石後甄泥事在永和前列階才巳成三秀入院聲應嗣八磚便為越中誇故實不須零瓦問甘泉􅮶蟣靈澤夫人畫像壻維大耳紫髯兄螓首帷中與論兵英氣不隨興廢盡危磯時蹙怒濤聲中興天子得成家撫鏡佳兒祀麗華原廟一頽霜露冷不如蘋藻奠江涯汪蛟門少壯三好圖康熙間題詠數十家今藏秦編修敦夫處屬題其末世間嗜好總雲煙差有風流翰墨傳長卷展窮階蔭轉強將衰病附前賢題釋果仲詩慧業何嘗不可珍研思處處鬪淸新寒山拾得誠難企正作人間休上人祝芷塘同年惠書並以新刻詩集見寄復謝浩蕩君才江漢浮魚龍沙石盡從流豈徒小我吞如芥更使前賢放一頭集鳳文章遺舊省垂虹煙水淡新秋圖書跌宕應忘老莫為悲傷歲月愁查篆仙淳於揚州訪得其族二瞻墓荒翳幾盡為修整種樹立碑旋獲二瞻舊硯於僧舍自紀以詩屬繼作二首一團紫璧墮僧扉無復蛟龍引墨飛百歲白虹重吐氣更從濡染瀉珠璣形骸石硯孰為親一臥荒郊一几茵梅壑有靈應附此諸孫門內接詩人二瞻號梅壑老人為胡雒君題説經圖二首圖三人一雒君一錢䀲之一陳仲魚遺經殘缺在人間巳墜斯文不復還一髮千鈞餘傳説九州三子尚追攀孝廉郡國同推舉吳越溪山共燕間若使老翁參坐論頻遭奪席也欣顔聞名吾未識錢陳應是東南兩俊民最憶半生同研席獨誇胡子出風塵文章經術元同貫場屋徵車總致身他日聖朝論白虎三君誰是著通人蘇州新作唐杜公白公宋蘇公祠於虎邱嘉慶戊午八月鼐及陳方伯諸公遊宴祠內作四絶句柁樓吳越壯遊年遺伕編詩歷下前惟有高祠照寒水文章千古寄雲煙文采風流並世芳蘇州德業獨難忘澄波五宿渾兒戲政使微之羡此堂端明過迹亦囱囱遺像高樓醉面紅記取樓頭看塔影小山叢桂正秋風獨餘叢桂小山幽東坡為虎邱詠也時祠前桂花極盛草堂橘刺藤梢裏官閣淸香畫戟中繼迹白蘇賢將在老夫乘興便遊東穹窿山真一觀山前雨歇日初升盤道穿松出霧登匝地湖光連海曲垂天雲影落吳興遙遙上古思蟬蛻淡淡秋空縱鳥憑周覽便辭高閣下幾時重宿看神燈鄧尉盛衰人事總無常鄧尉梅枯半作桑賴有山川長不改倚欄依舊見漁洋古柏菴高幹枝稀似立虬裂柯橫草翠還抽七株嘉慶三年看更歷人間幾百秋石湖草堂昔為祠宇記今訪石湖園煙水長如此風流向古論堂開懸石趾潭隱曲巖門滿谷芳幽桂虬枝誰與援楞伽寺上方雲氣上寺塔上方巔杖䇿層層石憑欄面面天翠華嘗駐此丹閣故依然吳越吾初到微茫眺海壖東浦方伯邀與同遊西山遍覽諸勝歸以二詩呈之南北吳山又越山排雲點黛洞庭間乘舟秋水天空闊拄䇿高巖徑曲環石谷漫泉斟乳液琳宮殘碣剔苔斑歸來夜夜餘淸夢攜得煙霞到市闤海內詩才各長雄幾人真嗣浣花翁草堂鵝鴨聊宜我碧海鯨魚卻付公松石相看懷舊日煙雲同泛又秋風極知老遇斯遊最便腐柔毫寫未工謁德馨祠先人蒞政浙江潮廟貌湖山鎖寂寥近日守官新檻楯百年父老戒蘇樵靑編史傳悲思極白髮秋風道路遙遺像幸瞻垂老日獨慚無狀負登朝登松篁嶺酌龍井泉與吳江郭頻伽朱鐵門及持衡同遊及暮乃返天宇青蒼秋氣悲松篁嶺上拄藤枝西湖煙景當巖下北宋風流似晉時龍井甘泉長不減虎溪送客竟何之幸逢佳士聊盤倚月上西林隱半規虎跑泉觀東坡詩刻神功虎穴作龍湫乳竇杭州與潤州一勺寰中尋廢寺草年招隱記間遊才誇新句蘇夫子巳誤前身戒比邱飲罷淸甘應有悟高巖風葉墜當頭城隍山秋風吹蕩亂雲開曉踏吳山頂上來左右江湖遙會合東南天地此徘徊宋宮衰草煙中白滄海驚雷勢盡回都邑且誇今日勝趾前城郭抱樓臺曉過蘇隄作蘇公隄畔緑煙堆行上澄波似鏡開秋柳霜風餘旖旎水亭金碧略傾頽浙東峯影遙空見湖外鐘聲四面來更入南山深處住擬將淨社結宗雷將去杭州項秋子墉邀餞余及持衡於其宅同會者孫心蒔侍講效曾孫貽穀觀察嘉樂潘蘭垞道長庭筠以一詩留別諸君絶境東南偶杖笻西湖十臥寺樓鐘無邊風月隨千里不盡溪山任萬重樽酒偕來尋舊夢雲帆何處計前蹤世間那有長相對留語天涯慶此逢戊午八月草六日過蘇州囱囱一詣虎邱後二十五日自杭州回與馬雨耕及持衡重往竟日登攬因題八韻虎阜前朝寺蜂房四面樓檻前山杳杳巖下水悠悠負海帆斜出生煙郭正浮地標鈴塔峻天納劒池幽捨宅希塵外開堂問石頭樹凋吳苑緑雲是晉時秋一慕莊巖界重經澶漫遊不隨零落候金粟為余留別張慕靑吳竹堂兩同年此身千里一飄蓬來值姑蘇兩寓公宿草堆中思故侶菊花樽畔賸衰翁各隨腰膝尋山好莫苦心脾索句工盡醉便將孤棹遠胥江西上水浮空無錫贈王錫公吳山秋色舉杯前各醉人間七十年一別相逢應更少只今同酌惠山泉宗人無錫半塘令君置酒寄暢園漫成一首九龍山下好園林雲物秋來澗戶陰回棹江湖孤客迹舉杯風雨故人心靑蒼石樹淩空色隱見巖泉注壑音此地買田陽羡近總將遺迹付登臨丹徒值雨夢樓邀挈持衡及江鳴韶同遊焦山登東升樓滄江僧榻壓龍宮二十年前一宿同偃蹇靑山長待我飄蕭白髮又乘風檻前萬頃淩天外樓上千生説夢中何事驚濤翻急雨苦將悲壯撼衰翁題花䲧夕陽遲圖誰辨韶光速與遲無情有態問花枝分明羲御長停處正在淩雲一笑時張惺齋見示先贈侍讀公西阪草堂集輒題一首數卷淸風迥出羣正如縹眇敬亭雲宣城古是詩人地張氏才多奕世聞踰嶺奇遊蘇玉局登樓傷別杜司勳通家獨恨升堂闕聊比中郎志郭君方坳堂昂以巡道提調南闈被詔擢貴州按察使僕適遊吳越逮其出闈不及祖餞以一詩追送二十八韻千山百越郡萬里五溪源地遠開都會才難任幹藩皇仁同近輦使者命乘軒道在儒生勇人依執法恩繡衣將日月襥被共朝昏一夕朝青瑣三年住白門帝咨方略盛民戴德風溫涕泗秦淮水徘徊禁掖垣遄歸期仲甫急病且臧孫帆泝三江上塗窮五嶺垠秋風彭蠡鴈落日洞庭猿志壯行無繫時艱事有原楚郊嗟獸駭蠻洞聚蜂屯太乙回西指將軍據右尊風雲霾戰壘歲月未櫜鞬封事參降畔夷情雜詐諼喬良今屬汝頗牧不須論辱好如昌歜瞻風接芷蓀煙開江總宅草長謝公墩半榻棲荒寺聨裾訪廢園極知東壁蟋豈偶北溟鯤適越才開艇興賢正閉閽盤遊淹帢履情好隔竾塤想像登車節乖違祖帳樽丈夫矜大志兒女謾銷魂國伐書金鼎田家醉瓦盆所欣光事業非僅賴平反寄望天涯路因歌江上村阻風三山夾因偕陳碩士及兒姪遊三華菴菴內牡丹頗盛而僧不知惜也巖松塢竹俯江皋小檻憑虛散鬱陶南障近圍春穀縣東風遙送廣陵濤堂無鐘梵從僧懶徑有苔蹤記客勞冷落國香聊與慰午晴扶向石臺高又寄方植之一首草靑雲碧接孱顔一徑深林記共攀步屧只如前兩歲停舟仍在上三山巖空松響舍風急春盡花枝著雨殷寄語閉門千帙畔夢魂曾否到江關哭陳東浦方伯三十二韻自古思賢傑因時各長消孤生情易感偶合興嘗饒老我依經肆逢公駐使軺一從捫蝨話屢歎阿龍超九牧分濳霍三江帶射洮憂勞中野瘠甄鑄在城佻移轉天書重周流水國遙紫闈遲覲履白旐促歸鑣士尚崇三肄民懷奉六條縱非情合契應惜韻孤標昨歲舟同載秋林葉始凋登臨雲漠漠唱詠水迢迢山勢蟠吳越天風送汐潮援豪昔賢墓解帶野僧寮文字鈔榛碣泉源酌木瓢乾坤孤過客今古一終朝北闕求衣切西垂擐甲􅙀殷憂分聖代得佐豈虛朝未竟銘鐘鼎徒思茇琫瑤龍髯雲去路鶴語雪寒宵秦杵俄停相虞廷正罷韶滄洲波浩浩空宇氣寥寥六代煙霞郭三春士女橈神徠靈雨冷迹在緑蕪蘨車斗容凡物堂階切久要敢云當虎眂深辱好蟲雕江月今弦魄吳帆舉過􅊑出迎周士披哀和楚巫簫貽厥為箕近恩斯作室翹故人留白首賢子尚青霄盡此平生痛從今道路遼陳詩動冥漠帷帳颯風飇孫淵如觀察星衍萬卷歸裝圖自興雕板易鈔胥市册雖多亂魯魚君自石渠翻七略復依官閣惜三餘世推列架皆精本我願連牆借讀書政恐衡山承召起牙籤三萬又隨車
