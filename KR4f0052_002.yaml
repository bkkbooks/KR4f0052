  text: 惜抱軒文集二
  hash: sha256:9f86e999d24fba1bbff0b6ad9e382849d678728db735633f0450772509f7af0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0052_SBCK_002-1a}
body:
  text: 考郡縣考周之制王所居曰國中分命大夫所居曰都鄙自國而外有曰家稍者矣曰邦縣者矣曰邦都者矣而統名之皆都鄙也鄭君云都之所居曰鄙殆非是宐曰鄙之所居日都詩曰作都於向月令日毋休於都然則都者鄙所居城之謂也見於詩書傳記几齊魯衞鄭之國率同王朝都鄙之稱葢周法中原侯服疆以周索國近蠻夷者乃疆以戎索故齊魯衞鄭名同於周而晉秦楚乃不同於周不日都鄙而日縣然始者有縣而已尙無郡名吾意郡之稱葢始於秦晉以所得戎翟地遠使人守之爲戎翟民君長故名曰郡如所云陰地之命大夫葢卽郡守之謂也趙簡子之誓日上大夫受縣下大夫受郡郡遠而縣近縣成聚富庶而郡荒陋故以美惡異等而非郡與縣相統屬也晉語夷吾謂公子縶日君實有郡縣言晉地屬秦異於秦之近縣則謂之曰郡縣亦非云郡與縣相統屬也及三卿分范中行知氏之縣其縣與已故縣隔絕分人以守略同昔者使人守遠地之體故率以郡名然而郡乃大矣所統有屬縣矣其後秦楚亦皆以得諸侯地名郡惟齊無郡齊用周制故也都鄙者王朝本名故晉秦楚雖爲縣而未嘗不可因周之稱而周必無郡之稱以郡者遠地之稱也秦之內史漢之三輔終不可名之郡況周畿內乎周書作雒篇乃有縣有四郡之語此非眞西周之書周末誣僭之士爲之也漢廬江九江二郡沿革考自秦幷六國分天下以爲三十六郡其後頗復增置然世欲考秦置分土之實不可得而詳矣其大要自巴蜀而下在江南地爲郡日長沙鄣㑹稽江北地爲郡曰南郡九江東陽皆緣江以達海漢興以秦郡居地太廣稍分置焉昔禹貢九江之水居秦九江郡南今安徽淮南地及湖廣之黄州府皆秦九江郡也項羽分王諸將分九江爲二國其北封九江王黥布都六其南封衡山王吳芮都邾秦時呼禹貢衡山曰湘山而名潛霍山曰衡山始皇帝二十八年渡淮水之衡山南郡浮江是也故芮爲衡山王約有今安慶廬州黃州地矣而九江之水乃在衡山之國漢滅項羽徒芮封於長沙以黥布爲淮南王王九江衡山及江南豫章廬江豫章廬江之在秦不知地何屬也及漢爲郡以隷淮南黥布滅以布四郡封淮南王長長死文帝復封其三子安爲淮南王葢得黥布九江王時故地勃爲衡山王葢得吳芮故地賜爲廬江王得豫章廬江夫廬江者其水出陵陽東南而西北流經彭蠡以入於江至今猶命彭蠡之山爲廬山云故漢之郡國以是名之也廬江王賜旣都江南地鄰越吳楚反時賜使使與越交通吳楚滅景帝以衡山王勃堅守不下吳楚內徙之爲濟北王以褒勃而疑賜徙賜王衡山收豫章廬江以􅍘通越焉其後伍被與淮南王謀收衡山以擊廬江絶豫章之口思得江南以通越云武帝元狩初淮南衡山旣皆以謀反國除淮南爲九江郡分其西爲六安國衡山國爲衡山郡漢二郡之立自是始始者劉賈王鄣吳東陽三郡爲荆王吳故㑹稽也賈死以封吳王濞濞時吳郡復名㑹稽又易東陽日廣陵景帝罪楚王戊削東海郡又削吳㑹稽鄣郡今史記作豫章葢傳冩誤吳楚以是反國除以吳廣陵爲江都國頗予以江南鄣數縣故江都號爲得鄣郡而不得吳武帝元朔元年江都國以推恩封易王子江南爲丹陽侯湖孰侯秣陵侯及元狩元鼎閒國皆除然後武帝於江南建丹楊郡其東合吳傅海爲㑹稽郡其西南包彭蠡届嶺爲豫章郡而鄣吳廬江悉罷自秦於江南設鄣㑹稽二郡至漢嘗分爲四五而卒爲三郡焉於是江南遂無廬江名矣其後改衡山郡曰廬江然後廬江之名遂移於江北也太史公猶稱九江衡山爲南楚褚先生始稱廬江郡嘗歲時生龜長尺二寸者二十枚桓寛爲廬江太守丞然則衡山之爲廬江其昭宣閒乎及平帝元始閒錄地志者於廬江郡書曰廬江出陸陽云云此葢沿武帝以前廬江郡之舊說昭宣以後廬江之水不在廬江而在豫章也九江廬江二郡始爲九江衡山國時北界淮南界大江東抵滁水西循安豐以南其形截然以方及漢以邾屬江夏郡則西南缺焉史言衡山王賜當朝道過淮南壽春苟賜因吳芮故都都邾則往長安不經壽春賜都葢處其東疑賜來王時漢削其邾自是郡無邾也漢郡二國一共縣三十二今州縣二十七舒葢得今舒城南桐城北及廬江縣地左傳杜注廬江舒縣西南有桐郷又云廬舒城屬廬州府葢得漢舒縣北合肥南界之地江南有舒城按廬江郡治舒而云南有舒城者三國兵爭舊治己壞晉徙治於漢縣北故也漢晉置舒皆當孔道六朝畏北兵又遷僻地宋之舒治徙益東南廬江屬廬州府葢得漢舒縣東南併臨湖地疑今廬江縣矣隋因之改縣與郡同名唐又因之故章懷後漢書注云舒故城在今廬江縣西以杜注章懐之言度之漢舒治今桐城之北晉舒治今舒城六朝舒治今廬江隋無舒唐開元後置舒略當晉故城地宋元明因之居巢葢得今巢縣漅湖南地及合肥東南廬江東北無爲州西北地當春秋時無爲州屬廬州府葢得漢居巢併襄安地此巢國屬楚槖臯屬吳吳楚以漅湖爲界定二年桐畔楚楚師於豫章吳濳師爲苟簡考其沿革淆亂莫分逮於後世而欲求之不亦難乎自隋混一南北㪅建郡縣自是雖有遷變以至今日而與隋不甚差絕隋建置於久亂之後戶口尠少城邑疏闊是以漢縣三十二今止爲州縣二十七也曩者鼐在京師與休寜戴東原言世之方志言古城邑苦不考求四面地形遠近堪容置否是以所舉多不實欲以漢縣與今地相較爲表而貫他沿革於其中縱不能無失猶差翔實愈於俗之所爲地理書也東原曰善今夏無事遂取郷里所近漢二郡一國爲沿革考一卷多病廢學不能求博東原旣喪無以聞之設有如鼐此例盡考漢之郡國勒爲一書以禆學者則將以俟夫世之君子也乾隆四十五年桐城姚鼐記項羽王九郡考史言項羽分割天下自王梁楚地九郡而不載九郡之名余考之葢爲碭陳東郡泗川薛東海東陽鄣㑹稽是云九郡碭與東郡故梁地也自陳以東故楚地也故日王梁楚大抵西界故韓東至海北界上則距河下則距泰山南界上則距淮下則包踰江東固天下之膏腴平壤矣昔秦以水灌大梁大梁毁意滅梁後郡不治大梁而南治碭故曰碭郡楚襄王始都陳後爲秦得故陳爲郡陳渉世家云陳守令皆不在則秦有陳郡明矣張子房擬分楚地與信越正自陳碭畫之北予越南予信其後羽滅如前約越得其二信得其七復如戰國時之梁楚高祖六年漢禽韓信分信國封劉賈以鄣吳東陽三郡爲荆王封劉交以沛薛郯三郡爲楚王吳卽㑹稽也郯卽東海也沛卽泗川也沛者高帝㪅名餘或羽所改或漢所改不可知然皆羽自封時舊郡耳今本漢書高帝紀誤文以沛爲碭碭與東郡是時方屬彭越爲梁國且度地勢交必不能踰沛而有碭故其誤可意決也是時雖分韓信地爲交賈國而漢西收陳郡不予諸侯淮水東流過陳則少北流故太史公云賈王淮東交王淮西夫收陳者以南制黥布北制彭越也於是分陳西爲汝南郡故地志曰汝南郡高帝置其後漢廢彭越立子恢爲梁王友爲淮陽王淮陽得汝南陳二郡是時相國何等請罷東郡頗益梁罷頴川郡頗益淮陽葢彭越國本有東碭郡二郡今以王恢爲國太大故罷東郡半屬漢半屬梁也汝南陳本楚故一郡耳以王友爲國小故罷頴川半益淮陽半歸漢也計二國各得楚故一郡又半矣及景帝徙淮陽王爲魯王復空爲郡太史公云淮北沛陳汝南南郡此西楚也陳在楚夏之交故知武帝時尙有陳郡矣宣帝時乃復以陳郡爲淮陽國漢自武昭宣以後王國減小於是梁淮陽國不滿一郡始者灌嬰夏侯嬰傅寛等傳皆云從追項籍軍至陳破之故垓下陳地也而在洨縣至漢地志乃載洨縣於沛郡賈誼欲割淮陽北縣益梁之東郡度誼所欲割者後或入沛或入陳畱則淮陽與東郡無鄰地焉惜抱軒詩集二古體六十二首送侍潞川主德州書院用前歲在揚州畱别韻一枝鷦鷯巢高蹈許由狷士生各有志齊心孰同願美君騏驥才掉鞅淮南甸策名白牒中早與南宮薦家託管絃城靑樓列玉面百里雉未馴行用陽春變而君獨何苦遠走妻孥訕任公釣會稽豈作井鼃見巳信黔婁富寧有陳平賤嗟我游孤踪南北舟車徧索米饑八尺摛賦羞百勸賴君毎見阿欲忘鄕閭戀如何燕市酒㪅作郵亭餞經譚東魯麟曲唱西飛燕諸侯重上賓六籍傳下縣淸廟奏升歌待君調駕辯小別近郊門踟蹰應回眷柬張橿亭庶子我愛嵇中散讀書想介狷濁酒彈素琴了畢平生願孤生託江淮垂纓入王甸匹若菁茅微偶與芹菹薦生世湘中帆曲折衡九面可憐牛馬走坐閱魚龍變渾沌中央死巒壑北山訕空館復何有皓月相邀見九衢金鑰開萬樹銀花賤不及輕薄兒珠樓聽歌徧知君亦寥寂座乏尊罍勸惟應好兄弟短檠猶堪戀金匱紀神功大蒙入寅餞柱石佐休明厦成紛賀燕丰采天下思奚論同鄉縣豈如一曲士聊游六氣辨未稱八金門靑山結遙眷次橿亭韻寄張安􅛛曾份天運自密移至道無遷改小夫每自私乗物以智宰往來撓世紛茫如㲹瀛海焉知鶉居德眾萬納淵滙寧憂聾五聲而目盲五采君如懸棟材起負高甍㟴我如小莛柔叩鐘婾欲怠二者同物役黽勉赴褒采昨日東風休夏綠謝春蕾豈不感嗁鵑鄉思寄江茝兹意恐亦非韋布驕錦綵不若兩俱忘養空復何待送鄭羲民忬郞中守永州至德交萬物賢否各有宐譬彼蕙與艾同被春風滋鄙人出孤陋小若鷽燕知託君通家愛謂我相逢遲大賢何不容而我竊自私造請百不厭童僕或㫄嗤雨窗黯靑鐙聽君絕妙辭淸韻倐邈遠南行指湘灕遠近何足言跬步有離思儀郞古淸要位望今巳衰出守千里疆豈復嫌一麾歸家酌玉尊綠窗櫻桃枝起挂衡嶽帆天碧劖九疑曙日淸崖猿渚風搖江蘺一聞漁父唱再繼桺侯詩臥理丹橘閒民言不忍欺公行良自得何以慰余羇紫藤花下醉歌用竹垞原韻紫藤書屋古椽橑紫藤春花復秋槁紫藤架底著書人吟魂冡閉縈靑艸過從飮酒雕龍客百歲風鐙迹都埽由來歴世猶駒隙安得長生服龜腦況余本性𣏌桺直戕賊彎回成栲栳朝走黃塵暮歸坐便覺明鐙賢晝杲今日攜行差快意佳士花陰共懐抱虬龍兩榦拏空立瓔珞萬條垂地倒晩春蜂蝶惜來遲夕照尊罍歸厭早賞花京洛稀常遇吹鬢東風易先老承恩自昔如竹垞抵巇一旦辭瓊㠀男兒恨不早歸去脫粟可餐衣布襖鄙人欲作雞棲桀多士自欣魚在藻乗舸春水向江湖迴首花前幾人好趙北口舟中作鳴蛩濼岸秋􅋊月趙水白捨轡理輕橈蒼茫盡湖澤葭菼遠蕭蕭鳧鴈時拍拍地有瓦橋城路失金隄石民昨歌子威皇今謂河伯不見秋歸壑那免春無麥坐愧田居懷未辦經世策想見滄洲人煙波偭咫尺景州開福寺塔俗云景州塔爲天下塔王百里見卓錐震旦仰雄最叩門謁香臺據地乃非大削立外無堦穿空中不礙矯立長風巔萬里散秋籟天地莽相圍白日轉檐外太行靑嶂􅍘煙霧積幽藹漳汶與滹沱流空忽交會帆檣趨溟渤鴻鴈下吳會回首送秋雲蕭蕭出燕塞緬思開皇年建造盛幢蓋移國女寵階貽家適宗廢福田安得長遺迹巋猶在嗟余塵鞅倦聊駐絕景對落景下層梯茫茫廣川晦德州浮橋運河繞齊魯勢若張大弓隈中抱泰嶽兩簫垂向東德州倚河壖南北適要衝帆檣遶其外車馬出其中浮橋與流水午貫相橫縱嗟我游中原來往如飛鴻弱冠一川水屢照將成翁大澤涌飄雲滄海起飛龍鼓蕩漳汶氣日觀交鴻濛落葉下河隄飛雨來淙淙觀河吾眼在憑檻望秋風九月八日登千佛山頂泰山岀靑雲天半蒼然獨梁宋曁東溟萬里環其足陰嶂走濟南雲濤尙奔蹙勢盡凥益高塹􅍘無陂麓振衣斗直上陟磴逾援木落葉下濼泉秋風散海曲一卷華不注拖雲點靑綠猶見山花開顧絕棲鳥躅高寒不可畱歸來泛秋菊大明湖夜南山已暝色回見明湖光秋盡濟南郭渺然江水長中流上新月輕舸復徜徉煙昏鷗鷺㝛波沈蘆荻蒼孤往仍中夜回飇城曲涼亭楸高拂霧寺棘下零霜佛幢猶立魏名士正思唐安知後游者聲迹永相望從千佛寺回過汋突泉暮飮張氏園濟南城南山正橫人言山前舜所耕崩榛衰艸蔽秋色古井深崖餘昔淸曉入南山僧住院爲訪北宋人題名初陽穿入洞窈曲佛龕鑿破山崢嶸大明湖動水雲白華不注抽煙霧靑惘燃憑欄忽歎惜古人不與余同生南尋日觀諒未可回念濼源重一經流穿山骨軸中出人遶瀵魁輪外行誰言渴馬半崖水解作黃牛三峽聲顯晦動靜一致耳惜哉枉使羣兒驚敗荷衰桺下零亂夕陽逝鴈高靑冥卻入荒圍洗盞坐㫄有小泉時復鳴白河京師如倚屏其北萬山立往往塞外水南穿塞垣入旋衰才沒踝驟盛懷原隰未出軍都障斂若衣在拾汗漫順義西毎當驟雨及橋梁旣突壞猝又無舟楫聖人歲北廵虎旅萬羣集灌漲夏秋交吏以供張急治道艸露閒隱慮事不給六飛竟安驅神靈信懷輯我來辰角見征衣不挾笠明當迎翠華夜渡漲沙溼彌知近塞寒霜風凌袴褶送張橿亭少詹爲晉陽書院山長兼寄朱石君方伯東坡在密州除夕詩云龍鐘三十九勞生已强半鼐與少詹方伯皆辛亥歲生今三十九矣故用其韻吾生如尺捶焉勝日取半少壯曾幾時撫節能無歎昔年十八九里舍共嬉玩見君升明堂瑤璧薦角散鄙才何所中强逐冠蓋伴賢愚別驥駑征邁同昏旦凋年感新歴短檠熒舊案坐閱燕郊晩行想淮流亂懿君淸素懷室闕奉匜盥聯居幸時近呻吟聞鄭緩倏遭浮雲翳孰辯淸濟貫余才從俗客署尾豈非懦孤懷復送君冷若冰中炭郊環如可待休踰燕昭館運會有屈伸賓餞易寒暖別離不可數垂領髟行粲代幷控朔漠連峯矗天半形勝擁晉陽英傑昔稱歎碧玉唐叔祠春陂足流玩俯仰一古今摛筆朱霞散誰爲賢主人十載承明伴方伯氣俊爽淸風發平旦孰言揚馬才治乃任牘案淮陽一臥臨渤海何憂亂垂澤巳如膏虛手眞若盥君往風景地流連帶其緩頓使庸俗目驚見兩崈貫誕生同一歲少長惟余懦竆冬方兀坐雪窗聊撥炭想君越井陘稅車行授館旉文列士興吹律竆谷暖離立不可參曷由發笑粲安肅道中簷聲三夜滴牀頭海日三朝照衣領風淸每快行人意泥滑仍爲車轍梗南行常遶西山麓靑銅新沐煙鬟影出岫溼雲行自媚蔽野綠陰寒且靜高禾連壠出􅉭槊行潦逾道跳蛙黽㪅有水田白鷺飛便如長夏江南境少年燕趙苦行役十七年閒一俄頃故人黃土寧復見古道荒煙聊自省竹輿夢􅍘一蕭疏高木嘶蟬挂􅋊影甲戌往王端木楷太守署所經此今十七年矣獲嘉渡河河北山形壓天半左挾軍都東海岸雲騰風掣到河陽二千里餘靑一􅍘我來經過衞州西雲巘迴頭百回看竹林亭立明玕淸原泉飛下珍珠散想見幽人尙考盤安得同歸脫鞿絆北風忽出白陘口吹渡秋河百川灌山川聊供中流喜舟車顧有知津歎西南廣武數峯來屈指英雄幾㪅換許州初秋過潁上艸木尙蒼然午日澹平野極望空無煙亂蟬相繼響獨樹垂陰圓舊渠八九廢許下猶良田如何文潞公種竹纔㛹娟行受使相寄不見車蓋旋荒園今亦盡潩水長涓涓西平明月郾城頭汝水下㶑灔五㪅楊桺底渡艇聞魚噞水南人未起行行一鐙閃鐙盡天轉黑數星澹可覘冥行不知處高下似原塹此閒入蔡師吾心爲一念館人邀我入酒幟曉挂店適已具晨炊行早食定欠㫄見婦孺喜今年秋禾贍軍罷驛傳稀民吏安眠暫吾寧作典農差愈棠谿劒吳戍橋巳盡韓鄭郊始入靑山路積雨曉未開前嶂隱忽露風林上蕭疏谿水下奔注傳聞元和初於玆畔藩戍地險九州分天子一朝怒上相歌采薇嚴軍入懸瓠千營盡凱歌三州始內附豈罄作輔材差免輿尸誤當事始知難斯人豈常遇沉沒不可論寒陂下飛鶩渡淮朝日出復陰廣野風浩浩淮源山萬重飛流下穹昊渺然走滄溟梁楚在襟抱汝潁交東環穰鄧控西道秋水欲歸壑憑渡馬腹燥撟首桐栢陰展坐淮南艸隧岸鳴蛩蛚邨簷挂棃棗風土近鄉里問語向耉老西成未爲惡苦被飛蝗惱連材撲未盡何以實萬寶長嘯招西風害氣一吹埽應山至孝感道中山光異遠近閒若重樓花行人度高下起落波中槎足迹未辨鄖隨國半生左史窺浮夸義陽關南出鳥道縱觀蒼壁澂朝霞野田茅屋秋未冷高藤翠木樛相加千峯南盡出江面一鳥東可投吾家上游勢已據荆郢左肱屈㪅招蘄巴胸吞雲夢不芥蔕囊括漢國無離􅏠宐有奇才表荆楚不然深谷逃麏䴥惜哉我行不得遇翩翩且逐投林雅寄仲孚應㝛曰余性質吶諧物無言詞游宦二十載殊乏新相知依依鄉閭愛握手自丱羈臭味若椒茝非是孰爲思今年覽雲夢飄颻來沙羨江漢一以會秋水浮天垂廣川起孤望日落吹參差憶昔各年少共戲澂江湄靑天澹秋色帆舉風颸颸海月萬里上屬酒酬淸詩歡樂去不復青鬢將成絲萬事無不改風景長如斯拂衣便可去濳霍吾前期登黄鶴樓次補山韻夷陵西望巴山連大江出空如墮懸奔流一抺蹙滄海大別黄鵠橫障天導江至此一夾束瀠洄衣帶高樓前憶昔赤烏始築邑憑軒雷鼓空江塡此閒開勢自明遠釣臺樊口誰能賢一朝金鴈瘞吳郡何殊繐帳臨漳川高樓千載幾興復傳芭士女徒哀憐因山命名義自當俗說詎可丹青傳虞翻地下應大笑孰逢黃鶴騎飛仙我聞譙郡戴仲若往往野服從䰻畋仙人母乃卽此是惜哉林壑空蒼煙農部腹中有武庫瘴鄕幕府嘗周旋罙入深穴縛虎子欲效左手如羊牽正當千里縱黃鵠豈將一渚從棲鳶嗟余年往道亦廢顧思暇豫偸安便陪君欲鼓瀟湘柁湖南未到秋雲邊漢口暮見樓雉影江風曉踏蛟龍涎晴空孑孑上反宇天幕澹澹垂重淵無心坐見白雲滅屹立惟有蒼山堅人閒萬事不須說跂足當樓聊醉眠雨登岳陽樓衡疑阻南服江漢朝東溟巴陵山澤會煙雨長晦冥風交廣漠野雲起盪天經荒忽洞一氣焉揚帝子靈坐銷積霧白稍見君山靑波下辰陽渚秋來襄郢坰澹余千里客城觀此孤停奄落西陵日餘陰橫洞庭咸池行復奏倚待與誰聆由橋頭驛至長沙雜樹接行雲䢅朝吐淸氣遙望西峯頂已上丹霞蔚遠山狀一同近嶺形千彙㵎霧忽成陰巖蘿密如衣泠風發空響幽愴多髣髴漸出深谷口始縱秋泉沸湘帆轉昭曠途夷畫經緯遄往凑舟車趨來孰涇渭物象倐以遷亭午待猶未緬憶獨居情將母狥俗畏嶽麓寺兩巨松數月前風拔其一萬林圍一嶺古寺仰白日客來亭午後峯陰落崷崒山巔長風起鼓盪四蕭瑟寒聲沈谿涯激轉久未畢老僧寂來對坐石邈悽慄延登佛閣望淸湘隔林出雉堞帶洲斜帆檣轉雲疾此身偶南寄天光正東溢新霜倏巳零斑駁靑林密殿角兩鬛松風雨失儔匹惟有石閒泉澂泓總如一前賢杳無見來者悵難必試將萬古懷移問金仙術九日渡湘水夜雨長沙郭餘陰被湘洲攬衣趨朝津朋好方維舟微飇颯以生澹蕩向中流初日忽東上連山正西浮葉落洞庭渚邈然江漢秋昭曠有餘景沉沒靡前修涼風送陽鴈空景弔陰蚪孤思安敢極良會聊相求詣嶽麓書院有述夙秉宋賢說太息懷斯文矧近講席前遺趾播餘芬湘東望湘西連山如陳雲亟渡入谷口空翠四邊分築室倚岝㟧開宇面巖垠當門古澗響環墉高樹曛荒榛延暮色泠風交遠聞去之六百年垂敎志何勤藹彼援鶉手傷玆獲角麏吾生志不就斯世邈無羣回艫天地晩空悵逝沄沄鐵瓦祠寒雲飄烈風盤石壓其上後踵倚絕壁前趾踏驚浪老松奮壑底長鬛仡相向結構託翠微丹靑昔何壯元武盛嚴衞髣髴動幽愴好從神霄淫迹自宗藩創神理有誕欺人事閱興喪衡岳百里外隱然出南望吾聞董鍊師玉顔故無恙解帶逝從玆將入靑霞訪爲香茝兄題秋梅圖梅花如幽士盛满毎不居澹泊向春風養氣故有餘雨晴百日暖天葩還自舒八月風露冷金波滿堦除傾城矯獨立疑來霽雪初主人昨何往密箐蠻獠廬伐畔安反側功豈崇誅鋤排斥蓐收氣獨任春扶輿寒􅈦慰歸眼香影橫空疏借問花無心何爲能待余君看同晩節芳情長宴如隆興寺閣烈風吹沙昏天低雪將至晡度滹沱水騎入隆興寺結阿層欄轉嵬閣當空企平當金像面下臨欲無地伏聽驚飇響緩送飛鳥墜迴首諸天外蒼然向幽冀自從隋唐來恆州幾鎭帥轂綰太行口旌麾委兒戲頗懷宋藝祖親攬六龍轡方釋晉陽圍迴岀土門騎山海近英盼渤碣在指臂圗黯隆準顔堦存刻石記黃士蔽賢愚萬古一幽翳冥冥止觀理漠漠浮生事何爲李匡威獨下登高淚定州遇雪夜出眞定府巳行一百里日晡人馬倦西風大無比大聲長遶空沙石四面起竹輿轉人肩翻翻欲見㡳偸眼望太行亂雲出其裏落日映其上昏黄到山趾投憇道邊廟相對袖縮指面色纔一回計程不可已入輿坐龜息下帷任所詣漸聞棲鴉聲始知風稍止張鐙到定州空庭月如水欲看雪浪石城閉二㪅矣夜臥聲㪅寂寒光忽透紙不知何時雪茫茫沒人􅛛踏冰渡唐河隔岸朝暾啟長椿寺觀明劉孝純太后畫像辛卯年春同數客宣武門西登佛閣壞牗長椿寺裏來畫圖崇禎年閒作仰瞻后像非副禕卻號菩薩佩瓔絡莊烈自初封信邸顧影摧心長巳矣夢魂不識劉孝純外家顧見徐夫人法駕淒涼迎畫像髣髴平生眞未眞內宮巳拓奉先殿外寺還修香火因當時圖像别有一供懸卻在瀛國室宗社竟至甲申年戚里都爲灰燼日太后門眞忠孝存一朝畫與山河失不知寝殿託誰人惟有此圗長傍佛君不見前有九蓮菩薩容奉之乃在東嶽宮松楸石屋深陰雨神鬼虛檐交泠風興亾死後誰能必富貴生前迹巳空罷歸三歎徑歸去澹澹靑天翔暮鴻會試出闈作季春八鎖闈土靑芽未寸漸復槐枝暗鸇毆納鳩遯滿堂皆彦英末座寄頑鈍朱紫目爲眩反覆心亦困仰屋偶欠伸放筆才一飯單緒少黨親愚者昧恩怨自任平生懷豈爲他人勸丈室忽託想風隄吹馬噴徒有遙山青隔城不自獻靜極遠囂來髣髴雜裨販今朝始縱步妻孥迎問健坐看轉夏陰掩戸散無悶沈椒園按察晩芝亭圖昔侍先伯居鄉邑四海賢人嘗語及淸如冰雪沈御史復有瓊瑤好篇什出持使節海岱閒吹满春風開束溼生爲後軰見之難公至暮年名轉立郎君與鼐再世交尙書禮曹先後入毎看鶴骨出人羣輙想龍門趨父執京師昨竟到軒車謝客未嘗容拜揖鼐也問疾就郎君語重行艱年七十傳將畫照索題詩展冊欲書眶已泣卻思先伯年正同曳杖歌先駒影急幅巾終冀一升堂白旐忽看翩指隰從玆前軰彫零盡況復孤生塗路澁城邊執手別郞君歸看畫圖仍在笈紫芝深谷自長生茆屋秋風爲誰葺惟有名德寄人閒兩家後裔收文集王少林嵩高讀書圖我初訪子在揚州天寒攜手王夢樓破窗鐙暗風䬒䬒擁褐無伴聲伊優推闔徑入驚仰頭王君戲子令子求指我君識是子不多君曾未一面謀道我姓字能探喉王君撫掌笑合眸一朝省試同見收無錫尙書賓館稠朝退論經幾客畱召我與子時從游王君先達居上頭我才於世眞一鯫俯仰郎署斑生髟尙書零落今山邱王君放浪江湖舟邈然罷郡歸幾秋笑我滯迹猶貪婾君如百錬不改鏐名在吏部將鳴騶偉建功業爲民休正當容我狂不羞少日讀書老壯猷回思故迹眞雲浮夢樓少林及鼐皆出秦文恭公之門而夢樓爲前軰送沈觀察淸任赴四川同知任古槐連理陰初綠禮部後堂庭有槐連理明朝植也我始逢君偕署牘春長風暖笑談餘身若停鸞面如玉旄麾忽去暮堂空葉落霜初森似束使君行部向竆山吏議藂輕俄折軸全家安否託江湖罷俸如何飽饘粥君還京國足如蓬我老塵車耳生木浮生託迹皆偶爾往事回頭嗟夢速喜君容貌愈充然有道何嘗驚寵辱亦知傑士不長閒所惜歡情猶未足竟作西南半刺官終起休明九州牧小蠢沈黎兵欲銷大餔成都酒應熟不須別緒道酸悽好與疲甿作膏沐送張侍御敦均歸里昔交湯緩叔信覩儒者傑好學老不衰養懷貞素節自還江上廬奄忽喪明哲當時承學徒幾家誦師說侍御獨尊聞前賢道未歇澹無才知競眞抱與眾別與君居連巷頗覺造請缺世外託知賞豈必相見熱羣才方進用君子胡退列旣往發遺經繼學良可悅日月正遷流所憂變齒髮俛仰尙後君豈不媿頑劣甘泉宮瓦歌漢家離宮渭南北前俯終南插天色椽欒山北古明庭盛夏凌兢寒不釋萬乗長安未足居迎風旣立增儲胥年年避暑雲陽去儲偫千官趨道途紅光翠氣相陵亂甲帳珠簾設霄漢美人鼓瑟待神仙羽林拱衞行人歎弄兵戾子起觸瑟何羅來甘泉見聞乃若此士木壯矣人危哉宮車卒別寒門道甍宇雖存瞻可哀嗚呼況復狐兎穴零瓦當年一膏血捨置耒耜作陶旊鞭笞畚挶升墆霓辛苦前人匠作誰摩挲今日形橅別君不見林光旣秦餘九成亦隨舊宗廟旣已夷慆心猶未究先王宮室蔽風雨侈君土木衣文繡千窑巳作向南山三輔幾何不苑囿茅茨太樸固未能露臺不起寧非厚陳屋三瓦戒居盈作室幾家貽肎搆對此悲傷千載心漢事巳過良勿又羅兩峯鬼趣圖形役此勞生束縛日來往謂當返其眞六氣同一廣如何釋委形轉受拘物象匹若脫繭蛾翻飛挂蛛網君看隙外光穿落窗中壤或方或橢圜橫斜直曲枉游光倏忽暝玆形究安放萬象不可竆顛倒由一想幻作三途業何異景㒺兩畫師如說法染筆興幽愴變狀悉呈露目覩非髴髣觀象轉得空智者一反掌天人阿修羅一一超無上稽首証導師玆義實非誷萬壽寺松樹歌呈張祭酒裕犖萬壽寺有元朝松七株偃仰無一同五百餘年到今植幾時變化風雨中我來頻見尙動色挐攫未敢趨當中甲戌京華夏初及禮闈始散羣賢集翰林邀客會城西寺門正帶朝暉八冥冥氣蓄雷霆寒颯颯風搖露枝溼是時同軰八九人鼐也年纔逾二十同披單衫趿輕􅛛一時散向松閒立風流諸客皆好文當筵意氣陵靑雲有松嘗經幾輩客高論松前曾幾聞自從車馬寺外分十年一半爲邱墳甲戊祭酒爲編修分校出邀同游者張鏡壑閣學涵暉助敎馬牧儕舍人方午莊明府眉山孝廉今皆殁矣嗚呼此地松猶在薄游曳杖僧窗外萬里秋吹遼海空重陰晝塞西山隘獨聽䬒䬟恐欲生況經搖落情先廢借問種松樹松樹何處無吾邑最南境何止百萬株上枝搖蕩濳霍雲下根磅礴松山湖往往中有宋元植榮枯蘿蔦騰年少去之歸老夫何況不歸使松孤君不念男兒莫待齒髮脫無情松樹始長活嚴侍讀長明散木菴集時嚴將南旋風日一何佳初冬殊未冷高齋客來暮檐陽露俄頃小庭木盡脫蕭蕭散空影所貴人心閒適與物候靜平生值數賢驟見良巳幸招邀況一室行不待造請主人無俗懷稍爲設蔬茗旣脫形骸累觀醉不妨醒試思士多才奚啻木有癭苟得謝斧斤何嫌寄幽屏所惜送將離屈指江路永曷以盡餘情宵深燭猶秉延祐元年江西鄉試石鼓賦卷題後小赋八首蘇君書我初見之詹事錢坤一載篋短檠風動目揩頻長卷夜寒手鈔怯延祐正當元運中詔書初行貢舉法主司聘用行省書布衣名上州縣牒十八路竝集隆興第二場中題試帖至令異日蹟還畱想見同年心最愜當時鄧公主浙試深褭吳生奏鄉捷聲名傳少惜終淪拔取雖多頗非躐低佪千載岐陽皷笑談一代慈恩塔文字貧兒矜敝帚宇宙飄風吹落葉賦好誰人手可义時過幾日鬚當鑷童幼嘗爲揚子雲長大㪅思袁伯業世閒筆墨未能抛太息古人譏目睫章華國課子圖君居西郊我城裏同飮桐谿一谿水我行京國百不歡惟見鄉閭來輙喜值君新著隴西績收縛竆姦才折箠侍中贊引入金門天子書名畱玉几出同鐙火倍欣然行異關河良久矣室家勞問到髫羈歳月崢嶸看髪齒一經君巳勝籝金四十余才射蓬矢根柯羡說長豫章圖畫㪅敎看騄駬失笑天吳紫鳯閒那免任童蔣翁恥君行努力快淸時身活千人家必起卻賦徐鄉有二雛所愧衰遲如子美寄蘇園仲蘇君信慕古閱世如有道蕩蕩胸臆閒不知何者好小心眾人內高視萬物表徒欲春馴雉而羞夜撮蚤作吏見不能收身豈嫌早平城山後郡八月衰塞艸蠥狐祥一邱固由佳士少君往聊託居巳使陋俗矯日昨向汾陰南行就稉稻目病細書難交疏吳語悄兒􅍸苦憶翁女嫁巳泣媼授館賴主賢妻孥稍相保嗟我别君來仰見昏中昴千里懸一心頻搖不可爪位置賢者生豈不在蒼昊正以松栢姿不厭藜藿飽諸生朱游客數帋山公嬲寄聲問起居曷以終素抱十一月十五日雪翁正三學士偕錢籜石詹事辛楣學士登陶肰亭回至鼐寓舍與程魚門吏部曹來殷贊善吳白華侍讀陸耳山刑部同飮至夜翁用東坡淸虛堂韻作詩垂示輙依奉和竝呈諸公西山指海如龍蛇揚雲弄霧行衙衙九門陰靄塞朝景雙闕明光開玉花羣公欲眺山半脊高閣上出城千家皓空正對北風客斜陽忽送西林雅八逢日至在京洛又見郊仗陳莖葩好景宐從客游戲碎事厭聽人梳􅐡惜未聯鑣踏冷絮顧承枉轡呼煎茶月堦凍面行蟻盞雪地立奴垂馬撾漸至中宵柝三兩猶取前軰文稱嗟後來知㪅道今不自記過眼看雲霞爲翁正三學士題東坡天際烏雲帖東坡自謂字無法天巧繩墨何從施青霄碧海縱游戲自中律度精毫釐嘗託西湖佳麗地仍記閒情書小詩前人不見蔡君謨後人不識柯九思人生翰墨細事耳古今相接良賴之學士新作蘇米齋欲飽看字􅓼輖饑此冊神妙尢所祕雲煙閱世憐公癡今朝我㪅作公病歛冊向篋重手持日午來看到昏黑兀兀不樂歸車馳學士平生妙臨本試作嘗眩眞鑒知請煩冰雪襟懷手再寫佳人絕妙辭三長物齋詩爲魚門吏部作椒花吟舫學士朱十年種樹玆舊廬主人擁節江山去遂使程侯來借居長身美髯眉鬢疏吟誦齋中朝與晡竆病聲名五十載劣將文字調妻孥埽除萬物無一須猶藏玄壁值連都咸亨舊碑北宋搨同時一硯遺大蘇風流頗與前賢俱文力猶健斑生鬚天地大矣偶相寄三物一身游有餘學士江南昨寄書齋前修竹復何如春風欲展小庭綠晴日涵空軒檻虛我亦長安一腐儒戲弄筆墨來停車人閒長物伴閒客正爾齋中不可無送吳編修敬輿吳侯自學道往往造淵靜不以宇宙廣而爲一塗競桃李常不言儕類輙愛敬乃知君子器宐從大夫政在朝量已優吿歸韻尢勝名班三殿㫄身逐一帆正花落春水生天合松陵鏡或逢鄉曲人爭席昧名姓刈艸先人廬種松邱壠徑倏忽秋風生相望北枝勁所恐竟脫屣杳與海鷗泳董賢銀印歌爲嚴東有作渭南城郭都非故南對南山止陵墓書生嗜古寶􅋊餘忘卻興悲啟幽戶小篆鏤銀印紙紅土花新洗到關東回頭秦嶺傷心碧袖裏金貂漢侍中花朝雪集覃谿學士家歸作此詩京師信人海時時遇賢哲事會一聚之倏復𡵨車轍出動千百里入乃限禁闥遠近雖則殊容儀皆邈絕獨玆五六人有職幸非熱從游頗最久盤斚遂屢設亦知天運旋終當有離別在目且欣然流連詎能歇正如春未深坐賞花朝雪平生覬聞道隨處知可悅淸宵接嘉論有蒙固當發遂歸吟塵窗耿未寒鐙滅述懷二首門有吳越士撟首自言賢束帶迎入座抗論崇古先摽舉文句閒所守何戔戔誹鄙程與朱制行或異旃漢唐勤箋疏用志誠精專星月豈不輝差異白日懸世有宋大儒江海容百川道學一旦廢乾坤其毀焉寄語幼誦子僞論烏足傳昔者先端恪實作虞廷士質對與神明非邀矜恕美一端或自咎中夜輙懲跽當時網信疏姧猾亦衰止先朝忠厚統所垂良遠矣自是百年來法家常繼軌刑官豈易爲乃及末小子顧念同形生安可欲之死苟足禁暴虐用威非得已所慮稍刻深輕重有失理文條豈無說人情或不爾不肖常淺識倉卒署紙尾恐非平生心終坐再三起長揖向上官秋風向田里魏三藏菩提流支在胡相國第譯金剛經刻石拓本佛在祗樹園當時說此經須菩提跽前涕零復有千二百五十人㫄聽艸堂寺盛秦姚興鳩摩羅什天竺僧譯諸經品中此經爲大乗後有菩提流支來世言可埓羅什才侍中崔光爲執筆相國之第爲之開別出譯本􅥵崔嵬自從西晉亂震旦人最苦是時佛法興經律徧中土大慈無力拯橫流象義猶能歆暴主其閒暫廢太平眞君年厥孫事佛俄加䖍廢者奉道希神仙復者諂媚求福田糜爛戰鬥峻刑網竆飾寺廟開法筵太和以來旣南渡洛陽伽藍起無數胡后宮闈不可言永寧佛圗功最鉅後胡國珍前馮熙敬事釋門皆后父富貴已極憂死生外戚無功謂神助譯經㪅薦國珍死作福寧非太后故我聞佛法不可文字求廓然無聖道最優天宮龍藏積萬卷紛紜律論誰竆􅊧其中佛語魔語雜埽除皮毛見正法章句文義若爭巧不二無言何處荅君不見胡后起自姑為尼死入雙靈寺內棲其始以此終亦此妙義那知葱嶺西河陰朝士埋碧血洛下宮閨生蒺藜祗有靑山宗片石畱傳絕域舍婆提崔光執筆事見三藏法師傳此譯本云佛在舍婆提國錢詹事座上觀沈石田畫檜歌三百年中畫第一天趣橫流腕閒出弟子尙作文徵明先生自入董源室長卷大樹爲者難屈伸神鬼開雲關忽移拔地風霆閒紙上已作千年斑常熟蕭梁七星檜七株今尙三株在一株橫空偃圓蓋二株曾遭雷火焚直幹依然挺靈怪海氣沉霾古觀中行人太息虞山外徵君攜客游觀之自從圖成復寫詩豈徒艸木生顔色談笑風流皆可思吾家乃在舒州住未過鎭江東一步曾聞此檜不曾逢卻憶江帆建康路壬申之歲給事園往看六朝之松樹長鬛上激虬龍嗚蜷身下作狻犀怒江寒浪湧排風煙日落天空走雲霧此松此檜遙相望神物而今松獨亾樵薪荆棘誰當念寂寞巖阿亦可傷人閒貴賤誠難測且展煙霞吐胷臆作畫看山終此身富貴不以離其親已逢洪治昇平日㪅作東吳偃臥人古樹江南春復春可憐輪轍盡勞薪世閒詩畫猶餘事令我長思眞逸民王舍人友亮坐看雲起圖濳皖萬嶺江之西朝雲暮靄長升躋吾家乃在雲中住出戶二里三里迷江上看山卓雲立畧與吾居平地齊吾嘗䇿杖㪅西上猿捷鳥逝非常蹊嶽雲盛氣遠蓊合何所埋庪元封珪竆丹踰翠亂雲墮其上點點才如鷖乃知大山宮小霍一邱軟艸平流谿不謂坐處巳嶃絕但覺四面峯頭低雲生石罅走一髮下作霹靂淙鳴畦繚繞連峯態萬出咫尺晴日交陰霓暮㝛僧菴光正白月橫露壑風淒淒晦明朝暮看盡好惟有遠別無由攜君家看雲昔黄海新居乃卜長干堤崇山到此勢已盡吐氣猶是龍虎棲欲竆餘霞散綺色請登天闕攀雲梯嗟余送子隔雲外獨憶秋山猿夜嗁七夕集覃谿學士家觀祈巧圖或以爲唐張萱筆也驪山秋樹圍宮殿列屋同居異歡宴人人七夕望牽牛歲歲秋風落團扇渭南渭北明河光張生腕底風露涼定知紈袖停針後金井殞梧聽漏長玉貌綺羅天寶末霜霰未深炎已奪宮中兒女爲情死牆外書生籌國活燒燭披圖又一時夜深題作女郎詩靑天纖月長如此巧拙人閒那得知今歲重九翁賈谿學士登法源寺閣作斲字韻七言詩亦以屬鼐而未暇爲也學士屢用其韻為詩益奇臘月飮學士家出示所得宋雕本施注蘇詩舊藏宋中丞家者欣賞無已乃次重九詩韻學士金石􅊧南朔攬異爲詩工刻斲閉門高興逸如雲舒紙揮毫疾逾颮今秋九月金垂砌西嶺無雲玉出璞霜寒勇上寺樓看風舞懸旛翩不卓成詩淵海得驪珠欲和空倉饑雀啄玆䢅招客爲看書來似鴻儔飛撲撲雕鐫遠有嘉泰字收藏近與商邱較蘇詩傳世幾千首高語去天眞一握當年獄案可悲傷他日注家還踳駁此編晩出施顧手黨禁正解東南角後來補闕㪅何如虎賁雖在中郞邈耽詩愛古皆結習計短衡長非大覺曾薄富貴書何厚甘典衣裘襟可捉子瞻自是千載人學士豈比無心學佳本與公吾亦欣叩門會辦來觀數用前韻贈朱竹君學士嘗聞至德還其朔緣餙雕幾皆鏟斲忘情世患了不驚絕勝爰居避災颮先生㝛有超世量刮摩無功完太璞出受使命寧熱內善誘諸生忘苦卓先幾獨奏啟鴻文後學多聞承鷇啄世人那悟鴛雛德纖兒枉作蚊䖟撲卻思此地羣冠蓋昨歲春風送重較僕時貢院從有司不見乗軺節在握默懷鄉郡江淮上道樹未嘗忘六駮懸知按部方千里曲若回文周四角傳聞山水頗流連復有篇章發幽邈歸挍中文亦復佳人道左遷原不覺最欣朋好復尊前風月不須勞捕捉子長好奇餘一病枝葉曷芟歸本學與君差近古人交苦語未嫌朋友數賞番圖爲李西華侍郞題禹昔導川疏溝渠四載不及東南墟漫天漲海游龍魚西畍閩越東尾閭百島散處黑子如自漢不屬王無諸聖朝持載配地輿鄭氏世竊蠻㠀居曷不稽首朝殿除仁皇在阼二紀餘天戈南指皆薅鋤設立郡縣軌同車御史監郡法秦初歲在困敦月在余臨川黃門受詔書南征軺傳前建旟舉帆度海風帷袪宣恩諭德遍里廬是時萬彙蒙煦嘘啟之闢之其檉椐遶屋種竹及芭苴枸榔餘甘椰栟櫚四時靑靑百穀蔬流脂稻米有餘糈轉市海內連籧篨吏治淸靜絕詐狙因俗示禮兩相於海風不復遷鶢鶋番人秉性豈異余與民雜處鼵幷鵌春秋射獵山作阹篾帶束腰聸耳鐻身衣鹿皮弓箖箊沙魚登岸脫塡淤距躍三百如蟾蜍迹纏迹速升山岨舍矢麗龜及豪豬相聚牽臂飮以醵好人怒獸或齟齬撫之有道難自紓艸薙禽獮豈義與使者治定靡紛拏乃命頒賞布燕譽天淸海宴風颺裾使者之幄面廣虛諸番部眾從長胥相排壓背蟨駏驉佩刀守將跪舉袪受命分賜金帛綀牽羊肩酒持巾帤旣賜拜舞歡情攄蠻歌振股疑蚣蝑使者閱歲菑未畬歸逾江淮超靑徐淸廟重器升璠璵司空度地九澤瀦藐彼外郡隣沮洳有番海上思欷歔道山延閣冊廣儲公與羣儒聯珮琚春風思遠夢蘧蘧陳圖示客言旣且遼哉古放龍蛇沮天子代來恩澤湑上褚中褚賜衣袽黄屋之國少躊躇於今絕域覆腋胠魯鷄伏鵠如蜀雓此圖稽典宐寶𡨢乃知柔遠術不疏篆秋艸堂歌贈錢獻之古文遭秦燒不存當時丞相篆獨尊登山刻石作螎匾頗取茂美異本根嗚呼秦人尙刻盭自玆書亦含秋氣魯壁再傳蝌斗書相傳竟􅍘衞伯儒世競艸隷篆益疏卓哉陽冰導二徐破碎都無保氏義瑰奇獨繼秦人橅錢君晚出江海陬學篆欲溯軒黃初艸堂多秋懷用意亦何孤豈但用意孤筆力不世出金壇王侍郞先朝篆第一濡毫未免先著漆布置雖均生氣失錢君寫篆不擇筆冥合豪釐未嘗溢乃知天巧工中微不似麤工常縛律君家詹事今古人君與學古情益親詹事登朝三十年大儒師保居虎門嘗見所作篆亦如儒者端拱齊韠紳況君年紀未三十老生相逢低首立家學益承安可及明廷待君雖未入經術終當佐天子挾筴那能歸下邑長安二月春風來艸靑欲岀花未開江湖夢遠春水白篆秋艸堂安在哉門多問字揚雄客聲振羣公賈誼才盛名雖好戒多取千古當推殊俗懷我今廢學苦多忘願就諮君日百回他日張紘隔吳下苦將名篆憶裵􅏆城南修禊詩暮春正三日來會城南隅長川明若練其上源西湖下輸南海子艸橋貫中途晝陰天多風楊桺密復疏艸芽沙岸綠葦席縱橫舒面流坐中林默數同會徒長者二十五幼稚十人餘自從導此川種樹歲增株我來再修禊風景日可娯何況冠蓋眾前春尙不如是時朝廷淸在列多鉅儒淸修好名節室不聞笙竽四海艸野賢招徠盡于于相從抗論古薄游散其劬山陰雖可慕豈若帝王都羣賢及古哲文藻復交敷鼐也最寡聞寬世容其愚頗減吏事責與使談詩書累從諸公後觀覽物華初當有異世賢慨慕今玆無中筵旣自幸迴念顧鬱紆昔者孔氏門材孰非時須後先及疏附所欲返唐虞如何浩歌人舍之風舞雩乃知士有志聖人不與渝旣乏經世畧披褐宐田廬遼哉千古會日月終不居夕陽散車馬長途晀廣虚屬斯告後來慨焉或念諸
