body:
  text: 䇿問乾隆戊子科山東鄉試䇿問五首問古者立學釋菜祀其國賢者爲先師示學者取法前哲從地近者始也矧東土爲聖人父母之邦名儒繼踵多士仰慕師法尢易興起者乎春秋時若桺下惠季文子孟獻子之流嘉言懿行於傳述焉多士宐誦習而考其純駁矣及孔子同時所交遊者大抵齊魯賢士太史公旣稱孔子嚴事晏平仲矣而又載晏子嘗沮尼谿之封夫晏子賢者而其言何謬乎抑史所載有未信乎劉向錄晏子於儒家而桺宗元謂其書出於墨子之徒又何說也孔子之後齊魯儒者各有著書惜哉今不盡傳其篇目存亾可考者凡幾曾子之書見存於大戴禮記者十篇與論語中曾子之語精粗奚若孟子十一篇今存者七篇其餘軼說尙可聞乎荀子嘗爲齊稷下祭酒矣古以孟荀同稱然荀子乃詆子思孟子之說爲非是夫何悖哉抑其言今多載於禮記諸生能別出之而論其當否歟漢初若魯申培穆生白生齊轅固濟南伏生之屬誠多賢者其後若公孫宏兒寛韋賢父子蕭望之匡衡孔光皆齊魯之儒皆致位公相矣乃其人邪正優劣則何如也鄭康成於東漢之末興於高密爲海內鉅儒夫世言理學者宗閩洛而考證經義詳博者推漢儒雖然漢儒行事具在將謂其苐能博聞稽古爲有功於經乎抑有躬修實踐誠無媿於儒者也宋儒孫明復石守道最有重名其人亦可與閩洛諸儒竝論之否方今皇上聖學日躋繼古道統崇經術奬德行所以興起敎化勸示儒林者至矣諸生承聖朝之澤而追鄉里之賢尙友千古考論辨說所慨慕企仰者何如哉願聞之以覘志趣焉問儒者之學非一端而欲觀古人之迹辨得失之林必求諸史爲史之家有數體而欲統貫終始言簡事該其法必取諸編年昔者孔子作春秋爲編年家之所祖筆削褒貶學者述焉然孟子曰其文則史左傳亦閒稱其體爲禮經之舊然則聖人所筆削者殆無多歟自是之後爲編年之史者有荀悅漢紀張璠袁宏後漢紀習鑿齒漢晉春秋于寳晉紀孫盛晉陽秋裴子野宋略之類其書或傳或不傳然昔人固有評之者其槩可略聞歟宋司馬文正公以遷固以來文字繁多删削冗長舉其大要作資治通鑑觀其進書表自謂抉摘幽隱計較毫釐則可謂盡善矣乃若漢畱侯之致四皓唐莊宗之負囊矢豔稱今古而何以不載而雜家小說若西京雜記平剡錄之類轉有採者何哉其後朱子因之作綱目其法益僃而義益精苐以門人編録或不免脫漏舛誤諸生嘗盡讀而考論之乎夫孔子序尙書始於堯太史公亦止紀五帝溫公通鑑託始於三晉而劉恕外紀獨上追盤古夫恕固與溫公同修書者而兹何其異也其餘前編續編續綱目等書孰爲優劣王應麟胡三省爲通鑑注尹起莘劉友益爲綱目發明書法其得失何如揚子雲曰子長多愛愛奇愛奇史氏通病豈獨子長哉故審理論世覈實去僞而不爲古人所愚善讀史者也皇上聖學淵深􅐶知首出御定通鑑綱目三編及近御批通鑑輯覽所取予進退莫不歸於至當譬之日月至明幽隱必照千載之遠不能欺也多士承聖訓而仰文明於史氏之學必有能稱量是非自攄所見者盍詳著於篇問夏書紀九州而各載其貢道葢以急惟正之供謀轉輸之便聖人所以安國而利民也禹時九州之中四州貢道皆在今山東之境或由濟漯或由汶泗皆達河以至帝畿或謂徐州浮於淮泗達於河河乃菏字之誤是何謂耶自水道屢變大河改流而南而國家建都燕京則天下糧運皆由㑹通河以至太倉而山東爲咽喉扼要之地是其勢較古時爲尢重夫運河北所行者漳水也南所行者泇承沂泗也臨淸以南濟寧以北則上下皆賴於汶水昔人言汶水有五源別而流同其詳可得聞歟明永樂中尙書宋禮用白英䇿築灞東平之戴邨遏汶盡出南旺分流南北可謂巧於濟運矣然南旺地勢特高故昔人謂去閘則南北分瀉一空況天時不齊或有旱竭固其理也然則豫僃之使無患運道者宐以何術周禮稻人以瀦蓄水以防止水考工記曰善防者水淫之初宋禮於汶上東平濟寧沛縣竝湖地設水櫃斗門櫃以蓄泉門以洩漲然水櫃在明時已苦易淤今固不免塡塞矣夫豈乏善防之術如周禮所云逆地阞不理孫者乎抑湖濱之民或有㑴占失其舊而吏不之省乎且唐時承縣有十三陂以爲沃壤嶧縣其故界也今將舉湖陂之利盡修復之内美田疇外資舟楫其道何以籌之至於濬淺置閘諸䇿前人謀之詳矣其在今日尙有可議者歟夫通古今之謂儒漕運經國之重務也是以皇上旣嘗親蒞河隄指示方略至雨澤小有不時必上軫宸慮咨命河臣毋敢怠忽意至切矣然則考稽川瀆講求利病幾一得以佐當世之用亦儒者事也其各陳所見以爲當宁獻問國家設官分職各有典司而惟守令最爲親民之吏使親民之吏舉得其人則天下何患不治使親民之吏一方失其人則一方受其病朝廷雖有良法善政皆爲虛文而已恭惟我皇上􅋢養黎庶軫念如傷重司牧之官愼察吏之政是以綱維建立於上羣生禔福於下治化之澤行而貪㬥之風寡矣雖然海内至大人情萬殊賢者固各舉其職而閒有不肖或亦偷容其閒今將使郡縣之吏盡稱其職其道以何者爲要夫人難求僃德性多偏吏之嚴明者或鮮慈惠仁愛者或過於寛柔所謂嚴而不􅋊愛民如子見惡如䢉夫之去艸者甚難其人今將聽長民者意之所自趨乎抑國家法令有可以持其偏而扶其弊者歟至其甚者則又或放縱無忌黷冒㑴惏是以今者稽察之令責成上官而執法除邪明示懲創然猶恐上官以姑息而吏巧於避法何以禁之且國風羔羊之詩美節儉正直之德夫節儉則無侈費正直則無營求無侈費無營求則取用於廉俸寛然有餘資矣而曷至甘爲墨吏哉然則奢蕩營謀者吏治之所由敗也今欲羔羊之美徧於郡邑而無簠簋不飭之譏將焉所立法而後可昔者司馬子長始傳循吏而所載公儀子固魯人也諸生亦嘗讀史而慕其風歟漢書循吏六人後漢書循吏十二人其所爲之迹有於今可倣而用之者亦有不可施於今者尙分别論之至其餘如趙張三王之流雖不入於循吏之傳然其治道實有足爲吏法者採其長而施之於今奚不可也諸生其援古以合諸當世之要書所謂學古入官者葢將有取於此問民俗美惡因上治化王者在上道德一而風俗同言治化無弗徧也雖然當周盛時分封魯衞及晉已有用夏政商政周索戎索之異然則所云風俗同者舉其槩而已其水土風氣性情習尙之偏聖人不能強使合也故曰修其敎不異其俗齊其政不易其宐昔者周公尊尊而親親太公舉賢而上功二者殊而齊魯皆治及其衰則洙泗之閒齗齗如也而臨湽至以多刼人爲大國之風於是乎曹參以勿擾獄市容姦爲治矣若是者豈風俗一變不可復反乎將其時上所以導之者失其理乎恭惟國家平治百年百姓自厥祖父被列聖敎養之澤加以我皇上建極錫福德溥而化光是以山東境內秀民則詩書絃誦愚民則重䢉桑務本業有淳古之風豈非以其質性敦樸處地近而感化尢速乎雖然恬熙久而侈肆萌生齒繁而游惰起文學固可貴而恐其質行之衰織作冰紈冠帶衣履天下之舊不必復而恐其本富之不足欲防其弊厥道奚從且欲保風俗之美者莫要於去姦民昔管子治齊參其國而伍其鄙使罷士無伍罷女無家管仲雖非王道之器及其治國實與周禮比伍族閭聯相保相受者同意諸生能舉其法之詳而識其要歟今山東東陼巨海廣斥之野南岨蒙羽西連湖澤盜賊匪人或託迹焉夫列郡舉行保甲之法豈非周公管子之遺去姦宐得其要矣姦民猶有竄匿何耶將山澤曠遠有散處幽阻難以比次歟抑市廛雜遝流冗來去無常難以踪跡歟不然則吏奉行者不盡實歟諸生生長其閒見聞熟矣欲登進其風俗之美而彰善癉惡以敦治道諸生私所議論者謂何其悉論陳之乾隆庚寅科湖南鄉試䇿問五首問古者立敎多以文章禮樂爲則未嘗輕言性命而性命之理實無不明其後學者岐分異說競起於是言性理者紛紛焉葢孔子之傳惟孟子得其宗至若莊周荀卿之屬推其原未嘗不出於孔氏之徒而卒不勝其刺謬者何也夫言性惡者其悖不待論矣董仲舒對䇿陳性命之情韓愈作原性李翺作復性書皆依於儒先之旨而時有純駁將何所去取歟昔箕子言五事周禮言六德孔子四敎文行忠信而已孟子始言四端及宋周子又舉仁義中正夫道一而已聖賢所舉之目何其參差也將有同條共貫者存而不嫌於言之異乎自漢以來天下賢人君子不可勝數然言道學孟子之後遂紹以周張程朱其實何以定之且周子言無極太極頗近於太始無始主靜則近於寂滅之旨主一則近於常德不離之敎正學異端懸於霄壤而判於微茫奚以析焉方今聖天子在上至德至敎究廣大而極精微接羲軒之統探孔顏之蘊垂則士林嚮風興起湖南爲周子故鄉餘風未泯尢宐有推闡服習其微言者諸生其毋謂誦習宋儒苐爲科舉之學也試悉攄所自得焉問史家之體多矣而紀傳之敘載爲詳爲紀傳者亦多矣而司馬遷班固爲首故言史法者宗史漢而已夫史記之紀五帝三王援據尙書及帝繫篇不敢多入異說葢其愼也然楊子雲猶云子長愛奇乃後人補述或反溢於子長之外何耶漢書本紀止於十二張衡謂宐增元后紀豈誠班氏之疏乎表所以殽列事時使人易曉共和以前之年不可知矣司馬遷表燕昭齊宣時事亦與孟子諸書不合者爲何漢有功臣表與外戚恩澤侯表景帝以後侯國以降將得者皆進於功臣丞相封侯雖以魏相丙吉之賢皆列於恩澤其升降義當然乎抑有所失耶後世之史多作兵志而史漢不著其目并分見於他篇其義安取孔子或謂不當入世家屈賈魯鄒或謂不當同傳進游俠退處士前人并以是譏遷能􅍘其功過歟史記西域之事何以附於博望漢書宗廟之議何以附於韋賢又霍去病之於子孟賈生之於君房雖爲一家而列傳釐分各以事彚當矣至劉向以附元王而不與蕭傅同傳張湯杜周不入酷吏其於本書體例能無參差乎恭惟皇上萬幾之暇披閱前史抉千古之匿情剖儒生之疑說特著論辨啟牖羣蒙士得奉折衷之論以盡探石室之藏將博學精思足僃異日珥筆之選者必有其人焉故詢史漢數端以覘其槩云問管子曰有地牧民者務在四時守在倉廩賈生曰積貯者天下之大命古聖王之制九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色則積貯莫善於此其後李悝治魏視年豐殺以爲糴出之節是雖富強之術其計畫亦足爲王政資漢五鳳年閒始設常平倉其法悝之遺法也然當時止用於邊郡一傳及元帝而罷之豈其道有不便於民乎抑吏爲之不善也隋時有義倉之名宋儒定社倉之制言積貯者大抵因此三術其建置本末利害得失之相較可悉聞歟今州縣各設常平倉又令鄉邑自爲社倉國家籌爲民厚生者至矣湖南之地古所云火耕水耨民食魚稻啙窳媮生而無積聚者然則議積貯於兹地尢其急也夫土壤卑溼官存倉穀久貯則有紅朽之虞歲糴則有強派抑買之弊是將何以杜之社倉積穀雖民所自爲然將一聽於民而官不爲之經理歟將使吏與於其閒而毋乃又爲閭里擾歟必使吏良而令行民賴其利將何術與夫審民生纖悉以達於謀國大體儒者有用之學也願聞陳義之詳密焉問民有四而士其表率也士習旣端則國多卿大夫之材而民安於從化古之時兎罝之士皆可爲干城父與父言慈子與子言孝一有罷士不得容於其閒也周秦之交士習始漓而縱横狙詐之說以起自漢以來士風又屢變矣方今多士涵濡於列聖重熙累洽之餘又仰被皇上聲律身度之敎嚮仁慕義俊民聿興詩云藹藹王多吉士固兹時也若乃九州萬國地廣俗殊椎魯者無文華巧者失實南北異尙何以齊其短長又其閒閒有居庠序而㑴吏事舍樸厚而樂輕俠有士之名而實爲士之蠧地有師儒而未必盡從其敎歲舉優劣而未必盡得其實將使化導得行而激勸各當其道曷由諸生夙誦洙泗閩洛之言所以自正其身者卽國家所以整齊天下之理也修已移風試爲悉陳其要問詩以言志虞廷設敎葢首用之唐時以律詩試士其後或沿或否聖上以科舉表判之法文具無實乃詔試士增用詩題所以觀學者性情才力畢陳而不可掩也今試以古今體制之殊俾諸生縱論之五言詩始於枚乗蘇李其後作者輩出魏晉而下太白譏其綺麗退之斥爲蟬噪果無足取若是乎李杜詩之大家而朱子尢推子昂感遇者則又何說七言歌行王子猷所吿謝太傅者已盡其理能推發其意與唐宋金元明諸家歌行一體派别尢多而各極其致其正變何以衡之自沈約始言聲病五言近體權輿於此唐初言律詩者推沈宋其後諸家少變其法中唐作者多以五律爲長然以視開寳以前何如也元微之推杜子美爲第一者其長律一體耳子美果以是獨絕而律詩必以是爲正法乎七言律詩明人之論或主王維李頎或主杜子美而盡斥宋元諸作者意亦隘矣然蘇黄而下氣體實自殊别意有不襲唐人之貌而得其神理者存乎夫唐人之詩古今獨出然或謂惟絕句一體最爲得樂府之遺者是何謂也我朝文治百有餘年風雅之林炳焉極盛皇上􅐶藻昭回囿古今而羅萬象學者少窺萬一以㫄衡千古詩人之作如登高臨谷如持鑑察形較如其易明也可以究舉而詳說矣惜抱軒詩集九今體一百十首寄天柱山人天柱萬重雲雲中抗棟棼巖花稀見客松蔭獨隨君浣手㫄行字琴心內景文坐忘如著論須與謫仙聞入龍眠䇿杖向山碧心淸境亦幽樹陰藏雨漬花落信風柔鳥迹交深逕人家面曲流寧當容竝舍終歳託夷猶江路感舊山藏春穀堞岸折石城船白髮尋前路靑春似往年落花江館雨叢樹縣樓煙未逮忘情者臨風故黯然野戍野戍孤無障停舟此作鄰連朝江路冷數點岸花春白霧離邨樹靑蕪向渡人無從商去住試禱水祠神江路又一首無復平生侶重於故迹經春風吹短髮江路數長亭帆遠橫天白山多跨地靑寂寥仍獨往風浪接滄溟寄靈谷僧自昔居靈谷終年聽石湍落花趺坐軟深樹衲衣寒孤月胸前指千山定後看無緣居士室暫接問輕安漫游東風吹脫鬢毛斑舉世誰如老子頑欲抱龜蓍終蜀肆豈將詞賦動江關五㪅竹露聽蕭寺一逕松風入蔣山越客偶談天姥勝相逢倚杖夕陽閒謝簡齋惠天台僧所餉黄精衰年不願海山居願舐淮南藥鼎餘但使體中還少壯㪅偕兒輩向詩書蒼山旨蓄承分乞白首飛蓬或埽除想見赤城霞畔路長鑱木柄下空虛輓陳勤齋中丞西南地控五谿遐承詔單車往建牙出令蠻夷方企踵從行琴鶴政忘家山圍幕府秋迴鴈霜落旌門曉聚雅故宅但瞻雙㦸在迎歸白旐拂江花陶怡雲深桺讀書堂圖我如枯樹託婆娑愛見新條發舊柯往日讀書眞恨少少年如子豈能多風軒百尺搖陰翳雲幌千秋對嘯歌願得隔窗斜倚聽立深飛絮覆堦莎王孔翔香雪梅宴集圖渡江春盡冬初去風雪寒山獨閉門羨殺烏衣眾年少梅花時節又開樽讀書秋樹根圖秋容自老君方少昕夕披尋歲月長不識五車書就日卻須林葉幾番黄孔信夫舍人自揚州挐舟見訪將自此適蘇州章淮樹觀察邀與共觀家伎因作此送信夫櫻笋成時燕入堂當軒陰重艸初長共扶白髮三千丈來看金釵十二行灔座玉船傾若下指塗蒲席向吳閶明朝萍迹都成憶耳識仍增記繞梁題右軍帖蘭亭眾㑹獨傷懷先墓歸誠誓㪅哀顯授何嘗較懷祖扶生或竟遜方回峩眉汶領終難至青李來禽尙可栽我亦年今垂耳順千秋思若坐中來雨夜秋館蟲吟出艸根倚窗塵榻一鐙昏瀟瀟半夜龍江雨知有寒潮又到門簡齋年七十五腹疾累月自憂不救邀作豫輓詩龍飛四載一詞臣吟嘯江山五十春莫怪尊前爲了語當年同輩久無人一代文章作满家爭求珠玉散天涯替人未得公須住天上寧無蔡少霞宮闕前朝迹惘然隨園花竹獨淸妍故墟慿弔終難免且願從游㪅數年氣聚升爲五色霓倏然散與太虛齊海山兜率猶黏著那㪅投生向玉谿作書戲題遂良舊日鬚皆白祕監今年臂㪅衰結習欲除猶未盡前身或是永禪師哭孔信夫次去歲觀伎韻君自遺書乞余銘墓公子聲高魯廟堂爲余江水遡游長石銘歸託名千載玉版前畱墨數行鵩臆恍知從物化人情未可扣天閶淸樽急管同聽處依舊烏衣上玳梁次韻荅毛學博文家俗見蔀千層嫵媚誰曾識魏徵若反淸言從正始便同乳穴復零陵有源君導如春水無盡人分是慧鐙愧我尙爲知解縛不成得髓自南能江北青山隱隔層今秋豐穀應休徵東籬正可歸彭澤左席奚求赴信陵諧物總非長袖舞相看各守短檠鐙初涼好共尋巖桂拄䇿僧廊病尙能倪學博欲爲設食而僕病後畏酒肉次前韻約爲茶果之㑹看花眼霧亂層層蒲桺先秋信有徵渴愛旗槍烹似乳閙嫌壺矢祝如陵連朝苓木衡三品薄晩鹽虀共一鐙君爲禪房設淸供試拈螺蛤小詩能又示客一首已識西堂合射艱況敎口腹累人閒庾郞正貴陳三九袁粲何須破入關明月淸風同入座綠葵紫蓼揔開顔不容㪅命門徒議早聽周生諫小山秋室澷咏積痾謝書冊人事亦無關曠爾一室内秋聲動遠山廊依風葉轉砌繞露花斑客至希言說依依久坐還隱仙菴雙桂相傳元時植秋時花開極盛攜客及幼子師古觀之因賦鍾離眞主渡江前雙桂蜷枝已刺天南國市朝非曩日西風闌檻又經年黄金萬蕋香浮閣白雪千莖冷覆磚零落滿堦君勿歎吾生那得較花堅漫游靑嶂連江抱隔闉此閒容託葛天民垂金花落秋將老流汞光升月又新隱几無心從喪我登山有句偶驚人毎攜邗竹尋蓬藋容有齊梁迹未湮登淸涼山翠微亭下重八隱仙庵看桂偕浦桺愚山長毛俟園倪健堂兩學博亭高碧嶂秋風上帆出青天曉日時一攬橫江全楚勢再尋幽壑小山枝樓前影擢交龍起雲裏香薰駐鶴知賴接數君情不淺不妨繞樹坐頻移次韻同年蔣澄川見懷澄川去夏皖中貽詩今夏始達江北江南兩岫雲從風偶聚又披紛鋤犂久分終南畝隴隧今傳誓右軍難得經年通尺素況期千里合離羣相望都似秋林葉澹倚寒山挂夕曛毛俟園用僕看桂前字韻作詩見貽因復荅之萬里淸江到坐前又逢佳客九秋天短笻共散幽憂疾芳樹誰知偃蹇年君輩論文推馬齒世閒相士貴鳶肩止宐不負看花約自􅍘平生志巳堅問張荷塘疾君抱幽憂卻酒巵空堂視蔭毎同誰今年靑女慵司令九日黄花未吐枝欲起毗耶居士疾愧無天寶謫仙詞瓦棺閣外江天遠請眺餘霞落鴈時喜胡冠海至高樹寒陰落掩扉城頭鍾阜夕煙微靑楓江上人才返黃菊花初蟹欲肥行樂繫錢隨處好論詩燒燭隔年違黑頭那易身無事且爲頻來趁短暉天門艸綠濡須口天青博望門雲山開四面波浪急東奔地有千秋感人傷垂老魂頻年逐帆影幾處認潮㾗題畫橫風吹雨過林邱萬片飛雲作水流倚檻數峯藏又見渾如天際識歸舟千巖雲起壓林低黄葉聲涼送馬蹄雨急看山行㪅緩野人家止隔前谿觀明賢在楚宗室宅詠繡毬花詩卷郭美命首唱凡十九人王夢樓跋尾有評繡毬花詩以宋牧仲爲冠語因題其後往日東風帝子家濡毫上客冩妍華時乖竟值憂危議春盡難畱錦繡花節槪青編悲志士文章白髮笑生涯從游紫栢猶吾願綺語何煩甲乙加荅朱石君中丞次韻衰年薝蔔甫聞香那得全將六用藏縱有隨之推老馬其如後者未鞭羊使君膏物眞時雨故侶零柯怨早霜不貴蘂珠傳不死諒公宇定自天光天界寺閣遇兩蜀僧南朝宮闕悉榛荆尙有栴檀閣未傾坐看青山圍建業來從赤腳下桐城􅋊英偶爾餘春色布穀泠然早夏聲萬里峩眉僧接䣛小窗深潑夕陽明送方坳堂解官後將之上江鎖闈將闢始聞名夢過春秋二十㪅三省最遲麾出把九州獨許蓋先傾山當蕭寺時停騎身付扁舟欲濯纓我亦舉頭偕眾望謝公終起爲蒼生君與名山㝛有期那應長閉入車帷好乗腰腳年來健徧攬煙霞物外奇僧俗總隨雲水㝛漁樵或與姓名知故當飽歴人閒路歸見桃花一笑時重㝛幽棲寺南山東面最孤鶱拄杖時攀問法源紺宇中臨千嶂小黄梅㫄出一枝尊春堦雨歇纔懸榻夏院陰成又扣門深洞了無來去迹只餘石澑滴苔㾗陳東浦方伯招飮瞻園次韻前代英雄不可尋千秋臺榭敞憑襟欹松立石泠風度暗艸叢花夕照深官閣畱傳多故實謝公寢處惬山林酒闌倚檻容吟嘯無那高垣易夕陰次韻荅吳竹橋稱病君眞似長卿我如蒲桺老無榮文章已謝當時好止足寧希史傳名獨立懷人常企踵相逢狂論復盱衡淸詩泠若臨風笛吹徹秦淮秋氣生題吳竹橋湖田書屋圖中田有精舍挾冊青林閒起見海東月流光湖上山時聞漁者唱或值耦耕閒非得忘機侶翛然自掩關昔君辭省閣余亦臥江濱山淥垂湖岸宐容澹蕩人藏書多足老資物少無貧㪅欲刺舟往相從忘主賓題黟縣朱榮朝望嶽樓圖記託新安郡晨朝見異峯遙思黄葉逕多被白雲封孤往未能決他年焉可逢披圖如曩昔惆悵列巖松題李僊枝四友圖君築巖居積翠重飄然偶出似雲龍孤舟乗興行千里襥被吟詩八萬峯屢痛昔賢披墓艸自希良友結霜松歸休梅竹蕭疏裏風雪余將䇿杖從方坳堂觀瀑圖泰山北面寒巖谷曾逐谿聲就朗公莫道出山泉竟去舉頭長在碧雲中坳堂觀察自安徽返將歸濟南仍入都補官餞之於淸涼山天門赤岸渉波濤問訊秋來迹已勞風雨才晴將送遠江山無際共登高重來郭伋誰能必獨立王尊氣自豪衰眼摩揩瞻事業何妨萬里縱旌旄題坳堂所藏諸城劉文正公手蹟獨立淸修動主知喟然耆艾在彤墀後來董令思文偉誰許王宏繼穆之竹素蒼茫千載事邱山零落百年期寸縑中有平生感曾共山公把酒巵跋汪稼門提刑登岱詩刻昔乗積雪被青山曾入天門縹緲閒日觀滄溟猶在眼白頭明鏡久驚顔壯才許國朝天近名嶽裁詩擁傳還盛藻宐摽千仭上衰翁無力㪅追攀過蕪湖不見春江際安知路所經遠隨煙外席時逗岸邊亭鵲尾雲彌白鳩玆山漸青㪅投前港㝛雨勢復冥冥四合山阻風桺枝搖不息久立望空津帆勢遙投戍濤聲故近人雲光開岸晩艸色澹谿春安得知言者披襟志一申天門阻風亂山蟠野合雙嶂矗雲開地擁江聲出天橫雨勢來輕蓑漁故往挑菜市都回老子惟高枕東西任擊豗東梁山僧舍津濤行復滯峽嶂路還緣石壁凌江閣風林隔浦舡鶻盤崕樹側㹠出浪花巓往迹無儔伴春陰彌悄然復阻風三月鸎花盡江邨直似秋陰從亭午合風挾暮潮畱水氣㑴厓上寒聲在樹頭長年仍益纜水宿亮多憂烏江阻風金陵如咫尺牛首在船窗棹往彌求速波來未可降急風吹白雨薄暮泊烏江鐙火連檣底瀟瀟雜語龎楊龍友墨蘭竹秣陵春盡倍銷魂紅藥花􅋊綠萼存被惱㪅尋修竹逕千叢元是畫時孫江左風流染翰時越疆同裹故人尸風蘭露竹容相憶寒食曾無上冡兒龍友殉難時吾鄉孫武功監軍與之同死後監軍子收其骨併龍友合葬桐城北楓香嶺余嘗至其墓側爲周期才題春江歸棹圖如織江帆上下流無人天際識歸舟昨來停棹還西去畫裏昇州似鄂州陳約堂武陵汎舟圖曠懷無染俗情濃芳樹春流到處逢喚作武陵何不可桃源元止在君胸憶禹卿在南昌我憶人閒王禹卿休心總異少年情靑娥玉笛春風盡朱雀金花夜氣生揮麈便應通肈論折釵偶或作顔行洪州止爲西山戀便滯南來累月程游攝山㝛綠雲菴二首不見深巖桂微風谷口香披雲過石徑聽㵎到僧房穹壁天容峻環林地籟長欲求明處士偃蹇待斜陽叢樹未搖落寒山已改容自攜孤杖影晚下最高峯燭隱秋聲閣詩成夜壑鐘白頭餘健在幽處欲濳蹤最高峯登晀已上嶕嶢又佛臺正逢秋霽夕陽開地竆江海與天際山自岷嶓夾水來南國中原同下頫華林衰艸幾千回何當住此雲霄上長與星房日馭陪題汪君試硯齋圖涵空高蔭氣淸泠黝玉開匳發古馨蕉葉滿窗苔满逕倚楹硏綠冩黄庭題畫山遠雲尢澹江空影最長秣陵秋易到不獨爲林霜瓦棺寺招提地亦古長千圍入南城體勢􅋊穿逕石崗隨繚曲到門風葉颯淸寒虎頭無影存金粟馬鬛何年出瓦棺尙有里民矜故事一成臺上集文翰前有小阜民謂卽鳳皇臺側建鳳游寺翠微亭蘭若門中山逕淸攀躋幾折與雲平排空疉嶂穿城入鋪地橫江隔樹明天運九秋如有怨人思萬古到無生奇文腐艸要同盡何用登高作賦名埽葉樓碧雲垂下大江流坐倚江城古石頭丹嶂欲平猶作巘靑楓未落已成秋三山夕照新林渚萬里西風埽葉樓虎踞地形猶在眼淸涼深院發鳴虬陳碩士藏管夫人寒林小幅獨於疏澹著精神山遠林枯意倍眞借問倪迂嗣誰法右軍書學衞夫人癸丑重九無樽酒之㑹往問袁香亭同年亦獨居寂然乃邀登雨花臺臨眺至暮香亭有詩和之二首六朝建國猶形勝九日登臺思悄然故壘蕭疏黄菊節旅懷搖落白頭年秋聲城郭千家樹返照雲霞萬里天若對江關悲作賦不如山石解談禪君解銅符五六年逢余黄髮白門前彈冠舊侶眞無幾䇿杖淸郊尙有緣俯踞小亭衰艸地仰思高座雨花天兩翁自愛尋荒迹豈必龍山會眾賢婺源胡奎若藏黃石齋自書五言詩蹟題後直言瀕死荷戈餘社稷猶思再埽除指佞朝廷惟汲黯存亾時勢異申胥秋來艸沒宮門路石齋將死于江寧時過故宮門猶下車見榕邨記夜半鐙寒屋漏書要識艱危成節概不隨流俗在平居和袁香亭在鄭思贊孝廉宅看牡丹三月江城泛玉巵朋簪不異少年時露華朝暖春應駐幽檻風微日漸移興極捲幃看國色病餘擁毳作僧詩惟君彩筆猶豪健合有紅雲捧硯池和袁香亭淸話白頭老子尙婆娑未便空山考在阿紅藥堦前春事減沙棠舟上酒情多衣沾天女花難去隙閱奔駒影易過試就詩人乞禪悅右丞容卽古維摩朱白泉觀察以僕往昔訪其先公運使於泰安時所作詩文各一首同裝成卷見示感題平生交友接龍門霽雪高山共酒尊立處不知天下小坐中祇謂古人存文章海内亾知已旄節江東見後昆畱得白頭如夢過舊書重展落嗁痕贈釋妙德嘗作老子疏者上人杭越秀攜笠到江邊宴坐苔生地談空花雨天道場隨里舍法性寄詩篇了悟無人相何妨解又元過明孝陵蔣侯山與故宮連想見興王作邑年銀海竟從僧易地石牀空令女朝天山青尙似觚棱闕㵎涸曾無功德泉正是江邨寒食節落花飛絮羨門前見諸君作莫愁湖櫂歌戲擬四首繁華才過卽千春遺迹荒寒任水濱復送酒船歌板至那知中有􅍘腸人春光易盡是湖涯桃李陰成桺作花和雨和煙千萬樹不知誰是莫愁家游人散盡漸烏棲惟有漁舟半隱堤一曲櫂歌明月上淒淸風露女牆西前古煙波後世樓敎人歡喜耐人愁新詞才子情深淺付與雙鬟試囀喉游瞻園和香亭同年兼呈東浦方伯及在坐諸君八首自有丹陽郡何時不勝遊名園今日會官閣累朝畱古意蟠松正天成立石稠遠思營建力名字向誰求開第從徐氏元功得賞延飛龍天子去喬木世臣傳室榻神疑在山亭迹邈然時將青簡事回憶綠尊前儒者資爲政維藩見節旄阜居憑井邑淸氣擁林皐暇日聊陳醼臨風一染毫石梯摹蜀道往迹念仍勞高軒開夏氣幽檻剰春花蘿翠升還墜松聲壯不譁褰衣穿數曲當席眺千家未覺淹畱久江天送落霞山遠良難步江空遽易臨無如三畝近不厭四時吟苔藉幽人履風披牧伯襟寧如羊叔子感慨畏幽沈諸君羅俊藻野客與追陪地下魚爭出天邊鶴亦來朱顔今已過笑口古難開豈恤狂言發頻當覆酒桮畫手有袁張同時幷擅場筵前交􅛛舄海內各文章雅集圖如就裁詩墨盡香祇憐才盡者偏畏擘牋長夙願鍾陵下茅茨架薜蘿卜鄰人有幾小築計云何地異官齋閟朋隨風雨過耆英眞可㑹山似洛陽多送李嗇生歸揚州後卻寄論交談藝氣飛揚淸夜纔邀共舉觴楓葉江天舟檝杳桂華樓榭雨風涼悲傷短髮秋三月淪落高才水一方計日賁來還有約糞除東序布藜床懷祝芷塘聞住華亭四五年東風輙爲望江船料應玉貌今衰醜卻誦淸詩轉妙妍地上朋儕餘有幾天涯風雨颯無邊白頭垂憶平生事㪅寄傷情到海壖江南㮄發同居諸友多被落感歎成咏九日明朝至千山秋氣來江南悲送客雨際罷登臺旅館須耽醉風帆且緩開誰憐黄菊節多滯白衣才有懷雒君秋陰不成雨黯黯望空津楓落初寒水帆行失意人山林違遠性書筴逐羇身安得將尊酒相邀慰此辰毛俟園倩樸山道人設素食於隱仙庵見邀同袁簡齋浦桺愚金麓邨陶讓舟王栢崕馬雨畊門人朱珏同游其時桂花甫謝率咏一首野蔌烹香進舊醅鶴儀道士住蓬萊青山曲曲藏修竹紅葉莖莖暎碧苔孔蓋蔽空雙立桂龍腰偃地半枯梅淸風又引羣賢會何必花時逐眾來別治三日月雙輪邁文章一管窺劣容畱後死敢謂使先知求子才寧易從余志亦奇深山有神會何異接披帷秣陵城外水空遠動離心楚澤同津去歸隔浦深秋風吹短日江霧蔽長林孤唱中流發寥寥無賞音洲上見桃花荻芽初岀麥莖寒中有江桃作意丹開落年年天不管夕陽洲上獨來看祝袁簡齋八十壽時方送小郎就婚湖州春風鳩杖挈佳兒棗栗盛笄共壽巵樂事天敎今世獨才名人作昔賢疑分司且遜休官早柱史從畱食乳遲會見小倉編後集較多盈萬渭南詩先生築館冶城隈壇坫爭趨末座來司馬從官嘗雨立元戎小隊及花開後堂弟子聞歌管西邸英王致酒桮此日壽登誰不慶早詢安否遍中臺送香亭重赴嶺南昔君溟海我燕京萬里相逢建業城艸綠冶亭同策杖花明江閣擁彈箏東山未可畱安石南越重須見陸生又送離天際望自垂白髮入柴荆重游隱仙庵幷詣古林律院承諸君和僕去歲詩韻見示因復繼和三雲通守四十矣前見其貌似年少因以入詩今知其誤故復以詩解之􅋊花猶未墮蒿萊拄杖濃陰踏逕苔魚鳥都於吾輩慣江山轉憶昔人來觀空應叩鋪金地遣累頻斟釀玉醅歸把淸詩慰岑寂一庭繁雨綴青梅江城朗見玉山來當座朱顔發綠醅流轉光陰速輪轂飄蕭花絮付莓苔黑頭子豈輸王簿秃髮余眞似賀梅四十功名非便晚㑹看風引到蓬萊賦得謝公墩昔聞謝太傅登眺此江東宰物仍高韻淸言見道風早齊東海德晩配始興功曹植詩多怨羊曇慟復竆閭閻葵扇在煙靄石城空遠想非無士從游詎有公一墩當水白三月落花紅㪅作書生詠青山夕照中香亭得雄於其去歳所失小郞有再生之徵一詩爲賀兼以識異普門大士感修熏福德兒重乞細君正似吾鄉張太傅再招東晉大將軍張文端太傅母始夢有異人自稱王敦至其家生子名敦哥數歲殞母慟甚夢異人復至日吾終爲夫人子遂產太傅名之敦復太傅長遂以爲字金環桒穴眞堪信老蚌珠胎倍可欣逸少諸郎他日貴不妨小者最超羣次韻荅朱二亭遼闊江山又値秋企余猶限水悠悠文章我欲從障瓿筋力君堪較上樓風雨白門尋史傳邱山黄土想朋儔幸餘秃鬢人閒老那不相思一命舟題朱涵齋都統便面洛神兼臨十三行二首誰識傷心賦洛神毎思千載一天人持將便面西風障卻愛淩波韈下塵都統丹靑祕殿儲偶傳􅍘箑亦琳璵正如大令多兼擅烏㹀牛成便作書
