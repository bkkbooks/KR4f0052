body:
  text: 論范蠡論范蠡之子殺人繫于楚蠡令其少子行千金於所善楚莊生救之其長子請行不許其後卒強以行於是莊生因為入朝楚王而説之赦蠡長子聞楚將赦謂弟固可活矣入莊生家復取金去莊生怒竟説楚王論殺其弟人以此稱蠡始不欲遣其長子為知也自君子觀之蠡固未嘗知也比之蹇曰比之匪人隨之震曰孚於嘉吉夫以匪人之比而望嘉字之吉其可乎吾觀莊生非賢者也其褊心與市井小人之為慮無以異而蠡顧以其子之命委之烏得知方蠡子之進金莊生也如果不欲受郤之可也既思終還之則雖為取去奚嫌焉蓋生以為救蠡之子而其家不見德則不足以為名又忿已以力為人而反為人所易故雖當其厚友之託不顧而必以術殺其子噫抑甚矣郈成子過衛右宰穀臣饗之欲託以其帑而未言及穀臣死迎其妻子分宅而居之晉叔向繫獄祈奚乘馹見范宣子言而出之不見叔向而歸夫受人之事則死生不以變其志急人之難而非為名高此固古賢人君子所為而蠡乃以望於莊生及其不得反以為其長子致之何其謬也且蠡當日即令遣其少子如楚而其子之囚於楚者亦必不可救何則長子生而貧則􅞋而貴財少子長而富則亦驕而輕士今使膏梁之子忽視貧士指麾而為之用則雖豫之厚利而不甘況以莊生之褊心多忌挾殘忍以報睚眥設以少年輕肆之氣乘之蠡之子不愈危哉嘗考范蠡之行當其相越所圖皆傾險之謀及越破吳吳危急而求成句踐欲許獨蠡不可而必亟斃之其意蓋亦忍矣夫涘頻之水鱣鮪不遊離靡之草虎豹不居旦暮之交君子弗與故必內行僃而後可友天下之士友天下之士而后為之謀則忠信而不私當其事則利害而不渝故君子重修身而貴擇交而蠡之所為殘忍刻薄其事獨與莊生者相近宜其心賢之而欲倚以為重也而豈知身受其禍也哉伍子胥論昔者嘗怪樂毅之於燕伍子胥之於吳皆以受任於先君之時及至嗣子棄之於是毅遂超然遠引而子胥乃戀戀不去終以諫死于吳若是之不同何也蓋古所謂忠臣之行必度其心之所安而後為非以苟託於名義以自居而遂可也今夫毅之仕燕也所任者軍旅之事耳惠王死而兵權奪毅雖留固無可為矣當伍子胥困屈楚鄭之郊飄搖江海之間結吳光于草野之際一旦攝吳國而乘之卒以君臣相倚報父仇而成君之名于天下其與吳相得如父子手足員雖烏集起事而其實與世胄同國休戚者等吾意闔廬之死也必以吳託之子胥子胥亦必慨然任而不辭子胥之心方以為受先君之恩寄社稷之重思盡其輔弼之任雖播棄而不忍自疏而不料夫差之終愎不悛遂泯絶其身而莫之復省也設令子胥于驟諫不用之時即引身去國人亦誰得而議之而樂毅之書至謂子胥不知主之不同量是其行固不免為天下之所譏而子胥終不肯以彼易此者蓋彼徒以求其心之慊然而無憾者夫豈以行事求白於衆多之口也哉或曰子胥之諫夫差其時季札與同立于朝季子親于吳而反不以諫死何耶蓋自諸樊戴吳欲以位傳季子而季子又以賢得民彼夫差者忌而遠之甚矣微子啓帝乙之長子也疑于紂而紂疏之故抱器適周而奉商祀微子季札之不諫知不可諫而以身存宗也伍員之諫恃夙昔之恩而冀君之一悟也而柳宗元乃從而非之以為非吳親屬諫死為過夫彼謂為親屬者固宜死也而微子季札之不死又豈非親屬者哉翰林論為天子侍從之臣拾遺補闕其常任也天子雖明聖不謂無失人臣雖非大賢不謂當職而不陳君之失與其有失播諸天下而改之不若傳諸朝廷而改之之善也傳諸朝廷而改之不若初見聞諸左右而改之之善也翰林居天子左右為近臣則諫其失也宜先于衆人見君之失而智不及辨與則不明智及辨之而諱言與則不忠侍從者擇其忠且明而居之者也唐之初設翰林百工皆入焉猥下之職也其後乃益親益尊益親益尊故責之益重今有人焉其于官也受其親與尊而辭其責之重將不蒙世譏乎官之失職也不亦久乎以宜蒙世譏者而上下皆謂其當然是以晏然而無可為安居而食其祿自唐及宋及元明官制因革六七百年其不革者御史有彈劾之責而兼諫爭翰林有制造文章之事而兼諫爭彈劾制造文章所別也諫爭所同也其為言官也奚以異入而面爭於左右出而上書陳事其為諫也奚以異今也獨謂御史言官而翰林不當有諫書是知其一而失其一也是故君子求乎道細人求乎技君子之職以道細人之職以技使世之君子賦若相如鄒枚善敘史事若太史公班固詩若李杜文若韓柳歐曾蘇氏雖至工猶技也技之中固有道焉不若極忠諫爭為道之大也徒以文字居翰林者是技而已若唐初之翰林者則若是可矣今之翰林固不可云皆親近居左右然固有親近居左右者且翰詹立班于科道上謂其近臣也居近臣之班不知近臣之職可乎明之翰林皆知其職也諫爭之人接踵諫爭之辭連策而時書今之人不以為其職也或取其忠而議其言為出位夫以盡職為出位世孰肯為盡職者余竊有惑焉作翰林論李斯論蘇子瞻謂李斯以荀卿之學亂天下是不然秦之亂天下之法無待于李斯斯亦未嘗以其學事秦當秦之中葉孝公即位得商鞅任之商鞅教孝公燔詩書明法令設告坐之過而禁遊宦之民因秦國地形便利用其法富強數世兼并諸侯迄至始皇始皇之時一用商鞅成法而已雖李斯助之言其便利益成秦亂然使李斯不言其便始皇固自為之而不厭何也秦之甘于刻薄而便于嚴法久矣其後世所習以為善者也斯逆探始皇二世之心非是不足以中侈君而張吾之寵是以盡舍其師荀卿之學而為商鞅之學掃去三代先王仁政而一切取自恣肆以為治焚詩書禁學士滅三代法而尚督責斯非行其學也趨時而已設所遭值非始皇二世斯之術將不出於此非為仁也亦以趨時而已君子之仕也進不隱賢小人之仕也無論所學識非也即有學識甚當見其君國行事悖謬無義疾首嚬蹙于私家之居而矜夸導譽於朝廷之上知其不義而勸為之者謂天下將諒我之無可奈何于吾君而不吾罪也知其將喪國家而為之者謂當吾身容可以免也且夫小人雖明知世之將亂而終不以易目前之富貴而以富貴之謀貽天下之亂固有終身安享榮樂禍遺後人而彼宴然無與者矣嗟乎秦未亡而斯先𬒳五刑夷三族也其天之誅惡人亦有時而信也邪易曰眇能視跛能履履虎尾嘻人凶其能視且履者幸也而卒于凶者蓋其自取邪且夫人有為善而受教于人者矣未聞為惡而必受教于人者也荀卿述先王而頌言儒效雖間有得失而大體得治世之要而蘇氏以李斯之害天下罪及于卿不亦遠乎行其學而害秦者商鞅也舍其學而害秦者李斯也商君禁遊宦而李斯諫逐客其始之不同術也而卒出于同者豈其本志哉宋之世王介甫以平生所學建熙寧新法其後章惇曾布張商英蔡京之倫曷嘗學介甫之學邪而以介甫之政促亡宋與李斯事頗相類夫世言法術之學足亡人國固也吾謂人臣善探其君之隱一以委曲變化從世好者其為人尤可畏哉尤可畏哉賈生明申商論太史公日賈生􅏯錯明申商公孫宏用儒術顯世多疑之果若是則公孫宏賢於賈生邪宋儒者以為生上書謂髖髀之所非斤則斧以此待諸侯為申韓之意吾謂不然生欲立法制以約諸侯王使受地有定不致入于罪而抗剄之所以為安全也斤斧以取譬耳豈刑戮謂哉此不足為生病然遂謂太史公偽誣賈生則亦非也夫戰國以來百家並興雖或純或駮或陋且謬悖推本之彼亦各原於聖人之一端未嘗不可相為用也顧用之何如耳冬必袁而夏必綌者時也齊甘苦酸辛醎而御之者和也諸葛武侯當先主之時寬法孝直救李邈張裕其用意一出于慈仁乃以申韓之書教後主知其所不能也且賈生諸葛皆所謂天下之才識時務之要者矣申商明君臣之分審名實使吏奉法令而度數可循守雖聖人作豈能廢其説哉然使述此於景武之時則與處烈風而進翣者何以異良醫不能使鍾乳烏頭之無毒而使其毒不為患也惟文帝仁厚而所不足者在于法制故賈生勸之立君臣等上下法制定則天下安此皆申商之長也申商之短在于刻薄賈生之知足以知文帝必不如申商之刻特患不能用其長耳景帝之天資固薄矣提殺吳太子於嬉戲疏張釋之而誅周亞夫其資如此而􅏯錯又以申商進之何怪有吳楚之難賢者視其君之資而矯正之不肖者則順其欲順其欲則言雖正而實與邪妄者等爾賈生當文帝而明申商汲長孺為武帝言黃老彼皆救世主之弊和而不同豈如公孫宏匡衡之流雖號為儒者誦説之辭洋洋盈耳而適以文其姦説者邪周公之告成王曰詰爾戎兵方行天下召公芮伯之告康王曰張皇六師若以此言施之好武之主其害豈不更重於申商哉惟於成康之時則無以復易矣吾嘗謂觀人之真偽與書之真偽其道一而已世所謂古文尚書者何其言之漫然泛博也彼以為使人誦其書莫可指􅎥者必以為聖賢之言如是其當於理也而不知言之不切者皆不當於理者也晏子不受邶殿論大夫相滅而相並者是篡殺其君之漸也齊晉之末載是已齊崔氏也亡而邑入乎慶慶氏也亡而邑入乎二惠諸族其時大夫分邑子雅辭多受少子尾既受而稍致諸公陳氏不取邑而取百車之木是三子者以為賢於吞噬之甚者則可矣以其私家相取為非人臣之道則一而已晏子將明言其不義乎得罪一國而不可為也將從而受分乎違已之心而不忍出也邦無道危行言孫其處喪則託曰惟卿為大夫其辭邶殿則託日畏失富晏子之心固亦苦矣夫晏子之賢無愧儒者世乃以孟子不欲比管晏及沮封孔子事疑其非賢是皆不然晏子蓋盛德而才差不足又直陳氏得政之日事景公庸主未嘗得君如管仲專也故其功烈非孟子王佐之才之所希也然第日管仲曾西所不為不言晏子者重晏子之德也當孔子至齊以景公之庸懦豈遽能以季孟之間期以待鄰之一儒士哉此必晏子薦之故也及其不能用孔子此必晏子所痛而知其國之將亡不可救者夫何有反沮孔子事哉晏子以儉著春秋之後墨子之徒假其説以難儒者沮孔子封事墨者造之也故載于墨子非儒篇其言以儒者為崇喪遂哀破産厚葬此墨者之陋説非粗縗斬以喪父盡禮者之言也諸侯裂地以封大夫此三晉田齊以後之事非孔子時國不過賜田邑之制也子長不能辨而載之世家雖大儒如朱子亦誤信焉是以晏子為世詬而不知其固非實也魯襄公十七年晏桓子卒平仲嗣立能為喪禮又從平陰之役意其年必逾二十其後五十七年乃會夾谷計晏子必已喪矣晏子喪而後景公行事益悖而子長言會夾谷時有晏子吾益知世家言之多謬也議兵兵民分雖有聖人不能使之復合者勢也今有人焉命其子弟入則挾策操管而學書出則量庾藪權輕重度長短持算而營什一之利其子弟必無一能矣今君國子民者佹而使耕稼之農聽號令習擊刺舍田里安居而履鋒鏑而輕死亡之難其病於衆庶而傷於國也亦明矣目不兩視耳不兩聽手左右畫則乖足跂立則先疲兵農兩為戰則速敗而田野為蕪萊國何賴此哉然古王者兵未始不出於農何也古之時征伐之事固少一旦戰而用其衆也至於萬人則為多矣日行三十里而舍戰陳必以禮節焉擇素教之人而使進退止伐於疆埸之交不啻為揖讓俯仰於庭戶之內也夫何為不可後世不然動以百萬之師決勝於呼吸之頃屠滅之慘川谷流膏血軍旅數動則士長齒稿馘於營幕之中當此之時士卒知戰門而已居則暴桀而與人若不同類固不可使伏居井里而民苟非習於兵者亦不可使之復為兵矣昔者湯之伐桀也民則曰舍我穡事湯至仁也以民為兵不免於怨若後世之兵善撫循之或踴躍以從戎事豈將能賢於湯武哉兵與民分之故也昔者管仲用齊欲以兵服諸侯管仲知先王兵民為一之制不可以決戰故參其國伍其鄙國中士之鄉十五五鄉為一軍參其國故三軍以方行天下伍其鄙故野有五屬五屬皆農夫而已國則為軍鄙則為農雖不盡若唐宋以後之制而兵民之分自是始故齊之伯天下者兵習戰而農不勞是故管子天下才也謂兵不可擾農亦不可盡一國而為兵定以三萬人教以軍令使之足用是故兵必習戰農必習耕兵不習戰農不習耕雖多不如其寡巳嗚呼後之為兵者何異於管子也兵額多而不盡可戰又不欲養兵而逸之使之不習戰而習於百役自明以來運糧之丁其始兵也而卒不能持一梃以與怯夫為鬥然以代民轉輸之苦尚有説也今之營伍有戰兵有守兵不習知戰守之事顧使之雜為捕伺盜賊詰私販娼妓賭博之任無不與是直有司事耳使兵足任之而有司不能何以為有司況兵藉是名而恐猲取財擾地方為害者有之矣夫兵農惟不欲兼也故使之專於為兵今之紛然而呼於市而誰何於道路者夫豈非兼任也則又不若使為農之為愈也惜抱軒詩集一古體五十六首錢舜舉蕭翼賺蘭亭圖萬壑千巖當坐起􅍘取越東山百里世間不見永和人長有春風流曲水滄海日高開寺樓樓上當窗僧白頭越僧世得鍾張法頭白朝朝摹禊帖扣門客坐軒檻風茶香酒暖笑語同致君有道堯舜出訪古無人羲獻空頻説法書日西宴蕭郎縮手心無限老僧抵掌僧雛睨似謂慢藏旁欲諫語卿且勿諫懷璧不可居御史稱有詔明日將登車長安再拜陳玉除歐虞俯首愧不如年往運謝五百餘錢生染筆中躊蹰石牀閉絶昭陵夜無復人間第一書元人散牧晚歸圖日落未落東皋黃搖風欲靜千絲楊榆策雨後村塢涼澤中草長人微茫牛從雜遝老牸將刺促或走或羊望或掉尾立銜藏莨牛背短箠二尺強握坐者牧舟樹檣或來以笛吹其旁據牛橫坐如胡牀後有蓬髮趨踉蹡前有招之右袂張首伏牛後尻前昂二人蓑薜行驅羊掀笠偃背丫髻長其一糾笠風中揚林木度盡橫陂塘前村暝色寒蒼蒼一人先俟牛宮旁繞宅榆柳靑蒼筤老􅡇飽腹飯黃粱出攜幼稚嬉徜徉少婦機杵鳴東廂人生正可知農桑春夏耕牧秋築場不見臧穀羊皆亡嗟哉此畫真吾鄉山寺四山動秋響高林黯將夕披雲度寒榛暮陰下前壁寺門風蕭蕭飛葉滿巖積箐嶼暗深溪淙鳴出穹石想見谷口外落日遠峯碧一磬流煙中萬壑抱簷隙豈無湛冥人於茲衣蘿薜初月輝易盡悵望遂停䇿偕一靑仲郛應宿登城北小山至夜作秋聲鴻澤滿暑氣蟲階謝攜客眺寒原居人斂餘稼酒取脫枝溫席以柔莎藉餘照在單椒暝色生林下泫露亘天垂巨壑當巖瀉微風度灌吟淡月流雲罅情集交悲歡生得幾淸暇寧於蟪蛄春而慕燕雀夏視後無虛鞭規前有戒駕懷哉古已遙逝者今方乍勿歎平分秋更卜將來夜春雨日暮東風休掩卷幽窗靜颯然春雨來一室生微冷時有棲鳥聲自令虛懷警咏古和璧非珠翠流光悅婦人章華宮畔路夫子欲何陳客行漢江渚思見遊女神蘋皋風日晚寧不怨青春秦皇服胡越六合歸懸衡雄心中不繼乃築女懷淸漢廷策賢良褒然儒董生慷慨公儀子食祿復何營如何桑與孔賈豎充簪纓富民封丞相他日悔心萌巳衰不再盛痛惜此孤􅑏鼓枻出大江回首樅陽渡中有漢帝臺言是射蛟處日夕天風吹靑條變枯樹上有黃鳥吟下有寒兔顧憶昔翠華遊帆檣隔雲霧中流造新歌淸音發衆嫭巡遊既已疲神仙不可遇為念祈招詩廣心焉所務循吏有兒寬乃以負租黜設吏為繭絲何以責乾沒念彼魏二臣屬厭風饋畢豈不愛吾君懼以滋遺失高亭發秋吹廣野多邊聲誰和羌笛歌難為愁士聽昔應縣官募希有絶幕名奮隨兩校尉西詣車師城夷虜衆且桀漢障懸孤旌創夷更登陴回首涕縱橫纍月鬻弩鎧援絶城遂傾將軍既效命舊卒皆凋零歸來室家盡門巷荊棘平咋聞漢天子巳拔單于庭微功不得録委棄秋草並贈郭昆甫焌助教老儒閉門元向白牢邪石邪五鹿客寄生入盆為窶數衰盛人間如反手君才磊落天下奇四海賢俊誰不知五年見子銅駝陌淡沱東風吹鬢絲朝為石鼓詩暮奏鹿嗚雅先生且臥鴻都下絳帳談經淡瀟灑嗟我水車旱資舟嗟君反衣孤白裘三月春心寄鳴鴈南來飛過嶽陽樓為王琴德昶題泖湖漁舍圖即送旋里王郎昔居泖湖裏出戶觀漁並湖水王郎今作漁舍圖紙上蘆菰北風起蘆花菰葉風蕭蕭煙深不見垂虹橋水澤朝飛洞庭雨亭皋暮落吳江潮江上漁村帶寒巘緩刺輕舟向平遠波靜鳴榔月上遲日斜挂席風吹晚曉來網得淞江鱸尊有淸酒飯炊菰蘆簾紙閣夜颯颯風雨坐伴靑鐙孤就中隱約畫師意蒼茫一葉湖山次頗似蒲帆別岸初回頭恰見湖中寺只此丹青貌故山拂衣歸思向雲間秋風夜火松陵驛唯有漁人認客還感春雜詠八首䢅坐執書䇿惘焉思古人勳業建九州名德在一身一身尚不治九州安能仁積水必成淵何患賤且貧苟非秋實堅孰為春木芚客來各有勸匪我同心親不恤同心鮮所感餘澤淪新陽散餘沍和風泛窗􅎉披褐藹自怡舉象難為名坐有素琴彈流韻方泠泠往復動心志終奏有希聲其人五百年遇我一朝並神理不可滅道與天地貞使我百世下無以移此情夜聞子規啼朝看春巳晚圜天高九重誰令互激轉北陸既藏凌西宅復寅餞野草青更靑衰盛吾何辨中谷多雨寒叢蘭蔽幽阻託身萬物表英華與誰睹既荷春陽氣柔芳冒寸土處有不自矜養節故難侮雖無桃李蹊豈失松桂伍葆真復其根甘與此終古可憐夭桃花植彼玉階側旖旎揚柔枝上與綺窗直美人出素手日攬芳菲色朝糚倭墮鬢暮作金瓶飾采采枝巳空何以成秋實陽澤降時雨卉木初萋萋黃隕豈其時片葉飛吾階昊天施大化榮悴理不齊胡為日與人多寡較毫釐聖舜乃惡父牧犢遂無妻順命苟無忤焉往不得諧橘樹多好陰乃在湘江涯光風蕩朝日朱實榮緑枝馨香既遠達乃託白玉墀被遇主人盻賓客皆嗟咨植根諒非舊為枳復何悲昨日衆賓會送我臨漳河芳草碧如染春風吹作波坐有兩少年鼓瑟而商歌一為黃鵠曲令我涕滂沱逸翮橫萬里儔侶離別多不如燕與雀啁啾相鳴和柬王禹卿病中羣舒山色如連雲萬里江濤蹙山動我昔結屋山中居歊霧蒸雲日澒洞青簑短棹放中流山壑貞觀信天縱與君初未奉餘歡各對煙波一江共而今俱作長安人林麓朝辭暮羈鞚論交塵土一茫然回首前遊渺淸夢生平素無諧俗韻轉喉棖觸嫌譏諷雖非雛鼠隔雲泥忍為蠻觸競庸衆君才磊砢出千尋匠石如逢任梁棟雕鐫緣飾會成名枉耽淸吟如鳥哢只今病臥況兼旬朝夕鹽虀愁屢空妻子牛衣色尚欣邑人狗監文誰誦燕山雲物萬里淸落葉秋聲一庭送高蓋誰過敝席門酒徒為具新芻甕愛君力疾劇淸狂尚有瑰詞成酒中跌宕寧非軼世才激昂頗負窮途慟從來烈士志濟時一割鉛刀貴為用不然脫屣去人間肯伏光範稱鄉貢君懷奇興逸如鴻我逢有道慚非鳳依違見事信為遲責備時賢母乃重何當去此脫吾纍卻因疾愈思當痛山光水態終不殊俗狀塵容還自恐但須鹿門攜妻子休俟臨邛致騎從淸睴萬里兩幽人回望塵埃真一閧奉答朱竹君筠用前韻見贈朱俟磊落抱奇懷相逢意氣劇飛動視我詩筆雜一卷商榷古今真鑒洞前儒瑣屑𬒳屏棄健筆淩空出奇縱採玉荆山虎豹競織綃泉室黿鼉共珍奇海嶽悉駢羅纍壓方艚與兼鞚況辱長篇持贈余大鼎特陳吳壽夢坐覺古色盈座隅深夜秉燭耽吟諷連年摘髭取科第射䇿彤庭語驚衆從古豪傑先輦轂邇來冠蓋競高棟漿酒藿肉獨鄙夷金奏宮縣羞啽哢首春上將西出師蟻穴初開天宇空美君奏賦揚馬儔屬草文成萬人誦金閨頗未掩豪雄長轡寧惟資縱送嗟余舊業本躬稼回首寒山餘牖甕欲鼠持璞真聽熒射虎臨石枉命中平生思就季主卜淸時焉用賈誼慟只今潦倒愧君知奭也雕龍具非用憶昔談子劉海峯與陳伯思時余初隨計吏貢未及相如被放歸郊坰空望觚稜鳳而今幸得比戶居晨夕相從荷倚重吾生關塞棲遲感故人江漢飄零痛落落獨為燕市飮駸駸況對􅋊秋恐君方簪筆入承明努力拾遺供侍從子將散髮入林深好聽砰訇泉石閧王君病起有詩見和因復次韻贈之我如惰農春未種已失農祥土膏動室如懸磬待遺秉大腹便便乃空洞由來人苦不自知未免心侈還口縱君方鋭敏有奇懷遠駕千古誰能共渥窪天馬或􅘆弛那遽柔心受持鞚高掌擘分二華嶽開胸吞納九雲夢何由菖歜獨嗜余不惜揄揚雜諫諷心親料應塵埃稀迹奇反致嫌猜衆子輿一病殊跰􅓷惟有擁衾看屋棟時余獨處復誰憐喬木虛庭響寒哢蟋蟀俄驚旅舍秋蛜蝛頗惻幽房空昨君新愈幸來過依舊雄談間歌誦短袖百尺光熊熊未出霜縑目先送千帆寒水下金陵一鴈秋聲橫鐵甕遠思瞑浦落帆還苦怨騷人薄寒中舊遊曾對孫登嘯新詩欲作唐衢慟磊落君才祗自知支離余德彌無用慚非大厦任帡幪恥作小璣號遊貢神全聊當比木雞德衰豈敢歌苞鳳方今聖德足兼包坐御共球湊居重南塞宣房萬福來北治胸奴一方痛有道未穀奚為恥薄植乘時反足恐雲霄未上且沈冥幅巾步屧鴟夷從明朝牆角見黃花泥酒相將一喧閧往與長沙郭昆甫遊歷城西見小千佛寺菊花甚盛昨復過其處􅋊菊無幾寺僧亦亡是時昆甫殁一年矣適竹君又次前韻來勉僕為學辭意甚美中頗念及昆甫並吾鄉孫汝昂余感其事因更答之去年重九天氣佳城角黃花倚風動精廬偶與故人來卻眺晴雲出煙洞竟填溝壑且無論自比雲龍吐豪縱今年重九故人死濁酒盈尊強誰共蕭蕭風雨動秋城席帽短驢時獨鞚晝陰荒寺更無人臥地􅋊英杳如夢寒蟬哀鴈共吟秋雖有新詩向誰諷豈期復遇翰林知謂我才殊千百衆投詩見和託幽思欲候雲旗桂為棟居然雅樂發遺音豈肯繁絃奏新哢中間陳義亦何堅列櫓巖城誰穴空古聖垂教宏且遠六籍具存可説誦尚思時述蛾子勤敢取謏聞禽犢送法言夷棄競靡詞如退韶虞樂秦甕辨麗徒於博奕賢滑稽奚貴談言中僕也幼志慕孔姬禮樂崩離每長慟博士書劵終自咍司空城旦成何用孤吟詎比郢中歌語人真若遼東貢未如口吃子雲才賦罷甘泉胸吐鳳看君少作已絶人草元行使桓談重生世交遊本寥落況經車過感腹痛酒爐從此邀君醉岐路久巳深余恐但望植學培根柢願捧珠盤譬牛從勿搜奇險持驚人似向穴中為鼠閧桃核研歌為庶子葉書山先生賦丈人石研安得之蒼然古色凝寒姿開匣四坐盡驚立蹜手不敢為摩持黯淡凸拗水痕漬鎮几礧碨重不陂潤氣上結雲絲浮晴天怒翻墨花碎陰崖江潭湛深黑大澤電光劃夜晦幽輝豈非玉質藴含􅉭況淬筆鋒利昔聞漢武靈臺夜獻桃遠致曾城駕餘核猶含茂陵思不獨銅人泣元霸或言天上隕星精下入淵谷為玉英千秋潄激風波爭至今尚作濤頭形曾為趙宋宮中祕上有君謨作題字御府流傳景祐藏夢華髣佛東京事宣和文物太淸樓艮嶽奇山錦石稠九重博古親翰墨焉知玩物非良謀北風塵冥靑城路舊物飄零竟何處淸燕當時御至尊丹鉛此日供儒素槖筆朝成奇木對屬車暮奏長楊賦文章猶壯身衰老金石無情世今故龍溪流水萬竿竹無數秋山點紅樹丈人雅意慕投簪他日煙霞墨池吐讀史古來江海人抗懷天下事閲歷多激情沈冥有餘志賈生洛陽子梅福抱關吏流涕復上書言之豈不義賢者與道隆儒林惡言肆願從君子遊寡學當默識詠史白日黯淡明河光騑騑駟馬驅王良萬廡天庫開天倉北斗何為挹酒漿市樓炯照旗亭張磊落錢室金為堂西園車馬趨道旁詔版朝裁授使者明日司徒拜階下後車鮐鮑前建旄擊鐘列鼎朱門高室中何物灑屑刀君不見夏王初定九州貢茅茨已遠蠙珠用傾宮璇室後王多筐篋司農愁屢空一任臨民責繭絲安知長國傾梁棟匹縑持出別宮門滿堂金玉還飢凍方知洛誥享多儀發粟當年有餘痛臨淸雨夜昔挂輕帆濟江澤載酒同舟盡佳客兩岸秋聲楓樹靑半夜月明江水白飄零朋舊感平生搖落關河復今夕漳水東流汶水淸寒雨孤篷百憂積酬胡君業宏我如遊雲出廬霍千里飄飄向京洛黃山西畔初別君溪流飮馬桃花落江南花落幾春風羇思漁陽飛塞鴻今年乘舟玩海月片帆淮甸搖晴空西尋廬阜彭蠡側拂袖千峯萬峯碧仙人一去白雲秋明月無心照石壁遠公東林寺徐孺南昌宅寒草蒼煙昏似積我對靑天空太息丹楓十月凋南州雨聲寒抱章江樓登高把酒忽相遇昔君頗料如今不明月寒胎耀當代楚望沈淪媚幽彩人間得失似浮雲且對江山吾輩在淸詩一唱碧霄間五色餘霞散湖海湖海西風萬里吹酒闌明日各天涯青山挂席余將去嗟爾塵埃玉樹姿望廬山我行昨出廬山西藤竹蒼蒼陰虎溪東林鐘聲晚出寺高巖木葉秋平溪白雲萬疉倏然合窈眇回聽淸猿啼洪州三月憶惝愡徑駕歸艇輕於鷖宮亭湖東日初出嵐彩欲見一片靑煙迷滄洲渺漭萬餘里巖風忽落聞天雞屏風疉開張􅒓入青頗黎滄海貫石梁白日挂丹梯松杉上接瀑布落藤蘿下拂雲光低須臾湖波興日晦風淒淒岧􆁿香爐峯搖曳同菰稗舟行望遠勢還出矯如踏雲浮動之蒼霓山搖海蕩不知處想見枕石醉臥人如泥晚泊湖心照南斗仰視正與石門齊莫言靈境近咫尺帆檣倏過難攀躋將遊天地之一氣廬山從我到處如提攜漫詠三首周道既巳敝儒術猶未淪暴君方代作孟子戒思申得國容有之天下必以仁秦法本商鞅日以虜使民竟能一四海詩書厝為薪發難以剗除藉始項與陳刀筆吏相漢法令惟所遵王霸雜用之叔孫為聖人盛衰益隆汙治道何由醇焉知百世後不有甚於秦天道且日變民生彌苦辛所以佛法來賢知皆委身超然思世外聞見同泯泯立人通天地斯足為大儒多聞闕其疑愼言而非迂兩漢承學者章句一何拘硜硜誠小哉賢彼不學徒奈何魏晉間放棄以恣踰靦然無汗顔誕説作偽書子雍及士安同敝無賢愚淵彌雖未來人心喪已夫不學殖將落周亂不斯須所以禁言偽宜為治君誅述兹誡當來愼以防厥初子長千古士被難身何窮悲哉百年後毀譽猶不公孔子録小雅怨誹君子風美善而刺惡史筆非不忠文園為令客竊資自臨邛將死勸封禪佞諛以為工文章兩司馬擅為西漢雄人君取士節優劣安得同如何永平詔抑揚恣其胸宜乎朝廷士進者多容容所以歌五噫邈然逝梁鴻秦帝卷衣曲池水生靑蒲枝葉自相扶水緑平如故池上蒲成樹秦關百二氐王才麾劍風雲萬里來圖籍河西收四郡旌旗鄴下宴三臺燕姬趙女顔如玉輦入殽函貯金屋閣道春遊度渭南珠簾暮卷臨澧曲貴主還留巨鹿名小腰絶愛鮮卑束去國嬋娟意可憐新恩慰藉情難足别有春風飄綺羅華鐙斗帳夜煙和君王欲卷衣裳贈一片流雲奈曉何雄略英姿冠當代指麾旦夕收江外戎國分居大荔城降夷盡保長榆塞大度何嘗愧帝王驕心豈免成傷敗卷衣空憶可憐宵月底花枝煙柳條婕好從招秦苑鴈侍中曾插漢宮貂錦袍再賜無顔色笑殺河東金步搖當年力戰壺關闢雀來燕室誠何益女戎亡國志先荒那係南朝謝安石千秋編簡載功名一朝富貴埋荆棘靑蒲零落水東流不見霓旌下枋頭碧雲散盡梧桐影太息阿房幾度秋唐伯虎匡廬瀑布圖江南萬重山匡廬乃出萬重上人言秋晴萬里峩􅖭巔靑天一點東南望連峯蒼蒼不見頂日出彩煙生半嶺玉堂石室藏其中縱有天風吹不冷羣巖環峙不可名巖端霞氣升空行石梁忽貫靑霞落倒海流雲走空壑萬谷鈞天廣樂鳴思鳥哀猿一時作石門百仞當空開吳越江帆千里來仰首見吳越俯首聞風雷何人攜杖凌倒景蕭條六合誰友哉林岑藤蔦相撑拒驂鸞過處原無路世間惟有銀河數派通濺珠飛玉流平處我昨乘小艇正出宮亭湖湖心黯黕沈黛色夕陽一半開菰蒲是時初冬水不落懸知崆㟅巨壑轟千車傾崖曲􅔍天長雨山鬼幽篁人見無咫尺未登疑有命評畫看山定誰勝煙雲絶境自人間文采風流隔嘉靖流落常年惜異才江山尺絹今􅋊剩人生衰老來無時五嶽求仙莫辭敻雨霽高齋過暑雨白雲逝滄洲涼風起林杪一葉巳先秋落照耿空開倏與蒼煙收西山轉斜漢龍角相隨流朝晡不相知逝者焉能留今之隱凡者未審當奚遊田家昨宵雨未足劚畦俟南塘果聞北山雷簷澑夜已長開門陰正重匝地垂千楊朝日尚未升風條自輕揚環村水盡白丹杏獨含光荷鍤向隴上但聞土膏香鄰里盡言好吾欲良亦償勤劬待一飽四體誠安康相與不相負莫若種稻粱詠七國孔道窮獲麟風雅泯無正蚩蚩六國主蟲豸力爭競函關向東啓四海一朝定銅柱絀燕謀天奚愛秦政屈子放湘流信陵罷稱病傷哉鄭國渠延韓數年命當時天下士寧蹈東海敻松柏與房陵哀歌不堪聽寄友一室聞秋鴈倏有江海思空水淡寒天遙待孤帆至念君朝未來誰當共吾逝相望隔淸溪西風滿林次出獨山湖至江口作初日澄前陂餘陰淡巖曲淸流杳終古宛此媚幽獨煙消淨衰草風來振疏木移舟度雲影停橈玩空淥理味後人蹤興與前遊屬託世楚雲裏孤懷亮自足連日淸齋寫佛經偶作數句結髮慕勝因而復役人事秋空泝江水勝地雲帆至煙際東林鐘月出山谷寺猿鳥諸天外中宵倚寒被劣觀淸靜理一寓情賞寄遣物非安排取境即塵纍雪餘冬日美門掩衰草翠淸夢觸舊想即目遇新義聊披貝葉書終與忘文字過天門山鼓楫淩驚波連山缺東隅飄颻天門上千里見全吳鍾阜何盤盤列城帶江湖風高黃雲動日落靑天孤不見昭明宮羅綺為榛蕪草白風蕭蕭枯樹上啼烏所以豪傑士竹帛奮良圖良圖亦焉在樹立才須臾悲風與流水萬古一歸墟不如和叩舷高歌稱釣徒送演綸歸里西風吹海月萬里散銀山裴􅏆淸夜席照君如玉顔玉顔願長保日月逝不間如何言別遽不念相逢艱金尊斟緑醅為唱古陽關男兒非藤木安得相附攀君有江上宅靑山繞如環朝望江雲起暮入江雲間雲開江路盡山月照君還送子潁之淮南憶昔去家三千里未有交遊託燕市當時獨聞劉海峯每把淸尊説吾子尊府多年為貴臣君才氣更凌靑雲會稽禹穴華嶽頂胸中萬里千嶙峋歸來風月淡襟抱勢去金貂非等倫君愛朋交重圭璧不恤家空徒四壁壯士論心天地間往往狂歌同落魄去君遠下滄江煙醉臥白雲天上船西風落葉東流水嬌首南鴻思北燕新知強對傷懷抱未若平生故交好海峯老隔黃山雲見子依燃薊門道雄才應勒萬里勳收身豈厭五湖島但願為龍我作雲對子玉顔長不老千里淮南雲水昏幾人流落憐王係平生志意詎如此離緒茫茫何可論萬柳堂分韻得房字驅車轢草越敗牆高柳萬數餘兩行同來十客弔荒圃自昔幾輩升此堂相公退直紫微省詞客盡會平泉莊外張緑雲作帷幕中吹白雪調竽簧尚餘杗桷挂蛛網已無戶牖開蜂房脫輻當門婦塵席舉案置地斟虛觴平生眩視魯郊饗日思埋迹蟻邱漿治世羣才美可用放言吾志嘻其荒已知堯桀未須辨焉明凡楚今誰亡默對荒陂夕陽盡獨憶秋風江水長僕夫促駕各歸去回首陳迹煙蒼蒼泊聊城高柳汶川飇落日聊城煙元雲翳明月忽墮孤舟前衆星稍磊落空水正回旋腼思燕將守辨説下魯連達士貴逃名奚以解紛慱一朝辭世網泯迹東海邊高臺今突兀空枕汶陽田南旺湖一花開湖尾千楊映緑潯孤霞照幽步春風蕩遠陰鱗鱗渚雲合渺渺平湖深不知水影外猶受天光侵遊目極東隅頗聞岱西岑石樓瞰海日礀戶窺花林春巖滴幽竇草木蒙淸音雲峯不可見高原誰為尋時有漁帆逝遠接鷗鳥沈蒼煙忽暝色惆望空勞心蜀山湖步登高阜巔一眺衆川會崩騰壓雲下濆薄吹地隘南旺夾雙鏡淸汶劃橫帶當空晝日陰將雨天風大連瀾將我心超越長天外廣宇靜蕭條歸鴻忽流瀨卷石屹沇溶明波被翳薈頗似團亭遊中逗弧山礙據地乃偏遐瀕江富樅檜寓目偶為佳風景誰當最吾行未可留登艫遄擊汏邳州黃山下邳有老父來登下邳橋遺身濁世外六合皆蕭條偶傳太公書聊以定紛淆卷舒出形迹可遇不可招寄語張孺子起佐興王朝一身尚為石功名何足驕我來秋草歇南渡黃河潮大風起泗上白雲莽蕭蕭英雄盡泯滅仙迹空岧嶤題沈學子步屧尋幽圖君昔依山居孤懷靦高寄步屧逐泉聲因風造幽地一徑獨流煙千山共成翠空巖太古花不與松柏異閉絶未成蹊焉知有開墜自與深山辭餘嵐在衣被夢渡泖湖陂圖成廣陵市萬壑動春雲為君渡江至余亦泉石人因之悵遙思贈沈方穀昨挂雲帆來黃河流浩浩遙天沃日滄海波長風送客淮南道不見隋朝之宮殿但見隋堤之芳草蕪城蕭索無可歡卻遇故人情獨好真珠滴酒斟金杯櫻筍玉􅎒珊瑚堆脫冠把袂相徘徊夜深星斗滿空落仰見孤鶴橫江來身後名生前酒二者於吾並何有嘗願登臨九子峯又思放浪五湖口難得人生一日間況值相知十年久看君鸞鳳才標孤秋風吹翼升天都難䇿言堪詘丞相作賦才寧非大夫豫章𣏌梓雲霄上豈與人間伴社樗楚雨才晴京口樹上有流雲不知處君望西南千萬峯我棹漁舟從此去遇劉朴夫坐逢春巳晚留滯楊州郭獨立望寒潮江空夏雲作雲中忽見君來帆廣陵落自攜蘭陵酒殷勤為余酌新詩別更奇玉貌看猶昨白雨灑開軒紅鐙照垂幕非賴此流連何能忘蕭索與侍潞川鄭楓人集不其山房分韻得希字江郭晴朝雨煙草滋掩扉紅藥坐成晚靑山仍未歸高齋方置酒良會遽披衣垂簾石蘚長拂硯風花飛業承愛微劣敢言知貴希所慙乏文藻況念歇芳菲終反羣舒路相望林岫微與王禹卿泛舟至平山堂即送其之臨安府往年與子遊揚州紅蕖盡落陂塘秋秋風吹江上海月照見蒼煙吹笛之孤舟形骸放浪各無纍釣竿只欲垂滄洲君後文辭動天子起家簪筆承明裏我復逢君向鳳城對把淸尊思故里春日辭君返鄉縣江草江花不相見何意昨宵明月來重照揚州故人面一麾出守未須嫌且泛江南水如練江南水暖揚州城亭閣半空絃管聲垂楊一棹千絲輕船窗玉面歌童出捧手迎君如有情錦帆畫舸競朝渡翠袖紅妝看晚明松風吹入棲靈寺一片斜陽渡江至江雲葉葉向南飛繞遍吳山萬重翠青山雖好不留君為念來朝復愁思愁思迢迢送別離勸君努力向天涯鳳皇須下滇南郡處士虛聲何足奇贈侍潞川走昔少年時志尚在狂狷希濶古哲人奮學乃所願北渡超大河遇子燕山甸謂我如草木臭味吾同薦步登昭王臺滹沱蕩南面塞上來驚風白日色俱變慷慨和悲歌流俗頗笑訕從此別春明三年乃一見相見復奔馳豈不傷貧賤今年訪子居淮堤緑楊遍紅鐙照故人洗盞復相勸誰言壯士懷不如兒女戀感舊默傷懷日月幾賓餞借問此何時夏屋飛乳燕嗟吾倦遠遊明朝返鄉縣身世如萍波茫茫孰先辨惟慙志業衰如何答深眷雨行白沙嶺至旵沖遂宿覽物長松杪春谷正蔥芊北望雙闕門硤石何蒼然寒雨從中來白雲鬱鉤連山鳥排空鳴四嶺下飛泉林崖倏開闔磴嶂窈回旋稍稍出孤村盤盤下蒼煙霽樹遠禽歸溼陰小桃姸俯仰羣化間何時不推遷真賞存物表了遇空山前鐙窗響松澗此意欲誰傳
